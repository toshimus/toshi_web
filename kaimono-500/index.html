    ////////////////////////////////////////////////////////////////////////
    // 角丸四角の基本変数定義
    // x = 左上の頂点x座標
    // y = 左上の頂点y座標
    // w = 横の長さ
    // h = 縦の長さ
    // r = 角丸の半径
    // color = "#9999FF";  //塗りつぶし色
    ////////////////////////////////////////////////////////////////////////
        function drawsq(x,y,w,h,r,color) {
            document.getElementById('pic_h').getContext('2d').beginPath();
            document.getElementById('pic_h').getContext('2d').lineWidth = 1;
            document.getElementById('pic_h').getContext('2d').strokeStyle = color;
            document.getElementById('pic_h').getContext('2d').fillStyle = color;
            document.getElementById('pic_h').getContext('2d').moveTo(x,y + r);
            document.getElementById('pic_h').getContext('2d').arc(x+r,y+h-r,r,Math.PI,Math.PI*0.5,true);
            document.getElementById('pic_h').getContext('2d').arc(x+w-r,y+h-r,r,Math.PI*0.5,0,1);
            document.getElementById('pic_h').getContext('2d').arc(x+w-r,y+r,r,0,Math.PI*1.5,1);
            document.getElementById('pic_h').getContext('2d').arc(x+r,y+r,r,Math.PI*1.5,Math.PI,1);       
            document.getElementById('pic_h').getContext('2d').closePath();
            document.getElementById('pic_h').getContext('2d').stroke();
            document.getElementById('pic_h').getContext('2d').fill();
        }
