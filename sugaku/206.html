<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>2桁+2桁のたし算（ひっ算）</title>

<!-- 共通スタイルの読み込み -->
<link rel="stylesheet" href="app-common.css">

<style>
    /* 画面全体（黒い余白部分） */
    html, body {
        height: 100%;
        width: 100%;
        overflow: hidden;
        margin: 0;
        padding: 0;
        background-color: #222;
        display: flex;
        justify-content: center;
        align-items: center;
    }
    
    /* デバイスサイズに合わせて伸縮するラッパー */
    #canvas-wrapper {
        width: 100vw;
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        overflow: hidden;
    }

    /* 内部の仮想キャンバス（固定解像度の画面: 1024x768） */
    .app-body {
        width: 1024px;   /* 論理的な横幅（固定） */
        height: 768px;   /* 論理的な縦幅（固定・4:3） */
        background-color: #ffffff;
        position: relative;
        transform-origin: center center; /* 中央を基準に拡縮 */
        padding: 20px;
        box-sizing: border-box;
        border-radius: 10px;
        box-shadow: 0 0 20px rgba(0,0,0,0.8);
        
        font-family: "Helvetica Neue", Arial, "Hiragino Kaku Gothic ProN", "Hiragino Sans", Meiryo, sans-serif;
        color: #333;
        touch-action: none;
        user-select: none;
        -webkit-user-select: none;
    }

    .problem-container {
        display: flex;
        flex-direction: column;
        width: 100%;
        max-width: 980px;
        margin: 0 auto;
        align-items: center;
        justify-content: center;
    }

    /* ひっ算エリア */
    .hissan-wrapper {
        display: grid;
        grid-template-columns: 180px 60px 80px 80px 80px 180px; /* 左ヒント, ＋記号, 百の位, 十の位, 一の位, 右ヒント＆できたボタン */
        grid-template-rows: 50px auto auto auto auto; /* メモ, 1項目, 2項目, 横線, 答え */
        row-gap: 12px;
        column-gap: 15px;
        align-items: center;
        justify-items: center;
        font-size: 4.5rem;
        font-weight: bold;
        background-color: #f9f9f9;
        padding: 15px 30px;
        border-radius: 12px;
        border: 2px solid #eee;
        margin: 5px 0 10px 0;
    }

    .hissan-line {
        width: 100%;
        height: 6px;
        background-color: #333;
        margin: 5px 0;
    }

    /* タップできる数字 */
    .clickable-digit {
        cursor: pointer;
        border-bottom: 6px dashed;
        transition: transform 0.1s, color 0.3s;
    }
    .clickable-digit:active {
        transform: scale(0.9);
    }

    /* ヒントのコマ（アニメーション付き） */
    .hint-container {
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
        align-items: center;
        width: 100%;
        box-sizing: border-box;
    }
    .hint-container.right-hint {
        justify-content: flex-start;
        padding-left: 10px;
    }
    .hint-container.left-hint {
        justify-content: flex-end;
        padding-right: 10px;
    }

    .hint-circle {
        width: 32px;
        height: 32px;
        border-radius: 50%;
        background-color: #ff4757;
        border: 2px solid #e84118;
        display: flex;
        justify-content: center;
        align-items: center;
        color: white;
        font-weight: bold;
        font-size: 1rem;
        opacity: 0;
        transform: scale(0.2);
        animation: popIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        cursor: pointer;
        user-select: none;
        -webkit-tap-highlight-color: transparent;
    }
    .hint-circle:active {
        transform: scale(0.9) !important;
    }
    .hint-circle.blue {
        background-color: #1e90ff;
        border: 2px solid #00a8ff;
    }
    .hint-circle.tens {
        background-color: #2ed573;
        border: 2px solid #27ae60;
    }
    @keyframes popIn {
        to { opacity: 1; transform: scale(1); }
    }

    /* ドロップゾーン（解答の□） */
    .drop-zone {
        width: 80px;
        height: 85px;
        border: 4px dashed #3498db;
        background-color: #f0f8ff;
        border-radius: 12px;
        display: flex;
        justify-content: center;
        align-items: center;
        font-size: 4.5rem;
        font-weight: bold;
        cursor: pointer;
        color: #333;
        flex-shrink: 0;
    }

    /* 繰り上がり用の小さなメモ枠 */
    .memo-zone {
        width: 48px;
        height: 48px;
        border: 3px dashed #e74c3c;
        background-color: #fff5f5;
        border-radius: 8px;
        display: flex;
        justify-content: center;
        align-items: center;
        font-size: 2.5rem;
        font-weight: bold;
        cursor: pointer;
        color: #e74c3c;
        align-self: center;
    }

    .instruction-red {
        color: red;
        font-size: 1.1rem;
        font-weight: bold;
        text-align: center;
        margin-bottom: 10px;
        line-height: 1.4;
    }
    
    /* 判定ボタン */
    .check-btn {
        width: 100%;
        height: 75px;
        font-size: 1.8rem;
        cursor: pointer;
        border: 2px solid #00bfff;
        background-color: #00bfff;
        color: #fff;
        font-weight: bold;
        border-radius: 10px;
        outline: none;
        box-shadow: 0 5px 0 #0088cc;
        -webkit-tap-highlight-color: transparent;
        touch-action: manipulation;
        justify-self: center;
    }
    .check-btn:active {
        transform: translateY(5px);
        box-shadow: none;
    }
    .check-btn:disabled {
        opacity: 0.5;
        cursor: not-allowed;
        transform: translateY(5px);
        box-shadow: none;
    }
</style>
</head>
<body>

    <div id="canvas-wrapper">
        <div class="app-body">

            <!-- スタート画面 -->
            <div id="start-screen" class="start-screen">
                <h1>2桁+2桁のたし算（ひっ算）</h1>
                <button id="start-btn" class="start-btn">スタート</button>
                <div style="margin-top: 30px; text-align: center;">
                    <a href="index.html" class="menu-btn" style="background-color: #95a5a6;">メニューへ戻る</a>
                </div>
            </div>

            <!-- メイン画面 -->
            <div id="main-content" style="display: none;">
                <div class="top-nav">
                    <div class="toggle-group">
                        <label class="settings-toggle"><input type="checkbox" id="speech-checkbox" checked> スピーチON</label>
                        <label class="settings-toggle"><input type="checkbox" id="sound-checkbox" checked> 効果音ON</label>
                    </div>
                    <a href="index.html" class="back-btn">メニューへ戻る</a>
                </div>
                
                <div id="status-bar" class="status-bar"></div>
                <h1 id="question-title" class="question-title">・ つぎのたし算を求めましょう！</h1>
                
                <div id="app"></div>
                <div id="judge-overlay" class="judge-overlay"></div>
            </div>

        </div>
    </div>

    <!-- 共通JavaScriptの読み込み -->
    <script src="app-common.js"></script>
    <script src="calc-keyboard.js"></script>

    <script>
        // === 仮想キャンバスの自動スケール処理 ===
        let currentScale = 1;
        function resizeCanvas() {
            const wrapper = document.getElementById('canvas-wrapper');
            const appBody = document.querySelector('.app-body');
            if (!wrapper || !appBody) return;
            const scaleX = wrapper.clientWidth / 1024;
            const scaleY = wrapper.clientHeight / 768;
            currentScale = Math.min(scaleX, scaleY);
            appBody.style.transform = `scale(${currentScale})`;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        // ガイドメッセージ表示関数
        function showGuideMessage(msg, speakMsg) {
            AppAudio.speak(speakMsg || msg);
            let guideEl = document.getElementById('guide-toast');
            if (!guideEl) {
                guideEl = document.createElement('div');
                guideEl.id = 'guide-toast';
                guideEl.style.cssText = `
                    position: fixed;
                    bottom: 80px;
                    left: 50%;
                    transform: translateX(-50%);
                    background-color: rgba(44, 62, 80, 0.95);
                    color: #fff;
                    padding: 14px 28px;
                    border-radius: 30px;
                    font-size: 1.3rem;
                    font-weight: bold;
                    z-index: 9998;
                    pointer-events: none;
                    transition: opacity 0.3s ease;
                    text-align: center;
                    box-shadow: 0 4px 15px rgba(0,0,0,0.3);
                    white-space: nowrap;
                `;
                document.body.appendChild(guideEl);
            }
            guideEl.textContent = msg;
            guideEl.style.opacity = '1';
            clearTimeout(guideEl.timer);
            guideEl.timer = setTimeout(() => {
                guideEl.style.opacity = '0';
            }, 2500);
        }

        // 十の位専用の読み上げ辞書（2桁＋2桁のため190まで対応）
        const tensReadings = {
            10: "じゅう", 20: "にじゅう", 30: "さんじゅう", 40: "よんじゅう", 
            50: "ごじゅう", 60: "ろくじゅう", 70: "ななじゅう", 80: "はちじゅう", 90: "きゅうじゅう",
            100: "ひゃく", 110: "ひゃくじゅう", 120: "ひゃくにじゅう", 130: "ひゃくさんじゅう",
            140: "ひゃくよんじゅう", 150: "ひゃくごじゅう", 160: "ひゃくろくじゅう",
            170: "ひゃくななじゅう", 180: "ひゃくはちじゅう", 190: "ひゃくきゅうじゅう"
        };

        /* ==========================================
           問題生成と判定ロジック (2桁+2桁のひっ算)
           ========================================== */
        const problems = [];
        const seen = new Set();
        while (problems.length < 10) {
            const a = Math.floor(Math.random() * 90) + 10; // 10〜99
            const b = Math.floor(Math.random() * 90) + 10; // 10〜99
            const key = `${a}+${b}`;
            if (!seen.has(key)) {
                seen.add(key);
                problems.push({ n1: a, n2: b });
            }
        }

        let currentIndex = 0;
        let mistakeCount = 0;
        const appContainer = document.getElementById('app');
        let problemStartTime;

        function renderProblem() {
            appContainer.innerHTML = '';
            problemStartTime = new Date();

            if (currentIndex >= problems.length) {
                document.getElementById('status-bar').style.display = 'none';
                document.getElementById('question-title').style.display = 'none';
                
                const clearMsg = document.createElement('div');
                clearMsg.className = 'clear-message';
                
                let htmlContent = `<h2>全10問合格！！</h2>`;
                htmlContent += `<div class="final-result-details">`;
                htmlContent += `<div>間違えた回数： <strong>${mistakeCount}</strong> 回</div>`;
                if (mistakeCount === 0) {
                    htmlContent += `<div style="color: blue; font-weight: bold; margin-top: 15px;">パーフェクトです！素晴らしい成績です。</div>`;
                }
                htmlContent += `</div>`;
                htmlContent += `<div style="margin-top: 25px;">`;
                htmlContent += `<button class="retry-btn" onclick="location.reload()">もう一度挑戦する</button>`;
                htmlContent += `<a href="index.html" class="menu-btn">メニューへ戻る</a>`;
                htmlContent += `</div>`;
                
                clearMsg.innerHTML = htmlContent;
                appContainer.appendChild(clearMsg);
                AppAudio.speak("ぜんもんごうかくです。おつかれさでした。");
                return;
            }

            document.getElementById('status-bar').style.display = 'block';
            document.getElementById('question-title').style.display = 'block';
            document.getElementById('status-bar').textContent = `第 ${currentIndex + 1} 問 / 全 10 問`;

            const prob = problems[currentIndex];
            AppAudio.speak(`つぎのたしざんをもとめましょう。${prob.n1} たす ${prob.n2} は`);
            AppAudio.playQ();

            // 問題エリア
            const container = document.createElement('div');
            container.className = 'problem-container';

            // --- ひっ算エリア ---
            const hissanArea = document.createElement('div');
            hissanArea.className = 'hissan-wrapper';
            
            const n1Str = prob.n1.toString();
            const n2Str = prob.n2.toString();
            const correctAns = prob.n1 + prob.n2;
            const ansLength = correctAns.toString().length;

            // 繰り上がりの判定
            const hasCarry1 = (prob.n1 % 10) + (prob.n2 % 10) >= 10;
            const hasCarry10 = Math.floor(prob.n1 / 10) + Math.floor(prob.n2 / 10) + (hasCarry1 ? 1 : 0) >= 10;

            // 一の位からの繰り上がりメモ枠
            if (hasCarry1) {
                const memoBox1 = document.createElement('div');
                memoBox1.className = 'memo-zone';
                memoBox1.style.gridColumn = '4'; // 十の位
                memoBox1.style.gridRow = '1';    // メモ行
                memoBox1.addEventListener('click', () => { 
                    CalcKeyboard.open(memoBox1);
                });
                hissanArea.appendChild(memoBox1);
            }

            // 十の位からの繰り上がりメモ枠
            if (hasCarry10) {
                const memoBox10 = document.createElement('div');
                memoBox10.className = 'memo-zone';
                memoBox10.style.gridColumn = '3'; // 百の位
                memoBox10.style.gridRow = '1';    // メモ行
                memoBox10.addEventListener('click', () => { 
                    CalcKeyboard.open(memoBox10);
                });
                hissanArea.appendChild(memoBox10);
            }

            // 第1項 (2桁) 十の位
            const n1Tens = document.createElement('div');
            n1Tens.textContent = n1Str[0];
            n1Tens.style.gridColumn = '4'; 
            n1Tens.style.gridRow = '2';
            n1Tens.className = 'clickable-digit';
            n1Tens.style.borderBottomColor = '#2ed573'; 

            // 第1項 1の位
            const n1Ones = document.createElement('div');
            n1Ones.textContent = n1Str[1];
            n1Ones.style.gridColumn = '5'; 
            n1Ones.style.gridRow = '2';
            n1Ones.className = 'clickable-digit';
            n1Ones.style.borderBottomColor = '#ffb3ba';

            // 第2項 (2桁) ＋記号つき
            const opPlus = document.createElement('div');
            opPlus.textContent = '＋';
            opPlus.style.gridColumn = '2';
            opPlus.style.gridRow = '3';
            opPlus.style.color = '#555';

            // 第2項 十の位
            const n2Tens = document.createElement('div');
            n2Tens.textContent = n2Str[0];
            n2Tens.style.gridColumn = '4'; 
            n2Tens.style.gridRow = '3';
            n2Tens.className = 'clickable-digit';
            n2Tens.style.borderBottomColor = '#7bed9f'; 

            // 第2項 1の位
            const n2Ones = document.createElement('div');
            n2Ones.textContent = n2Str[1];
            n2Ones.style.gridColumn = '5'; 
            n2Ones.style.gridRow = '3';
            n2Ones.className = 'clickable-digit';
            n2Ones.style.borderBottomColor = '#a0c4ff';

            // 横線
            const hissanLine = document.createElement('div');
            hissanLine.className = 'hissan-line';
            hissanLine.style.gridColumn = '2 / span 4'; 
            hissanLine.style.gridRow = '4';

            // ヒント表示用のコンテナ（左側：10の位）
            const hintTens1 = document.createElement('div');
            hintTens1.className = 'hint-container left-hint';
            hintTens1.style.gridColumn = '1';
            hintTens1.style.gridRow = '2';

            const hintTens2 = document.createElement('div');
            hintTens2.className = 'hint-container left-hint';
            hintTens2.style.gridColumn = '1';
            hintTens2.style.gridRow = '3';

            // ヒント表示用のコンテナ（右側：1の位）
            const hintOnes1 = document.createElement('div');
            hintOnes1.className = 'hint-container right-hint';
            hintOnes1.style.gridColumn = '6';
            hintOnes1.style.gridRow = '2';

            const hintOnes2 = document.createElement('div');
            hintOnes2.className = 'hint-container right-hint';
            hintOnes2.style.gridColumn = '6';
            hintOnes2.style.gridRow = '3';

            // 十の位のクリックイベント
            n1Tens.addEventListener('click', function() {
                if (this.dataset.clicked === "true") return; 
                this.dataset.clicked = "true";
                this.style.borderBottom = 'none';
                this.style.color = '#2ed573';
                
                hintTens1.innerHTML = '';
                const count = parseInt(n1Str[0], 10);
                AppAudio.speak(tensReadings[count * 10]); 
                
                for (let i = 0; i < count; i++) {
                    const c = document.createElement('div');
                    c.className = 'hint-circle tens';
                    c.textContent = '10';
                    c.style.animationDelay = `${i * 0.08}s`;
                    c.addEventListener('click', () => {
                        const speakNumber = (i + 1) * 10;
                        AppAudio.speak(tensReadings[speakNumber] || speakNumber.toString());
                    });
                    hintTens1.appendChild(c);
                }
            });

            n2Tens.addEventListener('click', function() {
                if (this.dataset.clicked === "true") return; 
                this.dataset.clicked = "true";
                this.style.borderBottom = 'none';
                this.style.color = '#2ed573'; 
                
                hintTens2.innerHTML = '';
                const count = parseInt(n2Str[0], 10);
                AppAudio.speak(tensReadings[count * 10]); 
                
                const n1TensCount = parseInt(n1Str[0], 10);
                
                for (let i = 0; i < count; i++) {
                    const c = document.createElement('div');
                    c.className = 'hint-circle tens';
                    c.textContent = '10';
                    c.style.animationDelay = `${i * 0.08}s`;
                    c.addEventListener('click', () => {
                        const speakNumber = (n1TensCount + i + 1) * 10;
                        AppAudio.speak(tensReadings[speakNumber] || speakNumber.toString());
                    });
                    hintTens2.appendChild(c);
                }
            });

            // 一の位のクリックイベント
            n1Ones.addEventListener('click', function() {
                if (this.dataset.clicked === "true") return;
                this.dataset.clicked = "true";
                this.style.borderBottom = 'none';
                this.style.color = '#ff4757';
                
                hintOnes1.innerHTML = '';
                const count = parseInt(n1Str[1], 10);
                AppAudio.speak(count.toString());
                
                for (let i = 0; i < count; i++) {
                    const c = document.createElement('div');
                    c.className = 'hint-circle';
                    c.textContent = '1';
                    c.style.animationDelay = `${i * 0.08}s`;
                    c.addEventListener('click', () => {
                        AppAudio.speak((i + 1).toString());
                    });
                    hintOnes1.appendChild(c);
                }
            });

            n2Ones.addEventListener('click', function() {
                if (this.dataset.clicked === "true") return;
                this.dataset.clicked = "true";
                this.style.borderBottom = 'none';
                this.style.color = '#1e90ff';

                hintOnes2.innerHTML = '';
                const count = parseInt(n2Str[1], 10);
                AppAudio.speak(count.toString());
                
                const n1OnesCount = parseInt(n1Str[1], 10);
                
                for (let i = 0; i < count; i++) {
                    const c = document.createElement('div');
                    c.className = 'hint-circle blue';
                    c.textContent = '1';
                    c.style.animationDelay = `${i * 0.08}s`;
                    c.addEventListener('click', () => {
                        const speakNumber = n1OnesCount + i + 1;
                        if (speakNumber >= 0 && speakNumber <= 20) {
                            AppAudio.speak(AppAudio.numberReadings[speakNumber] || speakNumber.toString());
                        } else {
                            AppAudio.speak(speakNumber.toString());
                        }
                    });
                    hintOnes2.appendChild(c);
                }
            });

            hissanArea.appendChild(n1Tens);
            hissanArea.appendChild(n1Ones);
            hissanArea.appendChild(opPlus);
            hissanArea.appendChild(n2Tens);
            hissanArea.appendChild(n2Ones);
            hissanArea.appendChild(hissanLine);
            hissanArea.appendChild(hintTens1);
            hissanArea.appendChild(hintTens2);
            hissanArea.appendChild(hintOnes1);
            hissanArea.appendChild(hintOnes2);

            // 解答枠 (桁数に合わせて生成)
            for (let i = 0; i < ansLength; i++) {
                const box = document.createElement('div');
                box.className = 'drop-zone';
                box.id = `ans-box-${i}`;
                
                // ansLengthに応じて右詰め (列5が一の位、列4が十の位、列3が百の位)
                let col = 5 - (ansLength - 1 - i);
                box.style.gridColumn = col.toString();
                box.style.gridRow = '5';

                // 共通キーボード起動
                box.addEventListener('click', () => { 
                    CalcKeyboard.open(box);
                });
                hissanArea.appendChild(box);
            }

            // 「できた！」ボタンを解答枠の右側（列6）に配置
            const checkBtn = document.createElement('button');
            checkBtn.className = 'check-btn';
            checkBtn.textContent = 'できた！';
            checkBtn.style.gridColumn = '6';
            checkBtn.style.gridRow = '5';
            hissanArea.appendChild(checkBtn);

            container.appendChild(hissanArea);

            const instruction = document.createElement('div');
            instruction.className = 'instruction-red';
            instruction.innerHTML = '※下線のある数字をタップすると「●」のヒントが出ます。';
            container.appendChild(instruction);

            appContainer.appendChild(container);

            // 判定処理
            checkBtn.addEventListener('click', () => {
                let uAnsStr = '';
                let allFilled = true;
                
                // 解答枠の判定
                for (let i = 0; i < ansLength; i++) {
                    const box = document.getElementById(`ans-box-${i}`);
                    if (!box || box.textContent.trim() === '') {
                        allFilled = false;
                        break;
                    }
                    uAnsStr += box.textContent.trim();
                }

                // 未入力時の案内
                if (!allFilled) {
                    showGuideMessage('数字を入力してね！', 'すうじをにゅうりょくしてね');
                    return;
                }

                const uAns = parseInt(uAnsStr, 10);
                const isCorrect = (uAns === correctAns);
                
                // 共通ログ保存機能
                AppLogger.save({
                    storageKey: "addition_2x2_history",
                    problemType: "2桁+2桁のたし算（ひっ算）",
                    problemContent: `${prob.n1} + ${prob.n2}`,
                    userAnswer: uAns.toString(),
                    startTime: problemStartTime,
                    endTime: new Date(),
                    inputMethod: "計算機入力",
                    isCorrect: isCorrect
                });

                const overlayJudge = document.getElementById('judge-overlay');
                if (isCorrect) {
                    overlayJudge.textContent = 'せいかい！';
                    overlayJudge.className = 'judge-overlay show';
                    AppAudio.speak("せいかい！");
                    AppAudio.playOk();
                    
                    checkBtn.disabled = true;
                    setTimeout(() => { overlayJudge.classList.remove('show'); }, 1200);
                    setTimeout(() => { currentIndex++; renderProblem(); }, 1500);
                } else {
                    overlayJudge.textContent = 'おしい！';
                    overlayJudge.className = 'judge-overlay incorrect show';
                    AppAudio.speak("おしい！");
                    AppAudio.playNg();
                    mistakeCount++;
                    setTimeout(() => { overlayJudge.classList.remove('show'); }, 1200);
                }
            });
        }

        document.getElementById('start-btn').addEventListener('click', () => {
            document.getElementById('start-screen').style.display = 'none';
            document.getElementById('main-content').style.display = 'block';
            renderProblem();
        });

    </script>
</body>
</html>
