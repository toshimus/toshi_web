<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>かけ算九九 3択学習（ニガテ克服機能付き）</title>

<!-- 共通スタイルの読み込み -->
<link rel="stylesheet" href="app-common.css">

<style>
    html, body {
        height: 100%;
        width: 100%;
    }
    body {
        font-family: "Helvetica Neue", Arial, "Hiragino Kaku Gothic ProN", "Hiragino Sans", Meiryo, sans-serif;
        margin: 0;
        padding: clamp(10px, 2vw, 20px);
        background-color: #f0f8ff;
        color: #333;
        touch-action: manipulation;
        box-sizing: border-box;
        user-select: none;
        -webkit-user-select: none;
        overflow-x: hidden;
    }

    .dan-selector {
        display: flex;
        flex-wrap: wrap;
        gap: 15px;
        justify-content: center;
        max-width: 600px;
        width: 100%;
    }

    .problem-container {
        display: flex;
        flex-direction: column;
        width: 100%;
        max-width: 1050px;
        margin: 0 auto;
        align-items: center;
        justify-content: center;
    }

    /* 左右並び替え用のゲームエリア */
    .game-area {
        display: flex;
        flex-direction: row;
        align-items: flex-start;
        justify-content: center;
        gap: clamp(15px, 3vw, 30px);
        width: 100%;
    }

    .main-column {
        display: flex;
        flex-direction: column;
        align-items: center;
        flex: 1;
        width: 100%;
    }

    /* 数式と解答エリア */
    .math-formula {
        display: flex;
        flex-direction: row;
        align-items: center;
        justify-content: center;
        gap: clamp(8px, 2vw, 15px);
        background-color: #ffffff;
        padding: clamp(15px, 3vh, 30px) clamp(15px, 3vw, 40px);
        border-radius: 15px;
        border: 2px solid #eee;
        box-shadow: 0 4px 10px rgba(0,0,0,0.05);
        margin-bottom: 20px;
        width: 100%;
        box-sizing: border-box;
    }

    .formula-term {
        font-size: clamp(3rem, 9vw, 6rem);
        font-weight: bold;
        color: #333;
    }
    .formula-term.blue {
        color: #1e90ff; /* かける数を青に */
    }
    .formula-term.question-mark {
        color: #e74c3c;
        min-width: clamp(60px, 15vw, 120px);
        text-align: center;
        border-bottom: 4px dashed #3498db;
    }
    .formula-op {
        font-size: clamp(2.5rem, 7vw, 5rem);
        font-weight: bold;
        color: #7f8c8d;
    }

    /* 3択ボタンエリア */
    .choices-container {
        display: flex;
        justify-content: center;
        gap: clamp(10px, 2vw, 20px);
        margin: 10px 0 20px 0;
        width: 100%;
    }
    .choice-btn {
        flex: 1;
        max-width: 180px;
        padding: clamp(10px, 2vh, 15px) 5px;
        font-size: clamp(2rem, 6vw, 3.5rem);
        font-weight: bold;
        color: #2c3e50;
        background-color: #f1c40f;
        border: 4px solid #f1c40f;
        border-radius: 15px;
        cursor: pointer;
        box-shadow: 0 6px 0 #d4ac0d;
        transition: all 0.1s;
        -webkit-tap-highlight-color: transparent;
        box-sizing: border-box;
    }
    .choice-btn:active {
        transform: translateY(6px);
        box-shadow: none;
    }
    .choice-btn.selected {
        background-color: #e74c3c;
        border-color: #c0392b;
        color: #fff;
        box-shadow: 0 6px 0 #c0392b;
    }
    .choice-btn.selected:active {
        transform: translateY(6px);
        box-shadow: none;
    }

    /* 判定ボタン */
    .check-btn {
        padding: 0 clamp(20px, 4vw, 50px);
        height: clamp(55px, 8vh, 80px);
        font-size: clamp(1.4rem, 3vw, 2rem);
        cursor: pointer;
        border: 2px solid #00bfff;
        background-color: #00bfff;
        color: #fff;
        font-weight: bold;
        border-radius: 10px;
        outline: none;
        box-shadow: 0 5px 0 #0088cc;
        touch-action: manipulation;
        white-space: nowrap; 
        transition: all 0.2s;
    }
    .check-btn:active:not(:disabled) {
        transform: translateY(5px);
        box-shadow: none;
    }
    .check-btn:disabled {
        background-color: #bdc3c7;
        border-color: #bdc3c7;
        box-shadow: 0 5px 0 #95a5a6;
        opacity: 0.7;
        cursor: not-allowed;
    }

    /* ヒントエリアのスタイル */
    .hint-column {
        width: 260px;
        flex-shrink: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
    }
    .hint-btn {
        padding: 12px 15px;
        font-size: clamp(1.2rem, 2.5vw, 1.6rem);
        font-weight: bold;
        color: #fff;
        background-color: #2ecc71;
        border: none;
        border-radius: 12px;
        cursor: pointer;
        box-shadow: 0 5px 0 #27ae60;
        transition: transform 0.1s, box-shadow 0.1s;
        width: 100%;
        touch-action: manipulation;
        -webkit-tap-highlight-color: transparent;
    }
    .hint-btn:active {
        transform: translateY(5px);
        box-shadow: none;
    }
    .hint-list {
        display: none;
        margin-top: 10px;
        background-color: #ffffff;
        border: 3px solid #2ecc71;
        border-radius: 12px;
        padding: 10px 15px;
        width: 100%;
        box-sizing: border-box;
        box-shadow: 0 4px 10px rgba(0,0,0,0.05);
        font-size: clamp(1.2rem, 2.5vw, 1.5rem);
        line-height: 1.6;
    }
    .hint-item {
        display: flex;
        justify-content: space-between;
        align-items: center;
        border-bottom: 1px dashed #ccc;
        padding: 3px 5px;
        font-weight: bold;
    }
    .hint-item:last-child {
        border-bottom: none;
    }
    .hint-blank {
        display: inline-block;
        width: 45px;
        height: 24px;
        border: 2px dashed #e74c3c;
        background-color: #f9f9f9;
        border-radius: 4px;
    }

    .button-group {
        display: flex;
        gap: 10px;
    }

    /* モバイル画面（幅768px以下）用の調整 */
    @media (max-width: 768px) {
        .game-area {
            flex-direction: column;
            align-items: center;
        }
        .hint-column {
            width: 100%;
            max-width: 400px;
        }
    }
</style>
</head>
<body>

    <!-- スタート画面 -->
    <div id="start-screen" class="start-screen">
        <h1>かけ算 九九 3択テスト</h1>
        <p>全30問！<br>はじめの10問で間違えた「ニガテな問題」は<br>後半でもういちど出題されるよ！</p>
        <div class="dan-selector">
            <button class="start-btn" id="start-btn" style="background-color: #e67e22; box-shadow: 0 5px 0 #d35400;">全30問 スタート！</button>
        </div>
        <br><br><a href="index.html" class="menu-btn" style="margin-top: 20px; background-color: #95a5a6;">メニューへ戻る</a>
    </div>

    <!-- メイン画面 -->
    <div id="main-content" style="display: none;">
        <div class="top-nav">
            <div class="toggle-group">
                <label class="settings-toggle"><input type="checkbox" id="speech-checkbox" checked> スピーチON</label>
                <label class="settings-toggle"><input type="checkbox" id="sound-checkbox" checked> 効果音ON</label>
            </div>
            
            <div class="button-group">
                <button class="back-btn" onclick="location.reload()">一覧に戻る</button>
                <a href="index.html" class="back-btn">メニューへ戻る</a>
            </div>
        </div>
        
        <div id="status-bar" class="status-bar"></div>
        <h1 class="question-title">・ つぎのかけ算の こたえをえらぼう！</h1>
        
        <div id="app"></div>
        <div id="judge-overlay" class="judge-overlay"></div>
    </div>

    <!-- 共通モジュールの読み込み -->
    <script src="app-common.js"></script>

    <script>
        const kukuReadings = {
            1: { 1: ["いんいちが", "いち"], 2: ["いんにが", "に"], 3: ["いんさんが", "さん"], 4: ["いんしが", "し"], 5: ["いんごが", "ご"], 6: ["いんろくが", "ろく"], 7: ["いんしちが", "しち"], 8: ["いんはちが", "はち"], 9: ["いんくが", "く"] },
            2: { 1: ["にいちが", "に"], 2: ["ににんが", "し"], 3: ["にさんが", "ろく"], 4: ["にしが", "はち"], 5: ["にご", "じゅう"], 6: ["にろく", "じゅうに"], 7: ["にしち", "じゅうし"], 8: ["にはち", "じゅうろく"], 9: ["にく", "じゅうはち"] },
            3: { 1: ["さんいちが", "さん"], 2: ["さんにが", "ろく"], 3: ["さざんが", "きゅう"], 4: ["さんし", "じゅうに"], 5: ["さんご", "じゅうご"], 6: ["さぶろく", "じゅうはち"], 7: ["さんしち", "にじゅういち"], 8: ["さんぱ", "にじゅうし"], 9: ["さんく", "にじゅうしち"] },
            4: { 1: ["しいちが", "し"], 2: ["しにが", "はち"], 3: ["しさん", "じゅうに"], 4: ["しし", "じゅうろく"], 5: ["しご", "にじゅう"], 6: ["しろく", "にじゅうし"], 7: ["ししち", "にじゅうはち"], 8: ["しはち", "さんじゅうに"], 9: ["しく", "さんじゅうろく"] },
            5: { 1: ["ごいちが", "ご"], 2: ["ごに", "じゅう"], 3: ["ごさん", "じゅうご"], 4: ["ごし", "にじゅう"], 5: ["ごご", "にじゅうご"], 6: ["ごろく", "さんじゅう"], 7: ["ごしち", "さんじゅうご"], 8: ["ごはち", "よんじゅう"], 9: ["ごっく", "しじゅうご"] },
            6: { 1: ["ろくいちが", "ろく"], 2: ["ろくに", "じゅうに"], 3: ["ろくさん", "じゅうはち"], 4: ["ろくし", "にじゅうし"], 5: ["ろくご", "さんじゅう"], 6: ["ろくろく", "さんじゅうろく"], 7: ["ろくしち", "しじゅうに"], 8: ["ろくはち", "しじゅうはち"], 9: ["ろっく", "ごじゅうし"] },
            7: { 1: ["しちいちが", "しち"], 2: ["しちに", "じゅうし"], 3: ["しちさん", "にじゅういち"], 4: ["しちし", "にじゅうはち"], 5: ["しちご", "さんじゅうご"], 6: ["しちろく", "しじゅうに"], 7: ["しちしち", "しじゅうく"], 8: ["しちは", "ごじゅうろく"], 9: ["しちく", "ろくじゅうさん"] },
            8: { 1: ["はちいちが", "はち"], 2: ["はちに", "じゅうろく"], 3: ["はちさん", "にじゅうし"], 4: ["はちし", "さんじゅうに"], 5: ["はちご", "よんじゅう"], 6: ["はちろく", "しじゅうはち"], 7: ["はちしち", "ごじゅうろく"], 8: ["はっぱ", "ろくじゅうし"], 9: ["はっく", "しちじゅうに"] },
            9: { 1: ["くいちが", "く"], 2: ["くに", "じゅうはち"], 3: ["くさん", "にじゅうしち"], 4: ["くし", "さんじゅうろく"], 5: ["くご", "しじゅうご"], 6: ["くろく", "ごじゅうし"], 7: ["くしち", "ろくじゅうさん"], 8: ["くはち", "しちじゅうに"], 9: ["くく", "はちじゅういち"] }
        };

        let problems = [];
        let currentIndex = 0;
        let mistakeCount = 0;
        let replaceIndex = 20; 
        const appContainer = document.getElementById('app');
        let problemStartTime;

        function generateProblems() {
            problems = [];
            while (problems.length < 30) {
                let a = Math.floor(Math.random() * 9) + 1;
                let b = Math.floor(Math.random() * 9) + 1;
                problems.push({ n1: a, n2: b });
            }
        }

        function getChoices(n1, n2) {
            const correct = n1 * n2;
            let candidates = [];
            
            if (n2 > 1) candidates.push(n1 * (n2 - 1));
            if (n2 < 9) candidates.push(n1 * (n2 + 1));
            if (n1 > 1) candidates.push((n1 - 1) * n2);
            if (n1 < 9) candidates.push((n1 + 1) * n2);
            
            candidates = candidates.filter((val, index, self) => self.indexOf(val) === index && val > 0 && val <= 81 && val !== correct);
            
            while (candidates.length < 2) {
                let r = (Math.floor(Math.random() * 9) + 1) * (Math.floor(Math.random() * 9) + 1);
                if (r !== correct && !candidates.includes(r)) {
                    candidates.push(r);
                }
            }
            
            candidates.sort(() => Math.random() - 0.5);
            let finalChoices = [correct, candidates[0], candidates[1]];
            
            return finalChoices.sort(() => Math.random() - 0.5);
        }

        function renderProblem() {
            appContainer.innerHTML = '';
            problemStartTime = new Date();

            if (currentIndex >= problems.length) {
                document.getElementById('status-bar').style.display = 'none';
                document.querySelector('.question-title').style.display = 'none';
                
                const clearMsg = document.createElement('div');
                clearMsg.className = 'clear-message';
                
                let htmlContent = `<h2>全${problems.length}問 終了！！</h2>`;
                htmlContent += `<div class="final-result-details">`;
                htmlContent += `<div>間違えた回数： <strong>${mistakeCount}</strong> 回</div>`;
                if (mistakeCount === 0) {
                    htmlContent += `<div style="color: blue; font-weight: bold; margin-top: 15px;">パーフェクトです！素晴らしい成績です。</div>`;
                }
                htmlContent += `</div>`;
                htmlContent += `<div style="margin-top: 25px;">`;
                htmlContent += `<button class="retry-btn" onclick="location.reload()">もう一度挑戦する</button>`;
                htmlContent += `<a href="view.html" class="menu-btn" style="background-color: #2ecc71; margin-right: 15px;">履歴を見る</a>`;
                htmlContent += `<a href="index.html" class="menu-btn">メニューへ戻る</a>`;
                htmlContent += `</div>`;
                
                clearMsg.innerHTML = htmlContent;
                appContainer.appendChild(clearMsg);
                AppAudio.speak("ぜんもんしゅうりょうです。おつかれさまでした。");
                return;
            }

            document.getElementById('status-bar').style.display = 'block';
            document.getElementById('status-bar').textContent = `第 ${currentIndex + 1} 問 / 全 ${problems.length} 問`;

            const prob = problems[currentIndex];
            const correctAns = prob.n1 * prob.n2;
            
            const yomi = kukuReadings[prob.n1][prob.n2][0];
            AppAudio.speak(yomi);
            AppAudio.playQ();

            const container = document.createElement('div');
            container.className = 'problem-container';

            const gameArea = document.createElement('div');
            gameArea.className = 'game-area';

            const mainColumn = document.createElement('div');
            mainColumn.className = 'main-column';

            const mathFormula = document.createElement('div');
            mathFormula.className = 'math-formula';
            
            const questionMark = document.createElement('div');
            questionMark.className = 'formula-term question-mark';
            questionMark.textContent = '？';

            mathFormula.innerHTML = `
                <div class="formula-term">${prob.n1}</div>
                <div class="formula-op">×</div>
                <div class="formula-term blue">${prob.n2}</div>
                <div class="formula-op">＝</div>
            `;
            mathFormula.appendChild(questionMark);
            mainColumn.appendChild(mathFormula);

            const choicesContainer = document.createElement('div');
            choicesContainer.className = 'choices-container';
            const choices = getChoices(prob.n1, prob.n2);
            
            let selectedAnswer = null;

            const checkBtnContainer = document.createElement('div');
            const checkBtn = document.createElement('button');
            checkBtn.className = 'check-btn';
            checkBtn.textContent = 'できた！';
            checkBtn.disabled = true; 
            checkBtnContainer.appendChild(checkBtn);

            choices.forEach(val => {
                const btn = document.createElement('button');
                btn.className = 'choice-btn';
                btn.textContent = val;
                
                btn.addEventListener('click', () => {
                    Array.from(choicesContainer.children).forEach(c => c.classList.remove('selected'));
                    btn.classList.add('selected');
                    selectedAnswer = val;
                    questionMark.textContent = val;
                    checkBtn.disabled = false; 
                });
                
                choicesContainer.appendChild(btn);
            });

            mainColumn.appendChild(choicesContainer);
            mainColumn.appendChild(checkBtnContainer);

            const hintColumn = document.createElement('div');
            hintColumn.className = 'hint-column';

            const hintBtn = document.createElement('button');
            hintBtn.className = 'hint-btn';
            hintBtn.textContent = 'ヒントをみる';

            const hintList = document.createElement('div');
            hintList.className = 'hint-list';

            let hintHtml = '';
            for (let i = 1; i <= 9; i++) {
                if (i === prob.n2) {
                    hintHtml += `<div class="hint-item"><span>${prob.n1} × ${i} ＝</span><span class="hint-blank"></span></div>`;
                } else {
                    hintHtml += `<div class="hint-item"><span>${prob.n1} × ${i} ＝</span><span>${prob.n1 * i}</span></div>`;
                }
            }
            hintList.innerHTML = hintHtml;

            hintBtn.addEventListener('click', () => {
                if (hintList.style.display === 'block') {
                    hintList.style.display = 'none';
                    hintBtn.textContent = 'ヒントをみる';
                } else {
                    hintList.style.display = 'block';
                    hintBtn.textContent = 'ヒントを閉じる';
                    AppAudio.speak(`${prob.n1}のだんのヒントです`);
                }
            });

            hintColumn.appendChild(hintBtn);
            hintColumn.appendChild(hintList);

            gameArea.appendChild(mainColumn);
            gameArea.appendChild(hintColumn);
            container.appendChild(gameArea);
            appContainer.appendChild(container);

            checkBtn.addEventListener('click', () => {
                if (selectedAnswer === null) return; 

                const isCorrect = (selectedAnswer === correctAns);

                AppLogger.save({
                    storageKey: "kuku_history",
                    problemType: "かけ算九九",
                    problemContent: `${prob.n1} × ${prob.n2}`,
                    userAnswer: selectedAnswer.toString(),
                    startTime: problemStartTime,
                    endTime: new Date(),
                    inputMethod: "3択入力",
                    isCorrect: isCorrect
                });

                const overlayJudge = document.getElementById('judge-overlay');
                if (isCorrect) {
                    overlayJudge.textContent = 'せいかい！';
                    overlayJudge.className = 'judge-overlay show';
                    AppAudio.playOk();
                    
                    AppAudio.speak(kukuReadings[prob.n1][prob.n2][1]);
                    
                    checkBtn.disabled = true;
                    Array.from(choicesContainer.children).forEach(c => c.style.pointerEvents = 'none');

                    setTimeout(() => { overlayJudge.classList.remove('show'); }, 1200);
                    setTimeout(() => { currentIndex++; renderProblem(); }, 1500);
                } else {
                    overlayJudge.textContent = 'おしい！';
                    overlayJudge.className = 'judge-overlay incorrect show';
                    AppAudio.speak("おしい！");
                    AppAudio.playNg();
                    mistakeCount++;
                    
                    if (currentIndex < 10 && replaceIndex < 30) {
                        problems[replaceIndex] = { n1: prob.n1, n2: prob.n2 };
                        replaceIndex++;
                    }
                    
                    setTimeout(() => { 
                        overlayJudge.classList.remove('show'); 
                        Array.from(choicesContainer.children).forEach(c => c.classList.remove('selected'));
                        questionMark.textContent = '？';
                        selectedAnswer = null;
                        checkBtn.disabled = true;
                    }, 1200);
                }
            });
        }

        document.getElementById('start-btn').addEventListener('click', () => {
            generateProblems();
            currentIndex = 0;
            mistakeCount = 0;
            replaceIndex = 20;
            
            document.getElementById('start-screen').style.display = 'none';
            document.getElementById('main-content').style.display = 'block';
            renderProblem();
        });

    </script>
</body>
</html>
