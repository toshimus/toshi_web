<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>正負の数の計算</title>
<style>
    html, body {
        height: 100%;
        overflow: hidden;
        position: fixed;
        width: 100%;
    }
    body {
        font-family: "Helvetica Neue", Arial, "Hiragino Kaku Gothic ProN", "Hiragino Sans", Meiryo, sans-serif;
        margin: 0;
        padding: 20px;
        background-color: #ffffff;
        color: #333;
        touch-action: none;
        box-sizing: border-box;
        user-select: none;
        -webkit-user-select: none;
    }
    
    /* スタート画面のスタイル */
    .start-screen {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background-color: #f0f8ff;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        z-index: 10000;
    }
    .start-screen h1 {
        font-size: 3rem;
        color: #2c3e50;
        margin-bottom: 40px;
    }
    .start-btn {
        padding: 20px 60px;
        font-size: 2.5rem;
        font-weight: bold;
        color: #fff;
        background-color: #3498db;
        border: none;
        border-radius: 15px;
        cursor: pointer;
        box-shadow: 0 8px 0 #2980b9;
        transition: transform 0.1s, box-shadow 0.1s;
        -webkit-tap-highlight-color: transparent;
    }
    .start-btn:active {
        transform: translateY(8px);
        box-shadow: none;
    }

    /* 上部ステータスバーと問題文のスタイル */
    .status-bar {
        font-size: 1.2rem;
        font-weight: bold;
        margin-bottom: 10px;
        color: #555;
    }
    .question-title {
        font-size: 1.6rem;
        font-weight: normal;
        margin-bottom: 25px;
        margin-top: 0;
    }

    .problem-container {
        display: flex;
        flex-direction: column;
        margin-bottom: 20px;
        width: 100%;
        max-width: 800px;
        margin-left: auto;
        margin-right: auto;
    }
    .problem-main {
        display: flex;
        flex-direction: column;
        align-items: center;
        width: 100%;
        margin-bottom: 20px;
    }
    
    /* 数直線のスタイル追加・修正 */
    .number-line-container {
        position: relative;
        width: 100%;
        height: 100px;
        margin: 20px 0 30px 0;
    }
    .number-line-base {
        position: absolute;
        top: 50%;
        left: 20px;
        right: 20px;
        height: 4px;
        background-color: #333;
        transform: translateY(-50%);
    }
    .tick-container {
        position: absolute;
        top: 0;
        left: 20px;
        right: 20px;
        height: 100%;
    }
    .tick-wrapper {
        position: absolute;
        top: 0;
        height: 100%;
        width: 30px; /* タップ範囲を確保 */
        transform: translateX(-50%);
        cursor: pointer;
    }
    .tick-mark {
        position: absolute;
        top: 50%;
        left: 50%;
        width: 2px;
        height: 20px;
        background-color: #333;
        transform: translate(-50%, -50%);
    }
    /* 0の目盛りのみ強調 */
    .tick-wrapper.zero .tick-mark {
        height: 30px;
        width: 4px;
        background-color: #e74c3c;
    }
    .tick-label {
        position: absolute;
        top: calc(50% + 15px);
        left: 50%;
        width: 28px;
        height: 28px;
        line-height: 24px; /* ボーダー幅を考慮 */
        text-align: center;
        font-size: 0.9rem;
        color: #333;
        font-weight: bold;
        border-radius: 50%;
        transform: translateX(-50%);
        box-sizing: border-box;
        transition: all 0.2s ease;
    }
    /* 選択された数値のスタイル（〇をつける） */
    .tick-label.circled {
        border: 2px solid #e74c3c;
        color: #e74c3c;
        background-color: #fff0f0;
    }

    /* ドラッグマーカー（●）のスタイル修正 */
    .drag-marker {
        position: absolute;
        top: 50%;
        /* leftはJSで制御 */
        width: 26px;
        height: 26px;
        background-color: #3498db;
        border: 2px solid #fff;
        border-radius: 50%;
        transform: translate(-50%, -50%);
        cursor: grab;
        z-index: 10;
        box-shadow: 0 3px 6px rgba(0,0,0,0.4);
        touch-action: none;
        display: none; /* 初期状態は非表示 */
    }
    .drag-marker:active {
        cursor: grabbing;
        transform: translate(-50%, -50%) scale(1.2);
    }
    
    .answer-area {
        display: flex;
        align-items: center;
        justify-content: center;
        margin-top: 20px;
    }
    .answer-label {
        font-size: 1.5rem;
        margin-right: 20px;
    }
    
    /* ドロップゾーン（□の枠） */
    .drop-zone {
        width: 80px;
        height: 60px;
        border: 2px dashed #3498db;
        background-color: #f0f8ff;
        border-radius: 8px;
        display: flex;
        justify-content: center;
        align-items: center;
        font-size: 2.2rem;
        font-weight: bold;
        cursor: pointer;
        color: #333;
        margin-right: 20px;
    }

    .hint-text {
        text-align: center;
        color: #e74c3c;
        font-size: 1.1rem;
        font-weight: bold;
        margin-top: 10px;
    }
    
    .check-btn {
        padding: 0 30px;
        height: 60px;
        font-size: 1.6rem;
        font-weight: bold;
        cursor: pointer;
        border: none;
        background-color: #00bfff;
        color: #ffffff;
        border-radius: 10px;
        font-family: inherit;
        outline: none;
        box-shadow: 0 4px 0 #0088cc;
        -webkit-tap-highlight-color: transparent;
        touch-action: manipulation;
        display: flex;
        justify-content: center;
        align-items: center;
    }
    .check-btn:active {
        transform: translateY(4px);
        box-shadow: none;
    }
    .check-btn:disabled {
        opacity: 0.5;
        cursor: not-allowed;
        transform: translateY(4px);
        box-shadow: none;
    }
    
    .judge-overlay {
        position: fixed;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%) scale(0.7);
        opacity: 0;
        visibility: hidden;
        background-color: transparent;
        color: #ff3333;
        font-size: 6rem;
        font-weight: bold;
        padding: 30px 60px;
        -webkit-text-stroke: 3px #000;
        text-shadow: 4px 4px 10px rgba(0, 0, 0, 0.5);
        z-index: 9999;
        pointer-events: none;
        transition: opacity 0.3s ease, transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275), visibility 0.3s;
        white-space: nowrap;
    }
    .judge-overlay.show {
        opacity: 1;
        visibility: visible;
        transform: translate(-50%, -50%) scale(1.0);
    }
    .judge-overlay.incorrect {
        color: #3366ff;
    }
    
    .clear-message {
        text-align: center;
        margin-top: 20px;
        padding: 25px;
        background-color: #f8f9fa;
        border-radius: 12px;
        border: 2px solid #a0c4ff;
    }
    .clear-message h2 {
        font-size: 1.8rem;
        color: #d9534f;
        margin-top: 0;
        margin-bottom: 20px;
    }
    .final-result-details {
        font-size: 1.3rem;
        color: #333;
        line-height: 1.8;
    }
    .menu-btn, .retry-btn {
        margin-top: 20px;
        padding: 12px 30px;
        font-size: 1.1rem;
        cursor: pointer;
        border: none;
        border-radius: 8px;
        outline: none;
        touch-action: manipulation;
        text-decoration: none;
        display: inline-block;
    }
    .retry-btn {
        background-color: #a0c4ff;
        color: #fff;
        margin-right: 15px;
    }
    .menu-btn {
        background-color: #95a5a6;
        color: #fff;
    }
    
    .top-nav {
        display: flex;
        justify-content: space-between; 
        align-items: center;            
        margin-bottom: 10px;
    }
    .toggle-group {
        display: flex;
        gap: 15px;
    }
    .settings-toggle {
        font-size: 1.1rem;
        color: #555;
        cursor: pointer;
        display: flex;
        align-items: center;
        -webkit-tap-highlight-color: transparent;
    }
    .settings-toggle input {
        transform: scale(1.3);
        margin-right: 8px;
        cursor: pointer;
    }
    .back-btn {
        padding: 8px 15px;
        background-color: #ecf0f1;
        border: 1px solid #bdc3c7;
        border-radius: 5px;
        text-decoration: none;
        color: #2c3e50;
        font-size: 0.9rem;
        touch-action: manipulation;
    }

    /* ==========================================
       計算機パネルとオーバーレイのスタイル追加
       ========================================== */
    .pieces-container { display: none; justify-content: center; align-items: center; flex-wrap: wrap; gap: 10px; padding: 15px; background-color: #ecf0f1; border-radius: 12px; width: 280px; margin: 0 auto; box-sizing: border-box; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); box-shadow: 0 10px 25px rgba(0,0,0,0.3); z-index: 1000; cursor: grab; }
    .pieces-container:active { cursor: grabbing; }
    
    /* 電卓ディスプレイのスタイル追加 */
    .calc-display { flex: 1 1 100%; height: 50px; background-color: #fff; border: 2px inset #bdc3c7; border-radius: 8px; margin-bottom: 5px; display: flex; justify-content: flex-end; align-items: center; padding: 0 15px; font-size: 2.2rem; font-weight: bold; box-sizing: border-box; color: #2c3e50; pointer-events: none; }
    
    .piece { flex: 1 1 25%; height: 60px; border: 2px solid #2c3e50; background-color: #f1c40f; border-radius: 10px; display: flex; justify-content: center; align-items: center; font-size: 1.8rem; font-weight: bold; cursor: pointer; color: #2c3e50; box-shadow: 0 4px 0 #d4ac0d; touch-action: manipulation; box-sizing: border-box; }
    .piece:active { transform: translateY(4px); box-shadow: none; }
    
    .piece.delete-btn { background-color: #e74c3c; color: white; border-color: #c0392b; box-shadow: 0 4px 0 #c0392b; font-size: 1.2rem; }
    .piece.enter-btn { background-color: #2ecc71; color: white; border-color: #27ae60; box-shadow: 0 4px 0 #27ae60; font-size: 1.2rem; }
    .piece.confirm-btn { background-color: #3498db; color: white; border-color: #2980b9; box-shadow: 0 4px 0 #2980b9; flex: 1 1 100%; font-size: 1.5rem; }
    
    .overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.4); z-index: 999; }
</style>
</head>
<body>

    <div id="start-screen" class="start-screen">
        <h1>正負の数の計算</h1>
        <button id="start-btn" class="start-btn">スタート</button>
        <BR><BR><a href="index.html" class="menu-btn" style="margin-top: 20px; background-color: #95a5a6;">メニューへ戻る</a>
    </div>

    <div id="main-content" style="display: none;">
        <div class="top-nav">
            <div class="toggle-group">
                <label class="settings-toggle">
                    <input type="checkbox" id="speech-checkbox" checked>
                    スピーチON
                </label>
                <label class="settings-toggle">
                    <input type="checkbox" id="sound-checkbox" checked>
                    効果音ON
                </label>
            </div>
            <a href="index.html" class="back-btn">メニューへ戻る</a>
        </div>
        
        <div id="status-bar" class="status-bar"></div>
        <h1 class="question-title" id="q-title"></h1>
        
        <div id="app"></div>
        
        <div id="judge-overlay" class="judge-overlay"></div>

        <div class="overlay" id="overlay"></div>
        <div class="pieces-container" id="calc-container"></div>
    </div>

    <script>
        // 音声ファイル（mp3）のセットアップ
        const okSound = new Audio('ok.mp3');
        const ngSound = new Audio('ng.mp3');
        const qSound = new Audio('q.mp3');

        // 音声読み上げ用の関数（Web Speech API）
        function speak(text) {
            const speechCheckbox = document.getElementById('speech-checkbox');
            if (speechCheckbox && !speechCheckbox.checked) {
                return; 
            }
            
            window.speechSynthesis.cancel(); 
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'ja-JP';
            utterance.rate = 1.0;
            utterance.pitch = 1.0;
            window.speechSynthesis.speak(utterance);
        }

        /* ==========================================
           計算機パネルの構築とロジック（電卓ディスプレイ搭載）
           ========================================== */
        const overlay = document.getElementById('overlay');
        const calcContainer = document.getElementById('calc-container');
        let activeInputBox = null;

        // 電卓ディスプレイの作成と追加
        const calcDisplay = document.createElement('div');
        calcDisplay.className = 'calc-display';
        calcDisplay.textContent = '';
        calcContainer.appendChild(calcDisplay);

        const calcKeys = [
            '7', '8', '9',
            '4', '5', '6',
            '1', '2', '3',
            '‐', '0', '削除',
            '確定'
        ];

        calcKeys.forEach(key => {
            const piece = document.createElement('div');
            piece.className = 'piece';
            piece.textContent = key;
            
            if (key === '削除') {
                piece.classList.add('delete-btn');
                piece.addEventListener('click', () => {
                    let currentText = calcDisplay.textContent;
                    calcDisplay.textContent = currentText.slice(0, -1);
                });
            } else if (key === '‐') {
                piece.addEventListener('click', () => {
                    let currentText = calcDisplay.textContent;
                    if (currentText.startsWith('-')) {
                        calcDisplay.textContent = currentText.substring(1);
                    } else {
                        calcDisplay.textContent = '-' + currentText;
                    }
                });
            } else if (key === '確定') {
                piece.classList.add('confirm-btn');
                piece.addEventListener('click', () => {
                    if (activeInputBox) {
                        // ディスプレイの値を解答欄へ転送
                        activeInputBox.textContent = calcDisplay.textContent;
                        
                        // 音声読み上げロジック（簡易的）
                        let valText = activeInputBox.textContent;
                        if (valText !== "" && valText !== "-") {
                            let readText = valText.replace('-', 'マイナス');
                            speak(readText);
                        }
                        
                        calcContainer.style.display = 'none';
                        overlay.style.display = 'none';
                        activeInputBox = null;
                    }
                });
            } else {
                // 0〜9の数字ボタン
                piece.addEventListener('click', () => {
                    calcDisplay.textContent += key;
                });
            }
            calcContainer.appendChild(piece);
        });

        overlay.addEventListener('click', () => {
            calcContainer.style.display = 'none';
            overlay.style.display = 'none';
            activeInputBox = null;
        });

        /* 計算機パネルのドラッグ移動ロジック */
        let isDragging = false;
        let dragStartX, dragStartY, initialLeft, initialTop;

        function startDrag(e) {
            // ディスプレイやボタンを触った時はドラッグさせない
            if (e.target.classList.contains('piece') || e.target.classList.contains('calc-display')) return;
            isDragging = true;
            let clientX = e.touches ? e.touches[0].clientX : e.clientX;
            let clientY = e.touches ? e.touches[0].clientY : e.clientY;
            dragStartX = clientX;
            dragStartY = clientY;
            let style = window.getComputedStyle(calcContainer);
            initialLeft = parseFloat(style.left);
            initialTop = parseFloat(style.top);
        }

        function doDrag(e) {
            if (!isDragging) return;
            e.preventDefault();
            let clientX = e.touches ? e.touches[0].clientX : e.clientX;
            let clientY = e.touches ? e.touches[0].clientY : e.clientY;
            let dx = clientX - dragStartX;
            let dy = clientY - dragStartY;
            calcContainer.style.left = (initialLeft + dx) + 'px';
            calcContainer.style.top = (initialTop + dy) + 'px';
        }

        function stopDrag() {
            isDragging = false;
        }

        calcContainer.addEventListener('mousedown', startDrag);
        document.addEventListener('mousemove', doDrag, { passive: false });
        document.addEventListener('mouseup', stopDrag);
        calcContainer.addEventListener('touchstart', startDrag, { passive: false });
        document.addEventListener('touchmove', doDrag, { passive: false });
        document.addEventListener('touchend', stopDrag);


        /* ==========================================
           問題ロジック（正負の数）
           ========================================== */
        const problems = [];
        let prevProblem = "";
        let prevAnswer = null;
        
        // 問題のランダム生成（連続・重複回避、答えは-10〜10）
        for (let i = 0; i < 10; i++) {
            let baseNum, diffNum, isGreater, answer, problemText;
            do {
                baseNum = Math.floor(Math.random() * 19) - 9; // -9 から 9
                diffNum = Math.floor(Math.random() * 9) + 1;  // 1 から 9
                isGreater = Math.random() < 0.5;
                
                if (isGreater) {
                    answer = baseNum + diffNum;
                    problemText = `${baseNum} より ${diffNum} 大きい数は？`;
                } else {
                    answer = baseNum - diffNum;
                    problemText = `${baseNum} より ${diffNum} 小さい数は？`;
                }
            } while (answer < -10 || answer > 10 || problemText === prevProblem || answer === prevAnswer);
            
            prevProblem = problemText;
            prevAnswer = answer;
            problems.push({ text: problemText, answer: answer, baseNum: baseNum });
        }

        let currentIndex = 0;
        let mistakeCount = 0;
        const appContainer = document.getElementById('app');
        
        let problemStartTime = new Date();

        function formatTime(date) {
            return date.getHours().toString().padStart(2, '0') + ':' + 
                   date.getMinutes().toString().padStart(2, '0') + ':' + 
                   date.getSeconds().toString().padStart(2, '0');
        }

        function renderProblem() {
            appContainer.innerHTML = '';
            problemStartTime = new Date();

            if (currentIndex >= problems.length) {
                document.getElementById('status-bar').style.display = 'none';
                document.querySelector('.question-title').style.display = 'none';
                
                const clearMsg = document.createElement('div');
                clearMsg.className = 'clear-message';
                
                let htmlContent = `<h2>全10問クリアしました！</h2>`;
                htmlContent += `<div class="final-result-details">`;
                htmlContent += `<div>正解した問題： <strong>10</strong> 問</div>`;
                htmlContent += `<div>間違えた回数： <strong>${mistakeCount}</strong> 回</div>`;
                
                if (mistakeCount === 0) {
                    htmlContent += `<div style="color: blue; font-weight: bold; margin-top: 15px;">パーフェクトです！素晴らしい成績です。</div>`;
                }
                
                htmlContent += `</div>`;
                htmlContent += `<button class="retry-btn" onclick="location.reload()">もう一度挑戦する</button>`;
                htmlContent += `<a href="index.html" class="menu-btn">メニューへ戻る</a>`;
                
                clearMsg.innerHTML = htmlContent;
                appContainer.appendChild(clearMsg);
                
                speak("ぜんもんくりあです。おつかれさまでした。");
                return;
            }

            // 問題提示音の再生
            const soundCheckbox = document.getElementById('sound-checkbox');
            if (soundCheckbox && soundCheckbox.checked) {
                qSound.currentTime = 0;
                qSound.play().catch(e => console.log("ブラウザの自動再生制限により保留されました:", e));
            }

            const prob = problems[currentIndex];

            document.getElementById('status-bar').style.display = 'block';
            document.querySelector('.question-title').style.display = 'block';
            document.getElementById('status-bar').textContent = `第 ${currentIndex + 1} 問 / 全 ${problems.length} 問`;
            document.getElementById('q-title').textContent = '・ ' + prob.text;

            const container = document.createElement('div');
            container.className = 'problem-container';

            const mainArea = document.createElement('div');
            mainArea.className = 'problem-main';

            // 数直線の構築
            const numberLineContainer = document.createElement('div');
            numberLineContainer.className = 'number-line-container';
            
            const numberLineBase = document.createElement('div');
            numberLineBase.className = 'number-line-base';
            numberLineContainer.appendChild(numberLineBase);
            
            const tickContainer = document.createElement('div');
            tickContainer.className = 'tick-container';
            
            // ドラッグ可能なマーカー（●）
            const dragMarker = document.createElement('div');
            dragMarker.className = 'drag-marker';
            
            const minScale = -10;
            const maxScale = 10;
            const totalTicks = maxScale - minScale;
            
            for (let i = minScale; i <= maxScale; i++) {
                const tickWrapper = document.createElement('div');
                tickWrapper.className = 'tick-wrapper';
                // パーセント計算で絶対位置を設定 (レイアウトズレ防止)
                const positionPct = ((i - minScale) / totalTicks) * 100;
                tickWrapper.style.left = positionPct + '%';
                
                if (i === 0) tickWrapper.classList.add('zero');
                
                const tickMark = document.createElement('div');
                tickMark.className = 'tick-mark';
                
                const tickLabel = document.createElement('div');
                tickLabel.className = 'tick-label';
                tickLabel.textContent = i;
                
                // 目盛りクリックで数値を〇で囲み、そこにドラッグマーカーを表示
                tickWrapper.addEventListener('click', () => {
                    // 全てのラベルから丸を外す
                    const allLabels = tickContainer.querySelectorAll('.tick-label');
                    allLabels.forEach(lbl => lbl.classList.remove('circled'));
                    
                    // クリックした数値に〇をつける
                    tickLabel.classList.add('circled');
                    
                    // ドラッグマーカーをこの位置に表示する
                    dragMarker.style.left = positionPct + '%';
                    dragMarker.style.display = 'block';
                });
                
                tickWrapper.appendChild(tickMark);
                tickWrapper.appendChild(tickLabel);
                tickContainer.appendChild(tickWrapper);
            }
            
            // dragMarkerをtickContainer内に追加し、座標系を統一
            tickContainer.appendChild(dragMarker);
            
            numberLineContainer.appendChild(tickContainer);
            
            mainArea.appendChild(numberLineContainer);
            container.appendChild(mainArea);

            // ドラッグマーカーのイベント設定
            let isDraggingMarker = false;

            function startMarkerDrag(e) {
                isDraggingMarker = true;
                e.stopPropagation();
            }

            function doMarkerDrag(e) {
                if (!isDraggingMarker) return;
                e.preventDefault(); // スクロール防止
                
                let clientX = e.touches ? e.touches[0].clientX : e.clientX;
                const rect = tickContainer.getBoundingClientRect();
                let x = clientX - rect.left;
                
                if (x < 0) x = 0;
                if (x > rect.width) x = rect.width;
                
                // 最も近い目盛りにスナップ（吸着）
                const step = rect.width / totalTicks;
                let index = Math.round(x / step);
                
                dragMarker.style.left = ((index / totalTicks) * 100) + '%';
            }

            function stopMarkerDrag() {
                isDraggingMarker = false;
            }

            dragMarker.addEventListener('mousedown', startMarkerDrag);
            document.addEventListener('mousemove', doMarkerDrag, { passive: false });
            document.addEventListener('mouseup', stopMarkerDrag);
            
            dragMarker.addEventListener('touchstart', startMarkerDrag, { passive: false });
            document.addEventListener('touchmove', doMarkerDrag, { passive: false });
            document.addEventListener('touchend', stopMarkerDrag);

            // 回答入力エリア
            const answerArea = document.createElement('div');
            answerArea.className = 'answer-area';

            const answerLabel = document.createElement('div');
            answerLabel.className = 'answer-label';
            answerLabel.textContent = 'こたえ：';

            // 解答ドロップゾーン（計算機呼び出し）
            const ansZone = document.createElement('div');
            ansZone.className = 'drop-zone';
            ansZone.id = 'ans-box';
            ansZone.addEventListener('click', () => { 
                // 電卓を開くたびにディスプレイをクリア
                calcDisplay.textContent = '';
                
                activeInputBox = ansZone;
                calcContainer.style.display = 'flex';
                overlay.style.display = 'block';
            });

            const checkBtn = document.createElement('button');
            checkBtn.className = 'check-btn';
            checkBtn.textContent = 'できた';

            answerArea.appendChild(answerLabel);
            answerArea.appendChild(ansZone);
            answerArea.appendChild(checkBtn);

            container.appendChild(answerArea);

            // 計算機入力用のヒントテキスト
            const hintText = document.createElement('div');
            hintText.className = 'hint-text';
            hintText.innerHTML = '枠をタップして、計算機で数字を入力してください';
            container.appendChild(hintText);
            
            appContainer.appendChild(container);

            checkBtn.addEventListener('click', () => {
                const userAnsStr = document.getElementById('ans-box').textContent;
                const userAns = parseInt(userAnsStr, 10);

                if (isNaN(userAns)) return;

                const isCorrect = (userAns === prob.answer);
                
                const endTime = new Date();
                const problemType = "正負の数の計算";
                const problemContent = prob.text;
                const userAnswer = userAns.toString();
                const inputMethod = "計算機入力";
                const resultStr = isCorrect ? "正解" : "不正解";
                
                const csvLine = `"${problemType}","${problemContent}","${userAnswer}",${formatTime(problemStartTime)},${formatTime(endTime)},${inputMethod},${resultStr}\n`;
                
                if (window.webkit && window.webkit.messageHandlers.appBridge) {
                    window.webkit.messageHandlers.appBridge.postMessage({
                        action: "saveCSV",
                        csvLine: csvLine
                    });
                }

                const judgeOverlay = document.getElementById('judge-overlay');

                if (isCorrect) {
                    judgeOverlay.textContent = 'せいかい！';
                    judgeOverlay.className = 'judge-overlay show';
                    
                    if (soundCheckbox && soundCheckbox.checked) {
                        okSound.currentTime = 0;
                        okSound.play();
                    }
                    
                    checkBtn.disabled = true;
                    
                    setTimeout(() => {
                        judgeOverlay.classList.remove('show');
                    }, 1200);
                    
                    setTimeout(() => {
                        currentIndex++;
                        renderProblem();
                    }, 1500);
                } else {
                    judgeOverlay.textContent = 'おしい！';
                    judgeOverlay.className = 'judge-overlay incorrect show';
                    mistakeCount++;
                    
                    if (soundCheckbox && soundCheckbox.checked) {
                        ngSound.currentTime = 0;
                        ngSound.play();
                    }
                    
                    setTimeout(() => {
                        judgeOverlay.classList.remove('show');
                    }, 1200);
                }
            });
        }

        // --- スタートボタンのイベントリスナー ---
        document.getElementById('start-btn').addEventListener('click', () => {
            document.getElementById('start-screen').style.display = 'none';
            document.getElementById('main-content').style.display = 'block';
            renderProblem();
        });
    </script>
</body>
</html>
