<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>3桁のたし算（上級編）</title>
<style>
    html, body {
        height: 100%;
        overflow: hidden;
        position: fixed;
        width: 100%;
    }
    body {
        font-family: "Helvetica Neue", Arial, "Hiragino Kaku Gothic ProN", "Hiragino Sans", Meiryo, sans-serif;
        margin: 0;
        padding: 20px;
        background-color: #ffffff;
        color: #333;
        touch-action: none;
        box-sizing: border-box;
        user-select: none;
        -webkit-user-select: none;
    }
    
    /* スタート画面 */
    .start-screen {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background-color: #f0f8ff;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        z-index: 10000;
    }
    .start-screen h1 {
        font-size: 3rem;
        color: #2c3e50;
        margin-bottom: 40px;
    }
    .start-btn {
        padding: 20px 60px;
        font-size: 2.5rem;
        font-weight: bold;
        color: #fff;
        background-color: #3498db;
        border: none;
        border-radius: 15px;
        cursor: pointer;
        box-shadow: 0 8px 0 #2980b9;
        transition: transform 0.1s, box-shadow 0.1s;
        -webkit-tap-highlight-color: transparent;
    }
    .start-btn:active {
        transform: translateY(8px);
        box-shadow: none;
    }

    .status-bar {
        font-size: 1.4rem;
        font-weight: bold;
        margin-bottom: 10px;
        color: #555;
    }
    .question-title {
        font-size: 1.8rem;
        font-weight: bold;
        margin-top: 5px;
        margin-bottom: 20px;
    }

    .problem-container {
        display: flex;
        flex-direction: column;
        width: 100%;
        max-width: 1000px;
        margin: 0 auto;
        align-items: center;
        justify-content: center;
    }

    /* ひっ算エリア */
    .hissan-wrapper {
        display: grid;
        grid-template-columns: 60px 80px 80px 80px 80px 180px; /* ＋記号, 千の位, 百の位, 十の位, 一の位, できたボタン */
        grid-template-rows: 60px auto auto auto auto; /* メモ, 1項目, 2項目, 横線, 答え */
        row-gap: 15px;
        column-gap: 15px;
        align-items: center;
        justify-items: center;
        font-size: 5rem;
        font-weight: bold;
        background-color: #f9f9f9;
        padding: 40px 40px;
        border-radius: 12px;
        border: 2px solid #eee;
        margin: 30px 0;
    }

    .hissan-line {
        width: 100%;
        height: 6px;
        background-color: #333;
        margin: 5px 0;
    }

    /* ドロップゾーン（解答の□） */
    .drop-zone {
        width: 80px;
        height: 90px;
        border: 4px dashed #3498db;
        background-color: #f0f8ff;
        border-radius: 12px;
        display: flex;
        justify-content: center;
        align-items: center;
        font-size: 5rem;
        font-weight: bold;
        cursor: pointer;
        color: #333;
        flex-shrink: 0;
    }

    /* 繰り上がり用の小さなメモ枠 */
    .memo-zone {
        width: 50px;
        height: 50px;
        border: 3px dashed #e74c3c;
        background-color: #fff5f5;
        border-radius: 8px;
        display: flex;
        justify-content: center;
        align-items: center;
        font-size: 3rem;
        font-weight: bold;
        cursor: pointer;
        color: #e74c3c;
        align-self: center;
    }

    .instruction-red {
        color: red;
        font-size: 1.2rem;
        font-weight: bold;
        text-align: center;
        margin-bottom: 20px;
    }
    
    /* 判定ボタン */
    .check-btn {
        width: 80%;
        height: 80px;
        font-size: 2rem;
        cursor: pointer;
        border: 2px solid #00bfff;
        background-color: #00bfff;
        color: #fff;
        font-weight: bold;
        border-radius: 10px;
        outline: none;
        box-shadow: 0 5px 0 #0088cc;
        -webkit-tap-highlight-color: transparent;
        touch-action: manipulation;
        justify-self: center;
    }
    .check-btn:active {
        transform: translateY(5px);
        box-shadow: none;
    }
    .check-btn:disabled {
        opacity: 0.5;
        cursor: not-allowed;
        transform: translateY(5px);
        box-shadow: none;
    }
    
    .judge-overlay {
        position: fixed;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%) scale(0.7);
        opacity: 0;
        visibility: hidden;
        background-color: transparent;
        color: #ff3333;
        font-size: 7rem;
        font-weight: bold;
        padding: 30px 60px;
        -webkit-text-stroke: 3px #000;
        text-shadow: 4px 4px 10px rgba(0, 0, 0, 0.5);
        z-index: 9999;
        pointer-events: none;
        transition: opacity 0.3s ease, transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275), visibility 0.3s;
        white-space: nowrap; 
    }
    .judge-overlay.show { opacity: 1; visibility: visible; transform: translate(-50%, -50%) scale(1.0); }
    .judge-overlay.incorrect { color: #3366ff; }
    
    .clear-message { text-align: center; margin-top: 20px; padding: 25px; background-color: #f8f9fa; border-radius: 12px; border: 2px solid #a0c4ff; }
    .clear-message h2 { font-size: 2rem; color: #d9534f; margin-top: 0; margin-bottom: 20px; }
    .final-result-details { font-size: 1.4rem; color: #333; line-height: 1.8; }
    .menu-btn, .retry-btn { margin-top: 20px; padding: 12px 30px; font-size: 1.2rem; cursor: pointer; border: none; border-radius: 8px; outline: none; touch-action: manipulation; text-decoration: none; display: inline-block; font-weight: bold;}
    .retry-btn { background-color: #a0c4ff; color: #fff; margin-right: 15px; }
    .menu-btn { background-color: #95a5a6; color: #fff; }
    
    .top-nav { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
    .toggle-group { display: flex; gap: 15px; }
    .settings-toggle { font-size: 1.1rem; color: #555; cursor: pointer; display: flex; align-items: center; -webkit-tap-highlight-color: transparent; }
    .settings-toggle input { transform: scale(1.3); margin-right: 8px; cursor: pointer; }
    .back-btn { padding: 8px 15px; background-color: #ecf0f1; border: 1px solid #bdc3c7; border-radius: 5px; text-decoration: none; color: #2c3e50; font-size: 0.9rem; touch-action: manipulation; }

    /* 計算機パネル */
    .pieces-container { display: none; justify-content: center; align-items: center; flex-wrap: wrap; gap: 10px; padding: 20px; background-color: #ecf0f1; border-radius: 12px; width: 300px; margin: 0 auto; box-sizing: border-box; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); box-shadow: 0 10px 25px rgba(0,0,0,0.3); z-index: 1000; cursor: grab; }
    .pieces-container:active { cursor: grabbing; }
    .piece { flex: 1 1 25%; height: 70px; border: 2px solid #2c3e50; background-color: #f1c40f; border-radius: 10px; display: flex; justify-content: center; align-items: center; font-size: 2rem; font-weight: bold; cursor: pointer; color: #2c3e50; box-shadow: 0 4px 0 #d4ac0d; touch-action: manipulation; box-sizing: border-box; }
    .piece:active { transform: translateY(4px); box-shadow: none; }
    .piece.delete-btn { background-color: #e74c3c; color: white; border-color: #c0392b; box-shadow: 0 4px 0 #c0392b; font-size: 1.4rem; }
    .piece.enter-btn { background-color: #95a5a6; color: white; border-color: #7f8c8d; box-shadow: 0 4px 0 #7f8c8d; font-size: 1.4rem; }
    
    .overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.4); z-index: 999; }
</style>
</head>
<body>

    <div id="start-screen" class="start-screen">
        <h1>3桁のたし算（上級編）</h1>
        <button id="start-btn" class="start-btn">スタート</button>
        <div style="margin-top: 30px; text-align: center;">
            <a href="view.html" class="menu-btn" style="background-color: #2ecc71; margin-right: 15px;">今までの履歴を見る</a>
            <a href="index.html" class="menu-btn" style="background-color: #95a5a6;">メニューへ戻る</a>
        </div>
    </div>

    <div id="main-content" style="display: none;">
        <div class="top-nav">
            <div class="toggle-group">
                <label class="settings-toggle"><input type="checkbox" id="speech-checkbox" checked> スピーチON</label>
                <label class="settings-toggle"><input type="checkbox" id="sound-checkbox" checked> 効果音ON</label>
            </div>
            <a href="index.html" class="back-btn">メニューへ戻る</a>
        </div>
        
        <div id="status-bar" class="status-bar"></div>
        <h1 class="question-title">・ つぎのたし算を求めましょう！</h1>
        
        <div id="app"></div>
        <div id="judge-overlay" class="judge-overlay"></div>

        <div class="overlay" id="overlay"></div>
        <div class="pieces-container" id="calc-container"></div>
    </div>

    <script>
        const okSound = new Audio('ok.mp3');
        const ngSound = new Audio('ng.mp3');
        const qSound = new Audio('q.mp3');

        function speak(text) {
            const speechCheckbox = document.getElementById('speech-checkbox');
            if (speechCheckbox && !speechCheckbox.checked) return; 
            window.speechSynthesis.cancel(); 
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'ja-JP';
            window.speechSynthesis.speak(utterance);
        }

        const numberReadings = [
            "ぜろ", "いち", "に", "さん", "よん", "ご", "ろく", "なな", "はち", "きゅう", "じゅう"
        ];

        /* ==========================================
           計算機パネルの構築（即決パターン・表示なし）
           ========================================== */
        const overlay = document.getElementById('overlay');
        const calcContainer = document.getElementById('calc-container');
        let activeInputBox = null;

        const calcKeys = [
            '7', '8', '9',
            '4', '5', '6',
            '1', '2', '3',
            '0', '削除', 'とじる'
        ];

        calcKeys.forEach(key => {
            const piece = document.createElement('div');
            piece.className = 'piece';
            piece.textContent = key;
            
            if (key === '削除') {
                piece.classList.add('delete-btn');
                piece.addEventListener('click', () => {
                    if (activeInputBox) {
                        activeInputBox.textContent = ''; 
                    }
                });
            } else if (key === 'とじる') {
                piece.classList.add('enter-btn');
                piece.addEventListener('click', () => {
                    calcContainer.style.display = 'none';
                    overlay.style.display = 'none';
                    activeInputBox = null;
                });
            } else {
                piece.addEventListener('click', () => {
                    if (activeInputBox) {
                        activeInputBox.textContent = key; 
                        
                        const parsedVal = parseInt(key, 10);
                        if (parsedVal >= 0 && parsedVal <= 9) {
                            speak(numberReadings[parsedVal]);
                        } else {
                            speak(key);
                        }

                        calcContainer.style.display = 'none';
                        overlay.style.display = 'none';
                        activeInputBox = null;
                    }
                });
            }
            calcContainer.appendChild(piece);
        });

        overlay.addEventListener('click', () => {
            calcContainer.style.display = 'none';
            overlay.style.display = 'none';
            activeInputBox = null;
        });

        // 計算機パネル自体のドラッグ機能
        let isCalcDragging = false;
        let calcDragStartX, calcDragStartY, calcInitialLeft, calcInitialTop;

        function startCalcDrag(e) {
            if (e.target.classList.contains('piece')) return;
            isCalcDragging = true;
            let clientX = e.touches ? e.touches[0].clientX : e.clientX;
            let clientY = e.touches ? e.touches[0].clientY : e.clientY;
            calcDragStartX = clientX;
            calcDragStartY = clientY;
            let style = window.getComputedStyle(calcContainer);
            calcInitialLeft = parseFloat(style.left);
            calcInitialTop = parseFloat(style.top);
        }

        function doCalcDrag(e) {
            if (!isCalcDragging) return;
            e.preventDefault();
            let clientX = e.touches ? e.touches[0].clientX : e.clientX;
            let clientY = e.touches ? e.touches[0].clientY : e.clientY;
            let dx = clientX - calcDragStartX;
            let dy = clientY - calcDragStartY;
            calcContainer.style.left = (calcInitialLeft + dx) + 'px';
            calcContainer.style.top = (calcInitialTop + dy) + 'px';
        }

        function stopCalcDrag() {
            isCalcDragging = false;
        }

        calcContainer.addEventListener('mousedown', startCalcDrag);
        document.addEventListener('mousemove', doCalcDrag, { passive: false });
        document.addEventListener('mouseup', stopCalcDrag);
        calcContainer.addEventListener('touchstart', startCalcDrag, { passive: false });
        document.addEventListener('touchmove', doCalcDrag, { passive: false });
        document.addEventListener('touchend', stopCalcDrag);

        /* ==========================================
           問題生成と判定ロジック (3桁 + 1〜3桁)
           ========================================== */
        const problems = [];
        const seen = new Set();
        
        // 1桁の足し算 (2問)
        while (problems.length < 2) {
            const a = Math.floor(Math.random() * 900) + 100; // 100〜999
            const b = Math.floor(Math.random() * 9) + 1;     // 1〜9
            const key = `${a}+${b}`;
            if (!seen.has(key)) {
                seen.add(key);
                problems.push({ n1: a, n2: b });
            }
        }
        
        // 2桁の足し算 (3問)
        while (problems.length < 5) {
            const a = Math.floor(Math.random() * 900) + 100; // 100〜999
            const b = Math.floor(Math.random() * 90) + 10;   // 10〜99
            const key = `${a}+${b}`;
            if (!seen.has(key)) {
                seen.add(key);
                problems.push({ n1: a, n2: b });
            }
        }
        
        // 3桁の足し算 (5問)
        while (problems.length < 10) {
            const a = Math.floor(Math.random() * 900) + 100; // 100〜999
            const b = Math.floor(Math.random() * 900) + 100; // 100〜999
            const key = `${a}+${b}`;
            if (!seen.has(key)) {
                seen.add(key);
                problems.push({ n1: a, n2: b });
            }
        }
        
        // 問題をランダムにシャッフルする
        for (let i = problems.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [problems[i], problems[j]] = [problems[j], problems[i]];
        }

        let currentIndex = 0;
        let mistakeCount = 0;
        const appContainer = document.getElementById('app');
        let problemStartTime;

        function formatTime(date) {
            return date.getHours().toString().padStart(2, '0') + ':' + 
                   date.getMinutes().toString().padStart(2, '0') + ':' + 
                   date.getSeconds().toString().padStart(2, '0');
        }

        function renderProblem() {
            appContainer.innerHTML = '';
            problemStartTime = new Date();

            if (currentIndex >= problems.length) {
                document.getElementById('status-bar').style.display = 'none';
                document.querySelector('.question-title').style.display = 'none';
                
                const clearMsg = document.createElement('div');
                clearMsg.className = 'clear-message';
                
                let htmlContent = `<h2>全10問合格！！</h2>`;
                htmlContent += `<div class="final-result-details">`;
                htmlContent += `<div>間違えた回数： <strong>${mistakeCount}</strong> 回</div>`;
                if (mistakeCount === 0) {
                    htmlContent += `<div style="color: blue; font-weight: bold; margin-top: 15px;">パーフェクトです！素晴らしい成績です。</div>`;
                }
                htmlContent += `</div>`;
                htmlContent += `<button class="retry-btn" onclick="location.reload()">もう一度挑戦する</button>`;
                htmlContent += `<a href="index.html" class="menu-btn">メニューへ戻る</a>`;
                
                clearMsg.innerHTML = htmlContent;
                appContainer.appendChild(clearMsg);
                speak("ぜんもんごうかくです。おつかれさまでした。");
                return;
            }

            document.getElementById('status-bar').style.display = 'block';
            document.getElementById('status-bar').textContent = `第 ${currentIndex + 1} 問 / 全 10 問`;

            const prob = problems[currentIndex];
            speak(`つぎのたしざんをもとめましょう。${prob.n1} たす ${prob.n2} は`);

            const soundCheckbox = document.getElementById('sound-checkbox');
            if (soundCheckbox && soundCheckbox.checked) {
                qSound.currentTime = 0; qSound.play().catch(e => {});
            }

            // 問題エリア
            const container = document.createElement('div');
            container.className = 'problem-container';

            // --- ひっ算エリア ---
            const hissanArea = document.createElement('div');
            hissanArea.className = 'hissan-wrapper';
            
            const n1Str = prob.n1.toString();
            const n2Str = prob.n2.toString();
            const correctAns = prob.n1 + prob.n2;
            const ansLength = correctAns.toString().length;

            // 繰り上がりの判定
            const hasCarry1 = (prob.n1 % 10) + (prob.n2 % 10) >= 10;
            const hasCarry10 = Math.floor((prob.n1 % 100) / 10) + Math.floor((prob.n2 % 100) / 10) + (hasCarry1 ? 1 : 0) >= 10;
            const hasCarry100 = Math.floor(prob.n1 / 100) + Math.floor(prob.n2 / 100) + (hasCarry10 ? 1 : 0) >= 10;

            // 一の位からの繰り上がりメモ枠 (十の位の上)
            if (hasCarry1) {
                const memoBox1 = document.createElement('div');
                memoBox1.className = 'memo-zone';
                memoBox1.style.gridColumn = '4'; 
                memoBox1.style.gridRow = '1';    
                memoBox1.addEventListener('click', () => { 
                    memoBox1.textContent = ''; 
                    activeInputBox = memoBox1;
                    calcContainer.style.display = 'flex';
                    overlay.style.display = 'block';
                });
                hissanArea.appendChild(memoBox1);
            }

            // 十の位からの繰り上がりメモ枠 (百の位の上)
            if (hasCarry10) {
                const memoBox10 = document.createElement('div');
                memoBox10.className = 'memo-zone';
                memoBox10.style.gridColumn = '3'; 
                memoBox10.style.gridRow = '1';    
                memoBox10.addEventListener('click', () => { 
                    memoBox10.textContent = ''; 
                    activeInputBox = memoBox10;
                    calcContainer.style.display = 'flex';
                    overlay.style.display = 'block';
                });
                hissanArea.appendChild(memoBox10);
            }

            // 百の位からの繰り上がりメモ枠 (千の位の上)
            if (hasCarry100) {
                const memoBox100 = document.createElement('div');
                memoBox100.className = 'memo-zone';
                memoBox100.style.gridColumn = '2'; 
                memoBox100.style.gridRow = '1';    
                memoBox100.addEventListener('click', () => { 
                    memoBox100.textContent = ''; 
                    activeInputBox = memoBox100;
                    calcContainer.style.display = 'flex';
                    overlay.style.display = 'block';
                });
                hissanArea.appendChild(memoBox100);
            }

            // 第1項 (3桁) 百の位
            const n1Hundreds = document.createElement('div');
            n1Hundreds.textContent = n1Str[0];
            n1Hundreds.style.gridColumn = '3'; 
            n1Hundreds.style.gridRow = '2';

            // 第1項 十の位
            const n1Tens = document.createElement('div');
            n1Tens.textContent = n1Str[1];
            n1Tens.style.gridColumn = '4'; 
            n1Tens.style.gridRow = '2';

            // 第1項 一の位
            const n1Ones = document.createElement('div');
            n1Ones.textContent = n1Str[2];
            n1Ones.style.gridColumn = '5'; 
            n1Ones.style.gridRow = '2';
            
            hissanArea.appendChild(n1Hundreds);
            hissanArea.appendChild(n1Tens);
            hissanArea.appendChild(n1Ones);

            // 第2項 ＋記号つき
            const opPlus = document.createElement('div');
            opPlus.textContent = '＋';
            opPlus.style.gridColumn = '1';
            opPlus.style.gridRow = '3';
            opPlus.style.color = '#555';
            hissanArea.appendChild(opPlus);

            // 第2項 各桁の配置（足す数の桁数に応じて動的に生成）
            if (n2Str.length >= 1) {
                const n2Ones = document.createElement('div');
                n2Ones.textContent = n2Str[n2Str.length - 1];
                n2Ones.style.gridColumn = '5'; 
                n2Ones.style.gridRow = '3';
                hissanArea.appendChild(n2Ones);
            }
            if (n2Str.length >= 2) {
                const n2Tens = document.createElement('div');
                n2Tens.textContent = n2Str[n2Str.length - 2];
                n2Tens.style.gridColumn = '4'; 
                n2Tens.style.gridRow = '3';
                hissanArea.appendChild(n2Tens);
            }
            if (n2Str.length >= 3) {
                const n2Hundreds = document.createElement('div');
                n2Hundreds.textContent = n2Str[n2Str.length - 3];
                n2Hundreds.style.gridColumn = '3'; 
                n2Hundreds.style.gridRow = '3';
                hissanArea.appendChild(n2Hundreds);
            }

            // 横線
            const hissanLine = document.createElement('div');
            hissanLine.className = 'hissan-line';
            hissanLine.style.gridColumn = '1 / span 5'; 
            hissanLine.style.gridRow = '4';
            hissanArea.appendChild(hissanLine);

            // 解答枠 (桁数に合わせて生成)
            for (let i = 0; i < ansLength; i++) {
                const box = document.createElement('div');
                box.className = 'drop-zone';
                box.id = `ans-box-${i}`;
                
                // ansLengthに応じて右詰め (列5が一の位、列4が十の位、列3が百の位、列2が千の位)
                let col = 5 - (ansLength - 1 - i);
                box.style.gridColumn = col.toString();
                box.style.gridRow = '5';

                box.addEventListener('click', () => { 
                    box.textContent = ''; 
                    activeInputBox = box;
                    calcContainer.style.display = 'flex';
                    overlay.style.display = 'block';
                });
                hissanArea.appendChild(box);
            }

            // 「できた！」ボタンを解答枠の右側（列6）に配置
            const checkBtn = document.createElement('button');
            checkBtn.className = 'check-btn';
            checkBtn.textContent = 'できた！';
            checkBtn.style.gridColumn = '6';
            checkBtn.style.gridRow = '5';
            hissanArea.appendChild(checkBtn);

            container.appendChild(hissanArea);

            const instruction = document.createElement('div');
            instruction.className = 'instruction-red';
            //instruction.innerHTML = 'それぞれの枠をタップして、数字を入力してください。';
            container.appendChild(instruction);
            
            appContainer.appendChild(container);

            // 判定処理
            checkBtn.addEventListener('click', () => {
                let uAnsStr = '';
                let allFilled = true;
                
                // メモ枠は評価に含めず、解答枠のみを判定
                for (let i = 0; i < ansLength; i++) {
                    const box = document.getElementById(`ans-box-${i}`);
                    if (box.textContent === '') {
                        allFilled = false;
                        break;
                    }
                    uAnsStr += box.textContent;
                }

                if (!allFilled) return; 

                const uAns = parseInt(uAnsStr, 10);
                const isCorrect = (uAns === correctAns);
                
                const endTime = new Date();
                const problemType = "3桁のたし算（上級編）";
                const problemContent = `${prob.n1} + ${prob.n2}`;
                const userAnswer = uAns.toString();
                const inputMethod = "計算機入力";
                const resultStr = isCorrect ? "正解" : "不正解";
                
                // view.htmlでの日付分割対応のため、日付文字列(YYYY/MM/DD)を生成
                const yyyy = problemStartTime.getFullYear();
                const mm = String(problemStartTime.getMonth() + 1).padStart(2, '0');
                const dd = String(problemStartTime.getDate()).padStart(2, '0');
                const dateStr = `${yyyy}/${mm}/${dd}`;
                
                // CSVフォーマットの先頭に日付を追加
                const csvLine = `"${dateStr}","${problemType}","${problemContent}","${userAnswer}",${formatTime(problemStartTime)},${formatTime(endTime)},${inputMethod},${resultStr}\n`;
                
                if (window.webkit && window.webkit.messageHandlers.appBridge) {
                    window.webkit.messageHandlers.appBridge.postMessage({
                        action: "saveCSV",
                        csvLine: csvLine
                    });
                } else {
                    // ブラウザ単体での動作確認用にLocalStorageへ保存
                    const storageKey = "addition_3digits_history";
                    let history = localStorage.getItem(storageKey) || "";
                    history += csvLine;
                    localStorage.setItem(storageKey, history);
                    console.log("LocalStorageに保存しました: " + csvLine);
                }

                const overlayJudge = document.getElementById('judge-overlay');
                if (isCorrect) {
                    overlayJudge.textContent = 'せいかい！';
                    overlayJudge.className = 'judge-overlay show';
                    if (soundCheckbox && soundCheckbox.checked) { okSound.currentTime = 0; okSound.play(); }
                    
                    checkBtn.disabled = true;
                    setTimeout(() => { overlayJudge.classList.remove('show'); }, 1200);
                    setTimeout(() => { currentIndex++; renderProblem(); }, 1500);
                } else {
                    overlayJudge.textContent = 'おしい！';
                    overlayJudge.className = 'judge-overlay incorrect show';
                    mistakeCount++;
                    if (soundCheckbox && soundCheckbox.checked) { ngSound.currentTime = 0; ngSound.play(); }
                    setTimeout(() => { overlayJudge.classList.remove('show'); }, 1200);
                }
            });
        }

        document.getElementById('start-btn').addEventListener('click', () => {
            document.getElementById('start-screen').style.display = 'none';
            document.getElementById('main-content').style.display = 'block';
            renderProblem();
        });

    </script>
</body>
</html>
