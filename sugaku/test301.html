<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>筆算アプリ実験</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <style>
        /* 1. 画面全体（外側の海） */
        body {
            /* 1. 全体の配置（中央寄せ） */
            background-color: gray;
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;

            /* 2. iPad操作を快適にする設定（追加） */
            overflow: hidden;
            overscroll-behavior: none;
            touch-action: none;

            /* 文字選択を禁止する（ここを追加！） */
            -webkit-user-select: none; /* Safari/iPad用 */
            user-select: none;
        }

        /* 2. 白い島（作業用エリア） */
        .container {
            width: 50vw;
            height: 50vh;
            background-color: white;
            position: relative; /* 座標指定(absolute)の基準点 */
            border: 2px solid black;
        }

        /* 共通の箱の設定 */
        .box {
            width: 50px;
            height: 50px;
            background-color: #3498db;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 5px;
            cursor: pointer; /* マウスを乗せると指の形になる */
            transition: transform 0.2s; /* クリック時のアニメーション */
        }

        /* 3番目・4番目のように自由に配置したい箱 */
        .box-absolute {
            position: absolute;
            background-color: #e74c3c;
        }

        /* クリックされた時の強調スタイル */
        .box.active {
            border: 4px solid yellow;
            transform: scale(1.1); /* 少し大きくする */
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="box">1</div>
        <div class="box">2</div>
        <div class="box box-absolute" style="top: 100px; left: 100px;">3</div>
        <div class="box box-absolute" style="top: 150px; left: 150px;">4</div>
        <div class="box">5</div>
    </div>

    <script>
        // すべての .box クラスを持つ要素を取得
        const boxes = document.querySelectorAll('.box');

        // すべての箱にクリック判定を追加
        boxes.forEach((box) => {
            box.addEventListener('click', (event) => {
                // 一度すべての箱から 'active' を消す（リセット）
                boxes.forEach(b => b.classList.remove('active'));

                // クリックされた箱に 'active' を追加
                event.target.classList.add('active');
                
                console.log(event.target.textContent + ' が選択されました');
            });
        });
    </script>
</body>
</html>
