<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>数直線ツール（正負の数）</title>
<style>
    html, body {
        height: 100%;
        overflow: hidden;
        position: fixed;
        width: 100%;
    }
    body {
        font-family: "Helvetica Neue", Arial, "Hiragino Kaku Gothic ProN", "Hiragino Sans", Meiryo, sans-serif;
        margin: 0;
        padding: 20px;
        background-color: #ffffff;
        color: #333;
        touch-action: none;
        box-sizing: border-box;
        user-select: none;
        -webkit-user-select: none;
    }

    /* ツールエリアのスタイル */
    .tool-container {
        display: flex;
        flex-direction: column;
        margin-top: 50px;
        margin-bottom: 20px;
        width: 100%;
        max-width: 1000px;
        margin-left: auto;
        margin-right: auto;
    }
    .tool-main {
        display: flex;
        flex-direction: column;
        align-items: center;
        width: 100%;
        margin-bottom: 20px;
    }
    
    /* 数直線のスタイル */
    .number-line-container {
        position: relative;
        width: 100%;
        height: 160px;
        margin: 40px 0 30px 0;
    }
    .number-line-base {
        position: absolute;
        top: 120px; 
        left: 4px;
        right: 4px;
        height: 4px;
        background-color: #333;
        transform: translateY(-50%);
    }
    .tick-container {
        position: absolute;
        top: 70px;
        left: 4px;
        right: 4px;
        height: 100px;
    }
    .tick-wrapper {
        position: absolute;
        top: 50%;
        height: 100%;
        width: 30px; 
        transform: translate(-50%, -50%);
        cursor: pointer;
    }
    .tick-mark {
        position: absolute;
        top: 50%;
        left: 50%;
        width: 2px;
        height: 20px;
        background-color: #333;
        transform: translate(-50%, -50%);
    }
    .tick-wrapper.zero .tick-mark {
        height: 30px;
        width: 4px;
        background-color: #e74c3c;
    }
    .tick-label {
        position: absolute;
        top: calc(50% + 20px);
        left: 50%;
        width: 28px;
        height: 28px;
        line-height: 24px;
        text-align: center;
        font-size: 1.8rem;
        color: #333;
        font-weight: bold;
        border-radius: 50%;
        transform: translateX(-50%);
        box-sizing: border-box;
        transition: all 0.2s ease;
    }
    .tick-label.circled {
        border: 2px solid #e74c3c;
        color: #e74c3c;
        background-color: #fff0f0;
    }

    /* ドラッグマーカー（青丸）のスタイル */
    .drag-marker {
        position: absolute;
        top: 10px;
        width: 54px;
        height: 54px;
        background-color: #3498db;
        border: 3px solid #fff;
        border-radius: 50%;
        transform: translate(-50%, -50%);
        cursor: grab;
        z-index: 10;
        box-shadow: 0 4px 8px rgba(0,0,0,0.4);
        touch-action: none;
        display: none; /* JSでflexに変更して表示 */
        
        color: #ffffff;
        font-size: 1.4rem;
        font-weight: bold;
        align-items: center;
        justify-content: center;
    }
    .drag-marker:active {
        cursor: grabbing;
        transform: translate(-50%, -50%) scale(1.1);
    }
    
    .hint-text {
        text-align: center;
        color: #555;
        font-size: 1.3rem;
        font-weight: bold;
        margin-top: 40px;
        line-height: 1.5;
    }

    .top-nav {
        display: flex;
        justify-content: space-between; 
        align-items: center;            
        margin-bottom: 10px;
    }
    .toggle-group {
        display: flex;
        gap: 15px;
    }
    .settings-toggle {
        font-size: 1.1rem;
        color: #555;
        cursor: pointer;
        display: flex;
        align-items: center;
        -webkit-tap-highlight-color: transparent;
    }
    .settings-toggle input {
        transform: scale(1.3);
        margin-right: 8px;
        cursor: pointer;
    }
    .back-btn {
        padding: 8px 15px;
        background-color: #ecf0f1;
        border: 1px solid #bdc3c7;
        border-radius: 5px;
        text-decoration: none;
        color: #2c3e50;
        font-size: 0.9rem;
        touch-action: manipulation;
    }
</style>
</head>
<body>

    <div id="main-content">
        <div class="top-nav">
            <div class="toggle-group">
                <label class="settings-toggle">
                    <input type="checkbox" id="sound-checkbox" checked>
                    効果音ON
                </label>
            </div>
            <a href="index.html" class="back-btn">メニューへ戻る</a>
        </div>
        
        <div id="app"></div>
    </div>

    <script>
        const komaSound = new Audio('koma.m4a');

        const appContainer = document.getElementById('app');

        function renderTool() {
            appContainer.innerHTML = '';

            const container = document.createElement('div');
            container.className = 'tool-container';

            const mainArea = document.createElement('div');
            mainArea.className = 'tool-main';

            const numberLineContainer = document.createElement('div');
            numberLineContainer.className = 'number-line-container';
            
            const numberLineBase = document.createElement('div');
            numberLineBase.className = 'number-line-base';
            numberLineContainer.appendChild(numberLineBase);
            
            const tickContainer = document.createElement('div');
            tickContainer.className = 'tick-container';
            
            const dragMarker = document.createElement('div');
            dragMarker.className = 'drag-marker';
            
            const minScale = -10;
            const maxScale = 10;
            const totalTicks = maxScale - minScale;

            // 基準となる数値を保持する変数
            let selectedBaseValue = null;
            
            for (let i = minScale; i <= maxScale; i++) {
                const tickWrapper = document.createElement('div');
                tickWrapper.className = 'tick-wrapper';
                const positionPct = ((i - minScale) / totalTicks) * 100;
                tickWrapper.style.left = positionPct + '%';
                
                if (i === 0) tickWrapper.classList.add('zero');
                
                const tickMark = document.createElement('div');
                tickMark.className = 'tick-mark';
                
                const tickLabel = document.createElement('div');
                tickLabel.className = 'tick-label';
                tickLabel.textContent = i;
                
                // 目盛りクリック時の処理（基準値の決定）
                tickWrapper.addEventListener('click', (e) => {
                    e.stopPropagation();

                    const allLabels = tickContainer.querySelectorAll('.tick-label');
                    allLabels.forEach(lbl => lbl.classList.remove('circled'));
                    
                    tickLabel.classList.add('circled');
                    
                    // クリックした座標を基準値として記憶
                    selectedBaseValue = i;
                    
                    dragMarker.style.left = positionPct + '%';
                    dragMarker.style.display = 'flex';
                    dragMarker.textContent = '0';
                });
                
                tickWrapper.appendChild(tickMark);
                tickWrapper.appendChild(tickLabel);
                tickContainer.appendChild(tickWrapper);
            }
            
            tickContainer.appendChild(dragMarker);
            numberLineContainer.appendChild(tickContainer);
            mainArea.appendChild(numberLineContainer);
            container.appendChild(mainArea);

            // ドラッグ操作のロジック
            let isDraggingMarker = false;

            function startMarkerDrag(e) {
                isDraggingMarker = true;
                e.stopPropagation();
            }

            let lastIndex = -1;

            function doMarkerDrag(e) {
                if (!isDraggingMarker) return;
                e.preventDefault(); 
                
                let clientX = e.touches ? e.touches[0].clientX : e.clientX;
                const rect = tickContainer.getBoundingClientRect();
                let x = clientX - rect.left;
                
                if (x < 0) x = 0;
                if (x > rect.width) x = rect.width;
                
                const step = rect.width / totalTicks;
                let index = Math.round(x / step);
                
                if (index !== lastIndex) {
                    const soundCheckbox = document.getElementById('sound-checkbox');
                    if (soundCheckbox && soundCheckbox.checked) {
                        komaSound.currentTime = 0;
                        komaSound.play().catch(err => {});
                    }
                    lastIndex = index;

                    // ドラッグ中の青丸の数値（差分）を計算して表示
                    if (selectedBaseValue !== null) {
                        let currentVal = minScale + index;
                        let diff = currentVal - selectedBaseValue;
                        
                        // 正の数の場合は「+」をつける
                        if (diff > 0) {
                            dragMarker.textContent = '+' + diff;
                        } else {
                            dragMarker.textContent = diff;
                        }
                    }
                }
                
                dragMarker.style.left = ((index / totalTicks) * 100) + '%';
            }

            function stopMarkerDrag() {
                isDraggingMarker = false;
                lastIndex = -1;
            }

            dragMarker.addEventListener('mousedown', startMarkerDrag);
            document.addEventListener('mousemove', doMarkerDrag, { passive: false });
            document.addEventListener('mouseup', stopMarkerDrag);
            
            dragMarker.addEventListener('touchstart', startMarkerDrag, { passive: false });
            document.addEventListener('touchmove', doMarkerDrag, { passive: false });
            document.addEventListener('touchend', stopMarkerDrag);

            const hintText = document.createElement('div');
            hintText.className = 'hint-text';
            hintText.innerHTML = '目盛りをタップして基準を決め、<br>青い丸を動かして計算してみましょう。';
            container.appendChild(hintText);
            
            appContainer.appendChild(container);
        }

        // 初期描画の実行
        renderTool();

    </script>
</body>
</html>
