<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>分数のひき算（１－分数）</title>
    
    <!-- 共通スタイルの読み込み -->
    <link rel="stylesheet" href="app-common.css">

    <!-- 固有のスタイル -->
    <style>
        .problem-container {
            display: flex;
            flex-direction: column;
            margin-bottom: 10px;
            width: 100%;
            max-width: 900px;
            margin-left: auto;
            margin-right: auto;
        }
        .problem-main {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
        }
        
        .bar-wrapper {
            width: 100%;
            display: flex;
            flex-direction: column;
            margin-bottom: 25px;
        }
        .length-indicator-container {
            position: relative;
            width: 100%;
            height: 35px;
            margin-bottom: 5px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .red-bar-indicator {
            position: absolute;
            width: 100%;
            height: 2px;
            background-color: red;
            border-radius: 1px;
            box-sizing: border-box;
            top: 50%;
            transform: translateY(-50%);
        }
        .red-bar-indicator::before, .red-bar-indicator::after {
            content: '';
            position: absolute;
            top: -8px;
            height: 18px;
            width: 2px;
            background-color: red;
        }
        .red-bar-indicator::before { left: 0; }
        .red-bar-indicator::after { right: 0; }
        
        .indicator-label-center {
            position: relative;
            z-index: 2;
            background-color: #ffffff;
            padding: 0 10px;
            color: red;
            font-size: 1.6rem;
            font-weight: bold;
            line-height: 1.0;
            top: -1px;
        }
        
        .bar {
            display: flex;
            width: 100%;
            height: 60px;
            border: 2px solid #000;
            box-sizing: border-box;
        }
        .segment {
            flex: 1;
            border-right: 1px dotted #000;
            box-sizing: border-box;
            transition: background-color 0.2s ease;
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
        }
        .segment:last-child {
            border-right: none;
        }
        .segment.filled {
            background-color: #00bfff;
        }
        .segment.gray-filled {
            background-color: #95a5a6 !important;
        }
        
        .inner-fraction {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            font-size: 1.4rem;
            font-weight: bold;
        }
        .inner-num {
            border-bottom: 2px solid #000;
            padding: 0 4px;
            line-height: 1.1;
        }
        .inner-den {
            padding: 0 4px;
            line-height: 1.1;
        }
        
        .controls-area {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
        }
        .eq-container {
            display: flex;
            align-items: center;
            justify-content: center;
            flex-wrap: wrap;
            margin-bottom: 25px;
            font-size: 3rem;
            font-weight: bold;
        }
        .eq-fraction {
            display: inline-flex;
            flex-direction: column;
            align-items: center;
            font-size: 2.5rem;
            margin: 0 10px;
        }
        
        .drop-zone {
            width: 70px;
            height: 70px;
            border: 3px dashed #3498db;
            background-color: #f0f8ff;
            border-radius: 8px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 3.5rem;
            font-weight: bold;
            cursor: pointer;
            color: #333;
            flex-shrink: 0;
        }
        .fraction-line {
            width: 100%;
            height: 5px;
            background-color: #000;
            margin: 8px 0;
        }
        
        .check-btn-container {
            display: flex;
            justify-content: center;
            width: 100%;
            margin-top: 15px;
        }
        .check-btn {
            padding: 0 40px;
            height: 60px;
            font-size: 1.5rem;
            cursor: pointer;
            border: 2px solid #00bfff;
            background-color: #00bfff;
            color: #fff;
            font-weight: bold;
            border-radius: 8px;
            outline: none;
            box-shadow: 0 4px 0 #0088cc;
            -webkit-tap-highlight-color: transparent;
            touch-action: manipulation;
            flex-shrink: 0;
        }
        .check-btn:active {
            transform: translateY(4px);
            box-shadow: none;
        }
        .check-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: translateY(4px);
            box-shadow: none;
        }
        
        .div-btn {
            width: 45px;
            height: 45px;
            font-size: 1.6rem;
            cursor: pointer;
            border: 1px solid #999;
            background-color: #fff;
            border-radius: 8px;
            margin: 0 10px;
        }
        .division-label {
            font-size: 1.4rem;
            color: #555;
            margin-left: 10px;
        }
        .instruction-red {
            color: red;
            font-size: 1.1rem;
            font-weight: bold;
            margin-bottom: 15px;
            text-align: center;
            line-height: 1.4;
        }
    </style>
</head>
<body>

    <!-- スタート画面 -->
    <div id="start-screen" class="start-screen">
        <h1>分数のひき算（１－分数）</h1>
        <button id="start-btn" class="start-btn">スタート</button>
        <div style="margin-top: 30px; text-align: center;">
            <a href="index.html" class="menu-btn">メニューへ戻る</a>
        </div>
    </div>

    <!-- メイン画面 -->
    <div id="main-content" style="display: none;">
        <div class="top-nav">
            <div class="toggle-group">
                <label class="settings-toggle">
                    <input type="checkbox" id="speech-checkbox" checked> スピーチON
                </label>
                <label class="settings-toggle">
                    <input type="checkbox" id="sound-checkbox" checked> 効果音ON
                </label>
            </div>
            <a href="index.html" class="back-btn">メニューへ戻る</a>
        </div>
        
        <div id="status-bar" class="status-bar"></div>
        <div id="question-title" class="question-title-container">・ 次の分数のひき算を求めなさい。</div>
        
        <div id="app"></div>
        <div id="judge-overlay" class="judge-overlay"></div>
    </div>

    <!-- 共通JavaScriptの読み込み -->
    <script src="app-common.js"></script>
    <script src="calc-keyboard.js"></script>

    <!-- アプリ固有JavaScript -->
    <script>
        // ガイドメッセージ表示関数
        function showGuideMessage(msg, speakMsg) {
            AppAudio.speak(speakMsg || msg);
            let guideEl = document.getElementById('guide-toast');
            if (!guideEl) {
                guideEl = document.createElement('div');
                guideEl.id = 'guide-toast';
                guideEl.style.cssText = `
                    position: fixed;
                    bottom: 80px;
                    left: 50%;
                    transform: translateX(-50%);
                    background-color: rgba(44, 62, 80, 0.95);
                    color: #fff;
                    padding: 14px 28px;
                    border-radius: 30px;
                    font-size: 1.3rem;
                    font-weight: bold;
                    z-index: 9998;
                    pointer-events: none;
                    transition: opacity 0.3s ease;
                    text-align: center;
                    box-shadow: 0 4px 15px rgba(0,0,0,0.3);
                    white-space: nowrap;
                `;
                document.body.appendChild(guideEl);
            }
            guideEl.textContent = msg;
            guideEl.style.opacity = '1';
            clearTimeout(guideEl.timer);
            guideEl.timer = setTimeout(() => {
                guideEl.style.opacity = '0';
            }, 2500);
        }

        // 問題の全パターンを作成してランダムに10問選出
        const allProblems = [];
        for (let d = 2; d <= 8; d++) {
            for (let n = 1; n < d; n++) {
                allProblems.push({ den: d, num: n });
            }
        }
        for (let i = allProblems.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [allProblems[i], allProblems[j]] = [allProblems[j], allProblems[i]];
        }
        const problems = allProblems.slice(0, 10); 
        
        let currentIndex = 0; 
        let mistakeCount = 0; 
        let problemStartTime;
        const appContainer = document.getElementById('app');

        function renderProblem() {
            appContainer.innerHTML = '';
            problemStartTime = new Date();

            if (currentIndex >= problems.length) {
                document.getElementById('status-bar').style.display = 'none';
                document.getElementById('question-title').style.display = 'none';
                
                const clearMsg = document.createElement('div');
                clearMsg.className = 'clear-message';
                clearMsg.innerHTML = `
                    <h2>全10問合格！！</h2>
                    <div class="final-result-details">
                        <div>間違えた回数： <strong>${mistakeCount}</strong> 回</div>
                        ${mistakeCount === 0 ? '<div style="color: blue; font-weight: bold; margin-top: 15px;">パーフェクトです！素晴らしい成績です。</div>' : ''}
                    </div>
                    <button class="retry-btn" onclick="location.reload()">もう一度挑戦する</button>
                    <a href="index.html" class="menu-btn">メニューへ戻る</a>
                `;
                appContainer.appendChild(clearMsg);
                AppAudio.speak("ぜんもんごうかくです。おつかれさでした。");
                return;
            }
            
            const prob = problems[currentIndex]; 
            document.getElementById('status-bar').style.display = 'block';
            document.getElementById('question-title').style.display = 'block';
            document.getElementById('status-bar').textContent = `第 ${currentIndex + 1} 問 / 全 10 問`;

            AppAudio.playQ();
            AppAudio.speak(`つぎのぶんすうのひきざんをもとめなさい。いち、ひく、${prob.den}ぶんの${prob.num}、は`);

            const container = document.createElement('div');
            container.className = 'problem-container';
            const mainArea = document.createElement('div');
            mainArea.className = 'problem-main';
            
            const bar1Wrapper = document.createElement('div');
            bar1Wrapper.className = 'bar-wrapper';
            bar1Wrapper.innerHTML = `
                <div class="length-indicator-container">
                    <div class="red-bar-indicator"></div>
                    <div class="indicator-label-center">1</div>
                </div>
                <div class="bar" id="bar1"></div>
                <div style="display:flex; align-items:center; justify-content:center; margin-top:10px;">
                    <button class="div-btn" id="minus-btn">ー</button>
                    <button class="div-btn" id="plus-btn">＋</button>
                    <div class="division-label" id="div-label">（1 分割）</div>
                </div>
            `;
            mainArea.appendChild(bar1Wrapper);

            const controlsArea = document.createElement('div');
            controlsArea.className = 'controls-area';

            const eqContainer = document.createElement('div');
            eqContainer.className = 'eq-container';
            eqContainer.innerHTML = `
                <div>1</div>
                <div style="margin: 0 15px;">ー</div>
                <div class="eq-fraction">
                    <div class="inner-num" style="border-bottom: 3px solid #000;">${prob.num}</div>
                    <div class="inner-den">${prob.den}</div>
                </div>
                <div style="margin: 0 15px;">＝</div>
                <div class="eq-fraction">
                    <div class="drop-zone" id="ans-num"></div>
                    <div class="fraction-line"></div>
                    <div class="drop-zone" id="ans-den"></div>
                </div>
            `;
            controlsArea.appendChild(eqContainer);

            const instruction = document.createElement('div');
            instruction.className = 'instruction-red';
            instruction.innerHTML = '※＋ーボタンで1を分割し、水色のブロックをタップして灰色にして引く分を考えましょう。<br>※枠をタップして、計算機で数字を入力してください';
            controlsArea.appendChild(instruction);

            // 判定ボタン
            const checkBtnContainer = document.createElement('div');
            checkBtnContainer.className = 'check-btn-container';
            const checkBtn = document.createElement('button');
            checkBtn.className = 'check-btn';
            checkBtn.textContent = 'できた！';
            checkBtnContainer.appendChild(checkBtn);
            controlsArea.appendChild(checkBtnContainer);

            container.appendChild(mainArea);
            container.appendChild(controlsArea);
            appContainer.appendChild(container);

            // 入力枠タップで計算機呼び出し
            [document.getElementById('ans-num'), document.getElementById('ans-den')].forEach(zone => {
                zone.addEventListener('click', () => { 
                    CalcKeyboard.open(zone);
                });
            });

            // 分割バーの更新
            let currentDivisions = 1;
            const bar1 = document.getElementById('bar1');
            const updateBar1 = () => {
                bar1.innerHTML = '';
                for(let i=0; i<currentDivisions; i++){
                    const seg = document.createElement('div');
                    seg.className = 'segment filled'; 
                    if (currentDivisions === 1) {
                        seg.innerHTML = `<div class="inner-fraction"><div style="font-size:2rem; font-weight:bold;">1</div></div>`;
                    } else {
                        seg.innerHTML = `<div class="inner-fraction"><div class="inner-num">1</div><div class="inner-den">${currentDivisions}</div></div>`;
                    }
                    seg.onclick = function() {
                        if (currentDivisions > 1) { 
                            this.classList.toggle('gray-filled');
                        }
                    };
                    bar1.appendChild(seg);
                }
            };
            updateBar1();

            document.getElementById('minus-btn').onclick = () => {
                if(currentDivisions > 1) {
                    currentDivisions--;
                    document.getElementById('div-label').textContent = `（${currentDivisions} 分割）`;
                    updateBar1();
                    AppAudio.speak(currentDivisions + "ぶんかつ");
                }
            };
            document.getElementById('plus-btn').onclick = () => {
                if(currentDivisions < 20) {
                    currentDivisions++;
                    document.getElementById('div-label').textContent = `（${currentDivisions} 分割）`;
                    updateBar1();
                    AppAudio.speak(currentDivisions + "ぶんかつ");
                }
            };

            /* 判定処理 */
            checkBtn.onclick = () => {
                const boxNum = document.getElementById('ans-num');
                const boxDen = document.getElementById('ans-den');
                const numVal = boxNum.textContent.trim();
                const denVal = boxDen.textContent.trim();
                const overlayJudge = document.getElementById('judge-overlay');
                
                // 未入力の場合のフィードバック案内
                if(numVal === "" || denVal === "") {
                    showGuideMessage('数字を全部入力してね！', 'すうじをぜんぶにゅうりょくしてね');
                    return;
                }
                
                // クロス乗算等で値が等しいか判定（約分済み・未約分のどちらにも対応）
                const isCorrect = (parseInt(numVal, 10) * prob.den === (prob.den - prob.num) * parseInt(denVal, 10));
                
                // 共通ログ機能による履歴保存
                AppLogger.save({
                    storageKey: "fraction_sub_1_history",
                    problemType: "1－分数のひき算",
                    problemContent: `1 - ${prob.num}/${prob.den}`,
                    userAnswer: `${numVal}/${denVal}`,
                    startTime: problemStartTime,
                    endTime: new Date(),
                    inputMethod: "計算機入力",
                    isCorrect: isCorrect
                });

                if (isCorrect) {
                    overlayJudge.textContent = 'せいかい！';
                    overlayJudge.className = 'judge-overlay show';
                    AppAudio.speak("せいかい！");
                    AppAudio.playOk();
                    checkBtn.disabled = true; 
                    setTimeout(() => { overlayJudge.classList.remove('show'); }, 1200);
                    setTimeout(() => { currentIndex++; renderProblem(); }, 1500);
                } else {
                    overlayJudge.textContent = 'おしい！';
                    overlayJudge.className = 'judge-overlay incorrect show';
                    AppAudio.speak("おしい！");
                    AppAudio.playNg();
                    mistakeCount++; 
                    setTimeout(() => { overlayJudge.classList.remove('show'); }, 1200);
                }
            };
        }

        // スタートボタン制御
        document.getElementById('start-btn').addEventListener('click', () => {
            document.getElementById('start-screen').style.display = 'none';
            document.getElementById('main-content').style.display = 'block';
            renderProblem();
        });
    </script>
</body>
</html>
