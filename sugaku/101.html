<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>分数のしくみ（ステップアップ）</title>
    
    <!-- 共通スタイルの読み込み -->
    <link rel="stylesheet" href="app-common.css">

    <!-- 分数のしくみ 固有のスタイル -->
    <style>
        .question-title-container {
            display: flex;
            align-items: center;
            font-size: 1.4rem;
            font-weight: normal;
            margin-bottom: 20px;
            margin-top: 0;
            flex-wrap: wrap; 
            line-height: 1.5;
        }
        
        /* 問題文の中の分数表示 */
        .inline-fraction {
            display: inline-flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            vertical-align: middle;
            margin: 0 5px;
            line-height: 1.1;
        }
        .inline-num {
            border-bottom: 2px solid #333;
            padding: 0 2px;
            font-size: 1.3rem;
        }
        .inline-den {
            padding: 0 2px;
            font-size: 1.3rem;
        }

        .problem-container {
            display: flex;
            flex-direction: column;
            margin-bottom: 20px;
            width: 100%;
            max-width: 900px;
            margin-left: auto;
            margin-right: auto;
        }
        .problem-main {
            display: flex;
            flex-direction: column; 
            align-items: center;    
            width: 100%;
        }

        /* テープ図と寸法線のエリア */
        .bar-area {
            width: 100%;            
            display: flex;
            flex-direction: column;
            margin-bottom: 25px;
        }
        
        /* 赤い寸法線（長さ「1」） */
        .length-indicator-container {
            position: relative;
            width: 100%;
            height: 35px; 
            margin-bottom: 5px;
            display: flex;
            align-items: center; 
            justify-content: center; 
        }
        .red-bar-indicator {
            position: absolute;
            width: 100%;
            height: 2px; 
            background-color: red;
            border-radius: 1px;
            box-sizing: border-box;
            top: 50%;
            transform: translateY(-50%);
        }
        .red-bar-indicator::before,
        .red-bar-indicator::after {
            content: '';
            position: absolute;
            top: -8px; 
            height: 18px; 
            width: 2px;
            background-color: red;
        }
        .red-bar-indicator::before { left: 0; }
        .red-bar-indicator::after { right: 0; }

        .indicator-label-center {
            position: relative;
            z-index: 2; 
            background-color: #ffffff; 
            padding: 0 10px; 
            color: red;
            font-size: 1.6rem; 
            font-weight: bold;
            line-height: 1.0;
            top: -1px; 
        }

        /* テープ図のバー本体 */
        .bar {
            display: flex;
            width: 100%;
            height: 60px;
            border: 2px solid #000;
            box-sizing: border-box;
            background-color: #fcfcfc;
        }
        .segment {
            flex: 1;
            border-right: 1px dotted #000;
            box-sizing: border-box;
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
            transition: background-color 0.2s ease;
        }
        .segment:last-child {
            border-right: none;
        }
        .segment.filled {
            background-color: #00bfff; 
        }
        
        /* バー内の分数表示 */
        .inner-fraction {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            font-size: 1.2rem;
            font-weight: bold;
        }
        .inner-num {
            border-bottom: 2px solid #000;
            padding: 0 4px;
            line-height: 1.1;
        }
        .inner-den {
            padding: 0 4px;
            line-height: 1.1;
        }

        /* 各入力コントロールエリア */
        .controls-area {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
        }
        
        /* Step 3: 分数入力 */
        .frac-input-area {
            display: inline-flex;
            flex-direction: column;
            align-items: center;
            font-size: 2.2rem;
            margin-bottom: 15px;
        }
        
        /* Step 4: 個数入力 */
        .count-input-area {
            display: flex;
            align-items: center;
            font-size: 2.2rem;
            margin-bottom: 15px;
        }

        /* Step 5: たし算の式エリア */
        .eq-container {
            display: flex;
            align-items: center;
            justify-content: center;
            flex-wrap: wrap;
            margin-bottom: 15px;
            font-size: 2rem;
            gap: 5px;
        }
        .eq-fraction {
            display: inline-flex;
            flex-direction: column;
            align-items: center;
            font-size: 1.8rem;
            margin: 0 5px;
        }

        /* 青枠入力ボックス */
        .input-box {
            border: 4px solid #00bfff;
            background-color: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 2.8rem;
            cursor: pointer;
            color: #333;
            font-weight: bold;
            border-radius: 8px;
        }
        .active-input {
            background-color: #e6f7ff;
        }

        .instruction-red {
            color: #e74c3c;
            font-size: 1rem;
            font-weight: bold;
            margin-bottom: 15px;
            text-align: center;
        }

        /* ボタン類 */
        .btn-container {
            width: 100%;
            display: flex;
            justify-content: center;
            margin-top: 10px;
        }
        .check-btn {
            padding: 12px 50px;
            font-size: 1.5rem;
            cursor: pointer;
            border: none;
            background-color: #00bfff;
            color: #fff;
            font-weight: bold;
            border-radius: 10px;
            outline: none;
            box-shadow: 0 4px 0 #0088cc;
            touch-action: manipulation;
        }
        .check-btn:active {
            transform: translateY(4px);
            box-shadow: none;
        }
        .check-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .div-btn {
            width: 60px; height: 60px; font-size: 2rem;
            cursor: pointer; border: 2px solid #3498db;
            background-color: #fff; border-radius: 12px;
            margin: 0 15px;
            font-weight: bold;
            color: #2c3e50;
            box-shadow: 0 3px 0 #bdc3c7;
        }
        .div-btn:active {
            transform: translateY(3px);
            box-shadow: none;
        }
    </style>
</head>
<body>

    <!-- スタート画面 -->
    <div id="start-screen" class="start-screen">
        <h1>分数のしくみ</h1>
        <button id="start-btn" class="start-btn">スタート</button>
        <div style="margin-top: 30px; text-align: center;">
            <a href="index.html" class="menu-btn">メニューへ戻る</a>
        </div>
    </div>

    <!-- メイン画面 -->
    <div id="main-content" style="display: none;">
        <div class="top-nav">
            <div class="toggle-group">
                <label class="settings-toggle"><input type="checkbox" id="speech-checkbox" checked> スピーチON</label>
                <label class="settings-toggle"><input type="checkbox" id="sound-checkbox" checked> 効果音ON</label>
            </div>
            <a href="index.html" class="back-btn">メニューへ戻る</a>
        </div>
        
        <div id="status-bar" class="status-bar"></div>
        <div id="question-title" class="question-title-container"></div>
        
        <div id="app"></div>
        <div id="judge-overlay" class="judge-overlay"></div>

        <!-- テンキー用オーバーレイとパネル -->
        <div class="overlay" id="overlay"></div>
        <div class="pieces-container" id="calc-container"></div>
    </div>

    <!-- 共通JavaScriptの読み込み -->
    <script src="app-common.js"></script>

    <!-- 分数のしくみ 固有JavaScript -->
    <script>
        const numberReadings = [
            "ぜろ", "いち", "に", "さん", "よん", "ご", "ろく", "なな", "はち", "きゅう", "じゅう",
            "じゅういち", "じゅうに", "じゅうさん", "じゅうよん", "じゅうご", "じゅうろく", "じゅうなな", "じゅうはち", "じゅうきゅう", "にじゅう"
        ];

        /* --- 計算機（テンキー）パネルの構築とドラッグ制御 --- */
        const overlay = document.getElementById('overlay');
        const calcContainer = document.getElementById('calc-container');
        let activeInputBox = null; 
        let baseValue = 0;

        const calcKeys = [
            '7', '8', '9',
            '4', '5', '6',
            '1', '2', '3',
            '0', '削除', '+10'
        ];

        calcKeys.forEach(key => {
            const piece = document.createElement('div');
            piece.className = 'piece';
            piece.textContent = key;
            
            if (key === '削除') {
                piece.classList.add('delete-btn');
                piece.addEventListener('click', () => {
                    if (activeInputBox) {
                        activeInputBox.textContent = ''; 
                        baseValue = 0; 
                        AppAudio.speak("けしました");
                    }
                });
            } else if (key === '+10') {
                piece.classList.add('enter-btn');
                piece.addEventListener('click', () => {
                    if (activeInputBox) {
                        baseValue += 10;
                        activeInputBox.textContent = baseValue; 
                        AppAudio.speak("じゅう");
                    }
                });
            } else {
                piece.addEventListener('click', () => {
                    if (activeInputBox) {
                        const num = parseInt(key, 10);
                        const finalValue = baseValue + num;
                        activeInputBox.textContent = finalValue;
                        
                        if (finalValue >= 0 && finalValue <= 20) {
                            AppAudio.speak(numberReadings[finalValue]);
                        } else {
                            AppAudio.speak(finalValue.toString());
                        }

                        calcContainer.style.display = 'none';
                        overlay.style.display = 'none';
                        activeInputBox = null;
                    }
                });
            }
            calcContainer.appendChild(piece);
        });

        overlay.addEventListener('click', () => {
            calcContainer.style.display = 'none';
            overlay.style.display = 'none';
            activeInputBox = null;
        });

        // パネルのドラッグ操作
        let isDragging = false;
        let dragStartX, dragStartY, initialLeft, initialTop;

        function startDrag(e) {
            if (e.target.classList.contains('piece')) return;
            isDragging = true;
            let clientX = e.touches ? e.touches[0].clientX : e.clientX;
            let clientY = e.touches ? e.touches[0].clientY : e.clientY;
            dragStartX = clientX;
            dragStartY = clientY;
            let style = window.getComputedStyle(calcContainer);
            initialLeft = parseFloat(style.left);
            initialTop = parseFloat(style.top);
        }

        function doDrag(e) {
            if (!isDragging) return;
            e.preventDefault();
            let clientX = e.touches ? e.touches[0].clientX : e.clientX;
            let clientY = e.touches ? e.touches[0].clientY : e.clientY;
            let dx = clientX - dragStartX;
            let dy = clientY - dragStartY;
            calcContainer.style.left = (initialLeft + dx) + 'px';
            calcContainer.style.top = (initialTop + dy) + 'px';
        }

        function stopDrag() { isDragging = false; }

        calcContainer.addEventListener('mousedown', startDrag);
        document.addEventListener('mousemove', doDrag, { passive: false });
        document.addEventListener('mouseup', stopDrag);
        calcContainer.addEventListener('touchstart', startDrag, { passive: false });
        document.addEventListener('touchmove', doDrag, { passive: false });
        document.addEventListener('touchend', stopDrag);


        /* --- 問題生成と進行管理 --- */
        const availableDens = [2, 3, 4, 5, 6, 7, 8];
        for (let i = availableDens.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [availableDens[i], availableDens[j]] = [availableDens[j], availableDens[i]];
        }
        const patterns = availableDens.slice(0, 3);
        
        let currentPatternIndex = 0; 
        let currentStep = 1;         
        let currentDivisions = 1;    
        let mistakeCount = 0;        
        
        let problemStartTime;
        const appContainer = document.getElementById('app');

        function renderStep() {
            appContainer.innerHTML = '';
            problemStartTime = new Date();

            if (currentPatternIndex >= patterns.length) {
                document.getElementById('status-bar').style.display = 'none';
                document.getElementById('question-title').style.display = 'none';
                
                const clearMsg = document.createElement('div');
                clearMsg.className = 'clear-message';
                clearMsg.innerHTML = `
                    <h2>全３パターン合格！！</h2>
                    <div class="final-result-details">
                        <div>間違えた回数： <strong>${mistakeCount}</strong> 回</div>
                        ${mistakeCount === 0 ? '<div style="color: blue; font-weight: bold; margin-top: 15px;">パーフェクトです！素晴らしい！</div>' : ''}
                    </div>
                    <button class="retry-btn" onclick="location.reload()">もう一度挑戦する</button>
                    <a href="index.html" class="menu-btn">メニューへ戻る</a>
                `;
                appContainer.appendChild(clearMsg);
                AppAudio.speak("ぜんもんごうかくです。おつかれさまでした。");
                return;
            }
            
            if (currentStep === 1) {
                AppAudio.playQ();
            }

            const D = patterns[currentPatternIndex];
            
            document.getElementById('status-bar').style.display = 'block';
            document.getElementById('status-bar').textContent = `第 ${currentPatternIndex + 1} 問 / 全 3 問 (Step ${currentStep}/5)`;
            const titleEl = document.getElementById('question-title');

            const container = document.createElement('div');
            container.className = 'problem-container';
            const mainArea = document.createElement('div');
            mainArea.className = 'problem-main';
            
            const barArea = document.createElement('div');
            barArea.className = 'bar-area';
            
            const indicatorContainer = document.createElement('div');
            indicatorContainer.className = 'length-indicator-container';
            indicatorContainer.innerHTML = `
                <div class="red-bar-indicator"></div>
                <div class="indicator-label-center">1</div>
            `;
            barArea.appendChild(indicatorContainer);

            const bar = document.createElement('div');
            bar.className = 'bar';
            barArea.appendChild(bar);
            mainArea.appendChild(barArea);

            const controlsArea = document.createElement('div');
            controlsArea.className = 'controls-area';
            
            let activeInputId = null;

            const createInlineFraction = (num, den) => {
                return `<div class="inline-fraction"><div class="inline-num">${num}</div><div class="inline-den">${den}</div></div>`;
            };

            // Stepに応じた画面表示切り替え
            if (currentStep === 1) {
                titleEl.innerHTML = `<span>(1) この長さは 1 です。${D}等分してください。</span>`;
                AppAudio.speak(`このばーのながさは、いちです。${D}とうぶんしてください。`);
                
                currentDivisions = 1;
                const updateBar1 = () => {
                    bar.innerHTML = '';
                    for(let i=0; i<currentDivisions; i++){
                        const seg = document.createElement('div');
                        seg.className = 'segment';
                        bar.appendChild(seg);
                    }
                };
                updateBar1();
                
                const btnArea = document.createElement('div');
                btnArea.style.display = 'flex'; btnArea.style.margin = '20px 0';
                
                const minusBtn = document.createElement('button');
                minusBtn.className = 'div-btn'; minusBtn.textContent = 'ー';
                minusBtn.onclick = () => { if(currentDivisions>1) { currentDivisions--; updateBar1(); AppAudio.speak(currentDivisions+"ぶんかつ"); } };
                
                const plusBtn = document.createElement('button');
                plusBtn.className = 'div-btn'; plusBtn.textContent = '＋';
                plusBtn.onclick = () => { if(currentDivisions<20) { currentDivisions++; updateBar1(); AppAudio.speak(currentDivisions+"ぶんかつ"); } };
                
                btnArea.appendChild(minusBtn);
                btnArea.appendChild(plusBtn);
                controlsArea.appendChild(btnArea);

            } else if (currentStep === 2) {
                titleEl.innerHTML = `<span>(2) 1つ選んで（タップして）色をぬってください。</span>`;
                AppAudio.speak(`ひとつえらんで、いろをぬってください。`);
                
                for(let i=0; i<D; i++){
                    const seg = document.createElement('div');
                    seg.className = 'segment';
                    seg.onclick = function() { this.classList.toggle('filled'); };
                    bar.appendChild(seg);
                }
                
            } else if (currentStep === 3) {
                titleEl.innerHTML = `<span>(3) 1つの長さは何分の1ですか？</span>`;
                AppAudio.speak(`ひとつのながさは、なんぶんのいちですか？`);
                
                for(let i=0; i<D; i++){
                    const seg = document.createElement('div');
                    seg.className = 'segment';
                    if(i===0) seg.classList.add('filled');
                    bar.appendChild(seg);
                }
                
                const fracInput = document.createElement('div');
                fracInput.className = 'frac-input-area';
                fracInput.innerHTML = `
                    <div style="border-bottom: 3px solid #000; padding: 0 15px; margin-bottom: 5px; font-weight: bold;">1</div>
                    <div class="input-box active-input" id="ans-box" style="width:65px; height:65px;"></div>
                `;
                controlsArea.appendChild(fracInput);
                activeInputId = 'ans-box';
                
            } else if (currentStep === 4) {
                titleEl.innerHTML = `<span>(4) </span> ${createInlineFraction(1, D)} <span> は、全部でいくつありますか？</span>`;
                AppAudio.speak(`${D}ぶんの１は、ぜんぶでいくつありますか？`);
                
                for(let i=0; i<D; i++){
                    const seg = document.createElement('div');
                    seg.className = 'segment';
                    if(i===0) seg.classList.add('filled');
                    seg.innerHTML = `<div class="inner-fraction"><div class="inner-num">1</div><div class="inner-den">${D}</div></div>`;
                    bar.appendChild(seg);
                }
                
                const countInput = document.createElement('div');
                countInput.className = 'count-input-area';
                countInput.innerHTML = `<div class="input-box active-input" id="ans-box" style="width:65px; height:65px; margin-right:15px;"></div><div> 個</div>`;
                controlsArea.appendChild(countInput);
                activeInputId = 'ans-box';
                
            } else if (currentStep === 5) {
                titleEl.innerHTML = `<span>(5) </span> ${createInlineFraction(1, D)} <span> が ${D}つ で、いくつになりますか？</span>`;
                AppAudio.speak(`${D}ぶんの１が、${D}こで、いくつになりますか？`);
                
                for(let i=0; i<D; i++){
                    const seg = document.createElement('div');
                    seg.className = 'segment filled';
                    seg.innerHTML = `<div class="inner-fraction"><div class="inner-num">1</div><div class="inner-den">${D}</div></div>`;
                    bar.appendChild(seg);
                }
                
                const eqContainer = document.createElement('div');
                eqContainer.className = 'eq-container';
                for(let i=0; i<D; i++) {
                    eqContainer.innerHTML += `<div class="eq-fraction"><div class="inner-num">1</div><div class="inner-den">${D}</div></div>`;
                    if (i < D - 1) eqContainer.innerHTML += `<div style="margin:0 5px;">＋</div>`;
                }
                eqContainer.innerHTML += `<div style="margin:0 10px;">＝</div><div class="input-box active-input" id="ans-box" style="width:70px; height:70px;"></div>`;
                controlsArea.appendChild(eqContainer);
                activeInputId = 'ans-box';
            }

            if (activeInputId) {
                const instruction = document.createElement('div');
                instruction.className = 'instruction-red';
                instruction.textContent = '※枠をタップして、計算機で数字を入力してください';
                controlsArea.appendChild(instruction);

                setTimeout(() => {
                    const box = document.getElementById(activeInputId);
                    if(box) {
                        box.onclick = function() {
                            if (this.textContent !== '') {
                                this.textContent = '';
                                AppAudio.speak("けしました");
                            }
                            baseValue = 0;
                            activeInputBox = this;
                            calcContainer.style.display = 'flex';
                            overlay.style.display = 'block';
                        };
                    }
                }, 0);
            }

            container.appendChild(mainArea);

            const btnContainer = document.createElement('div');
            btnContainer.className = 'btn-container';
            const checkBtn = document.createElement('button');
            checkBtn.className = 'check-btn';
            checkBtn.textContent = 'できた！';
            btnContainer.appendChild(checkBtn);
            
            checkBtn.onclick = () => {
                let isCorrect = false;
                let userAnswer = "";
                const overlayJudge = document.getElementById('judge-overlay');
                
                if (currentStep === 1) {
                    userAnswer = `${currentDivisions}等分`;
                    isCorrect = (currentDivisions === D);
                } else if (currentStep === 2) {
                    const filledCount = bar.querySelectorAll('.segment.filled').length;
                    userAnswer = `${filledCount}個塗り`;
                    isCorrect = (filledCount === 1);
                } else if (currentStep === 3) {
                    const val = document.getElementById('ans-box').textContent;
                    if(val === "") {
                        overlayJudge.textContent = 'すうじを いれてね';
                        overlayJudge.className = 'judge-overlay incorrect show';
                        AppAudio.speak("すうじを いれてね");
                        setTimeout(() => { overlayJudge.classList.remove('show'); }, 1200);
                        return;
                    }
                    userAnswer = `1/${val}`;
                    isCorrect = (val === D.toString());
                } else if (currentStep === 4) {
                    const val = document.getElementById('ans-box').textContent;
                    if(val === "") {
                        overlayJudge.textContent = 'すうじを いれてね';
                        overlayJudge.className = 'judge-overlay incorrect show';
                        AppAudio.speak("すうじを いれてね");
                        setTimeout(() => { overlayJudge.classList.remove('show'); }, 1200);
                        return;
                    }
                    userAnswer = `${val}個`;
                    isCorrect = (val === D.toString());
                } else if (currentStep === 5) {
                    const val = document.getElementById('ans-box').textContent;
                    if(val === "") {
                        overlayJudge.textContent = 'すうじを いれてね';
                        overlayJudge.className = 'judge-overlay incorrect show';
                        AppAudio.speak("すうじを いれてね");
                        setTimeout(() => { overlayJudge.classList.remove('show'); }, 1200);
                        return;
                    }
                    userAnswer = val;
                    isCorrect = (val === "1");
                }
                
                // 共通モジュール（AppLogger）による履歴送信
                AppLogger.save({
                    storageKey: "fraction_step_history",
                    problemType: `分数のしくみ(第${currentPatternIndex+1}問-Step${currentStep})`,
                    problemContent: `分母${D}の課題`,
                    userAnswer: userAnswer,
                    startTime: problemStartTime,
                    endTime: new Date(),
                    inputMethod: (currentStep === 1 || currentStep === 2) ? "タップ" : "計算機入力",
                    isCorrect: isCorrect
                });

                if (isCorrect) {
                    overlayJudge.textContent = 'せいかい！';
                    overlayJudge.className = 'judge-overlay show';
                    AppAudio.speak("せいかい！");
                    AppAudio.playOk();
                    
                    checkBtn.disabled = true; 
                    
                    setTimeout(() => { overlayJudge.classList.remove('show'); }, 1200);
                    setTimeout(() => {
                        currentStep++;
                        if (currentStep > 5) {
                            currentStep = 1;
                            currentPatternIndex++;
                        }
                        renderStep(); 
                    }, 1500);
                } else {
                    overlayJudge.textContent = 'おしい！';
                    overlayJudge.className = 'judge-overlay incorrect show';
                    AppAudio.speak("おしい！");
                    mistakeCount++; 
                    AppAudio.playNg();
                    setTimeout(() => { overlayJudge.classList.remove('show'); }, 1200);
                }
            };
            
            controlsArea.appendChild(btnContainer);
            container.appendChild(controlsArea);
            appContainer.appendChild(container);
        }

        // --- スタートボタン ---
        document.getElementById('start-btn').addEventListener('click', () => {
            document.getElementById('start-screen').style.display = 'none';
            document.getElementById('main-content').style.display = 'block';
            renderStep();
        });
    </script>
</body>
</html>
