<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>20までのたし算（繰り上がり）</title>

<!-- 共通スタイルの読み込み -->
<link rel="stylesheet" href="app-common.css">

<style>
    /* 画面全体（黒い余白部分） */
    html, body {
        height: 100%;
        width: 100%;
        overflow: hidden;
        margin: 0;
        padding: 0;
        background-color: #222;
        display: flex;
        justify-content: center;
        align-items: center;
    }
    
    /* デバイスサイズに合わせて伸縮するラッパー */
    #canvas-wrapper {
        width: 100vw;
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        overflow: hidden;
    }

    /* 内部の仮想キャンバス（固定解像度の画面: 1024x768） */
    .app-body {
        width: 1024px;   /* 論理的な横幅 */
        height: 768px;   /* 論理的な縦幅（4:3） */
        background-color: #ffffff;
        position: relative;
        transform-origin: center center;
        padding: 20px;
        box-sizing: border-box;
        border-radius: 10px;
        box-shadow: 0 0 20px rgba(0,0,0,0.8);
        
        font-family: "Helvetica Neue", Arial, "Hiragino Kaku Gothic ProN", "Hiragino Sans", Meiryo, sans-serif;
        color: #333;
        touch-action: none;
        user-select: none;
        -webkit-user-select: none;
    }

    .problem-container {
        display: flex;
        flex-direction: column;
        width: 100%;
        max-width: 900px;
        margin: 0 auto;
        align-items: center;
    }

    /* 数式エリア */
    .equation-area {
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 4.8rem;
        font-weight: bold;
        gap: 20px;
        margin: 5px 0 15px 0;
        background-color: #f9f9f9;
        padding: 10px 40px;
        border-radius: 16px;
        border: 2px solid #eee;
    }
    .clickable-num {
        cursor: pointer;
        padding: 5px 20px;
        border-radius: 12px;
        border: 4px dashed transparent;
        transition: all 0.2s;
    }
    .clickable-num:hover {
        background-color: #f0f0f0;
    }
    .clickable-num.num-left {
        border-color: #ffb3ba;
        color: #ff4757;
    }
    .clickable-num.num-right {
        border-color: #a0c4ff;
        color: #1e90ff;
    }
    .clickable-num.clicked {
        pointer-events: none;
        border-style: solid;
        background-color: #fff;
    }

    /* ドロップゾーン（解答の□） */
    .drop-zone {
        width: 85px;
        height: 85px;
        border: 4px dashed #3498db;
        background-color: #f0f8ff;
        border-radius: 12px;
        display: flex;
        justify-content: center;
        align-items: center;
        font-size: 4rem;
        font-weight: bold;
        cursor: pointer;
        color: #333;
        flex-shrink: 0;
    }

    /* テンフレーム（5×2のマス目） */
    .frames-container {
        display: flex;
        justify-content: center;
        gap: 40px;
        margin: 10px 0 15px 0;
    }
    .ten-frame {
        display: grid;
        grid-template-columns: repeat(5, 65px);
        grid-template-rows: repeat(2, 65px);
        border: 5px solid #333;
        background-color: #fff;
        gap: 0;
        box-shadow: 0 4px 6px rgba(0,0,0,0.1);
    }
    .cell {
        border: 2px solid #ccc;
        display: flex;
        justify-content: center;
        align-items: center;
        box-sizing: border-box;
        position: relative;
    }
    
    /* アニメーション・ドラッグ用の● */
    .circle {
        width: 50px;
        height: 50px;
        border-radius: 50%;
        cursor: grab;
        box-shadow: 0 3px 6px rgba(0,0,0,0.3);
        touch-action: none;
    }
    .circle:active {
        cursor: grabbing;
    }
    .circle.red {
        background-color: #ff4757;
        border: 2px solid #ff0000;
    }
    .circle.blue {
        background-color: #1e90ff;
        border: 2px solid #0000ff;
    }
    .circle.dragging {
        position: absolute;
        z-index: 2000;
        pointer-events: none;
        transform: scale(1.15);
        opacity: 0.85;
    }

    .instruction-red {
        color: red;
        font-size: 1.1rem;
        font-weight: bold;
        text-align: center;
        margin-bottom: 10px;
        line-height: 1.4;
    }
    
    /* 判定ボタン */
    .check-btn-container {
        display: flex;
        justify-content: center;
        width: 100%;
        margin-top: 5px;
    }
    .check-btn {
        padding: 0 40px;
        height: 65px;
        font-size: 1.6rem;
        cursor: pointer;
        border: 2px solid #00bfff;
        background-color: #00bfff;
        color: #fff;
        font-weight: bold;
        border-radius: 10px;
        outline: none;
        box-shadow: 0 5px 0 #0088cc;
        -webkit-tap-highlight-color: transparent;
        touch-action: manipulation;
    }
    .check-btn:active {
        transform: translateY(5px);
        box-shadow: none;
    }
    .check-btn:disabled {
        opacity: 0.5;
        cursor: not-allowed;
        transform: translateY(5px);
        box-shadow: none;
    }
</style>
</head>
<body>

    <div id="canvas-wrapper">
        <div class="app-body">

            <!-- スタート画面 -->
            <div id="start-screen" class="start-screen">
                <h1>20までのたし算（繰り上がり）</h1>
                <button id="start-btn" class="start-btn">スタート</button>
                <div style="margin-top: 30px; text-align: center;">
                    <a href="index.html" class="menu-btn">メニューへ戻る</a>
                </div>
            </div>

            <!-- メイン画面 -->
            <div id="main-content" style="display: none;">
                <div class="top-nav">
                    <div class="toggle-group">
                        <label class="settings-toggle">
                            <input type="checkbox" id="speech-checkbox" checked> スピーチON
                        </label>
                        <label class="settings-toggle">
                            <input type="checkbox" id="sound-checkbox" checked> 効果音ON
                        </label>
                    </div>
                    <a href="index.html" class="back-btn">メニューへ戻る</a>
                </div>
                
                <div id="status-bar" class="status-bar"></div>
                <h1 id="question-title" class="question-title">・ つぎのたし算を求めましょう！</h1>
                
                <div id="app"></div>
                <div id="judge-overlay" class="judge-overlay"></div>
            </div>

        </div>
    </div>

    <!-- 共通JavaScriptの読み込み -->
    <script src="app-common.js"></script>
    <script src="calc-keyboard.js"></script>

    <script>
        // === 仮想キャンバスの自動スケール処理 ===
        let currentScale = 1;
        function resizeCanvas() {
            const wrapper = document.getElementById('canvas-wrapper');
            const appBody = document.querySelector('.app-body');
            if (!wrapper || !appBody) return;
            const scaleX = wrapper.clientWidth / 1024;
            const scaleY = wrapper.clientHeight / 768;
            currentScale = Math.min(scaleX, scaleY);
            appBody.style.transform = `scale(${currentScale})`;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        // ガイドメッセージ表示関数
        function showGuideMessage(msg, speakMsg) {
            AppAudio.speak(speakMsg || msg);
            let guideEl = document.getElementById('guide-toast');
            if (!guideEl) {
                guideEl = document.createElement('div');
                guideEl.id = 'guide-toast';
                guideEl.style.cssText = `
                    position: fixed;
                    bottom: 80px;
                    left: 50%;
                    transform: translateX(-50%);
                    background-color: rgba(44, 62, 80, 0.95);
                    color: #fff;
                    padding: 14px 28px;
                    border-radius: 30px;
                    font-size: 1.3rem;
                    font-weight: bold;
                    z-index: 9998;
                    pointer-events: none;
                    transition: opacity 0.3s ease;
                    text-align: center;
                    box-shadow: 0 4px 15px rgba(0,0,0,0.3);
                    white-space: nowrap;
                `;
                document.body.appendChild(guideEl);
            }
            guideEl.textContent = msg;
            guideEl.style.opacity = '1';
            clearTimeout(guideEl.timer);
            guideEl.timer = setTimeout(() => {
                guideEl.style.opacity = '0';
            }, 2500);
        }

        /* ==========================================
           ●のドラッグ＆ドロップ機能（スケール補正あり）
           ========================================== */
        let draggingCircle = null;
        let sourceCell = null;
        const appBody = document.querySelector('.app-body');

        function circleTouchStart(e) {
            // キーボード表示中は無効化
            const calcKeyboard = document.getElementById('calc-container');
            if (calcKeyboard && calcKeyboard.style.display === 'flex') return;

            if (e.target.classList.contains('circle') && !e.target.classList.contains('dragging')) {
                draggingCircle = e.target;
                sourceCell = draggingCircle.parentElement;
                
                let clientX = e.touches ? e.touches[0].clientX : e.clientX;
                let clientY = e.touches ? e.touches[0].clientY : e.clientY;
                
                draggingCircle.classList.add('dragging');
                appBody.appendChild(draggingCircle); // キャンバス内に追加
                
                const rect = appBody.getBoundingClientRect();
                let canvasX = (clientX - rect.left) / currentScale;
                let canvasY = (clientY - rect.top) / currentScale;

                draggingCircle.style.left = (canvasX - 25) + 'px'; 
                draggingCircle.style.top = (canvasY - 25) + 'px';
            }
        }

        function circleTouchMove(e) {
            if (!draggingCircle) return;
            e.preventDefault(); 
            let clientX = e.touches ? e.touches[0].clientX : e.clientX;
            let clientY = e.touches ? e.touches[0].clientY : e.clientY;
            
            const rect = appBody.getBoundingClientRect();
            let canvasX = (clientX - rect.left) / currentScale;
            let canvasY = (clientY - rect.top) / currentScale;

            draggingCircle.style.left = (canvasX - 25) + 'px';
            draggingCircle.style.top = (canvasY - 25) + 'px';
        }

        function circleTouchEnd(e) {
            if (!draggingCircle) return;
            
            let clientX = e.changedTouches ? e.changedTouches[0].clientX : e.clientX;
            let clientY = e.changedTouches ? e.changedTouches[0].clientY : e.clientY;
            
            let elem = document.elementFromPoint(clientX, clientY);
            let targetFrame = elem ? elem.closest('.ten-frame') : null;
            let placed = false;
            
            if (targetFrame) {
                let emptyCell = Array.from(targetFrame.querySelectorAll('.cell')).find(c => !c.hasChildNodes());
                if (emptyCell) {
                    emptyCell.appendChild(draggingCircle);
                    placed = true;
                }
            }
            
            if (!placed && sourceCell) {
                sourceCell.appendChild(draggingCircle);
            }
            
            draggingCircle.classList.remove('dragging');
            draggingCircle.style.left = '';
            draggingCircle.style.top = '';
            
            // 自動整列処理
            document.querySelectorAll('.ten-frame').forEach(frame => {
                const cells = Array.from(frame.querySelectorAll('.cell'));
                const circles = cells.map(cell => cell.firstElementChild).filter(c => c !== null);
                
                cells.forEach(cell => cell.innerHTML = '');
                circles.forEach((circle, index) => {
                    cells[index].appendChild(circle);
                });
            });
            
            draggingCircle = null;
            sourceCell = null;
        }

        document.addEventListener('touchstart', circleTouchStart, {passive: false});
        document.addEventListener('touchmove', circleTouchMove, {passive: false});
        document.addEventListener('touchend', circleTouchEnd);
        document.addEventListener('mousedown', circleTouchStart);
        document.addEventListener('mousemove', circleTouchMove);
        document.addEventListener('mouseup', circleTouchEnd);

        /* ==========================================
           問題生成と判定ロジック (繰り上がりあり 11〜18)
           ========================================== */
        const problems = [];
        const seen = new Set();
        while (problems.length < 10) {
            const a = Math.floor(Math.random() * 9) + 1; // 1〜9
            const b = Math.floor(Math.random() * 9) + 1; // 1〜9
            const key = `${a}+${b}`;
            // 合計が10を超える（繰り上がり）問題のみ採用
            if (a + b > 10 && !seen.has(key)) {
                seen.add(key);
                problems.push({ n1: a, n2: b });
            }
        }

        let currentIndex = 0;
        let mistakeCount = 0;
        const appContainer = document.getElementById('app');
        let problemStartTime;

        function spawnCircles(container, count, colorClass) {
            const cells = container.querySelectorAll('.cell');
            let placed = 0;
            let i = 0;
            
            function placeNext() {
                if (placed >= count || i >= cells.length) return;
                if (!cells[i].hasChildNodes()) {
                    const circle = document.createElement('div');
                    circle.className = `circle ${colorClass}`;
                    circle.style.opacity = 0;
                    circle.style.transform = 'scale(0.2)';
                    circle.style.transition = 'all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275)';
                    
                    cells[i].appendChild(circle);
                    void circle.offsetWidth; 
                    circle.style.opacity = 1;
                    circle.style.transform = 'scale(1)';
                    placed++;
                }
                i++;
                setTimeout(placeNext, 120);
            }
            placeNext();
        }

        function renderProblem() {
            appContainer.innerHTML = '';
            problemStartTime = new Date();

            if (currentIndex >= problems.length) {
                document.getElementById('status-bar').style.display = 'none';
                document.getElementById('question-title').style.display = 'none';
                
                const clearMsg = document.createElement('div');
                clearMsg.className = 'clear-message';
                
                let htmlContent = `<h2>全10問合格！！</h2>`;
                htmlContent += `<div class="final-result-details">`;
                htmlContent += `<div>間違えた回数： <strong>${mistakeCount}</strong> 回</div>`;
                if (mistakeCount === 0) {
                    htmlContent += `<div style="color: blue; font-weight: bold; margin-top: 15px;">パーフェクトです！素晴らしい成績です。</div>`;
                }
                htmlContent += `</div>`;
                htmlContent += `<div style="margin-top: 25px;">`;
                htmlContent += `<button class="retry-btn" onclick="location.reload()">もう一度挑戦する</button>`;
                htmlContent += `<a href="index.html" class="menu-btn">メニューへ戻る</a>`;
                htmlContent += `</div>`;
                
                clearMsg.innerHTML = htmlContent;
                appContainer.appendChild(clearMsg);
                AppAudio.speak("ぜんもんごうかくです。おつかれさまでした。");
                return;
            }

            document.getElementById('status-bar').style.display = 'block';
            document.getElementById('question-title').style.display = 'block';
            document.getElementById('status-bar').textContent = `第 ${currentIndex + 1} 問 / 全 10 問`;

            const prob = problems[currentIndex];
            AppAudio.speak(`つぎのたしざんをもとめましょう。${prob.n1} たす ${prob.n2} は`);
            AppAudio.playQ();

            const container = document.createElement('div');
            container.className = 'problem-container';

            // --- 数式エリア ---
            const eqArea = document.createElement('div');
            eqArea.className = 'equation-area';
            
            const num1El = document.createElement('div');
            num1El.className = 'clickable-num num-left';
            num1El.textContent = prob.n1;
            
            const opPlus = document.createElement('div');
            opPlus.textContent = '＋';
            opPlus.style.color = '#555';
            
            const num2El = document.createElement('div');
            num2El.className = 'clickable-num num-right';
            num2El.textContent = prob.n2;
            
            const opEq = document.createElement('div');
            opEq.textContent = '＝';
            opEq.style.color = '#555';
            
            const ansZone = document.createElement('div');
            ansZone.className = 'drop-zone';
            ansZone.id = 'ans-box';
            
            // 共通電卓キーボードの起動
            ansZone.addEventListener('click', () => { 
                CalcKeyboard.open(ansZone);
            });

            eqArea.appendChild(num1El);
            eqArea.appendChild(opPlus);
            eqArea.appendChild(num2El);
            eqArea.appendChild(opEq);
            eqArea.appendChild(ansZone);
            
            container.appendChild(eqArea);

            // --- テンフレームエリア ---
            const framesContainer = document.createElement('div');
            framesContainer.className = 'frames-container';
            
            const frame1 = document.createElement('div');
            frame1.className = 'ten-frame';
            for(let i=0; i<10; i++) {
                const cell = document.createElement('div');
                cell.className = 'cell';
                frame1.appendChild(cell);
            }
            
            const frame2 = document.createElement('div');
            frame2.className = 'ten-frame';
            for(let i=0; i<10; i++) {
                const cell = document.createElement('div');
                cell.className = 'cell';
                frame2.appendChild(cell);
            }

            framesContainer.appendChild(frame1);
            framesContainer.appendChild(frame2);
            container.appendChild(framesContainer);

            // --- クリックイベント（●のアニメーション） ---
            num1El.addEventListener('click', function() {
                if (this.classList.contains('clicked')) return;
                this.classList.add('clicked');
                AppAudio.speak(prob.n1.toString());
                spawnCircles(frame1, prob.n1, 'red');
            });

            num2El.addEventListener('click', function() {
                if (this.classList.contains('clicked')) return;
                this.classList.add('clicked');
                AppAudio.speak(prob.n2.toString());
                spawnCircles(frame2, prob.n2, 'blue');
            });

            const instruction = document.createElement('div');
            instruction.className = 'instruction-red';
            instruction.innerHTML = '※数字をタップすると、下のマスに「●」が入ります。<br>※「●」は手で動かすこともできます。';
            container.appendChild(instruction);

            // 判定ボタン
            const checkBtnContainer = document.createElement('div');
            checkBtnContainer.className = 'check-btn-container';
            const checkBtn = document.createElement('button');
            checkBtn.className = 'check-btn';
            checkBtn.textContent = 'できた！';
            checkBtnContainer.appendChild(checkBtn);
            container.appendChild(checkBtnContainer);
            
            appContainer.appendChild(container);

            // 判定処理
            checkBtn.addEventListener('click', () => {
                const numVal = ansZone.textContent.trim();
                
                // 未入力時の案内
                if (numVal === "") {
                    showGuideMessage('数字を入力してね！', 'すうじをにゅうりょくしてね');
                    return;
                }

                const uAns = parseInt(numVal, 10);
                const correctAns = prob.n1 + prob.n2;
                const isCorrect = (uAns === correctAns);
                
                // 共通ログ保存機能
                AppLogger.save({
                    storageKey: "addition20_history",
                    problemType: "20までのたし算（繰り上がり）",
                    problemContent: `${prob.n1} + ${prob.n2}`,
                    userAnswer: uAns.toString(),
                    startTime: problemStartTime,
                    endTime: new Date(),
                    inputMethod: "計算機入力",
                    isCorrect: isCorrect
                });

                const overlayJudge = document.getElementById('judge-overlay');
                if (isCorrect) {
                    overlayJudge.textContent = 'せいかい！';
                    overlayJudge.className = 'judge-overlay show';
                    AppAudio.speak("せいかい！");
                    AppAudio.playOk();
                    
                    checkBtn.disabled = true;
                    setTimeout(() => { overlayJudge.classList.remove('show'); }, 1200);
                    setTimeout(() => { currentIndex++; renderProblem(); }, 1500);
                } else {
                    overlayJudge.textContent = 'おしい！';
                    overlayJudge.className = 'judge-overlay incorrect show';
                    AppAudio.speak("おしい！");
                    AppAudio.playNg();
                    mistakeCount++;
                    setTimeout(() => { overlayJudge.classList.remove('show'); }, 1200);
                }
            });
        }

        document.getElementById('start-btn').addEventListener('click', () => {
            document.getElementById('start-screen').style.display = 'none';
            document.getElementById('main-content').style.display = 'block';
            renderProblem();
        });

    </script>
</body>
</html>
