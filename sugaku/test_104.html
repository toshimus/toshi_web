<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>計算機入力学習用サンプル（日付追加・履歴蓄積・LocalStorage保存対応版）</title>
<style>
    /* 全体レイアウトの設定 */
    html, body { height: 100%; overflow: hidden; position: fixed; width: 100%; }
    body { font-family: sans-serif; margin: 0; padding: 20px; background-color: #ffffff; user-select: none; -webkit-user-select: none; box-sizing: border-box; }
    
    /* ==========================================
       スタート画面のスタイル
       ========================================== */
    .start-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-color: #f0f8ff; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 10000; }
    .start-screen h1 { font-size: 3rem; color: #2c3e50; margin-bottom: 40px; text-align: center; }
    .start-btn { padding: 20px 60px; font-size: 2.5rem; font-weight: bold; color: #fff; background-color: #00bfff; border: none; border-radius: 15px; cursor: pointer; box-shadow: 0 8px 0 #008ecc; transition: transform 0.1s, box-shadow 0.1s; -webkit-tap-highlight-color: transparent; }
    .start-btn:active { transform: translateY(8px); box-shadow: none; }

    /* ==========================================
       メインコンテンツのスタイル
       ========================================== */
    /* 問題文のスタイル */
    .question-title { font-size: 2rem; font-weight: bold; margin-top: 20px; margin-bottom: 20px; text-align: center; }

    /* 回答入力エリアのスタイル */
    .answer-panel { display: flex; justify-content: center; align-items: center; background-color: #f9f9f9; padding: 20px; border-radius: 12px; border: 1px solid #ddd; width: fit-content; margin: 0 auto 20px auto; }
    .answer-label { font-size: 1.5rem; font-weight: bold; margin-right: 20px; }
    
    /* ドロップゾーン（はめ込む枠）のスタイル */
    .drop-zone { width: 80px; height: 80px; border: 2px dashed #3498db; background-color: #f0f8ff; border-radius: 8px; display: flex; justify-content: center; align-items: center; font-size: 3rem; font-weight: bold; cursor: pointer; color: #333; }

    /* ヒントテキスト */
    .hint-text { text-align: center; color: #e74c3c; font-size: 1.1rem; font-weight: bold; margin-bottom: 20px; }
    
    /* できた！ボタンのスタイル（メイン画面用） */
    .check-btn { display: block; width: 200px; height: 60px; margin: 20px auto; font-size: 1.5rem; font-weight: bold; color: #ffffff; cursor: pointer; border: none; background-color: #00bfff; border-radius: 10px; box-shadow: 0 4px 0 #008ecc; touch-action: manipulation; }
    .check-btn:active { transform: translateY(4px); box-shadow: none; }

    /* ==========================================
       計算機パネルとオーバーレイのスタイル
       ========================================== */
    /* 計算機パネル（ドラッグ移動可能） */
    .pieces-container { display: none; justify-content: center; align-items: center; flex-wrap: wrap; gap: 10px; padding: 15px; background-color: #ecf0f1; border-radius: 12px; width: 280px; margin: 0 auto; box-sizing: border-box; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); box-shadow: 0 10px 25px rgba(0,0,0,0.3); z-index: 1000; cursor: grab; }
    .pieces-container:active { cursor: grabbing; }
    
    /* 計算機のキー */
    .piece { flex: 1 1 25%; height: 60px; border: 2px solid #2c3e50; background-color: #f1c40f; border-radius: 10px; display: flex; justify-content: center; align-items: center; font-size: 1.8rem; font-weight: bold; cursor: pointer; color: #2c3e50; box-shadow: 0 4px 0 #d4ac0d; touch-action: manipulation; box-sizing: border-box; }
    .piece:active { transform: translateY(4px); box-shadow: none; }
    
    /* 特殊キー（削除、決定）の追加スタイル */
    .piece.delete-btn { background-color: #e74c3c; color: white; border-color: #c0392b; box-shadow: 0 4px 0 #c0392b; font-size: 1.2rem; }
    .piece.enter-btn { background-color: #2ecc71; color: white; border-color: #27ae60; box-shadow: 0 4px 0 #27ae60; font-size: 1.2rem; }
    
    /* 背景のオーバーレイ（計算機表示時に背景を暗くする） */
    .overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.4); z-index: 999; }
</style>
</head>
<body>

    <div id="start-screen" class="start-screen">
        <h1>計算機入力学習</h1>
        <button id="start-btn" class="start-btn">スタート</button>
    </div>

    <div id="main-content" style="display: none;">
        <h1 class="question-title">ここに問題がきます！</h1>
        
        <div class="answer-panel">
            <div class="answer-label">答え：</div>
            <div class="drop-zone" id="ans-box"></div>
        </div>
        
        <div class="hint-text">枠をタップして、計算機で数字を入力してください</div>

        <button class="check-btn" id="check-btn">できた！</button>
    </div>

    <div class="overlay" id="overlay"></div>
    
    <div class="pieces-container" id="pieces-container"></div>

    <script>
        /* ==========================================
           1. 画面の要素（UI）の準備と時間管理
           ========================================== */
        const piecesContainer = document.getElementById('pieces-container');
        const ansBox = document.getElementById('ans-box');
        const checkBtn = document.getElementById('check-btn');
        const overlay = document.getElementById('overlay');

        let startTime = null; /* 問題開始時間を記録する変数 */

        /* ==========================================
           LocalStorageを利用したデータ保存ロジック
           ========================================== */
        const STORAGE_KEY = 'calc_app_save_data'; /* 入力途中のデータ復元用 */
        const HISTORY_KEY = 'calc_app_history';   /* 完了した結果の蓄積用 */

        /* データを保存する関数（入力途中用） */
        function saveToStorage() {
            const data = {
                answer: ansBox.textContent,
                startTime: startTime ? startTime.getTime() : null,
                isMainVisible: document.getElementById('main-content').style.display === 'block'
            };
            localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
        }

        /* データを読み込む関数（画面読み込み時用） */
        function loadFromStorage() {
            const savedStr = localStorage.getItem(STORAGE_KEY);
            if (savedStr) {
                const data = JSON.parse(savedStr);
                ansBox.textContent = data.answer || '';
                if (data.startTime) {
                    startTime = new Date(data.startTime);
                }
                if (data.isMainVisible) {
                    document.getElementById('start-screen').style.display = 'none';
                    document.getElementById('main-content').style.display = 'block';
                }
            }
        }

        /* データを消去する関数（回答完了時、入力枠をリセットするため） */
        function clearStorage() {
            localStorage.removeItem(STORAGE_KEY);
        }

        /* 画面読み込み時に保存されたデータがあれば復元します */
        window.addEventListener('DOMContentLoaded', loadFromStorage);


        /* ==========================================
           2. 各種イベント処理
           ========================================== */

        /**
         * CSV配信用にお知らせする日付を「YYYY/MM/DD」の形式に整形する関数
         */
        function formatDate(date) {
            return date.getFullYear() + '/' + 
                   (date.getMonth() + 1).toString().padStart(2, '0') + '/' + 
                   date.getDate().toString().padStart(2, '0');
        }

        /**
         * CSV配信用にお知らせする時間を「hh:mm:ss」の形式に整形する関数
         */
        function formatTime(date) {
            return date.getHours().toString().padStart(2, '0') + ':' + 
                   date.getMinutes().toString().padStart(2, '0') + ':' + 
                   date.getSeconds().toString().padStart(2, '0');
        }

        /* スタートボタンが押された時の処理 */
        document.getElementById('start-btn').addEventListener('click', () => {
            document.getElementById('start-screen').style.display = 'none';
            document.getElementById('main-content').style.display = 'block';
            startTime = new Date(); /* 開始時間を記録します */
            saveToStorage(); /* 状態を保存 */
        });

        /* 枠をタップしたら、計算機パネルを表示する処理 */
        ansBox.addEventListener('click', () => { 
            piecesContainer.style.display = 'flex'; 
            overlay.style.display = 'block';
        });

        /* オーバーレイ（暗い背景）をタップしたら計算機を閉じる処理 */
        overlay.addEventListener('click', () => {
            piecesContainer.style.display = 'none';
            overlay.style.display = 'none';
        });

        /* ==========================================
           3. 計算機パネルの構築と入力ロジック
           ========================================== */
        const calcKeys = [
            '7', '8', '9',
            '4', '5', '6',
            '1', '2', '3',
            '0', '削除', '決定'
        ];

        calcKeys.forEach(key => {
            const piece = document.createElement('div');
            piece.className = 'piece';
            piece.textContent = key;
            
            if (key === '削除') {
                piece.classList.add('delete-btn');
                piece.addEventListener('click', () => {
                    ansBox.textContent = ansBox.textContent.slice(0, -1);
                    saveToStorage(); /* 入力状態を保存 */
                });
            } else if (key === '決定') {
                piece.classList.add('enter-btn');
                piece.addEventListener('click', () => {
                    piecesContainer.style.display = 'none';
                    overlay.style.display = 'none';
                });
            } else {
                piece.addEventListener('click', () => {
                    if (ansBox.textContent.length < 2) {
                        ansBox.textContent += key;
                        saveToStorage(); /* 入力状態を保存 */
                    }
                });
            }
            piecesContainer.appendChild(piece);
        });

        /* ==========================================
           4. 【重要】Swiftへのデータ送信処理と履歴の蓄積
           ========================================== */
        checkBtn.addEventListener('click', () => {
            const answer = ansBox.textContent;
            if (answer === '') {
                alert('枠の中に数字がありません。');
                return; /* 空欄の場合は中断します */
            }

            const endTime = new Date(); /* 終了時間を記録します */
            
            /* 送信用・蓄積用のデータを用意します */
            const dateStr = formatDate(startTime); /* 日付データを取得します */
            const problemType = "シンプル版テスト";
            const problemContent = "ここに問題がきます！";
            const userAnswer = answer;
            const inputMethod = "計算機入力"; 
            const resultStr = "判定なし";
            
            /* CSVフォーマットのテキスト行を作成します（先頭に日付を追加） */
            const csvLine = `"${dateStr}","${problemType}","${problemContent}","${userAnswer}",${formatTime(startTime)},${formatTime(endTime)},${inputMethod},${resultStr}\n`;
            
            /* LocalStorageの「calc_app_history」に結果を蓄積します */
            let currentHistory = localStorage.getItem(HISTORY_KEY) || '';
            currentHistory += csvLine;
            localStorage.setItem(HISTORY_KEY, currentHistory);

            /* 実行環境（iPadかPCか）を判別して送信します */
            if (window.webkit && window.webkit.messageHandlers.appBridge) {
                window.webkit.messageHandlers.appBridge.postMessage({
                    action: "saveCSV",
                    csvLine: csvLine
                });
                alert('iPadアプリ（Swift）へデータを送信しました。');
            } else {
                alert(`※パソコンで起動しているため、Swiftへの送信は行われません。\n\n【作成・蓄積されたCSVデータ】\n${csvLine}`);
            }

            /* 送信後、枠を空にして時間をリセットし、次の入力に備えます */
            ansBox.textContent = '';
            startTime = new Date();
            clearStorage(); /* 提出が完了したため、入力途中用の一時データを消去します */
        });

        /* ==========================================
           5. 計算機パネルのドラッグ移動ロジック
           ========================================== */
        let isDragging = false;
        let dragStartX, dragStartY, initialLeft, initialTop;

        /* ドラッグ開始 */
        function startDrag(e) {
            if (e.target.classList.contains('piece')) return;
            
            isDragging = true;
            
            let clientX = e.touches ? e.touches[0].clientX : e.clientX;
            let clientY = e.touches ? e.touches[0].clientY : e.clientY;
            
            dragStartX = clientX;
            dragStartY = clientY;
            
            let style = window.getComputedStyle(piecesContainer);
            initialLeft = parseFloat(style.left);
            initialTop = parseFloat(style.top);
        }

        /* ドラッグ中 */
        function doDrag(e) {
            if (!isDragging) return;
            e.preventDefault();
            
            let clientX = e.touches ? e.touches[0].clientX : e.clientX;
            let clientY = e.touches ? e.touches[0].clientY : e.clientY;
            
            let dx = clientX - dragStartX;
            let dy = clientY - dragStartY;
            
            piecesContainer.style.left = (initialLeft + dx) + 'px';
            piecesContainer.style.top = (initialTop + dy) + 'px';
        }

        /* ドラッグ終了 */
        function stopDrag() {
            isDragging = false;
        }

        /* マウス用イベント */
        piecesContainer.addEventListener('mousedown', startDrag);
        document.addEventListener('mousemove', doDrag, { passive: false });
        document.addEventListener('mouseup', stopDrag);

        /* スマホ・タブレット（タッチ）用イベント */
        piecesContainer.addEventListener('touchstart', startDrag, { passive: false });
        document.addEventListener('touchmove', doDrag, { passive: false });
        document.addEventListener('touchend', stopDrag);

    </script>
</body>
</html>
