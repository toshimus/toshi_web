<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>分数の分類</title>
<style>
    html, body {
        height: 100%;
        overflow: hidden;
        position: fixed;
        width: 100%;
    }
    body {
        font-family: "Helvetica Neue", Arial, "Hiragino Kaku Gothic ProN", "Hiragino Sans", Meiryo, sans-serif;
        margin: 0;
        padding: 20px;
        background-color: #ffffff;
        color: #333;
        touch-action: none;
        box-sizing: border-box;
        user-select: none;
        -webkit-user-select: none;
    }
    h1 {
        font-size: 1.2rem;
        font-weight: normal;
        margin-bottom: 20px;
    }
    .status-bar {
        font-size: 1.1rem;
        margin-bottom: 30px;
        color: #555;
    }
    .problem-container {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        width: 100%;
        max-width: 800px;
        margin: 0 auto;
    }
    
    .question-area {
        display: flex;
        align-items: center;
        justify-content: center;
        margin-bottom: 40px;
        background-color: #f9f9f9;
        padding: 30px 50px;
        border-radius: 12px;
        border: 1px solid #ddd;
    }

    /* 分数の表示スタイル */
    .problem-fraction {
        display: flex;
        align-items: center;
        margin-right: 40px;
    }
    .whole-number {
        font-size: 4rem;
        font-weight: bold;
        margin-right: 10px;
    }
    .fraction {
        display: inline-flex;
        flex-direction: column;
        align-items: center;
        font-size: 3rem;
        font-weight: bold;
        line-height: 1.2;
    }
    .numerator {
        border-bottom: 3px solid #000;
        padding: 0 15px;
    }
    .denominator {
        padding: 0 15px;
    }
    
    /* ドロップゾーン（□の枠） */
    .drop-zone {
        width: 160px;
        height: 70px;
        border: 2px dashed #3498db;
        background-color: #f0f8ff;
        border-radius: 8px;
        display: flex;
        justify-content: center;
        align-items: center;
        font-size: 1.8rem;
        font-weight: bold;
        cursor: pointer;
        color: #333;
    }

    /* 分類の駒エリア */
    .pieces-container {
        display: flex;
        justify-content: center;
        flex-wrap: wrap;
        gap: 20px;
        margin-top: 10px;
        padding: 20px;
        background-color: #ecf0f1;
        border-radius: 12px;
    }
    .piece {
        width: 140px;
        height: 60px;
        border: 2px solid #2c3e50;
        background-color: #f1c40f;
        border-radius: 10px;
        display: flex;
        justify-content: center;
        align-items: center;
        font-size: 1.6rem;
        font-weight: bold;
        cursor: grab;
        color: #2c3e50;
        box-shadow: 0 4px 0 #d4ac0d;
        touch-action: none;
    }
    .piece:active {
        transform: translateY(4px);
        box-shadow: none;
    }
    .piece.dragging {
        position: fixed;
        z-index: 1000;
        pointer-events: none;
        opacity: 0.9;
        box-shadow: 0 10px 15px rgba(0,0,0,0.3);
        transform: scale(1.05);
    }
    .hint-text {
        text-align: center;
        color: #e74c3c;
        font-size: 1.1rem;
        font-weight: bold;
        margin-top: 10px;
        margin-bottom: 10px;
    }
    
    .check-btn-container {
        display: flex;
        justify-content: flex-end;
        width: 100%;
        max-width: 800px;
        margin-top: 20px;
    }
    .check-btn {
        padding: 15px 40px;
        font-size: 1.3rem;
        cursor: pointer;
        border: 1px solid #999;
        background-color: #f0f0f0;
        border-radius: 8px;
        font-family: inherit;
        outline: none;
        -webkit-tap-highlight-color: transparent;
        touch-action: manipulation;
    }
    .check-btn:active {
        background-color: #dcdcdc;
    }
    .check-btn:disabled {
        opacity: 0.5;
        cursor: not-allowed;
    }
    
    .result-display {
        font-size: 7rem;
        color: red;
        font-weight: bold;
        text-align: center;
        width: 100%;
        margin-top: 10px;
        min-height: 100px; 
        display: flex;
        justify-content: center;
        align-items: center;
        white-space: nowrap;
        pointer-events: none;
    }
    
    /* 最終結果表示用 */
    .clear-message {
        text-align: center;
        margin-top: 20px;
        padding: 25px;
        background-color: #f8f9fa;
        border-radius: 12px;
        border: 2px solid #a0c4ff;
    }
    .clear-message h2 {
        font-size: 1.8rem;
        color: #d9534f;
        margin-top: 0;
        margin-bottom: 20px;
    }
    .final-result-details {
        font-size: 1.3rem;
        color: #333;
        line-height: 1.8;
    }
    .menu-btn, .retry-btn {
        margin-top: 20px;
        padding: 12px 30px;
        font-size: 1.1rem;
        cursor: pointer;
        border: none;
        border-radius: 8px;
        outline: none;
        touch-action: manipulation;
        text-decoration: none;
        display: inline-block;
    }
    .retry-btn {
        background-color: #a0c4ff;
        color: #fff;
        margin-right: 15px;
    }
    .retry-btn:active {
        background-color: #8bb4f5;
    }
    .menu-btn {
        background-color: #95a5a6;
        color: #fff;
    }
    .menu-btn:active {
        background-color: #7f8c8d;
    }
    
    /* 上部に戻るボタン */
    .top-nav {
        display: flex;
        justify-content: flex-end;
        margin-bottom: 5px;
    }
    .back-btn {
        padding: 8px 15px;
        background-color: #ecf0f1;
        border: 1px solid #bdc3c7;
        border-radius: 5px;
        text-decoration: none;
        color: #2c3e50;
        font-size: 0.9rem;
        touch-action: manipulation;
    }
</style>
</head>
<body>

    <div class="top-nav">
        <a href="index.html" class="back-btn">メニューへ戻る</a>
    </div>
    <h1>・ 次の分数は、真分数、仮分数、帯分数のどれですか。</h1>
    <div id="app"></div>

    <script>
        // ランダムな分数を10問生成します
        const problemTypes = ['真分数', '仮分数', '帯分数'];
        const problems = [];
        
        while (problems.length < 10) {
            const typeIdx = Math.floor(Math.random() * 3);
            let num, den, whole;
            
            if (typeIdx === 0) { // 真分数
                den = Math.floor(Math.random() * 8) + 2; // 分母 2〜9
                num = Math.floor(Math.random() * (den - 1)) + 1; // 分子 1〜分母-1
                whole = 0;
            } else if (typeIdx === 1) { // 仮分数
                den = Math.floor(Math.random() * 8) + 2; // 分母 2〜9
                num = den + Math.floor(Math.random() * 5); // 分子 分母〜分母+4
                whole = 0;
            } else { // 帯分数
                den = Math.floor(Math.random() * 8) + 2; // 分母 2〜9
                num = Math.floor(Math.random() * (den - 1)) + 1; // 分子 1〜分母-1
                whole = Math.floor(Math.random() * 4) + 1; // 整数部分 1〜4
            }
            
            problems.push({ 
                typeName: problemTypes[typeIdx], 
                num: num, 
                den: den, 
                whole: whole 
            });
        }

        let currentIndex = 0;
        let mistakeCount = 0;
        const appContainer = document.getElementById('app');

        function renderProblem() {
            appContainer.innerHTML = '';

            if (currentIndex >= problems.length) {
                const clearMsg = document.createElement('div');
                clearMsg.className = 'clear-message';
                
                let htmlContent = `<h2>全10問クリアしました！</h2>`;
                htmlContent += `<div class="final-result-details">`;
                htmlContent += `<div>正解した問題： <strong>10</strong> 問</div>`;
                htmlContent += `<div>間違えた回数： <strong>${mistakeCount}</strong> 回</div>`;
                
                if (mistakeCount === 0) {
                    htmlContent += `<div style="color: blue; font-weight: bold; margin-top: 15px;">パーフェクトです！素晴らしい成績です。</div>`;
                }
                htmlContent += `</div>`;
                htmlContent += `<button class="retry-btn" onclick="location.reload()">もう一度挑戦する</button>`;
                htmlContent += `<a href="index.html" class="menu-btn">メニューへ戻る</a>`;
                
                clearMsg.innerHTML = htmlContent;
                appContainer.appendChild(clearMsg);
                return;
            }

            const prob = problems[currentIndex];

            const statusBar = document.createElement('div');
            statusBar.className = 'status-bar';
            statusBar.textContent = `第 ${currentIndex + 1} 問 / 全 ${problems.length} 問`;
            appContainer.appendChild(statusBar);

            const container = document.createElement('div');
            container.className = 'problem-container';

            // --- 質問表示エリア ---
            const questionArea = document.createElement('div');
            questionArea.className = 'question-area';

            // 分数の描画
            const fracContainer = document.createElement('div');
            fracContainer.className = 'problem-fraction';
            
            if (prob.whole > 0) {
                const wholeEl = document.createElement('div');
                wholeEl.className = 'whole-number';
                wholeEl.textContent = prob.whole;
                fracContainer.appendChild(wholeEl);
            }
            
            const fracEl = document.createElement('div');
            fracEl.className = 'fraction';
            const numEl = document.createElement('div');
            numEl.className = 'numerator';
            numEl.textContent = prob.num;
            const denEl = document.createElement('div');
            denEl.className = 'denominator';
            denEl.textContent = prob.den;
            
            fracEl.appendChild(numEl);
            fracEl.appendChild(denEl);
            fracContainer.appendChild(fracEl);
            
            questionArea.appendChild(fracContainer);

            // ドロップゾーン
            const dropZone = document.createElement('div');
            dropZone.className = 'drop-zone';
            dropZone.id = 'ans-zone';
            dropZone.addEventListener('click', () => { dropZone.textContent = ''; });
            
            questionArea.appendChild(dropZone);
            container.appendChild(questionArea);

            // --- 分類の駒エリア ---
            const hintText = document.createElement('div');
            hintText.className = 'hint-text';
            hintText.innerHTML = '当てはまる言葉をドラッグして□にはめよう！<br>※枠をタップすると消せます';
            container.appendChild(hintText);

            const piecesContainer = document.createElement('div');
            piecesContainer.className = 'pieces-container';
            
            const pieceLabels = ['真分数', '仮分数', '帯分数'];
            pieceLabels.forEach(label => {
                const piece = document.createElement('div');
                piece.className = 'piece';
                piece.dataset.val = label;
                piece.textContent = label;
                piecesContainer.appendChild(piece);
            });
            
            container.appendChild(piecesContainer);

            // 判定ボタンと結果表示
            const checkBtnContainer = document.createElement('div');
            checkBtnContainer.className = 'check-btn-container';
            const checkBtn = document.createElement('button');
            checkBtn.className = 'check-btn';
            checkBtn.textContent = 'できた';
            checkBtnContainer.appendChild(checkBtn);
            
            container.appendChild(checkBtnContainer);

            const resultDisplay = document.createElement('div');
            resultDisplay.className = 'result-display';
            container.appendChild(resultDisplay);

            appContainer.appendChild(container);

            checkBtn.addEventListener('click', () => {
                const userAnswer = document.getElementById('ans-zone').textContent;

                if (!userAnswer) {
                    return; // 未入力の場合は何もしない
                }

                const isCorrect = (userAnswer === prob.typeName);

                if (isCorrect) {
                    resultDisplay.textContent = '正解！';
                    checkBtn.disabled = true;
                    
                    setTimeout(() => {
                        currentIndex++;
                        renderProblem();
                    }, 1500);
                } else {
                    resultDisplay.textContent = 'おしい！';
                    mistakeCount++;
                }
            });
        }

        renderProblem();

        // --- ドラッグ＆ドロップのグローバル処理 ---
        let draggingPiece = null;

        function handleStart(e) {
            if (e.target.classList.contains('piece') && !e.target.classList.contains('dragging')) {
                const val = e.target.dataset.val;
                draggingPiece = document.createElement('div');
                draggingPiece.className = 'piece dragging';
                draggingPiece.textContent = val;
                draggingPiece.dataset.val = val;
                document.body.appendChild(draggingPiece);
                movePiece(e);
            }
        }

        function movePiece(e) {
            if (!draggingPiece) return;
            e.preventDefault(); 
            let clientX, clientY;
            if (e.touches && e.touches.length > 0) {
                clientX = e.touches[0].clientX;
                clientY = e.touches[0].clientY;
            } else {
                clientX = e.clientX;
                clientY = e.clientY;
            }
            // 駒の幅(140px)/高さ(60px)の半分ずらす
            draggingPiece.style.left = (clientX - 70) + 'px';
            draggingPiece.style.top = (clientY - 30) + 'px';
        }

        function handleEnd(e) {
            if (!draggingPiece) return;
            
            draggingPiece.style.display = 'none';
            let clientX, clientY;
            if (e.changedTouches && e.changedTouches.length > 0) {
                clientX = e.changedTouches[0].clientX;
                clientY = e.changedTouches[0].clientY;
            } else {
                clientX = e.clientX;
                clientY = e.clientY;
            }
            
            let elem = document.elementFromPoint(clientX, clientY);
            draggingPiece.style.display = 'flex';
            
            if (elem && elem.classList.contains('drop-zone')) {
                // 今回は文字の置き換えのみ（追記ではない）
                elem.textContent = draggingPiece.dataset.val;
            }
            
            draggingPiece.remove();
            draggingPiece = null;
        }

        document.addEventListener('touchstart', handleStart, {passive: false});
        document.addEventListener('touchmove', movePiece, {passive: false});
        document.addEventListener('touchend', handleEnd);
        document.addEventListener('mousedown', handleStart);
        document.addEventListener('mousemove', movePiece);
        document.addEventListener('mouseup', handleEnd);

    </script>
</body>
</html>
