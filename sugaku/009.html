<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>分数の分類</title>
<style>
    html, body {
        height: 100%;
        overflow: hidden;
        position: fixed;
        width: 100%;
    }
    body {
        font-family: "Helvetica Neue", Arial, "Hiragino Kaku Gothic ProN", "Hiragino Sans", Meiryo, sans-serif;
        margin: 0;
        padding: 20px;
        background-color: #ffffff;
        color: #333;
        touch-action: none;
        box-sizing: border-box;
        user-select: none;
        -webkit-user-select: none;
    }
    
    /* スタート画面のスタイル */
    .start-screen {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background-color: #f0f8ff;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        z-index: 10000;
    }
    .start-screen h1 {
        font-size: 3rem;
        color: #2c3e50;
        margin-bottom: 40px;
    }
    .start-btn {
        padding: 20px 60px;
        font-size: 2.5rem;
        font-weight: bold;
        color: #fff;
        background-color: #3498db;
        border: none;
        border-radius: 15px;
        cursor: pointer;
        box-shadow: 0 8px 0 #2980b9;
        transition: transform 0.1s, box-shadow 0.1s;
        -webkit-tap-highlight-color: transparent;
    }
    .start-btn:active {
        transform: translateY(8px);
        box-shadow: none;
    }

    .status-bar {
        font-size: 1.4rem;
        font-weight: bold;
        margin-bottom: 10px;
        color: #555;
    }
    .question-title {
        font-size: 2rem;
        font-weight: bold;
        margin-top: 5px;
        margin-bottom: 20px;
    }

    .problem-container {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        width: 100%;
        max-width: 800px;
        margin: 0 auto;
    }
    
    .question-area {
        display: flex;
        align-items: center;
        justify-content: center;
        margin-bottom: 20px;
        background-color: #f9f9f9;
        padding: 30px 50px;
        border-radius: 12px;
        border: 1px solid #ddd;
    }

    /* 分数の表示スタイル */
    .problem-fraction {
        display: flex;
        align-items: center;
        margin-right: 40px;
    }
    .whole-number {
        font-size: 4rem;
        font-weight: bold;
        margin-right: 10px;
    }
    .fraction {
        display: inline-flex;
        flex-direction: column;
        align-items: center;
        font-size: 3rem;
        font-weight: bold;
        line-height: 1.2;
    }
    .numerator {
        border-bottom: 3px solid #000;
        padding: 0 15px;
    }
    .denominator {
        padding: 0 15px;
    }
    
    /* ドロップゾーン（□の枠） */
    .drop-zone {
        width: 160px;
        height: 70px;
        border: 2px dashed #3498db;
        background-color: #f0f8ff;
        border-radius: 8px;
        display: flex;
        justify-content: center;
        align-items: center;
        font-size: 1.8rem;
        font-weight: bold;
        cursor: pointer;
        color: #333;
    }

    /* 分類の駒と判定ボタンのエリア */
    .pieces-container {
        display: flex;
        justify-content: center;
        align-items: center;
        flex-wrap: wrap;
        gap: 20px;
        margin-top: 10px;
        padding: 20px;
        background-color: #ecf0f1;
        border-radius: 12px;
    }
    .piece {
        width: 140px;
        height: 60px;
        border: 2px solid #2c3e50;
        background-color: #f1c40f;
        border-radius: 10px;
        display: flex;
        justify-content: center;
        align-items: center;
        font-size: 1.6rem;
        font-weight: bold;
        cursor: pointer;
        color: #2c3e50;
        box-shadow: 0 4px 0 #d4ac0d;
        touch-action: manipulation;
    }
    .piece:active {
        transform: translateY(4px);
        box-shadow: none;
    }
    
    /* 判定ボタンを青色の立体パターンに変更 */
    .check-btn {
        padding: 0 30px;
        height: 60px;
        font-size: 1.6rem;
        font-weight: bold;
        cursor: pointer;
        border: none;
        background-color: #00bfff;
        color: #ffffff;
        border-radius: 10px;
        font-family: inherit;
        outline: none;
        box-shadow: 0 4px 0 #0088cc;
        -webkit-tap-highlight-color: transparent;
        touch-action: manipulation;
        display: flex;
        justify-content: center;
        align-items: center;
    }
    .check-btn:active {
        transform: translateY(4px);
        box-shadow: none;
    }
    .check-btn:disabled {
        opacity: 0.5;
        cursor: not-allowed;
        transform: translateY(4px);
        box-shadow: none;
    }

    .hint-text {
        text-align: center;
        color: #e74c3c;
        font-size: 1.1rem;
        font-weight: bold;
        margin-top: 10px;
        margin-bottom: 5px;
    }
    
    .judge-overlay {
        position: fixed;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%) scale(0.7);
        opacity: 0;
        visibility: hidden;
        background-color: transparent;
        color: #ff3333;
        font-size: 6rem;
        font-weight: bold;
        padding: 30px 60px;
        -webkit-text-stroke: 3px #000;
        text-shadow: 4px 4px 10px rgba(0, 0, 0, 0.5);
        z-index: 9999;
        pointer-events: none;
        transition: opacity 0.3s ease, transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275), visibility 0.3s;
        white-space: nowrap;
    }
    .judge-overlay.show {
        opacity: 1;
        visibility: visible;
        transform: translate(-50%, -50%) scale(1.0);
    }
    .judge-overlay.incorrect {
        color: #3366ff;
    }
    
    .clear-message {
        text-align: center;
        margin-top: 20px;
        padding: 25px;
        background-color: #f8f9fa;
        border-radius: 12px;
        border: 2px solid #a0c4ff;
    }
    .clear-message h2 {
        font-size: 1.8rem;
        color: #d9534f;
        margin-top: 0;
        margin-bottom: 20px;
    }
    .final-result-details {
        font-size: 1.3rem;
        color: #333;
        line-height: 1.8;
    }
    .menu-btn, .retry-btn {
        margin-top: 20px;
        padding: 12px 30px;
        font-size: 1.1rem;
        cursor: pointer;
        border: none;
        border-radius: 8px;
        outline: none;
        touch-action: manipulation;
        text-decoration: none;
        display: inline-block;
    }
    .retry-btn {
        background-color: #a0c4ff;
        color: #fff;
        margin-right: 15px;
    }
    .menu-btn {
        background-color: #95a5a6;
        color: #fff;
    }
    
    .top-nav {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 10px;
    }
    .toggle-group {
        display: flex;
        gap: 15px;
    }
    .settings-toggle {
        font-size: 1.1rem;
        color: #555;
        cursor: pointer;
        display: flex;
        align-items: center;
        -webkit-tap-highlight-color: transparent;
    }
    .settings-toggle input {
        transform: scale(1.3);
        margin-right: 8px;
        cursor: pointer;
    }
    .back-btn {
        padding: 8px 15px;
        background-color: #ecf0f1;
        border: 1px solid #bdc3c7;
        border-radius: 5px;
        text-decoration: none;
        color: #2c3e50;
        font-size: 0.9rem;
        touch-action: manipulation;
    }
</style>
</head>
<body>

    <div id="start-screen" class="start-screen">
        <h1>分数の分類</h1>
        <button id="start-btn" class="start-btn">スタート</button>
        <BR><BR><a href="index.html" class="menu-btn" style="margin-top: 20px; background-color: #95a5a6;">メニューへ戻る</a>
    </div>

    <div id="main-content" style="display: none;">
        <div class="top-nav">
            <div class="toggle-group">
                <label class="settings-toggle">
                    <input type="checkbox" id="speech-checkbox" checked>
                    スピーチON
                </label>
                <label class="settings-toggle">
                    <input type="checkbox" id="sound-checkbox" checked>
                    効果音ON
                </label>
            </div>
            <a href="index.html" class="back-btn">メニューへ戻る</a>
        </div>
        
        <div id="status-bar" class="status-bar"></div>
        <h1 class="question-title" id="question-title">・ 次の分数は、真分数、仮分数、帯分数のどれですか。</h1>
        
        <div id="app"></div>
        <div id="judge-overlay" class="judge-overlay"></div>
    </div>

    <script>
        const okSound = new Audio('ok.mp3');
        const ngSound = new Audio('ng.mp3');
        const qSound = new Audio('q.mp3');

        // 音声読み上げ用の関数
        function speak(text) {
            const speechCheckbox = document.getElementById('speech-checkbox');
            if (speechCheckbox && !speechCheckbox.checked) return; 
            window.speechSynthesis.cancel(); 
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'ja-JP';
            utterance.rate = 1.0;
            utterance.pitch = 1.0;
            window.speechSynthesis.speak(utterance);
        }

        const typeReadings = { '真分数': 'しんぶんすう', '仮分数': 'かぶんすう', '帯分数': 'たいぶんすう' };

        const problems = [];
        const seen = new Set();
        const problemTypes = ['真分数', '仮分数', '帯分数'];
        
        while (problems.length < 10) {
            const typeIdx = Math.floor(Math.random() * 3);
            let num, den, whole;
            
            if (typeIdx === 0) { 
                den = Math.floor(Math.random() * 8) + 2; 
                num = Math.floor(Math.random() * (den - 1)) + 1; 
                whole = 0;
            } else if (typeIdx === 1) { 
                den = Math.floor(Math.random() * 8) + 2; 
                num = den + Math.floor(Math.random() * 5); 
                whole = 0;
            } else { 
                den = Math.floor(Math.random() * 8) + 2; 
                num = Math.floor(Math.random() * (den - 1)) + 1; 
                whole = Math.floor(Math.random() * 4) + 1; 
            }
            
            const fracKey = `${whole}-${num}/${den}`;
            if (!seen.has(fracKey)) {
                seen.add(fracKey);
                problems.push({ typeName: problemTypes[typeIdx], num: num, den: den, whole: whole });
            }
        }

        let currentIndex = 0;
        let mistakeCount = 0;
        const appContainer = document.getElementById('app');
        
        let problemStartTime = new Date();

        function formatTime(date) {
            return date.getHours().toString().padStart(2, '0') + ':' + 
                   date.getMinutes().toString().padStart(2, '0') + ':' + 
                   date.getSeconds().toString().padStart(2, '0');
        }

        function renderProblem() {
            appContainer.innerHTML = '';
            problemStartTime = new Date();

            if (currentIndex >= problems.length) {
                document.getElementById('status-bar').style.display = 'none';
                document.getElementById('question-title').style.display = 'none';
                
                const clearMsg = document.createElement('div');
                clearMsg.className = 'clear-message';
                clearMsg.innerHTML = `
                    <h2>全10問クリアしました！</h2>
                    <div class="final-result-details">
                        <div>正解した問題： <strong>10</strong> 問</div>
                        <div>間違えた回数： <strong>${mistakeCount}</strong> 回</div>
                    </div>
                    <button class="retry-btn" onclick="location.reload()">もう一度挑戦する</button>
                    <a href="index.html" class="menu-btn">メニューへ戻る</a>
                `;
                appContainer.appendChild(clearMsg);
                speak("ぜんもんくりあです。おつかれさまでした。");
                return;
            }

            document.getElementById('status-bar').style.display = 'block';
            document.getElementById('question-title').style.display = 'block';
            document.getElementById('status-bar').textContent = `第 ${currentIndex + 1} 問 / 全 ${problems.length} 問`;

            const soundCheckbox = document.getElementById('sound-checkbox');
            if (soundCheckbox && soundCheckbox.checked) {
                qSound.currentTime = 0;
                qSound.play().catch(e => console.log("Auto-play blocked:", e));
            }

            const prob = problems[currentIndex];
            const container = document.createElement('div');
            container.className = 'problem-container';

            // --- 質問表示エリア ---
            const questionArea = document.createElement('div');
            questionArea.className = 'question-area';

            const fracContainer = document.createElement('div');
            fracContainer.className = 'problem-fraction';
            
            if (prob.whole > 0) {
                const wholeEl = document.createElement('div');
                wholeEl.className = 'whole-number';
                wholeEl.textContent = prob.whole;
                fracContainer.appendChild(wholeEl);
            }
            
            const fracEl = document.createElement('div');
            fracEl.className = 'fraction';
            const numEl = document.createElement('div');
            numEl.className = 'numerator';
            numEl.textContent = prob.num;
            const denEl = document.createElement('div');
            denEl.className = 'denominator';
            denEl.textContent = prob.den;
            
            fracEl.appendChild(numEl);
            fracEl.appendChild(denEl);
            fracContainer.appendChild(fracEl);
            
            questionArea.appendChild(fracContainer);

            // ドロップゾーン
            const dropZone = document.createElement('div');
            dropZone.className = 'drop-zone';
            dropZone.id = 'ans-zone';
            dropZone.addEventListener('click', () => { 
                dropZone.textContent = ''; 
                speak("くりあ");
            });
            
            questionArea.appendChild(dropZone);
            container.appendChild(questionArea);

            // --- 分類の駒と判定ボタンのエリア ---
            const hintText = document.createElement('div');
            hintText.className = 'hint-text';
            hintText.innerHTML = 'あてはまる言葉をタップして、□にはめよう！<br>※枠をタップすると消せます';
            container.appendChild(hintText);

            const piecesContainer = document.createElement('div');
            piecesContainer.className = 'pieces-container';
            
            // 選択肢の駒を生成
            ['真分数', '仮分数', '帯分数'].forEach(label => {
                const piece = document.createElement('div');
                piece.className = 'piece';
                piece.textContent = label;
                piece.addEventListener('click', () => {
                    dropZone.textContent = label;
                    speak(typeReadings[label]);
                });
                piecesContainer.appendChild(piece);
            });
            
            // 判定ボタンを駒と同じコンテナ内に追加（横一列に並ぶ）
            const checkBtn = document.createElement('button');
            checkBtn.className = 'check-btn';
            checkBtn.textContent = 'できた！';
            piecesContainer.appendChild(checkBtn);
            
            container.appendChild(piecesContainer);

            appContainer.appendChild(container);

            checkBtn.addEventListener('click', () => {
                const userAnswer = dropZone.textContent;
                if (!userAnswer) return; 

                const isCorrect = (userAnswer === prob.typeName);
                
                const endTime = new Date();
                const problemType = "分数の分類";
                let fractionStr = prob.whole > 0 ? `${prob.whole}と${prob.num}/${prob.den}` : `${prob.num}/${prob.den}`;
                const problemContent = fractionStr;
                const inputMethod = "タップ";
                const resultStr = isCorrect ? "正解" : "不正解";
                
                const csvLine = `"${problemType}","${problemContent}","${userAnswer}",${formatTime(problemStartTime)},${formatTime(endTime)},${inputMethod},${resultStr}\n`;
                
                if (window.webkit && window.webkit.messageHandlers.appBridge) {
                    window.webkit.messageHandlers.appBridge.postMessage({
                        action: "saveCSV",
                        csvLine: csvLine
                    });
                }

                const overlay = document.getElementById('judge-overlay');

                if (isCorrect) {
                    overlay.textContent = 'せいかい！';
                    overlay.className = 'judge-overlay show';
                    if (soundCheckbox && soundCheckbox.checked) {
                        okSound.currentTime = 0;
                        okSound.play();
                    }
                    checkBtn.disabled = true;
                    // ボタン群を操作できなくする
                    piecesContainer.style.pointerEvents = 'none';
                    
                    setTimeout(() => { overlay.classList.remove('show'); }, 1200);
                    setTimeout(() => { currentIndex++; renderProblem(); }, 1500);
                } else {
                    overlay.textContent = 'おしい！';
                    overlay.className = 'judge-overlay incorrect show';
                    mistakeCount++;
                    if (soundCheckbox && soundCheckbox.checked) {
                        ngSound.currentTime = 0;
                        ngSound.play();
                    }
                    setTimeout(() => { overlay.classList.remove('show'); }, 1200);
                }
            });
        }

        // --- スタートボタンのイベントリスナー ---
        document.getElementById('start-btn').addEventListener('click', () => {
            document.getElementById('start-screen').style.display = 'none';
            document.getElementById('main-content').style.display = 'block';
            renderProblem();
        });
    </script>
</body>
</html>
