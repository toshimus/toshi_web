<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>分数の分類</title>
    
    <!-- 共通スタイルの読み込み -->
    <link rel="stylesheet" href="app-common.css">

    <!-- 分数の分類 固有のスタイル -->
    <style>
        .problem-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 100%;
            max-width: 800px;
            margin: 0 auto;
        }
        
        .question-area {
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 15px;
            background-color: #f9f9f9;
            padding: 20px 30px;
            border-radius: 12px;
            border: 1px solid #ddd;
            flex-wrap: wrap;
            gap: 20px;
        }

        /* 分数の表示スタイル */
        .problem-fraction {
            display: flex;
            align-items: center;
        }
        .whole-number {
            font-size: 3.5rem;
            font-weight: bold;
            margin-right: 10px;
        }
        .fraction {
            display: inline-flex;
            flex-direction: column;
            align-items: center;
            font-size: 2.5rem;
            font-weight: bold;
            line-height: 1.2;
        }
        .numerator {
            border-bottom: 3px solid #000;
            padding: 0 12px;
        }
        .denominator {
            padding: 0 12px;
        }
        
        /* ドロップゾーン（□の枠） */
        .drop-zone {
            width: 160px;
            height: 70px;
            border: 2px dashed #3498db;
            background-color: #f0f8ff;
            border-radius: 8px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 1.8rem;
            font-weight: bold;
            cursor: pointer;
            color: #333;
        }

        /* ヒントテキスト */
        .hint-text {
            text-align: center;
            color: #e74c3c;
            font-size: 1rem;
            font-weight: bold;
            margin-top: 5px;
            margin-bottom: 15px;
        }

        /* 分類の駒と判定ボタンのエリア */
        .pieces-container {
            display: flex;
            justify-content: center;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
            padding: 15px;
            background-color: #ecf0f1;
            border-radius: 12px;
            width: 100%;
            box-sizing: border-box;
        }
        .piece {
            width: 130px;
            height: 60px;
            border: 2px solid #2c3e50;
            background-color: #f1c40f;
            border-radius: 10px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 1.5rem;
            font-weight: bold;
            cursor: pointer;
            color: #2c3e50;
            box-shadow: 0 4px 0 #d4ac0d;
            touch-action: manipulation;
        }
        .piece:active {
            transform: translateY(4px);
            box-shadow: none;
        }
        
        /* 判定ボタン */
        .check-btn {
            padding: 0 30px;
            height: 60px;
            font-size: 1.5rem;
            font-weight: bold;
            cursor: pointer;
            border: none;
            background-color: #00bfff;
            color: #ffffff;
            border-radius: 10px;
            font-family: inherit;
            outline: none;
            box-shadow: 0 4px 0 #0088cc;
            -webkit-tap-highlight-color: transparent;
            touch-action: manipulation;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .check-btn:active {
            transform: translateY(4px);
            box-shadow: none;
        }
        .check-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: translateY(4px);
            box-shadow: none;
        }
    </style>
</head>
<body>

    <!-- スタート画面 -->
    <div id="start-screen" class="start-screen">
        <h1>分数の分類</h1>
        <button id="start-btn" class="start-btn">スタート</button>
        <div style="margin-top: 30px; text-align: center;">
            <a href="index.html" class="menu-btn">メニューへ戻る</a>
        </div>
    </div>

    <!-- メイン画面 -->
    <div id="main-content" style="display: none;">
        <div class="top-nav">
            <div class="toggle-group">
                <label class="settings-toggle">
                    <input type="checkbox" id="speech-checkbox" checked>
                    スピーチON
                </label>
                <label class="settings-toggle">
                    <input type="checkbox" id="sound-checkbox" checked>
                    効果音ON
                </label>
            </div>
            <a href="index.html" class="back-btn">メニューへ戻る</a>
        </div>
        
        <div id="status-bar" class="status-bar"></div>
        <h1 class="question-title" id="question-title">・ 次の分数は、真分数、仮分数、帯分数のどれですか。</h1>
        
        <div id="app"></div>
        <div id="judge-overlay" class="judge-overlay"></div>
    </div>

    <!-- 共通JavaScriptの読み込み -->
    <script src="app-common.js"></script>

    <!-- 分数の分類 固有JavaScript -->
    <script>
        const typeReadings = { 
            '真分数': 'しんぶんすう', 
            '仮分数': 'かぶんすう', 
            '帯分数': 'たいぶんすう' 
        };

        /* ==========================================
           問題生成ロジック (全10問)
           ========================================== */
        const problems = [];
        const seen = new Set();
        const problemTypes = ['真分数', '仮分数', '帯分数'];
        
        while (problems.length < 10) {
            const typeIdx = Math.floor(Math.random() * 3);
            let num, den, whole;
            
            if (typeIdx === 0) { 
                // 真分数 (分子 < 分母)
                den = Math.floor(Math.random() * 8) + 2; 
                num = Math.floor(Math.random() * (den - 1)) + 1; 
                whole = 0;
            } else if (typeIdx === 1) { 
                // 仮分数 (分子 >= 分母)
                den = Math.floor(Math.random() * 8) + 2; 
                num = den + Math.floor(Math.random() * 5); 
                whole = 0;
            } else { 
                // 帯分数 (整数 + 真分数)
                den = Math.floor(Math.random() * 8) + 2; 
                num = Math.floor(Math.random() * (den - 1)) + 1; 
                whole = Math.floor(Math.random() * 4) + 1; 
            }
            
            const fracKey = `${whole}-${num}/${den}`;
            if (!seen.has(fracKey)) {
                seen.add(fracKey);
                problems.push({ typeName: problemTypes[typeIdx], num: num, den: den, whole: whole });
            }
        }

        let currentIndex = 0;
        let mistakeCount = 0;
        const appContainer = document.getElementById('app');
        let problemStartTime;

        function renderProblem() {
            appContainer.innerHTML = '';
            problemStartTime = new Date();

            if (currentIndex >= problems.length) {
                document.getElementById('status-bar').style.display = 'none';
                document.getElementById('question-title').style.display = 'none';
                
                const clearMsg = document.createElement('div');
                clearMsg.className = 'clear-message';
                
                let htmlContent = `<h2>全10問クリアしました！</h2>`;
                htmlContent += `<div class="final-result-details">`;
                htmlContent += `<div>間違えた回数： <strong>${mistakeCount}</strong> 回</div>`;
                if (mistakeCount === 0) {
                    htmlContent += `<div style="color: blue; font-weight: bold; margin-top: 15px;">パーフェクトです！素晴らしい成績です。</div>`;
                }
                htmlContent += `</div>`;
                htmlContent += `<button class="retry-btn" onclick="location.reload()">もう一度挑戦する</button>`;
                htmlContent += `<a href="index.html" class="menu-btn">メニューへ戻る</a>`;
                
                clearMsg.innerHTML = htmlContent;
                appContainer.appendChild(clearMsg);
                AppAudio.speak("ぜんもんくりあです。おつかれさまでした。");
                return;
            }

            document.getElementById('status-bar').style.display = 'block';
            document.getElementById('question-title').style.display = 'block';
            document.getElementById('status-bar').textContent = `第 ${currentIndex + 1} 問 / 全 ${problems.length} 問`;

            AppAudio.playQ();
            AppAudio.speak("つぎの ぶんすうは、しんぶんすう、かぶんすう、たいぶんすうの どれですか。");

            const prob = problems[currentIndex];
            const container = document.createElement('div');
            container.className = 'problem-container';

            // --- 質問表示エリア ---
            const questionArea = document.createElement('div');
            questionArea.className = 'question-area';

            const fracContainer = document.createElement('div');
            fracContainer.className = 'problem-fraction';
            
            if (prob.whole > 0) {
                const wholeEl = document.createElement('div');
                wholeEl.className = 'whole-number';
                wholeEl.textContent = prob.whole;
                fracContainer.appendChild(wholeEl);
            }
            
            const fracEl = document.createElement('div');
            fracEl.className = 'fraction';
            const numEl = document.createElement('div');
            numEl.className = 'numerator';
            numEl.textContent = prob.num;
            const denEl = document.createElement('div');
            denEl.className = 'denominator';
            denEl.textContent = prob.den;
            
            fracEl.appendChild(numEl);
            fracEl.appendChild(denEl);
            fracContainer.appendChild(fracEl);
            
            questionArea.appendChild(fracContainer);

            // ドロップゾーン（回答枠）
            const dropZone = document.createElement('div');
            dropZone.className = 'drop-zone';
            dropZone.id = 'ans-zone';
            dropZone.addEventListener('click', () => { 
                if (dropZone.textContent !== '') {
                    dropZone.textContent = ''; 
                    AppAudio.speak("けしました");
                }
            });
            
            questionArea.appendChild(dropZone);
            container.appendChild(questionArea);

            // --- ヒントテキスト ---
            const hintText = document.createElement('div');
            hintText.className = 'hint-text';
            hintText.innerHTML = 'あてはまる言葉をタップして、□にはめよう！<br>※枠をタップすると消せます';
            container.appendChild(hintText);

            // --- 分類の駒と判定ボタンのエリア ---
            const piecesContainer = document.createElement('div');
            piecesContainer.className = 'pieces-container';
            
            // 選択肢の駒を生成
            ['真分数', '仮分数', '帯分数'].forEach(label => {
                const piece = document.createElement('div');
                piece.className = 'piece';
                piece.textContent = label;
                piece.addEventListener('click', () => {
                    dropZone.textContent = label;
                    AppAudio.speak(typeReadings[label]);
                });
                piecesContainer.appendChild(piece);
            });
            
            // 判定ボタン
            const checkBtn = document.createElement('button');
            checkBtn.className = 'check-btn';
            checkBtn.textContent = 'できた！';
            piecesContainer.appendChild(checkBtn);
            
            container.appendChild(piecesContainer);
            appContainer.appendChild(container);

            checkBtn.addEventListener('click', () => {
                const userAnswer = dropZone.textContent;
                const overlay = document.getElementById('judge-overlay');

                // 未選択時のチェック
                if (!userAnswer) {
                    overlay.textContent = 'ことばを えらんでね';
                    overlay.className = 'judge-overlay incorrect show';
                    AppAudio.speak("ことばを えらんでね");
                    setTimeout(() => { overlay.classList.remove('show'); }, 1200);
                    return;
                }

                const isCorrect = (userAnswer === prob.typeName);
                let fractionStr = prob.whole > 0 ? `${prob.whole}と${prob.num}/${prob.den}` : `${prob.num}/${prob.den}`;

                // 共通モジュール（AppLogger）による履歴保存
                AppLogger.save({
                    storageKey: "fraction_classification_history",
                    problemType: "分数の分類",
                    problemContent: fractionStr,
                    userAnswer: userAnswer,
                    startTime: problemStartTime,
                    endTime: new Date(),
                    inputMethod: "タップ",
                    isCorrect: isCorrect
                });

                if (isCorrect) {
                    overlay.textContent = 'せいかい！';
                    overlay.className = 'judge-overlay show';
                    AppAudio.speak("せいかい！");
                    AppAudio.playOk();
                    checkBtn.disabled = true;
                    piecesContainer.style.pointerEvents = 'none';
                    
                    setTimeout(() => { overlay.classList.remove('show'); }, 1200);
                    setTimeout(() => { currentIndex++; renderProblem(); }, 1500);
                } else {
                    overlay.textContent = 'おしい！';
                    overlay.className = 'judge-overlay incorrect show';
                    AppAudio.speak("おしい！");
                    mistakeCount++;
                    AppAudio.playNg();

                    setTimeout(() => { overlay.classList.remove('show'); }, 1200);
                }
            });
        }

        // --- スタートボタンのイベントリスナー ---
        document.getElementById('start-btn').addEventListener('click', () => {
            document.getElementById('start-screen').style.display = 'none';
            document.getElementById('main-content').style.display = 'block';
            renderProblem();
        });
    </script>
</body>
</html>
