<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>お買い物計算（買えるかな？）</title>
<style>
    html, body {
        min-height: 100%;
        width: 100%;
    }
    body {
        font-family: "Helvetica Neue", Arial, "Hiragino Kaku Gothic ProN", "Hiragino Sans", Meiryo, sans-serif;
        margin: 0;
        padding: clamp(10px, 3vw, 20px);
        background-color: #f4f7f6;
        color: #333;
        touch-action: manipulation;
        box-sizing: border-box;
        user-select: none;
        -webkit-user-select: none;
        overflow-x: hidden;
    }
    
    /* スタート画面のスタイル */
    .start-screen {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background-color: #f0f8ff;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        z-index: 10000;
        padding: 20px;
        box-sizing: border-box;
    }
    .start-screen h1 {
        font-size: clamp(2rem, 6vw, 3rem);
        color: #2c3e50;
        margin-bottom: 40px;
        text-align: center;
    }
    .start-btn {
        padding: clamp(12px, 3vh, 20px) clamp(30px, 8vw, 60px);
        font-size: clamp(1.6rem, 5vw, 2.5rem);
        font-weight: bold;
        color: #fff;
        background-color: #3498db;
        border: none;
        border-radius: 15px;
        cursor: pointer;
        box-shadow: 0 8px 0 #2980b9;
        transition: transform 0.1s, box-shadow 0.1s;
        -webkit-tap-highlight-color: transparent;
    }
    .start-btn:active {
        transform: translateY(8px);
        box-shadow: none;
    }

    /* 上部ステータスバー */
    .status-bar {
        font-size: clamp(1rem, 2.5vw, 1.2rem);
        font-weight: bold;
        margin-bottom: 10px;
        color: #555;
    }

    /* メインレイアウト（PC/タブレットでは左右分割、スマホ等では縦並び） */
    .layout-container {
        display: flex;
        flex-direction: row;
        width: 100%;
        max-width: 1000px;
        margin: 0 auto;
        gap: 20px;
        align-items: stretch;
    }

    @media (max-width: 768px) {
        .layout-container {
            flex-direction: column;
        }
    }

    /* 左側：問題エリア */
    .problem-area {
        flex: 1.3;
        display: flex;
        flex-direction: column;
        background-color: #fff;
        border-radius: 15px;
        padding: clamp(15px, 3vw, 20px);
        box-shadow: 0 4px 10px rgba(0,0,0,0.05);
        box-sizing: border-box;
    }
    
    .money-info {
        background-color: #fff3cd;
        border: 2px solid #ffeeba;
        border-radius: 10px;
        padding: clamp(10px, 2vw, 15px);
        text-align: center;
        margin-bottom: 15px;
    }
    .money-info span {
        display: block;
        font-size: clamp(1rem, 2.5vw, 1.2rem);
        color: #856404;
    }
    .money-info .amount {
        font-size: clamp(1.8rem, 5vw, 2.5rem);
        font-weight: bold;
        color: #d35400;
        margin-top: 5px;
    }

    .items-list {
        background-color: #e8f4f8;
        border-radius: 10px;
        padding: clamp(10px, 2.5vw, 15px);
        margin-bottom: 20px;
        flex-grow: 1;
    }
    .items-title {
        font-size: clamp(1rem, 2.5vw, 1.2rem);
        font-weight: bold;
        margin-bottom: 10px;
        text-align: center;
        color: #2980b9;
    }
    .item-row {
        display: flex;
        justify-content: space-between;
        align-items: center;
        font-size: clamp(1.1rem, 3.5vw, 1.5rem);
        font-weight: bold;
        padding: 8px 5px;
        border-bottom: 2px dashed #bdc3c7;
    }
    .item-row:last-child {
        border-bottom: none;
    }
    .item-name {
        flex: 1;
        text-align: left;
        color: #2c3e50;
        word-break: break-all;
    }
    .item-price {
        text-align: right;
        color: #c0392b;
        min-width: 90px;
        margin-left: 10px;
    }

    /* 2択ボタン */
    .choices-area {
        display: flex;
        gap: 15px;
    }
    .choice-btn {
        flex: 1;
        height: clamp(60px, 12vh, 80px);
        font-size: clamp(1.3rem, 4vw, 2rem);
        font-weight: bold;
        color: #fff;
        border: none;
        border-radius: 15px;
        cursor: pointer;
        transition: transform 0.1s, box-shadow 0.1s;
        -webkit-tap-highlight-color: transparent;
        display: flex;
        justify-content: center;
        align-items: center;
        touch-action: manipulation;
    }
    .btn-buy {
        background-color: #2ecc71;
        box-shadow: 0 6px 0 #27ae60;
    }
    .btn-buy:active {
        transform: translateY(6px);
        box-shadow: none;
    }
    .btn-cant-buy {
        background-color: #e74c3c;
        box-shadow: 0 6px 0 #c0392b;
    }
    .btn-cant-buy:active {
        transform: translateY(6px);
        box-shadow: none;
    }
    .choice-btn:disabled {
        opacity: 0.6;
        cursor: not-allowed;
        transform: translateY(6px);
        box-shadow: none;
    }

    /* 右側：計算機（メモ機能） */
    .calculator-area {
        flex: 0.7;
        background-color: #2c3e50;
        border-radius: 15px;
        padding: 15px;
        display: flex;
        flex-direction: column;
        box-shadow: 0 8px 20px rgba(0,0,0,0.2);
        box-sizing: border-box;
    }
    .calc-title {
        color: #ecf0f1;
        font-size: clamp(0.9rem, 2vw, 1rem);
        text-align: center;
        margin-bottom: 10px;
    }
    .calc-display {
        background-color: #ecf0f1;
        border-radius: 8px;
        height: clamp(50px, 10vh, 60px);
        margin-bottom: 15px;
        display: flex;
        justify-content: flex-end;
        align-items: center;
        padding: 0 15px;
        font-size: clamp(1.6rem, 5vw, 2.2rem);
        font-weight: bold;
        color: #333;
        overflow: hidden;
    }
    .calc-keys {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 10px;
    }
    .calc-btn {
        height: clamp(45px, 8vh, 60px);
        background-color: #bdc3c7;
        border: none;
        border-radius: 8px;
        font-size: clamp(1.2rem, 3.5vw, 1.5rem);
        font-weight: bold;
        color: #2c3e50;
        cursor: pointer;
        box-shadow: 0 4px 0 #95a5a6;
        display: flex;
        justify-content: center;
        align-items: center;
        -webkit-tap-highlight-color: transparent;
        touch-action: manipulation;
    }
    .calc-btn:active {
        transform: translateY(4px);
        box-shadow: none;
    }
    .calc-btn.operator {
        background-color: #f1c40f;
        box-shadow: 0 4px 0 #d4ac0d;
        color: #fff;
    }
    .calc-btn.clear {
        background-color: #e74c3c;
        box-shadow: 0 4px 0 #c0392b;
        color: #fff;
    }
    .calc-btn.equal {
        background-color: #3498db;
        box-shadow: 0 4px 0 #2980b9;
        color: #fff;
        grid-column: span 2; 
    }

    /* 判定表示とクリアメッセージ */
    .judge-overlay {
        position: fixed;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%) scale(0.7);
        opacity: 0;
        visibility: hidden;
        background-color: transparent;
        color: #ff3333;
        font-size: clamp(3.5rem, 10vw, 6rem);
        font-weight: bold;
        padding: 20px 40px;
        -webkit-text-stroke: 3px #000;
        text-shadow: 4px 4px 10px rgba(0, 0, 0, 0.5);
        z-index: 9999;
        pointer-events: none;
        transition: opacity 0.3s ease, transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275), visibility 0.3s;
        white-space: nowrap;
    }
    .judge-overlay.show {
        opacity: 1;
        visibility: visible;
        transform: translate(-50%, -50%) scale(1.0);
    }
    .judge-overlay.incorrect {
        color: #3366ff;
    }

    .clear-message {
        text-align: center;
        margin-top: 20px;
        padding: 25px;
        background-color: #f8f9fa;
        border-radius: 12px;
        border: 2px solid #a0c4ff;
    }
    .clear-message h2 {
        font-size: clamp(1.4rem, 4vw, 1.8rem);
        color: #d9534f;
        margin-top: 0;
        margin-bottom: 20px;
    }
    .final-result-details {
        font-size: clamp(1.1rem, 3vw, 1.3rem);
        color: #333;
        line-height: 1.8;
    }
    .menu-btn, .retry-btn {
        margin-top: 20px;
        padding: 12px 30px;
        font-size: clamp(1rem, 2.5vw, 1.1rem);
        cursor: pointer;
        border: none;
        border-radius: 8px;
        outline: none;
        touch-action: manipulation;
        text-decoration: none;
        display: inline-block;
        font-weight: bold;
    }
    .retry-btn { background-color: #a0c4ff; color: #fff; margin-right: 15px; }
    .menu-btn { background-color: #95a5a6; color: #fff; }

    /* 上部ナビゲーション */
    .top-nav {
        display: flex;
        justify-content: space-between; 
        align-items: center;            
        margin-bottom: 10px;
    }
    .toggle-group {
        display: flex;
        gap: 15px;
    }
    .settings-toggle {
        font-size: clamp(0.9rem, 2vw, 1.1rem);
        color: #555;
        cursor: pointer;
        display: flex;
        align-items: center;
        -webkit-tap-highlight-color: transparent;
    }
    .settings-toggle input { transform: scale(1.2); margin-right: 8px; cursor: pointer; }
    .back-btn {
        padding: 6px 12px;
        background-color: #ecf0f1;
        border: 1px solid #bdc3c7;
        border-radius: 5px;
        text-decoration: none;
        color: #2c3e50;
        font-size: clamp(0.8rem, 1.8vw, 0.9rem);
        touch-action: manipulation;
    }

</style>
</head>
<body>

    <div id="start-screen" class="start-screen">
        <h1>お買い物計算</h1>
        <button id="start-btn" class="start-btn">スタート</button>
        <div style="margin-top: 30px; text-align: center;">
            <a href="index.html" class="menu-btn" style="background-color: #95a5a6;">メニューへ戻る</a>
        </div>
    </div>

    <div id="main-content" style="display: none;">
        <div class="top-nav">
            <div class="toggle-group">
                <label class="settings-toggle">
                    <input type="checkbox" id="speech-checkbox" checked>
                    スピーチON
                </label>
                <label class="settings-toggle">
                    <input type="checkbox" id="sound-checkbox" checked>
                    効果音ON
                </label>
            </div>
            <a href="index.html" class="back-btn">メニューへ戻る</a>
        </div>
        
        <div id="status-bar" class="status-bar"></div>
        
        <div class="layout-container" id="app">
            <div class="problem-area" id="problem-area">
            </div>

            <div class="calculator-area">
                <div class="calc-title">📝 計算メモ</div>
                <div class="calc-display" id="calc-display">0</div>
                <div class="calc-keys">
                    <button class="calc-btn" onclick="inputCalc('7')">7</button>
                    <button class="calc-btn" onclick="inputCalc('8')">8</button>
                    <button class="calc-btn" onclick="inputCalc('9')">9</button>
                    <button class="calc-btn clear" onclick="clearCalc()">C</button>

                    <button class="calc-btn" onclick="inputCalc('4')">4</button>
                    <button class="calc-btn" onclick="inputCalc('5')">5</button>
                    <button class="calc-btn" onclick="inputCalc('6')">6</button>
                    <button class="calc-btn operator" onclick="setOp('-')">－</button>

                    <button class="calc-btn" onclick="inputCalc('1')">1</button>
                    <button class="calc-btn" onclick="inputCalc('2')">2</button>
                    <button class="calc-btn" onclick="inputCalc('3')">3</button>
                    <button class="calc-btn operator" onclick="setOp('+')">＋</button>

                    <button class="calc-btn" onclick="inputCalc('0')">0</button>
                    <button class="calc-btn" onclick="inputCalc('00')">00</button>
                    <button class="calc-btn equal" onclick="calculate()">＝</button>
                </div>
            </div>
        </div>
        
        <div id="judge-overlay" class="judge-overlay"></div>
    </div>

    <!-- 共通モジュールの読み込み -->
    <script src="app-common.js"></script>

    <script>
        // --- 商品データベース（全60アイテム） ---
        const itemDatabase = {
            low: [
                { name: "ノート", price: 150 }, { name: "チョコレート", price: 120 }, { name: "ポテトチップス", price: 150 },
                { name: "ペットボトル飲料", price: 160 }, { name: "消しゴム", price: 100 }, { name: "ボールペン", price: 150 },
                { name: "アイスクリーム", price: 140 }, { name: "キャラメル", price: 110 }, { name: "シャープペンシル", price: 200 },
                { name: "スナック菓子", price: 130 }, { name: "定規", price: 180 }, { name: "クリアファイル", price: 120 },
                { name: "漫画", price: 500 }, { name: "雑誌", price: 600 }, { name: "文庫本", price: 700 },
                { name: "靴下", price: 400 }, { name: "ハンカチ", price: 500 }, { name: "ケーキ", price: 450 },
                { name: "おにぎり", price: 150 }, { name: "サンドイッチ", price: 350 }
            ],
            mid: [
                { name: "Tシャツ", price: 2500 }, { name: "リュックサック", price: 4500 }, { name: "サッカーボール", price: 3500 },
                { name: "ボードゲーム", price: 4000 }, { name: "スニーカー", price: 6000 }, { name: "帽子", price: 2000 },
                { name: "水筒", price: 2500 }, { name: "ペンケース", price: 1200 }, { name: "図鑑", price: 2200 },
                { name: "CD", price: 3000 }, { name: "プラモデル", price: 3500 }, { name: "ワイヤレスイヤホン", price: 5500 },
                { name: "パジャマ", price: 3000 }, { name: "クッション", price: 1500 }, { name: "腕時計", price: 8000 },
                { name: "卓上カレンダー", price: 1000 }, { name: "モバイルバッテリー", price: 3800 }, { name: "折りたたみ傘", price: 2000 },
                { name: "カードゲーム", price: 1500 }, { name: "スポーツタオル", price: 1200 }
            ],
            high: [
                { name: "ゲーム機本体", price: 35000 }, { name: "タブレット端末", price: 45000 }, { name: "自転車", price: 25000 },
                { name: "スマートウォッチ", price: 18000 }, { name: "デジタルカメラ", price: 65000 }, { name: "天体望遠鏡", price: 15000 },
                { name: "高級スニーカー", price: 12000 }, { name: "コート", price: 15000 }, { name: "ノートパソコン", price: 85000 },
                { name: "電子ピアノ", price: 40000 }, { name: "ゲーミングチェア", price: 28000 }, { name: "ドローン", price: 12000 },
                { name: "ブランド財布", price: 30000 }, { name: "ワイヤレスヘッドホン", price: 22000 }, { name: "テレビ", price: 55000 },
                { name: "ロボット掃除機", price: 42000 }, { name: "スーツケース", price: 18000 }, { name: "テント", price: 25000 },
                { name: "高級腕時計", price: 95000 }, { name: "液晶モニター", price: 32000 }
            ]
        };

        // 配列から重複なしで指定個数のアイテムを取得するヘルパー関数
        function getUniqueItems(pool, count) {
            let shuffled = [...pool].sort(() => 0.5 - Math.random());
            return shuffled.slice(0, count);
        }

        // --- 右側の計算機（メモ）の実装ロジック ---
        let calcDisplayValue = '0';
        let calcFirstOperand = null;
        let calcOperator = null;
        let calcWaitingForSecond = false;
        const calcScreen = document.getElementById('calc-display');

        function updateCalcScreen() {
            calcScreen.textContent = calcDisplayValue;
        }

        function inputCalc(digit) {
            if (calcWaitingForSecond) {
                calcDisplayValue = digit;
                calcWaitingForSecond = false;
            } else {
                calcDisplayValue = calcDisplayValue === '0' ? digit : calcDisplayValue + digit;
            }
            updateCalcScreen();
        }

        function setOp(nextOperator) {
            const inputValue = parseFloat(calcDisplayValue);
            if (calcOperator && calcWaitingForSecond) {
                calcOperator = nextOperator;
                return;
            }
            if (calcFirstOperand == null && !isNaN(inputValue)) {
                calcFirstOperand = inputValue;
            } else if (calcOperator) {
                const result = performCalculation(calcFirstOperand, inputValue, calcOperator);
                calcDisplayValue = String(result);
                calcFirstOperand = result;
            }
            calcWaitingForSecond = true;
            calcOperator = nextOperator;
            updateCalcScreen();
        }

        function performCalculation(first, second, op) {
            if (op === '+') return first + second;
            if (op === '-') return first - second;
            return second;
        }

        function calculate() {
            if (calcOperator === null || calcWaitingForSecond) return;
            const inputValue = parseFloat(calcDisplayValue);
            const result = performCalculation(calcFirstOperand, inputValue, calcOperator);
            calcDisplayValue = String(result);
            calcFirstOperand = null;
            calcOperator = null;
            calcWaitingForSecond = true;
            updateCalcScreen();
        }

        function clearCalc() {
            calcDisplayValue = '0';
            calcFirstOperand = null;
            calcOperator = null;
            calcWaitingForSecond = false;
            updateCalcScreen();
        }


        // --- 問題生成と進行ロジック ---
        const problems = [];
        
        for (let i = 0; i < 10; i++) {
            let scale = Math.random();
            let selectedItems = [];
            let diff;

            // スケール（難易度）に合わせてデータベースから商品を抽出
            if (scale < 0.4) {
                // 小規模 (数百円〜数千円)
                selectedItems = getUniqueItems(itemDatabase.low, 3);
                diff = [10, 20, 30, 40, 50][Math.floor(Math.random() * 5)];
            } else if (scale < 0.7) {
                // 中規模 (数千円〜数万円)
                selectedItems = getUniqueItems(itemDatabase.mid, 2).concat(getUniqueItems(itemDatabase.low, 1));
                diff = [50, 100, 150, 200, 300][Math.floor(Math.random() * 5)];
            } else {
                // 大規模 (数万円〜十万円台)
                selectedItems = getUniqueItems(itemDatabase.high, 1).concat(getUniqueItems(itemDatabase.mid, 1), getUniqueItems(itemDatabase.low, 1));
                diff = [100, 200, 300, 400, 500][Math.floor(Math.random() * 5)];
            }
            
            // 表示順序をランダムにシャッフル
            selectedItems.sort(() => 0.5 - Math.random());

            let actualTotal = selectedItems[0].price + selectedItems[1].price + selectedItems[2].price;
            let canBuy = Math.random() < 0.5; // 買えるか買えないかは50%の確率
            
            // 所持金の算出（絶妙な差額を適用）
            let pocketMoney = canBuy ? actualTotal + diff : actualTotal - diff;
            
            // 安全策（万が一マイナスになった場合は補正）
            if (pocketMoney < 100) pocketMoney = 100;

            problems.push({ 
                pocketMoney: pocketMoney,
                item1: selectedItems[0],
                item2: selectedItems[1],
                item3: selectedItems[2],
                totalCost: actualTotal,
                answer: canBuy 
            });
        }

        let currentIndex = 0;
        let mistakeCount = 0;
        const problemArea = document.getElementById('problem-area');
        
        let problemStartTime = new Date();

        function renderProblem() {
            problemArea.innerHTML = '';
            // 計算機を自動でクリア
            clearCalc();
            problemStartTime = new Date();

            if (currentIndex >= problems.length) {
                document.getElementById('status-bar').style.display = 'none';
                
                // リザルト画面への切り替え (計算機も消すため親コンテナを書き換え)
                const appContainer = document.getElementById('app');
                appContainer.style.display = 'block'; 
                appContainer.innerHTML = '';
                
                const clearMsg = document.createElement('div');
                clearMsg.className = 'clear-message';
                
                let htmlContent = `<h2>全10問クリアしました！</h2>`;
                htmlContent += `<div class="final-result-details">`;
                htmlContent += `<div>正解した問題： <strong>10</strong> 問</div>`;
                htmlContent += `<div>間違えた回数： <strong>${mistakeCount}</strong> 回</div>`;
                
                if (mistakeCount === 0) {
                    htmlContent += `<div style="color: blue; font-weight: bold; margin-top: 15px;">パーフェクトです！素晴らしい成績です。</div>`;
                }
                
                htmlContent += `</div>`;
                htmlContent += `<button class="retry-btn" onclick="location.reload()">もう一度挑戦する</button>`;
                htmlContent += `<a href="index.html" class="menu-btn">メニューへ戻る</a>`;
                
                clearMsg.innerHTML = htmlContent;
                appContainer.appendChild(clearMsg);
                
                AppAudio.speak("ぜんもんくりあです。おつかれさまでした。");
                return;
            }

            const prob = problems[currentIndex];

            document.getElementById('status-bar').style.display = 'block';
            document.getElementById('status-bar').textContent = `第 ${currentIndex + 1} 問 / 全 ${problems.length} 問`;

            // 実在の商品名を自然に読み上げるテキストの生成
            const readText = `じょじきんは、${prob.pocketMoney}円です。${prob.item1.name}、${prob.item1.price}円。${prob.item2.name}、${prob.item2.price}円。${prob.item3.name}、${prob.item3.price}円の、３つの品物は、買えるでしょうか？`;

            // 問題提示音と読み上げ
            AppAudio.playQ();
            AppAudio.speak(readText);

            // DOM構築 (左側の問題エリア)
            const moneyInfo = document.createElement('div');
            moneyInfo.className = 'money-info';
            moneyInfo.innerHTML = `<span>じょじきん</span><div class="amount">${prob.pocketMoney} 円</div>`;

            const itemsList = document.createElement('div');
            itemsList.className = 'items-list';
            itemsList.innerHTML = `
                <div class="items-title">買いたい品物</div>
                <div class="item-row">
                    <span class="item-name">${prob.item1.name}</span>
                    <span class="item-price">${prob.item1.price} 円</span>
                </div>
                <div class="item-row">
                    <span class="item-name">${prob.item2.name}</span>
                    <span class="item-price">${prob.item2.price} 円</span>
                </div>
                <div class="item-row">
                    <span class="item-name">${prob.item3.name}</span>
                    <span class="item-price">${prob.item3.price} 円</span>
                </div>
            `;

            const choicesArea = document.createElement('div');
            choicesArea.className = 'choices-area';

            const btnBuy = document.createElement('button');
            btnBuy.className = 'choice-btn btn-buy';
            btnBuy.textContent = '買える 〇';

            const btnCantBuy = document.createElement('button');
            btnCantBuy.className = 'choice-btn btn-cant-buy';
            btnCantBuy.textContent = '買えない ×';

            choicesArea.appendChild(btnBuy);
            choicesArea.appendChild(btnCantBuy);

            problemArea.appendChild(moneyInfo);
            problemArea.appendChild(itemsList);
            problemArea.appendChild(choicesArea);

            // 回答判定処理
            function handleAnswer(userChoiceBoolean) {
                btnBuy.disabled = true;
                btnCantBuy.disabled = true;

                const isCorrect = (userChoiceBoolean === prob.answer);
                
                // --- 共通モジュール(AppLogger)による履歴保存 ---
                AppLogger.save({
                    storageKey: "shopping_calc_history",
                    problemType: "お買い物計算",
                    problemContent: `所持金${prob.pocketMoney}円/商品(${prob.item1.name}:${prob.item1.price}+${prob.item2.name}:${prob.item2.price}+${prob.item3.name}:${prob.item3.price})`,
                    userAnswer: userChoiceBoolean ? "買える" : "買えない",
                    startTime: problemStartTime,
                    endTime: new Date(),
                    inputMethod: "2択ボタン(計算メモ有)",
                    isCorrect: isCorrect
                });

                const judgeOverlay = document.getElementById('judge-overlay');

                if (isCorrect) {
                    judgeOverlay.textContent = 'せいかい！';
                    judgeOverlay.className = 'judge-overlay show';
                    
                    AppAudio.playOk();
                    
                    setTimeout(() => {
                        judgeOverlay.classList.remove('show');
                    }, 1200);
                    
                    setTimeout(() => {
                        currentIndex++;
                        renderProblem();
                    }, 1500);
                } else {
                    judgeOverlay.textContent = 'おしい！';
                    judgeOverlay.className = 'judge-overlay incorrect show';
                    mistakeCount++;
                    
                    AppAudio.playNg();
                    
                    setTimeout(() => {
                        judgeOverlay.classList.remove('show');
                        btnBuy.disabled = false;
                        btnCantBuy.disabled = false;
                    }, 1200);
                }
            }

            btnBuy.addEventListener('click', () => handleAnswer(true));
            btnCantBuy.addEventListener('click', () => handleAnswer(false));
        }

        // --- スタートボタン ---
        document.getElementById('start-btn').addEventListener('click', () => {
            document.getElementById('start-screen').style.display = 'none';
            document.getElementById('main-content').style.display = 'block';
            renderProblem();
        });
    </script>
</body>
</html>
