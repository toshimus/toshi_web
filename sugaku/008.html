<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>1より大きい分数の数直線</title>
    
    <!-- 共通スタイルの読み込み -->
    <link rel="stylesheet" href="app-common.css">

    <!-- 1より大きい分数の数直線 固有のスタイル -->
    <style>
        .problem-container {
            display: flex;
            flex-direction: column;
            width: 100%;
            max-width: 800px;
            margin: 0 auto;
        }
        
        /* 数直線エリア */
        .svg-container {
            width: 100%;
            max-height: 180px;
            margin-bottom: 15px;
        }
        
        /* 回答入力エリア */
        .answer-panel {
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #f9f9f9;
            padding: 15px 30px;
            border-radius: 12px;
            border: 1px solid #ddd;
            width: fit-content;
            margin-left: auto;
            margin-right: auto;
        }
        .answer-label {
            font-size: 1.5rem;
            font-weight: bold;
            margin-right: 15px;
        }
        
        .fraction-input {
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        
        /* ドロップゾーン（□の枠） */
        .drop-zone {
            width: 65px;
            height: 60px;
            border: 2px dashed #3498db;
            background-color: #f0f8ff;
            border-radius: 8px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 2rem;
            font-weight: bold;
            cursor: pointer;
            color: #333;
        }
        .fraction-line {
            width: 100%;
            height: 3px;
            background-color: #000;
            margin: 6px 0;
        }
        .unit {
            font-size: 1.5rem;
            font-weight: bold;
            margin-left: 15px;
        }

        .hint-text {
            text-align: center;
            color: #e74c3c;
            font-size: 1rem;
            font-weight: bold;
            margin-top: 10px;
        }
        
        .check-btn-container {
            display: flex;
            justify-content: center;
            width: 100%;
            max-width: 800px;
            margin-top: 20px;
            margin-left: auto;
            margin-right: auto;
        }
        .check-btn {
            padding: 0 40px;
            height: 60px;
            font-size: 1.6rem;
            font-weight: bold;
            cursor: pointer;
            border: none;
            background-color: #00bfff;
            color: #ffffff;
            border-radius: 10px;
            font-family: inherit;
            outline: none;
            box-shadow: 0 4px 0 #0088cc;
            -webkit-tap-highlight-color: transparent;
            touch-action: manipulation;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .check-btn:active {
            transform: translateY(4px);
            box-shadow: none;
        }
        .check-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: translateY(4px);
            box-shadow: none;
        }

        /* テンキーパネルとオーバーレイのスタイル */
        .pieces-container {
            display: none;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            padding: 15px;
            background-color: #2c3e50;
            border-radius: 15px;
            width: 280px;
            box-sizing: border-box;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            z-index: 1000;
        }
        
        .piece {
            height: 55px;
            border: none;
            background-color: #f1c40f;
            border-radius: 10px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 1.8rem;
            font-weight: bold;
            cursor: pointer;
            color: #2c3e50;
            box-shadow: 0 4px 0 #d4ac0d;
            touch-action: manipulation;
        }
        .piece:active {
            transform: translateY(4px);
            box-shadow: none;
        }
        
        .piece.delete-btn {
            background-color: #e74c3c;
            color: white;
            box-shadow: 0 4px 0 #c0392b;
            font-size: 1.2rem;
        }
        .piece.ok-btn {
            background-color: #2ecc71;
            color: white;
            box-shadow: 0 4px 0 #27ae60;
            font-size: 1.2rem;
        }
        
        .overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.4);
            z-index: 999;
        }
    </style>
</head>
<body>

    <!-- スタート画面 -->
    <div id="start-screen" class="start-screen">
        <h1>1より大きい分数の数直線</h1>
        <button id="start-btn" class="start-btn">スタート</button>
        <div style="margin-top: 30px; text-align: center;">
            <a href="index.html" class="menu-btn">メニューへ戻る</a>
        </div>
    </div>

    <!-- メイン画面 -->
    <div id="main-content" style="display: none; height: 100%; width: 100%;">
        <div class="top-nav">
            <div class="toggle-group">
                <label class="settings-toggle">
                    <input type="checkbox" id="speech-checkbox" checked> スピーチON
                </label>
                <label class="settings-toggle">
                    <input type="checkbox" id="sound-checkbox" checked> 効果音ON
                </label>
            </div>
            <a href="index.html" class="back-btn">メニューへ戻る</a>
        </div>
        
        <div id="status-bar" class="status-bar"></div>
        <h1 class="question-title" id="question-title">・ 矢印のめもりが表す長さは、何mですか。</h1>
        
        <div id="app"></div>
        <div id="judge-overlay" class="judge-overlay"></div>

        <div class="overlay" id="overlay"></div>
        <div class="pieces-container" id="calc-container"></div>
    </div>

    <!-- 共通JavaScriptの読み込み -->
    <script src="app-common.js"></script>

    <!-- 1より大きい分数の数直線 固有JavaScript -->
    <script>
        const numberReadings = [
            "ぜろ", "いち", "に", "さん", "よん", "ご", "ろく", "なな", "はち", "きゅう", "じゅう",
            "じゅういち", "じゅうに", "じゅうさん", "じゅうよん", "じゅうご", "じゅうろく", "じゅうなな", "じゅうはち", "じゅうきゅう", "にじゅう"
        ];

        /* ==========================================
           テンキーパネルの構築（0~9、けす、OK）
           ========================================== */
        const overlay = document.getElementById('overlay');
        const calcContainer = document.getElementById('calc-container');
        let activeInputBox = null;

        const calcKeys = [
            '7', '8', '9',
            '4', '5', '6',
            '1', '2', '3',
            'けす', '0', 'OK'
        ];

        calcKeys.forEach(key => {
            const piece = document.createElement('div');
            piece.className = 'piece';
            piece.textContent = key;
            
            if (key === 'けす') {
                piece.classList.add('delete-btn');
                piece.addEventListener('click', () => {
                    if (activeInputBox) {
                        let cur = activeInputBox.textContent;
                        activeInputBox.textContent = cur.slice(0, -1);
                    }
                });
            } else if (key === 'OK') {
                piece.classList.add('ok-btn');
                piece.addEventListener('click', () => {
                    if (activeInputBox && activeInputBox.textContent.length > 0) {
                        const val = parseInt(activeInputBox.textContent, 10);
                        if (val >= 0 && val <= 20) {
                            AppAudio.speak(numberReadings[val]);
                        }
                    }
                    calcContainer.style.display = 'none';
                    overlay.style.display = 'none';
                    activeInputBox = null;
                });
            } else {
                // 数字キーを押したときの処理（2桁まで入力可能）
                piece.addEventListener('click', () => {
                    if (activeInputBox) {
                        let currentText = activeInputBox.textContent;
                        if (currentText.length < 2) {
                            activeInputBox.textContent = currentText + key;
                        }
                    }
                });
            }
            calcContainer.appendChild(piece);
        });

        overlay.addEventListener('click', () => {
            calcContainer.style.display = 'none';
            overlay.style.display = 'none';
            activeInputBox = null;
        });

        /* ==========================================
           問題生成と判定ロジック (1より大きい分数)
           ========================================== */
        const problems = [];
        while (problems.length < 10) {
            const den = Math.floor(Math.random() * 9) + 2; // 分母: 2〜10
            // 1から2の間（den+1 から den*2-1）の仮分数を生成
            const val = Math.floor(Math.random() * (den - 1)) + den + 1; 
            problems.push({ den: den, val: val });
        }

        let currentIndex = 0;
        let mistakeCount = 0;
        const appContainer = document.getElementById('app');
        let problemStartTime;

        function renderProblem() {
            appContainer.innerHTML = '';
            problemStartTime = new Date();

            if (currentIndex >= problems.length) {
                document.getElementById('status-bar').style.display = 'none';
                document.getElementById('question-title').style.display = 'none';
                
                const clearMsg = document.createElement('div');
                clearMsg.className = 'clear-message';
                
                let htmlContent = `<h2>全10問クリアしました！</h2>`;
                htmlContent += `<div class="final-result-details">`;
                htmlContent += `<div>間違えた回数： <strong>${mistakeCount}</strong> 回</div>`;
                if (mistakeCount === 0) {
                    htmlContent += `<div style="color: blue; font-weight: bold; margin-top: 15px;">パーフェクトです！素晴らしい成績です。</div>`;
                }
                htmlContent += `</div>`;
                htmlContent += `<button class="retry-btn" onclick="location.reload()">もう一度挑戦する</button>`;
                htmlContent += `<a href="index.html" class="menu-btn">メニューへ戻る</a>`;
                
                clearMsg.innerHTML = htmlContent;
                appContainer.appendChild(clearMsg);
                AppAudio.speak("ぜんもんくりあです。おつかれさまでした。");
                return;
            }

            document.getElementById('status-bar').style.display = 'block';
            document.getElementById('question-title').style.display = 'block';
            document.getElementById('status-bar').textContent = `第 ${currentIndex + 1} 問 / 全 ${problems.length} 問`;

            AppAudio.playQ();
            AppAudio.speak("やじるしの めもりが あらわす ちょうさは、なんメートルですか。");

            const prob = problems[currentIndex];

            const container = document.createElement('div');
            container.className = 'problem-container';

            // --- 数直線（SVG）描画エリア ---
            const svgContainer = document.createElement('div');
            svgContainer.className = 'svg-container';
            const svgNS = 'http://www.w3.org/2000/svg';
            const svg = document.createElementNS(svgNS, 'svg');
            svg.setAttribute('width', '100%');
            svg.setAttribute('height', '100%');
            svg.setAttribute('viewBox', '0 0 800 200');
            
            const mainLine = document.createElementNS(svgNS, 'line');
            mainLine.setAttribute('x1', '50'); mainLine.setAttribute('y1', '80');
            mainLine.setAttribute('x2', '750'); mainLine.setAttribute('y2', '80');
            mainLine.setAttribute('stroke', '#000'); mainLine.setAttribute('stroke-width', '4');
            svg.appendChild(mainLine);

            const text0 = document.createElementNS(svgNS, 'text');
            text0.setAttribute('x', '50'); text0.setAttribute('y', '50');
            text0.setAttribute('text-anchor', 'middle'); text0.setAttribute('font-size', '24');
            text0.textContent = '0';
            svg.appendChild(text0);

            const text1 = document.createElementNS(svgNS, 'text');
            text1.setAttribute('x', '400'); text1.setAttribute('y', '50');
            text1.setAttribute('text-anchor', 'middle'); text1.setAttribute('font-size', '24');
            text1.textContent = '1';
            svg.appendChild(text1);

            const text2 = document.createElementNS(svgNS, 'text');
            text2.setAttribute('x', '750'); text2.setAttribute('y', '50');
            text2.setAttribute('text-anchor', 'middle'); text2.setAttribute('font-size', '24');
            text2.textContent = '2';
            svg.appendChild(text2);

            const textM = document.createElementNS(svgNS, 'text');
            textM.setAttribute('x', '780'); textM.setAttribute('y', '50');
            textM.setAttribute('text-anchor', 'start'); textM.setAttribute('font-size', '24');
            textM.textContent = '(m)';
            svg.appendChild(textM);

            // 目盛りの描画
            const intervalWidth = 350 / prob.den; // 0~1の幅が350
            for(let i = 0; i <= prob.den * 2; i++) {
                const xPos = 50 + intervalWidth * i;
                const tick = document.createElementNS(svgNS, 'line');
                
                let tickY1, tickY2;
                if (i % prob.den === 0) {
                    tickY1 = 55;
                    tickY2 = 105;
                } else if (i % 5 === 0) {
                    tickY1 = 60;
                    tickY2 = 100;
                } else {
                    tickY1 = 70;
                    tickY2 = 90;
                }

                tick.setAttribute('x1', xPos.toString());
                tick.setAttribute('y1', tickY1.toString());
                tick.setAttribute('x2', xPos.toString());
                tick.setAttribute('y2', tickY2.toString());
                tick.setAttribute('stroke', '#000');
                tick.setAttribute('stroke-width', '3');
                svg.appendChild(tick);
            }

            // 矢印の描画
            const arrowX = 50 + intervalWidth * prob.val;
            const arrow = document.createElementNS(svgNS, 'path');
            const pathStr = `M ${arrowX} 135 L ${arrowX} 105 L ${arrowX - 8} 115 M ${arrowX} 105 L ${arrowX + 8} 115`;
            arrow.setAttribute('d', pathStr);
            arrow.setAttribute('stroke', '#e74c3c'); 
            arrow.setAttribute('stroke-width', '5');
            arrow.setAttribute('fill', 'none');
            svg.appendChild(arrow);

            svgContainer.appendChild(svg);
            container.appendChild(svgContainer);

            // --- 回答入力エリア ---
            const answerPanel = document.createElement('div');
            answerPanel.className = 'answer-panel';

            const label = document.createElement('div');
            label.className = 'answer-label';
            label.textContent = '答え：';

            const fractionInput = document.createElement('div');
            fractionInput.className = 'fraction-input';

            // 分子のドロップゾーン
            const numZone = document.createElement('div');
            numZone.className = 'drop-zone';
            numZone.id = 'ans-num';
            numZone.addEventListener('click', () => { 
                activeInputBox = numZone;
                calcContainer.style.display = 'grid';
                overlay.style.display = 'block';
            });

            const fractionLine = document.createElement('div');
            fractionLine.className = 'fraction-line';

            // 分母のドロップゾーン
            const denZone = document.createElement('div');
            denZone.className = 'drop-zone';
            denZone.id = 'ans-den';
            denZone.addEventListener('click', () => { 
                activeInputBox = denZone;
                calcContainer.style.display = 'grid';
                overlay.style.display = 'block';
            });

            fractionInput.appendChild(numZone);
            fractionInput.appendChild(fractionLine);
            fractionInput.appendChild(denZone);

            const unit = document.createElement('div');
            unit.className = 'unit';
            unit.textContent = 'm';

            answerPanel.appendChild(label);
            answerPanel.appendChild(fractionInput);
            answerPanel.appendChild(unit);
            container.appendChild(answerPanel);

            // --- ヒントテキスト ---
            const hintText = document.createElement('div');
            hintText.className = 'hint-text';
            hintText.innerHTML = '※ 枠をタップして数字を入力してください';
            container.appendChild(hintText);

            // 判定ボタン
            const checkBtnContainer = document.createElement('div');
            checkBtnContainer.className = 'check-btn-container';
            const checkBtn = document.createElement('button');
            checkBtn.className = 'check-btn';
            checkBtn.textContent = 'できた！';
            checkBtnContainer.appendChild(checkBtn);
            
            container.appendChild(checkBtnContainer);
            appContainer.appendChild(container);

            checkBtn.addEventListener('click', () => {
                const ansNumText = document.getElementById('ans-num').textContent.trim();
                const ansDenText = document.getElementById('ans-den').textContent.trim();
                const overlayJudge = document.getElementById('judge-overlay');

                // 未入力時のチェック
                if (!ansNumText || !ansDenText) {
                    overlayJudge.textContent = 'すうじを にゅうりょく してね';
                    overlayJudge.className = 'judge-overlay incorrect show';
                    AppAudio.speak("すうじを にゅうりょく してね");
                    setTimeout(() => { overlayJudge.classList.remove('show'); }, 1200);
                    return;
                }

                const userNum = parseInt(ansNumText, 10);
                const userDen = parseInt(ansDenText, 10);
                const isCorrect = (userNum === prob.val) && (userDen === prob.den);

                // 共通モジュール（AppLogger）による履歴保存
                AppLogger.save({
                    storageKey: "number_line_fraction_over_1_history",
                    problemType: "1より大きい分数の数直線",
                    problemContent: `分母:${prob.den}, 値:${prob.val}`,
                    userAnswer: `${userNum}/${userDen}`,
                    startTime: problemStartTime,
                    endTime: new Date(),
                    inputMethod: "計算機入力",
                    isCorrect: isCorrect
                });

                if (isCorrect) {
                    overlayJudge.textContent = 'せいかい！';
                    overlayJudge.className = 'judge-overlay show';
                    AppAudio.speak("せいかい！");
                    AppAudio.playOk();
                    checkBtn.disabled = true;
                    
                    setTimeout(() => { overlayJudge.classList.remove('show'); }, 1200);
                    setTimeout(() => { currentIndex++; renderProblem(); }, 1500);
                } else {
                    overlayJudge.textContent = 'おしい！';
                    overlayJudge.className = 'judge-overlay incorrect show';
                    AppAudio.speak("おしい！");
                    mistakeCount++;
                    AppAudio.playNg();

                    setTimeout(() => { overlayJudge.classList.remove('show'); }, 1200);
                }
            });
        }

        // --- スタートボタンのイベントリスナー ---
        document.getElementById('start-btn').addEventListener('click', () => {
            document.getElementById('start-screen').style.display = 'none';
            document.getElementById('main-content').style.display = 'block';
            renderProblem();
        });
    </script>
</body>
</html>
