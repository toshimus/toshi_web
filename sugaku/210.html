<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>3桁の引き算（上級編）</title>

<!-- 共通スタイルの読み込み -->
<link rel="stylesheet" href="app-common.css">

<style>
    /* 画面全体（黒い余白部分） */
    html, body {
        height: 100%;
        width: 100%;
        overflow: hidden;
        margin: 0;
        padding: 0;
        background-color: #222;
        display: flex;
        justify-content: center;
        align-items: center;
    }
    
    /* デバイスサイズに合わせて伸縮するラッパー */
    #canvas-wrapper {
        width: 100vw;
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        overflow: hidden;
    }

    /* 内部の仮想キャンバス（固定解像度の画面: 1024x768） */
    .app-body {
        width: 1024px;   /* 論理的な横幅（固定） */
        height: 768px;   /* 論理的な縦幅（固定・4:3） */
        background-color: #ffffff;
        position: relative;
        transform-origin: center center; /* 中央を基準に拡縮 */
        padding: 20px;
        box-sizing: border-box;
        border-radius: 10px;
        box-shadow: 0 0 20px rgba(0,0,0,0.8);
        
        font-family: "Helvetica Neue", Arial, "Hiragino Kaku Gothic ProN", "Hiragino Sans", Meiryo, sans-serif;
        color: #333;
        touch-action: none;
        user-select: none;
        -webkit-user-select: none;
    }

    .problem-container {
        display: flex;
        flex-direction: column;
        width: 100%;
        max-width: 1000px;
        margin: 0 auto;
        align-items: center;
        justify-content: center;
    }

    /* ひっ算エリア */
    .hissan-wrapper {
        display: grid;
        grid-template-columns: 60px 80px 80px 80px 180px; /* －記号, 百の位, 十の位, 一の位, できたボタン */
        grid-template-rows: 60px 80px 80px 20px 90px; /* メモ, 1項目, 2項目, 横線, 答え */
        row-gap: 15px;
        column-gap: 15px;
        align-items: center;
        justify-items: center;
        font-size: 5rem;
        font-weight: bold;
        background-color: #f9f9f9;
        padding: 30px 40px;
        border-radius: 12px;
        border: 2px solid #eee;
        margin: 20px 0;
    }

    .hissan-line {
        width: 100%;
        height: 6px;
        background-color: #333;
        margin: 5px 0;
    }

    /* ドロップゾーン（解答の□） */
    .drop-zone {
        width: 80px;
        height: 90px;
        border: 4px dashed #3498db;
        background-color: #f0f8ff;
        border-radius: 12px;
        display: flex;
        justify-content: center;
        align-items: center;
        font-size: 5rem;
        font-weight: bold;
        cursor: pointer;
        color: #333;
        flex-shrink: 0;
    }

    /* 繰り上がり・繰り下がり用の小さなメモ枠 */
    .memo-zone {
        width: 50px;
        height: 50px;
        border: 3px dashed #e74c3c;
        background-color: #fff5f5;
        border-radius: 8px;
        display: flex;
        justify-content: center;
        align-items: center;
        font-size: 3rem;
        font-weight: bold;
        cursor: pointer;
        color: #e74c3c;
        align-self: center;
    }

    .instruction-red {
        color: red;
        font-size: 1.2rem;
        font-weight: bold;
        text-align: center;
        margin-bottom: 20px;
    }
    
    /* 判定ボタン */
    .check-btn {
        width: 80%;
        height: 80px;
        font-size: 2rem;
        cursor: pointer;
        border: 2px solid #00bfff;
        background-color: #00bfff;
        color: #fff;
        font-weight: bold;
        border-radius: 10px;
        outline: none;
        box-shadow: 0 5px 0 #0088cc;
        -webkit-tap-highlight-color: transparent;
        touch-action: manipulation;
        justify-self: center;
    }
    .check-btn:active {
        transform: translateY(5px);
        box-shadow: none;
    }
    .check-btn:disabled {
        opacity: 0.5;
        cursor: not-allowed;
        transform: translateY(5px);
        box-shadow: none;
    }
</style>
</head>
<body>

    <div id="canvas-wrapper">
        <div class="app-body">

            <!-- スタート画面 -->
            <div id="start-screen" class="start-screen">
                <h1>3桁の引き算（上級編）</h1>
                <button id="start-btn" class="start-btn">スタート</button>
                <div style="margin-top: 30px; text-align: center;">
                    <a href="index.html" class="menu-btn" style="background-color: #95a5a6;">メニューへ戻る</a>
                </div>
            </div>

            <!-- メイン画面 -->
            <div id="main-content" style="display: none;">
                <div class="top-nav">
                    <div class="toggle-group">
                        <label class="settings-toggle"><input type="checkbox" id="speech-checkbox" checked> スピーチON</label>
                        <label class="settings-toggle"><input type="checkbox" id="sound-checkbox" checked> 効果音ON</label>
                    </div>
                    <a href="index.html" class="back-btn">メニューへ戻る</a>
                </div>
                
                <div id="status-bar" class="status-bar"></div>
                <h1 id="question-title" class="question-title">・ つぎのひき算を求めましょう！</h1>
                
                <div id="app"></div>
                <div id="judge-overlay" class="judge-overlay"></div>
            </div>

        </div>
    </div>

    <!-- 共通JavaScriptの読み込み -->
    <script src="app-common.js"></script>
    <script src="calc-keyboard.js"></script>

    <script>
        // === 仮想キャンバスの自動スケール処理 ===
        let currentScale = 1;
        function resizeCanvas() {
            const wrapper = document.getElementById('canvas-wrapper');
            const appBody = document.querySelector('.app-body');
            if (!wrapper || !appBody) return;
            const scaleX = wrapper.clientWidth / 1024;
            const scaleY = wrapper.clientHeight / 768;
            currentScale = Math.min(scaleX, scaleY);
            appBody.style.transform = `scale(${currentScale})`;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        // ガイドメッセージ表示関数
        function showGuideMessage(msg, speakMsg) {
            AppAudio.speak(speakMsg || msg);
            let guideEl = document.getElementById('guide-toast');
            if (!guideEl) {
                guideEl = document.createElement('div');
                guideEl.id = 'guide-toast';
                guideEl.style.cssText = `
                    position: fixed;
                    bottom: 80px;
                    left: 50%;
                    transform: translateX(-50%);
                    background-color: rgba(44, 62, 80, 0.95);
                    color: #fff;
                    padding: 14px 28px;
                    border-radius: 30px;
                    font-size: 1.3rem;
                    font-weight: bold;
                    z-index: 9998;
                    pointer-events: none;
                    transition: opacity 0.3s ease;
                    text-align: center;
                    box-shadow: 0 4px 15px rgba(0,0,0,0.3);
                    white-space: nowrap;
                `;
                document.body.appendChild(guideEl);
            }
            guideEl.textContent = msg;
            guideEl.style.opacity = '1';
            clearTimeout(guideEl.timer);
            guideEl.timer = setTimeout(() => {
                guideEl.style.opacity = '0';
            }, 2500);
        }

        /* ==========================================
           問題生成と判定ロジック (3桁 - 1〜3桁)
           ========================================== */
        const problems = [];
        const seen = new Set();
        
        // 1桁の引き算 (2問)
        while (problems.length < 2) {
            const a = Math.floor(Math.random() * 900) + 100; // 100〜999
            const b = Math.floor(Math.random() * 9) + 1;     // 1〜9
            const key = `${a}-${b}`;
            if (!seen.has(key)) {
                seen.add(key);
                problems.push({ n1: a, n2: b });
            }
        }
        
        // 2桁の引き算 (3問)
        while (problems.length < 5) {
            const a = Math.floor(Math.random() * 900) + 100; // 100〜999
            const b = Math.floor(Math.random() * 90) + 10;   // 10〜99
            const key = `${a}-${b}`;
            if (!seen.has(key)) {
                seen.add(key);
                problems.push({ n1: a, n2: b });
            }
        }
        
        // 3桁の引き算 (5問)
        while (problems.length < 10) {
            const a = Math.floor(Math.random() * 900) + 100; // 100〜999
            const b = Math.floor(Math.random() * 900) + 100; // 100〜999
            if (a > b) {
                const key = `${a}-${b}`;
                if (!seen.has(key)) {
                    seen.add(key);
                    problems.push({ n1: a, n2: b });
                }
            }
        }
        
        // 問題をランダムにシャッフル
        for (let i = problems.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [problems[i], problems[j]] = [problems[j], problems[i]];
        }

        let currentIndex = 0;
        let mistakeCount = 0;
        const appContainer = document.getElementById('app');
        let problemStartTime;

        function renderProblem() {
            appContainer.innerHTML = '';
            problemStartTime = new Date();

            if (currentIndex >= problems.length) {
                document.getElementById('status-bar').style.display = 'none';
                document.getElementById('question-title').style.display = 'none';
                
                const clearMsg = document.createElement('div');
                clearMsg.className = 'clear-message';
                
                let htmlContent = `<h2>全10問合格！！</h2>`;
                htmlContent += `<div class="final-result-details">`;
                htmlContent += `<div>間違えた回数： <strong>${mistakeCount}</strong> 回</div>`;
                if (mistakeCount === 0) {
                    htmlContent += `<div style="color: blue; font-weight: bold; margin-top: 15px;">パーフェクトです！素晴らしい成績です。</div>`;
                }
                htmlContent += `</div>`;
                htmlContent += `<div style="margin-top: 25px;">`;
                htmlContent += `<button class="retry-btn" onclick="location.reload()">もう一度挑戦する</button>`;
                htmlContent += `<a href="view.html" class="menu-btn" style="background-color: #2ecc71; margin-right: 15px;">履歴を見る</a>`;
                htmlContent += `<a href="index.html" class="menu-btn">メニューへ戻る</a>`;
                htmlContent += `</div>`;
                
                clearMsg.innerHTML = htmlContent;
                appContainer.appendChild(clearMsg);
                AppAudio.speak("ぜんもんごうかくです。おつかれさまでした。");
                return;
            }

            document.getElementById('status-bar').style.display = 'block';
            document.getElementById('question-title').style.display = 'block';
            document.getElementById('status-bar').textContent = `第 ${currentIndex + 1} 問 / 全 10 問`;

            const prob = problems[currentIndex];
            AppAudio.speak(`つぎのひきざんをもとめましょう。${prob.n1} ひく ${prob.n2} は`);
            AppAudio.playQ();

            // 問題エリア
            const container = document.createElement('div');
            container.className = 'problem-container';

            // --- ひっ算エリア ---
            const hissanArea = document.createElement('div');
            hissanArea.className = 'hissan-wrapper';
            
            const n1Str = prob.n1.toString();
            const n2Str = prob.n2.toString();
            const correctAns = prob.n1 - prob.n2;
            const ansLength = correctAns.toString().length;

            // 第1項 (3桁)
            const n1Hundreds = document.createElement('div');
            n1Hundreds.textContent = n1Str[0];
            n1Hundreds.style.gridColumn = '2'; 
            n1Hundreds.style.gridRow = '2';

            const n1Tens = document.createElement('div');
            n1Tens.textContent = n1Str[1];
            n1Tens.style.gridColumn = '3'; 
            n1Tens.style.gridRow = '2';

            const n1Ones = document.createElement('div');
            n1Ones.textContent = n1Str[2];
            n1Ones.style.gridColumn = '4'; 
            n1Ones.style.gridRow = '2';

            // 繰り下がりの判定
            const hasCarry1 = (prob.n1 % 10) < (prob.n2 % 10);
            const n1_10 = Math.floor((prob.n1 % 100) / 10);
            const n2_10 = Math.floor((prob.n2 % 100) / 10);
            const hasCarry10 = (n1_10 - (hasCarry1 ? 1 : 0)) < n2_10;

            // 一の位からの繰り下がりメモ枠 (十の位の上：列3)
            if (hasCarry1) {
                const memoBox1 = document.createElement('div');
                memoBox1.className = 'memo-zone';
                memoBox1.style.gridColumn = '3'; 
                memoBox1.style.gridRow = '1';    
                memoBox1.addEventListener('click', () => { 
                    CalcKeyboard.open(memoBox1);
                });
                
                // MutationObserverで入力状態を監視して十の位の斜線を切り替え
                const observer1 = new MutationObserver(() => {
                    if (memoBox1.textContent.trim() !== '') {
                        n1Tens.style.textDecoration = 'line-through';
                        n1Tens.style.textDecorationThickness = '6px';
                        n1Tens.style.textDecorationColor = '#e74c3c';
                        n1Tens.style.color = '#7f8c8d';
                    } else {
                        n1Tens.style.textDecoration = 'none';
                        n1Tens.style.color = '#333';
                    }
                });
                observer1.observe(memoBox1, { childList: true, characterData: true, subtree: true });

                hissanArea.appendChild(memoBox1);
            }

            // 十の位からの繰り下がりメモ枠 (百の位の上：列2)
            if (hasCarry10) {
                const memoBox10 = document.createElement('div');
                memoBox10.className = 'memo-zone';
                memoBox10.style.gridColumn = '2'; 
                memoBox10.style.gridRow = '1';    
                memoBox10.addEventListener('click', () => { 
                    CalcKeyboard.open(memoBox10);
                });
                
                // MutationObserverで入力状態を監視して百の位の斜線を切り替え
                const observer10 = new MutationObserver(() => {
                    if (memoBox10.textContent.trim() !== '') {
                        n1Hundreds.style.textDecoration = 'line-through';
                        n1Hundreds.style.textDecorationThickness = '6px';
                        n1Hundreds.style.textDecorationColor = '#e74c3c';
                        n1Hundreds.style.color = '#7f8c8d';
                    } else {
                        n1Hundreds.style.textDecoration = 'none';
                        n1Hundreds.style.color = '#333';
                    }
                });
                observer10.observe(memoBox10, { childList: true, characterData: true, subtree: true });

                hissanArea.appendChild(memoBox10);
            }

            hissanArea.appendChild(n1Hundreds);
            hissanArea.appendChild(n1Tens);
            hissanArea.appendChild(n1Ones);

            // 第2項 －記号つき
            const opMinus = document.createElement('div');
            opMinus.textContent = 'ー';
            opMinus.style.gridColumn = '1';
            opMinus.style.gridRow = '3';
            opMinus.style.color = '#555';
            hissanArea.appendChild(opMinus);

            // 第2項 各桁の配置（引く数の桁数に応じて動的に生成）
            if (n2Str.length >= 1) {
                const n2Ones = document.createElement('div');
                n2Ones.textContent = n2Str[n2Str.length - 1];
                n2Ones.style.gridColumn = '4'; 
                n2Ones.style.gridRow = '3';
                hissanArea.appendChild(n2Ones);
            }
            if (n2Str.length >= 2) {
                const n2Tens = document.createElement('div');
                n2Tens.textContent = n2Str[n2Str.length - 2];
                n2Tens.style.gridColumn = '3'; 
                n2Tens.style.gridRow = '3';
                hissanArea.appendChild(n2Tens);
            }
            if (n2Str.length >= 3) {
                const n2Hundreds = document.createElement('div');
                n2Hundreds.textContent = n2Str[n2Str.length - 3];
                n2Hundreds.style.gridColumn = '2'; 
                n2Hundreds.style.gridRow = '3';
                hissanArea.appendChild(n2Hundreds);
            }

            // 横線
            const hissanLine = document.createElement('div');
            hissanLine.className = 'hissan-line';
            hissanLine.style.gridColumn = '1 / span 4'; 
            hissanLine.style.gridRow = '4';
            hissanArea.appendChild(hissanLine);

            // 解答枠 (桁数に合わせて生成)
            for (let i = 0; i < ansLength; i++) {
                const box = document.createElement('div');
                box.className = 'drop-zone';
                box.id = `ans-box-${i}`;
                
                // ansLengthに応じて右詰め (列4が一の位、列3が十の位、列2が百の位)
                let col = 4 - (ansLength - 1 - i);
                box.style.gridColumn = col.toString();
                box.style.gridRow = '5';

                box.addEventListener('click', () => { 
                    CalcKeyboard.open(box);
                });
                hissanArea.appendChild(box);
            }

            // 「できた！」ボタンを解答枠の右側（列5）に配置
            const checkBtn = document.createElement('button');
            checkBtn.className = 'check-btn';
            checkBtn.textContent = 'できた！';
            checkBtn.style.gridColumn = '5';
            checkBtn.style.gridRow = '5';
            hissanArea.appendChild(checkBtn);

            container.appendChild(hissanArea);

            const instruction = document.createElement('div');
            instruction.className = 'instruction-red';
            container.appendChild(instruction);
            
            appContainer.appendChild(container);

            // 判定処理
            checkBtn.addEventListener('click', () => {
                let uAnsStr = '';
                let allFilled = true;
                
                // メモ枠は評価に含めず、解答枠のみを判定
                for (let i = 0; i < ansLength; i++) {
                    const box = document.getElementById(`ans-box-${i}`);
                    if (!box || box.textContent.trim() === '') {
                        allFilled = false;
                        break;
                    }
                    uAnsStr += box.textContent.trim();
                }

                // 未入力時の案内
                if (!allFilled) {
                    showGuideMessage('数字を入力してね！', 'すうじをにゅうりょくしてね');
                    return;
                }

                const uAns = parseInt(uAnsStr, 10);
                const isCorrect = (uAns === correctAns);

                // --- 共通モジュール(AppLogger)によるCSV履歴保存 ---
                AppLogger.save({
                    storageKey: "subtraction_3digits_history",
                    problemType: "3桁の引き算（上級編）",
                    problemContent: `${prob.n1} - ${prob.n2}`,
                    userAnswer: uAns.toString(),
                    startTime: problemStartTime,
                    endTime: new Date(),
                    inputMethod: "計算機入力",
                    isCorrect: isCorrect
                });

                const overlayJudge = document.getElementById('judge-overlay');
                if (isCorrect) {
                    overlayJudge.textContent = 'せいかい！';
                    overlayJudge.className = 'judge-overlay show';
                    AppAudio.speak("せいかい！");
                    AppAudio.playOk();
                    
                    checkBtn.disabled = true;
                    setTimeout(() => { overlayJudge.classList.remove('show'); }, 1200);
                    setTimeout(() => { currentIndex++; renderProblem(); }, 1500);
                } else {
                    overlayJudge.textContent = 'おしい！';
                    overlayJudge.className = 'judge-overlay incorrect show';
                    AppAudio.speak("おしい！");
                    AppAudio.playNg();
                    mistakeCount++;
                    setTimeout(() => { overlayJudge.classList.remove('show'); }, 1200);
                }
            });
        }

        document.getElementById('start-btn').addEventListener('click', () => {
            document.getElementById('start-screen').style.display = 'none';
            document.getElementById('main-content').style.display = 'block';
            renderProblem();
        });

    </script>
</body>
</html>
