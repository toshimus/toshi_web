<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>2桁×1桁のかけ算（ひっ算）</title>
<style>
    html, body {
        height: 100%;
        overflow: hidden;
        position: fixed;
        width: 100%;
    }
    body {
        font-family: "Helvetica Neue", Arial, "Hiragino Kaku Gothic ProN", "Hiragino Sans", Meiryo, sans-serif;
        margin: 0;
        padding: 20px;
        background-color: #ffffff;
        color: #333;
        touch-action: none;
        box-sizing: border-box;
        user-select: none;
        -webkit-user-select: none;
    }
    
    /* スタート画面 */
    .start-screen {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background-color: #f0f8ff;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        z-index: 10000;
    }
    .start-screen h1 {
        font-size: 3rem;
        color: #2c3e50;
        margin-bottom: 40px;
    }
    .start-btn {
        padding: 20px 60px;
        font-size: 2.5rem;
        font-weight: bold;
        color: #fff;
        background-color: #3498db;
        border: none;
        border-radius: 15px;
        cursor: pointer;
        box-shadow: 0 8px 0 #2980b9;
        transition: transform 0.1s, box-shadow 0.1s;
        -webkit-tap-highlight-color: transparent;
    }
    .start-btn:active {
        transform: translateY(8px);
        box-shadow: none;
    }

    .status-bar {
        font-size: 1.4rem;
        font-weight: bold;
        margin-bottom: 10px;
        color: #555;
    }
    .question-title {
        font-size: 1.8rem;
        font-weight: bold;
        margin-top: 5px;
        margin-bottom: 20px;
    }

    /* 左右分割用のコンテナ */
    .problem-container {
        display: flex;
        flex-direction: row;
        width: 100%;
        max-width: 950px;
        margin: 0 auto;
        align-items: flex-end;
        justify-content: center;
        gap: 50px;
    }

    /* ひっ算エリア */
    .hissan-wrapper {
        display: grid;
        grid-template-columns: 80px 80px 80px; /* 百の位(×), 十の位, 一の位 */
        grid-template-rows: auto auto auto 50px auto; /* 1項目, 2項目, 横線, メモ, 答え */
        row-gap: 10px; /* 少し詰めて一体感を出す */
        column-gap: 15px;
        align-items: center;
        justify-items: center;
        font-size: 5rem;
        font-weight: bold;
        background-color: #f9f9f9;
        padding: 30px 40px;
        border-radius: 12px;
        border: 2px solid #eee;
        margin: 0;
        align-self: flex-start; /* 上揃え */
    }

    .hissan-line {
        width: 100%;
        height: 6px;
        background-color: #333;
        margin: 5px 0;
    }

    /* 繰り上がり用の小さなメモ枠（解答欄の上に配置） */
    .memo-zone {
        width: 45px;
        height: 45px;
        border: 3px dashed #e74c3c;
        background-color: #fff5f5;
        border-radius: 8px;
        display: flex;
        justify-content: center;
        align-items: center;
        font-size: 2.5rem;
        font-weight: bold;
        cursor: pointer;
        color: #e74c3c;
        align-self: center;
    }

    /* ドロップゾーン（解答の□） */
    .drop-zone {
        width: 80px;
        height: 90px;
        border: 4px dashed #3498db;
        background-color: #f0f8ff;
        border-radius: 12px;
        display: flex;
        justify-content: center;
        align-items: center;
        font-size: 5rem;
        font-weight: bold;
        cursor: pointer;
        color: #333;
        flex-shrink: 0;
    }

    /* 右側パネル（ヒントとできたボタン） */
    .right-panel {
        display: flex;
        flex-direction: column;
        justify-content: flex-start;
        flex: 1;
        max-width: 480px;
    }

    .hint-wrapper {
        display: flex;
        flex-direction: column;
        gap: 20px;
        margin-top: 10px;
        margin-bottom: 40px;
    }

    .hint-line {
        display: flex;
        align-items: center;
        gap: 10px;
        font-size: 2.8rem;
        font-weight: bold;
        color: #333;
        opacity: 0;
        transform: translateX(-20px);
        transition: opacity 0.3s ease, transform 0.3s ease;
    }

    .hint-line.show {
        opacity: 1;
        transform: translateX(0);
    }

    .circle {
        display: inline-flex;
        justify-content: center;
        align-items: center;
        width: 45px;
        height: 45px;
        border-radius: 50%;
        color: white;
        font-size: 2.2rem;
        font-weight: bold;
        padding-bottom: 2px;
        box-sizing: border-box;
    }
    .circle.pink { background-color: #ff7675; }
    .circle.green { background-color: #55efc4; color: #2d3436; }
    .text-blue { color: #0984e3; }

    /* タップできる数字 */
    .clickable-digit {
        cursor: pointer;
        border-bottom: 6px dashed;
        transition: transform 0.1s, color 0.3s;
    }
    .clickable-digit:active {
        transform: scale(0.9);
    }

    .instruction-red {
        color: red;
        font-size: 1.2rem;
        font-weight: bold;
        text-align: center;
        margin-bottom: 20px;
        margin-top: 20px;
    }
    
    /* 判定ボタン */
    .check-btn {
        width: auto;
        padding: 0 40px;
        height: 90px;
        font-size: 2.2rem;
        cursor: pointer;
        border: 2px solid #00bfff;
        background-color: #00bfff;
        color: #fff;
        font-weight: bold;
        border-radius: 10px;
        outline: none;
        box-shadow: 0 5px 0 #0088cc;
        -webkit-tap-highlight-color: transparent;
        touch-action: manipulation;
        white-space: nowrap;
        align-self: flex-start;
    }
    .check-btn:active {
        transform: translateY(5px);
        box-shadow: none;
    }
    .check-btn:disabled {
        opacity: 0.5;
        cursor: not-allowed;
        transform: translateY(5px);
        box-shadow: none;
    }
    
    .judge-overlay {
        position: fixed;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%) scale(0.7);
        opacity: 0;
        visibility: hidden;
        background-color: transparent;
        color: #ff3333;
        font-size: 7rem;
        font-weight: bold;
        padding: 30px 60px;
        -webkit-text-stroke: 3px #000;
        text-shadow: 4px 4px 10px rgba(0, 0, 0, 0.5);
        z-index: 9999;
        pointer-events: none;
        transition: opacity 0.3s ease, transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275), visibility 0.3s;
        white-space: nowrap; 
    }
    .judge-overlay.show { opacity: 1; visibility: visible; transform: translate(-50%, -50%) scale(1.0); }
    .judge-overlay.incorrect { color: #3366ff; }
    
    .clear-message { text-align: center; margin-top: 20px; padding: 25px; background-color: #f8f9fa; border-radius: 12px; border: 2px solid #a0c4ff; }
    .clear-message h2 { font-size: 2rem; color: #d9534f; margin-top: 0; margin-bottom: 20px; }
    .final-result-details { font-size: 1.4rem; color: #333; line-height: 1.8; }
    .menu-btn, .retry-btn { margin-top: 20px; padding: 12px 30px; font-size: 1.2rem; cursor: pointer; border: none; border-radius: 8px; outline: none; touch-action: manipulation; text-decoration: none; display: inline-block; font-weight: bold;}
    .retry-btn { background-color: #a0c4ff; color: #fff; margin-right: 15px; }
    .menu-btn { background-color: #95a5a6; color: #fff; }
    
    .top-nav { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
    .toggle-group { display: flex; gap: 15px; }
    .settings-toggle { font-size: 1.1rem; color: #555; cursor: pointer; display: flex; align-items: center; -webkit-tap-highlight-color: transparent; }
    .settings-toggle input { transform: scale(1.3); margin-right: 8px; cursor: pointer; }
    .back-btn { padding: 8px 15px; background-color: #ecf0f1; border: 1px solid #bdc3c7; border-radius: 5px; text-decoration: none; color: #2c3e50; font-size: 0.9rem; touch-action: manipulation; }

    /* 計算機パネル */
    .pieces-container { display: none; justify-content: center; align-items: center; flex-wrap: wrap; gap: 10px; padding: 20px; background-color: #ecf0f1; border-radius: 12px; width: 300px; margin: 0 auto; box-sizing: border-box; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); box-shadow: 0 10px 25px rgba(0,0,0,0.3); z-index: 1000; cursor: grab; }
    .pieces-container:active { cursor: grabbing; }
    .piece { flex: 1 1 25%; height: 70px; border: 2px solid #2c3e50; background-color: #f1c40f; border-radius: 10px; display: flex; justify-content: center; align-items: center; font-size: 2rem; font-weight: bold; cursor: pointer; color: #2c3e50; box-shadow: 0 4px 0 #d4ac0d; touch-action: manipulation; box-sizing: border-box; }
    .piece:active { transform: translateY(4px); box-shadow: none; }
    .piece.delete-btn { background-color: #e74c3c; color: white; border-color: #c0392b; box-shadow: 0 4px 0 #c0392b; font-size: 1.4rem; }
    .piece.enter-btn { background-color: #95a5a6; color: white; border-color: #7f8c8d; box-shadow: 0 4px 0 #7f8c8d; font-size: 1.4rem; }
    
    .overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.4); z-index: 999; }

    /* スマホ向けレイアウト調整 */
    @media (max-width: 768px) {
        .problem-container {
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }
        .right-panel {
            width: 100%;
            max-width: 100%;
            align-items: center;
        }
        .check-btn {
            align-self: center;
        }
    }
</style>
</head>
<body>

    <div id="start-screen" class="start-screen">
        <h1>2桁×1桁のかけ算（ひっ算）</h1>
        <button id="start-btn" class="start-btn">スタート</button>
        <BR><BR><a href="index.html" class="menu-btn" style="margin-top: 20px; background-color: #95a5a6;">メニューへ戻る</a>
    </div>

    <div id="main-content" style="display: none;">
        <div class="top-nav">
            <div class="toggle-group">
                <label class="settings-toggle"><input type="checkbox" id="speech-checkbox" checked> スピーチON</label>
                <label class="settings-toggle"><input type="checkbox" id="sound-checkbox" checked> 効果音ON</label>
            </div>
            <a href="index.html" class="back-btn">メニューへ戻る</a>
        </div>
        
        <div id="status-bar" class="status-bar"></div>
        <h1 class="question-title">・ つぎのかけ算を求めましょう！</h1>
        
        <div id="app"></div>
        <div id="judge-overlay" class="judge-overlay"></div>

        <div class="overlay" id="overlay"></div>
        <div class="pieces-container" id="calc-container"></div>
    </div>

    <script>
        const okSound = new Audio('ok.mp3');
        const ngSound = new Audio('ng.mp3');
        const qSound = new Audio('q.mp3');

        function speak(text) {
            const speechCheckbox = document.getElementById('speech-checkbox');
            if (speechCheckbox && !speechCheckbox.checked) return; 
            window.speechSynthesis.cancel(); 
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'ja-JP';
            window.speechSynthesis.speak(utterance);
        }

        const numberReadings = [
            "ぜろ", "いち", "に", "さん", "よん", "ご", "ろく", "なな", "はち", "きゅう", "じゅう"
        ];

        // 九九専用の読み上げ辞書
        const kukuReadings = {
            1: { 1: ["いんいちが", "いち"], 2: ["いんにが", "に"], 3: ["いんさんが", "さん"], 4: ["いんしが", "し"], 5: ["いんごが", "ご"], 6: ["いんろくが", "ろく"], 7: ["いんしちが", "しち"], 8: ["いんはちが", "はち"], 9: ["いんくが", "く"] },
            2: { 1: ["にいちが", "に"], 2: ["ににんが", "し"], 3: ["にさんが", "ろく"], 4: ["にしが", "はち"], 5: ["にご", "じゅう"], 6: ["にろく", "じゅうに"], 7: ["にしち", "じゅうし"], 8: ["にはち", "じゅうろく"], 9: ["にく", "じゅうはち"] },
            3: { 1: ["さんいちが", "さん"], 2: ["さんにが", "ろく"], 3: ["さざんが", "きゅう"], 4: ["さんし", "じゅうに"], 5: ["さんご", "じゅうご"], 6: ["さぶろく", "じゅうはち"], 7: ["さんしち", "にじゅういち"], 8: ["さんぱ", "にじゅうし"], 9: ["さんく", "にじゅうしち"] },
            4: { 1: ["しいちが", "し"], 2: ["しにが", "はち"], 3: ["しさん", "じゅうに"], 4: ["しし", "じゅうろく"], 5: ["しご", "にじゅう"], 6: ["しろく", "にじゅうし"], 7: ["ししち", "にじゅうはち"], 8: ["しはち", "さんじゅうに"], 9: ["しく", "さんじゅうろく"] },
            5: { 1: ["ごいちが", "ご"], 2: ["ごに", "じゅう"], 3: ["ごさん", "じゅうご"], 4: ["ごし", "にじゅう"], 5: ["ごご", "にじゅうご"], 6: ["ごろく", "さんじゅう"], 7: ["ごしち", "さんじゅうご"], 8: ["ごはち", "よんじゅう"], 9: ["ごっく", "しじゅうご"] },
            6: { 1: ["ろくいちが", "ろく"], 2: ["ろくに", "じゅうに"], 3: ["ろくさん", "じゅうはち"], 4: ["ろくし", "にじゅうし"], 5: ["ろくご", "さんじゅう"], 6: ["ろくろく", "さんじゅうろく"], 7: ["ろくしち", "しじゅうに"], 8: ["ろくはち", "しじゅうはち"], 9: ["ろっく", "ごじゅうし"] },
            7: { 1: ["しちいちが", "しち"], 2: ["しちに", "じゅうし"], 3: ["しちさん", "にじゅういち"], 4: ["しちし", "にじゅうはち"], 5: ["しちご", "さんじゅうご"], 6: ["しちろく", "しじゅうに"], 7: ["しちしち", "しじゅうく"], 8: ["しちは", "ごじゅうろく"], 9: ["しちく", "ろくじゅうさん"] },
            8: { 1: ["はちいちが", "はち"], 2: ["はちに", "じゅうろく"], 3: ["はちさん", "にじゅうし"], 4: ["はちし", "さんじゅうに"], 5: ["はちご", "よんじゅう"], 6: ["はちろく", "しじゅうはち"], 7: ["はちしち", "ごじゅうろく"], 8: ["はっぱ", "ろくじゅうし"], 9: ["はっく", "しちじゅうに"] },
            9: { 1: ["くいちが", "く"], 2: ["くに", "じゅうはち"], 3: ["くさん", "にじゅうしち"], 4: ["くし", "さんじゅうろく"], 5: ["くご", "しじゅうご"], 6: ["くろく", "ごじゅうし"], 7: ["くしち", "ろくじゅうさん"], 8: ["くはち", "しちじゅうに"], 9: ["くく", "はちじゅういち"] }
        };

        function playKuku(n1, n2) {
            if (n1 === 0) {
                speak("ぜろ");
            } else {
                const yomi1 = kukuReadings[n1][n2][0];
                const yomi2 = kukuReadings[n1][n2][1];
                speak(`${yomi1}、${yomi2}`);
            }
        }

        /* ==========================================
           計算機パネルの構築（即決パターン・表示なし）
           ========================================== */
        const overlay = document.getElementById('overlay');
        const calcContainer = document.getElementById('calc-container');
        let activeInputBox = null;

        const calcKeys = [
            '7', '8', '9',
            '4', '5', '6',
            '1', '2', '3',
            '0', '削除', 'とじる'
        ];

        calcKeys.forEach(key => {
            const piece = document.createElement('div');
            piece.className = 'piece';
            piece.textContent = key;
            
            if (key === '削除') {
                piece.classList.add('delete-btn');
                piece.addEventListener('click', () => {
                    if (activeInputBox) {
                        activeInputBox.textContent = ''; 
                    }
                });
            } else if (key === 'とじる') {
                piece.classList.add('enter-btn');
                piece.addEventListener('click', () => {
                    calcContainer.style.display = 'none';
                    overlay.style.display = 'none';
                    activeInputBox = null;
                });
            } else {
                piece.addEventListener('click', () => {
                    if (activeInputBox) {
                        activeInputBox.textContent = key; 
                        
                        const parsedVal = parseInt(key, 10);
                        if (parsedVal >= 0 && parsedVal <= 9) {
                            speak(numberReadings[parsedVal]);
                        } else {
                            speak(key);
                        }

                        calcContainer.style.display = 'none';
                        overlay.style.display = 'none';
                        activeInputBox = null;
                    }
                });
            }
            calcContainer.appendChild(piece);
        });

        overlay.addEventListener('click', () => {
            calcContainer.style.display = 'none';
            overlay.style.display = 'none';
            activeInputBox = null;
        });

        let isCalcDragging = false;
        let calcDragStartX, calcDragStartY, calcInitialLeft, calcInitialTop;

        function startCalcDrag(e) {
            if (e.target.classList.contains('piece')) return;
            isCalcDragging = true;
            let clientX = e.touches ? e.touches[0].clientX : e.clientX;
            let clientY = e.touches ? e.touches[0].clientY : e.clientY;
            calcDragStartX = clientX;
            calcDragStartY = clientY;
            let style = window.getComputedStyle(calcContainer);
            calcInitialLeft = parseFloat(style.left);
            calcInitialTop = parseFloat(style.top);
        }

        function doCalcDrag(e) {
            if (!isCalcDragging) return;
            e.preventDefault();
            let clientX = e.touches ? e.touches[0].clientX : e.clientX;
            let clientY = e.touches ? e.touches[0].clientY : e.clientY;
            let dx = clientX - calcDragStartX;
            let dy = clientY - calcDragStartY;
            calcContainer.style.left = (calcInitialLeft + dx) + 'px';
            calcContainer.style.top = (calcInitialTop + dy) + 'px';
        }

        function stopCalcDrag() {
            isCalcDragging = false;
        }

        calcContainer.addEventListener('mousedown', startCalcDrag);
        document.addEventListener('mousemove', doCalcDrag, { passive: false });
        document.addEventListener('mouseup', stopCalcDrag);
        calcContainer.addEventListener('touchstart', startCalcDrag, { passive: false });
        document.addEventListener('touchmove', doCalcDrag, { passive: false });
        document.addEventListener('touchend', stopCalcDrag);

        /* ==========================================
           問題生成と判定ロジック (2桁 × 1桁)
           ========================================== */
        const problems = [];
        const seen = new Set();
        while (problems.length < 10) {
            const a = Math.floor(Math.random() * 90) + 10; // 10〜99
            const b = Math.floor(Math.random() * 8) + 2;   // 2〜9 (1の段は除外)
            const key = `${a}x${b}`;
            if (!seen.has(key)) {
                seen.add(key);
                problems.push({ n1: a, n2: b });
            }
        }

        let currentIndex = 0;
        let mistakeCount = 0;
        const appContainer = document.getElementById('app');
        let problemStartTime;

        function formatTime(date) {
            return date.getHours().toString().padStart(2, '0') + ':' + 
                   date.getMinutes().toString().padStart(2, '0') + ':' + 
                   date.getSeconds().toString().padStart(2, '0');
        }

        function renderProblem() {
            appContainer.innerHTML = '';
            problemStartTime = new Date();

            if (currentIndex >= problems.length) {
                document.getElementById('status-bar').style.display = 'none';
                document.querySelector('.question-title').style.display = 'none';
                
                const clearMsg = document.createElement('div');
                clearMsg.className = 'clear-message';
                
                let htmlContent = `<h2>全10問合格！！</h2>`;
                htmlContent += `<div class="final-result-details">`;
                htmlContent += `<div>間違えた回数： <strong>${mistakeCount}</strong> 回</div>`;
                if (mistakeCount === 0) {
                    htmlContent += `<div style="color: blue; font-weight: bold; margin-top: 15px;">パーフェクトです！素晴らしい成績です。</div>`;
                }
                htmlContent += `</div>`;
                htmlContent += `<button class="retry-btn" onclick="location.reload()">もう一度挑戦する</button>`;
                htmlContent += `<a href="index.html" class="menu-btn">メニューへ戻る</a>`;
                
                clearMsg.innerHTML = htmlContent;
                appContainer.appendChild(clearMsg);
                speak("ぜんもんごうかくです。おつかれさまでした。");
                return;
            }

            document.getElementById('status-bar').style.display = 'block';
            document.getElementById('status-bar').textContent = `第 ${currentIndex + 1} 問 / 全 10 問`;

            const prob = problems[currentIndex];
            speak(`つぎのかけざんをもとめましょう。${prob.n1} かける ${prob.n2} は`);

            const soundCheckbox = document.getElementById('sound-checkbox');
            if (soundCheckbox && soundCheckbox.checked) {
                qSound.currentTime = 0; qSound.play().catch(e => {});
            }

            // 全体を囲むコンテナ（左右分割）
            const container = document.createElement('div');
            container.className = 'problem-container';

            // --- 左側：ひっ算エリア ---
            const hissanArea = document.createElement('div');
            hissanArea.className = 'hissan-wrapper';
            
            const n1Str = prob.n1.toString();
            const n2Str = prob.n2.toString();
            const correctAns = prob.n1 * prob.n2;
            const ansLength = correctAns.toString().length;

            const n1TensVal = Math.floor(prob.n1 / 10);
            const n1OnesVal = prob.n1 % 10;
            const n2Val = prob.n2;

            // 繰り上がりの判定 (一の位の掛け算で10以上になるか)
            const hasCarry = n1OnesVal * n2Val >= 10;

            // 第1項 (2桁) 十の位
            const n1Tens = document.createElement('div');
            n1Tens.textContent = n1Str[0];
            n1Tens.style.gridColumn = '2'; 
            n1Tens.style.gridRow = '1';
            n1Tens.className = 'clickable-digit';
            n1Tens.style.borderBottomColor = '#55efc4'; // 緑の破線

            // 第1項 1の位
            const n1Ones = document.createElement('div');
            n1Ones.textContent = n1Str[1];
            n1Ones.style.gridColumn = '3'; 
            n1Ones.style.gridRow = '1';
            n1Ones.className = 'clickable-digit';
            n1Ones.style.borderBottomColor = '#ff7675'; // ピンクの破線

            // 第2項 ×記号つき
            const opMul = document.createElement('div');
            opMul.textContent = '×';
            opMul.style.gridColumn = '1';
            opMul.style.gridRow = '2';
            opMul.style.color = '#555';

            // 第2項 1の位
            const n2Ones = document.createElement('div');
            n2Ones.textContent = n2Str;
            n2Ones.style.gridColumn = '3'; 
            n2Ones.style.gridRow = '2';
            n2Ones.className = 'text-blue';

            // 横線
            const hissanLine = document.createElement('div');
            hissanLine.className = 'hissan-line';
            hissanLine.style.gridColumn = '1 / span 3'; 
            hissanLine.style.gridRow = '3';

            // 繰り上がりメモ枠 (十の位の列、横線の下、解答欄の少し上)
            if (hasCarry) {
                const memoBox = document.createElement('div');
                memoBox.className = 'memo-zone';
                memoBox.style.gridColumn = '2'; 
                memoBox.style.gridRow = '4';    
                memoBox.addEventListener('click', () => { 
                    memoBox.textContent = ''; 
                    activeInputBox = memoBox;
                    calcContainer.style.display = 'flex';
                    overlay.style.display = 'block';
                });
                hissanArea.appendChild(memoBox);
            }

            hissanArea.appendChild(n1Tens);
            hissanArea.appendChild(n1Ones);
            hissanArea.appendChild(opMul);
            hissanArea.appendChild(n2Ones);
            hissanArea.appendChild(hissanLine);

            // 解答枠 (桁数に合わせて生成、row: 5)
            for (let i = 0; i < ansLength; i++) {
                const box = document.createElement('div');
                box.className = 'drop-zone';
                box.id = `ans-box-${i}`;
                
                // ansLengthに応じて右詰め
                let col = 4 - (ansLength - i);
                box.style.gridColumn = col.toString();
                box.style.gridRow = '5';

                box.addEventListener('click', () => { 
                    box.textContent = ''; 
                    activeInputBox = box;
                    calcContainer.style.display = 'flex';
                    overlay.style.display = 'block';
                });
                hissanArea.appendChild(box);
            }

            // --- 右側パネル：ヒントエリアとボタン ---
            const rightPanel = document.createElement('div');
            rightPanel.className = 'right-panel';

            const hintWrapper = document.createElement('div');
            hintWrapper.className = 'hint-wrapper';

            // 一の位のヒント行
            const hintOnes = document.createElement('div');
            hintOnes.className = 'hint-line';
            hintOnes.innerHTML = `<div class="circle pink">${n1OnesVal}</div> <span>×</span> <span class="text-blue">${n2Val}</span> <span>=</span> <span>${n1OnesVal * n2Val}</span>`;

            // 十の位のヒント行
            const hintTens = document.createElement('div');
            hintTens.className = 'hint-line';
            hintTens.innerHTML = `<div class="circle green">${n1TensVal}</div> <span>×</span> <span class="text-blue">${n2Val}</span> <span>=</span> <span>${n1TensVal * n2Val}</span>`;

            hintWrapper.appendChild(hintOnes);
            hintWrapper.appendChild(hintTens);

            // できたボタン
            const checkBtn = document.createElement('button');
            checkBtn.className = 'check-btn';
            checkBtn.textContent = 'できた！';

            rightPanel.appendChild(hintWrapper);
            rightPanel.appendChild(checkBtn);

            // タップイベントの登録
            n1Ones.addEventListener('click', function() {
                if (this.dataset.clicked === "true") return;
                this.dataset.clicked = "true";
                this.style.borderBottom = 'none';
                this.style.color = '#ff7675';
                
                hintOnes.classList.add('show');
                playKuku(n1OnesVal, n2Val);
            });

            n1Tens.addEventListener('click', function() {
                if (this.dataset.clicked === "true") return;
                this.dataset.clicked = "true";
                this.style.borderBottom = 'none';
                this.style.color = '#00b894';
                
                hintTens.classList.add('show');
                playKuku(n1TensVal, n2Val);
            });

            // コンテナへの組み込み
            container.appendChild(hissanArea);
            container.appendChild(rightPanel);

            // ヒントのテキスト追加
            const instruction = document.createElement('div');
            instruction.className = 'instruction-red';
            instruction.innerHTML = '点線がある数字をタップすると、計算のヒントが出ます。<br>答えが分かったら枠をタップして入力してください。';
            
            appContainer.appendChild(container);
            appContainer.appendChild(instruction);

            // 判定処理
            checkBtn.addEventListener('click', () => {
                let uAnsStr = '';
                let allFilled = true;
                
                for (let i = 0; i < ansLength; i++) {
                    const box = document.getElementById(`ans-box-${i}`);
                    if (box.textContent === '') {
                        allFilled = false;
                        break;
                    }
                    uAnsStr += box.textContent;
                }

                if (!allFilled) return; 

                const uAns = parseInt(uAnsStr, 10);
                const isCorrect = (uAns === correctAns);
                
                const endTime = new Date();
                const problemType = "2桁×1桁のかけ算（ひっ算）";
                const problemContent = `${prob.n1} × ${prob.n2}`;
                const userAnswer = uAns.toString();
                const inputMethod = "計算機入力";
                const resultStr = isCorrect ? "正解" : "不正解";
                
                // view.htmlでの日付分割対応のため、日付文字列(YYYY/MM/DD)を生成
                const yyyy = problemStartTime.getFullYear();
                const mm = String(problemStartTime.getMonth() + 1).padStart(2, '0');
                const dd = String(problemStartTime.getDate()).padStart(2, '0');
                const dateStr = `${yyyy}/${mm}/${dd}`;
                
                // CSVフォーマットの先頭に日付を追加
                const csvLine = `"${dateStr}","${problemType}","${problemContent}","${userAnswer}",${formatTime(problemStartTime)},${formatTime(endTime)},${inputMethod},${resultStr}\n`;
                
                if (window.webkit && window.webkit.messageHandlers.appBridge) {
                    window.webkit.messageHandlers.appBridge.postMessage({
                        action: "saveCSV",
                        csvLine: csvLine
                    });
                } else {
                    // ブラウザ単体での動作確認用にLocalStorageへ保存
                    const storageKey = "hissan_history";
                    let history = localStorage.getItem(storageKey) || "";
                    history += csvLine;
                    localStorage.setItem(storageKey, history);
                    console.log("LocalStorageに保存しました: " + csvLine);
                }

                const overlayJudge = document.getElementById('judge-overlay');
                if (isCorrect) {
                    overlayJudge.textContent = 'せいかい！';
                    overlayJudge.className = 'judge-overlay show';
                    if (soundCheckbox && soundCheckbox.checked) { okSound.currentTime = 0; okSound.play(); }
                    
                    checkBtn.disabled = true;
                    setTimeout(() => { overlayJudge.classList.remove('show'); }, 1200);
                    setTimeout(() => { currentIndex++; renderProblem(); }, 1500);
                } else {
                    overlayJudge.textContent = 'おしい！';
                    overlayJudge.className = 'judge-overlay incorrect show';
                    mistakeCount++;
                    if (soundCheckbox && soundCheckbox.checked) { ngSound.currentTime = 0; ngSound.play(); }
                    setTimeout(() => { overlayJudge.classList.remove('show'); }, 1200);
                }
            });
        }

        document.getElementById('start-btn').addEventListener('click', () => {
            document.getElementById('start-screen').style.display = 'none';
            document.getElementById('main-content').style.display = 'block';
            renderProblem();
        });

    </script>
</body>
</html>
