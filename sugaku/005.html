<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>分数の色塗りと読み取り</title>
    
    <!-- 共通スタイルの読み込み -->
    <link rel="stylesheet" href="app-common.css">

    <!-- 005固有のスタイル -->
    <style>
        .problem-container {
            display: flex;
            flex-direction: row;
            margin-bottom: 10px;
            width: 100%;
            max-width: 900px;
            margin-left: auto;
            margin-right: auto;
            align-items: center;
            justify-content: center;
            flex-wrap: wrap;
            flex: 1;
            gap: clamp(10px, 3vw, 20px);
        }
        
        .beaker-area {
            width: clamp(180px, 35vw, 260px); 
            height: clamp(220px, 40vh, 320px); 
            display: flex;
            justify-content: center;
            align-items: flex-end;
            position: relative;
            flex-shrink: 0;
        }
        .svg-container {
            width: 100%;
            height: 100%;
        }
        
        /* 色塗り用セグメントのスタイル */
        .water-segment {
            fill: #ffffff;
            cursor: pointer;
            transition: fill 0.2s;
            touch-action: manipulation;
            -webkit-tap-highlight-color: transparent;
            outline: none;
        }
        .water-segment.filled {
            fill: #a0c4ff;
        }

        .question-area {
            display: flex;
            flex-direction: column;
            justify-content: center;
            gap: clamp(10px, 2vh, 15px);
            min-width: 280px;
            flex-grow: 1;
        }
        .question-block {
            margin-bottom: 0;
        }
        .question-text {
            font-size: clamp(1rem, 2.5vw, 1.2rem);
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            flex-wrap: wrap;
        }
        
        /* インライン分数表示 */
        .inline-frac {
            display: inline-flex;
            flex-direction: column;
            align-items: center;
            vertical-align: middle;
            font-size: clamp(1rem, 2.5vw, 1.2rem);
            margin: 0 6px;
            line-height: 1.1;
        }
        .inline-frac .num {
            border-bottom: 2px solid #000;
            padding: 0 4px;
        }
        .inline-frac .den {
            padding: 0 4px;
        }
        
        .input-row {
            display: flex;
            align-items: center;
            margin-left: 10px;
        }
        
        .drop-zone {
            width: clamp(45px, 7vw, 55px);
            height: clamp(45px, 7vw, 55px);
            border: 2px dashed #3498db;
            background-color: #f0f8ff;
            border-radius: 8px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: clamp(1.5rem, 4vw, 2rem);
            font-weight: bold;
            cursor: pointer;
            color: #333;
            touch-action: manipulation;
        }
        
        .fraction-input {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-right: 5px;
        }
        .fraction-line {
            width: 100%;
            height: 3px;
            background-color: #000;
            margin: 4px 0;
        }
        .unit {
            font-size: clamp(1rem, 2.5vw, 1.2rem);
            margin-left: 10px;
            font-weight: bold;
        }
        
        .hint-text {
            text-align: center;
            color: #e74c3c;
            font-size: clamp(0.85rem, 2vw, 1rem);
            font-weight: bold;
            margin-top: 5px;
        }

        .check-btn-container {
            display: flex;
            flex-direction: column;
            justify-content: center;
            margin-left: auto;
        }
        .check-btn {
            padding: 0 clamp(15px, 3vw, 25px);
            height: clamp(50px, 8vh, 60px);
            font-size: clamp(1.2rem, 3vw, 1.5rem);
            font-weight: bold;
            cursor: pointer;
            border: none;
            background-color: #00bfff;
            color: #ffffff;
            border-radius: 10px;
            font-family: inherit;
            outline: none;
            box-shadow: 0 4px 0 #0088cc;
            -webkit-tap-highlight-color: transparent;
            touch-action: manipulation;
            display: flex;
            justify-content: center;
            align-items: center;
            white-space: nowrap;
        }
        .check-btn:active { transform: translateY(4px); box-shadow: none; }
        .check-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: translateY(4px); box-shadow: none; }
    </style>
</head>
<body>

    <!-- スタート画面 -->
    <div id="start-screen" class="start-screen">
        <h1>分数の色塗りと読み取り</h1>
        <button id="start-btn" class="start-btn">スタート</button>
        <div style="margin-top: 30px; text-align: center;">
            <a href="index.html" class="menu-btn">メニューへ戻る</a>
        </div>
    </div>

    <!-- メイン画面 -->
    <div id="main-content" style="display: none; height: 100%; width: 100%;">
        <div class="top-nav">
            <div class="toggle-group">
                <label class="settings-toggle">
                    <input type="checkbox" id="speech-checkbox" checked> スピーチON
                </label>
                <label class="settings-toggle">
                    <input type="checkbox" id="sound-checkbox" checked> 効果音ON
                </label>
            </div>
            <a href="index.html" class="back-btn">メニューへ戻る</a>
        </div>
        
        <div id="status-bar" class="status-bar"></div>
        <h1 class="question-title" id="question-title">・ 指示された分だけ色をぬり、かさを答えましょう。</h1>
        
        <div id="app"></div>
        <div id="judge-overlay" class="judge-overlay"></div>
    </div>

    <!-- 共有JavaScriptの読み込み -->
    <script src="app-common.js"></script>
    <script src="calc-keyboard.js"></script>

    <!-- 分数の色塗りと読み取り 固有JavaScript -->
    <script>
        const numberReadings = [
            "ぜろ", "いち", "に", "さん", "よん", "ご", "ろく", "なな", "はち", "きゅう", "じゅう",
            "じゅういち", "じゅうに", "じゅうさん", "じゅうよん", "じゅうご", "じゅうろく", "じゅうなな", "じゅうはち", "じゅうきゅう", "にじゅう"
        ];

        // 問題の作成 (10問)
        const problems = [];
        const seen = new Set();
        while (problems.length < 10) {
            const den = Math.floor(Math.random() * 9) + 2; // 分母：2〜10
            const num = Math.floor(Math.random() * (den - 1)) + 1; // 分子：1〜(den-1)
            const fracKey = `${num}/${den}`;
            if (!seen.has(fracKey)) {
                seen.add(fracKey);
                problems.push({ num: num, den: den });
            }
        }

        function shuffleArray(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
        }

        shuffleArray(problems);
        let currentIndex = 0;
        let mistakeCount = 0;
        const appContainer = document.getElementById('app');
        let problemStartTime;

        function renderProblem() {
            appContainer.innerHTML = '';
            problemStartTime = new Date();

            if (currentIndex >= problems.length) {
                document.getElementById('status-bar').style.display = 'none';
                document.getElementById('question-title').style.display = 'none';
                
                const clearMsg = document.createElement('div');
                clearMsg.className = 'clear-message';
                
                let htmlContent = `<h2>全10問クリアしました！</h2>`;
                htmlContent += `<div class="final-result-details">`;
                htmlContent += `<div>正解した問題： <strong>10</strong> 問</div>`;
                htmlContent += `<div>間違えた回数： <strong>${mistakeCount}</strong> 回</div>`;
                
                if (mistakeCount === 0) {
                    htmlContent += `<div style="color: blue; font-weight: bold; margin-top: 15px;">パーフェクトです！素晴らしい成績です。</div>`;
                }
                htmlContent += `</div>`;
                htmlContent += `<button class="retry-btn" onclick="location.reload()">もう一度挑戦する</button>`;
                htmlContent += `<a href="index.html" class="menu-btn">メニューへ戻る</a>`;
                
                clearMsg.innerHTML = htmlContent;
                appContainer.appendChild(clearMsg);
                
                AppAudio.speak("ぜんもんくりあです。おつかれさまでした。");
                return;
            }
            
            document.getElementById('status-bar').style.display = 'block';
            document.getElementById('question-title').style.display = 'block';
            document.getElementById('status-bar').textContent = `第 ${currentIndex + 1} 問 / 全 ${problems.length} 問`;

            AppAudio.playQ();

            const prob = problems[currentIndex];

            const container = document.createElement('div');
            container.className = 'problem-container';

            // --- ビーカー（色塗り）エリア ---
            const beakerArea = document.createElement('div');
            beakerArea.className = 'beaker-area';
            
            const svgContainer = document.createElement('div');
            svgContainer.className = 'svg-container';
            const svg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
            svg.setAttribute('width', '100%');
            svg.setAttribute('height', '100%');
            svg.setAttribute('viewBox', '0 0 150 250');
            
            const segmentHeight = 200 / prob.den;
            
            // 下から順番にセグメントを描画
            for (let i = 0; i < prob.den; i++) {
                const yPos = 220 - (i + 1) * segmentHeight;
                const rect = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
                rect.setAttribute('x', '40');
                rect.setAttribute('y', yPos.toString());
                rect.setAttribute('width', '90');
                rect.setAttribute('height', segmentHeight.toString());
                rect.setAttribute('class', 'water-segment');
                rect.dataset.index = i;

                // セグメントの色塗りインタラクション
                rect.addEventListener('click', function() {
                    const targetIndex = parseInt(this.dataset.index, 10);
                    const allSegments = svgContainer.querySelectorAll('.water-segment');
                    const currentFilled = svgContainer.querySelectorAll('.water-segment.filled').length;
                    
                    let newCount = targetIndex + 1;
                    if (currentFilled === newCount) {
                        newCount = targetIndex;
                    }

                    allSegments.forEach((seg, idx) => {
                        if (idx < newCount) {
                            seg.classList.add('filled');
                        } else {
                            seg.classList.remove('filled');
                        }
                    });

                    if (newCount >= 0 && newCount <= 20) {
                        AppAudio.speak(numberReadings[newCount]);
                    }
                });
                svg.appendChild(rect);
            }

            // ビーカー外郭
            const beakerOutline = document.createElementNS('http://www.w3.org/2000/svg', 'polyline');
            beakerOutline.setAttribute('points', '40,20 40,220 130,220 130,20');
            beakerOutline.setAttribute('fill', 'none');
            beakerOutline.setAttribute('stroke', '#000');
            beakerOutline.setAttribute('stroke-width', '4');
            beakerOutline.setAttribute('pointer-events', 'none');
            svg.appendChild(beakerOutline);

            // 目盛り描画
            for (let i = 0; i <= prob.den; i++) {
                const yPos = 220 - segmentHeight * i;
                const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
                
                let lineX1 = (i === 0 || i === prob.den) ? 15 : (i % 5 === 0 ? 22 : 30);

                line.setAttribute('x1', lineX1.toString());
                line.setAttribute('y1', yPos.toString());
                line.setAttribute('x2', '40');
                line.setAttribute('y2', yPos.toString());
                line.setAttribute('stroke', '#000');
                line.setAttribute('stroke-width', '2');
                line.setAttribute('pointer-events', 'none');
                svg.appendChild(line);
                
                if (i === prob.den) {
                    const label1L = document.createElementNS('http://www.w3.org/2000/svg', 'text');
                    label1L.setAttribute('x', '65');
                    label1L.setAttribute('y', '35');
                    label1L.setAttribute('font-size', '24');
                    label1L.setAttribute('font-weight', 'bold');
                    label1L.setAttribute('pointer-events', 'none');
                    label1L.textContent = '1L';
                    svg.appendChild(label1L);
                    
                    const topDecorL = document.createElementNS('http://www.w3.org/2000/svg', 'line');
                    topDecorL.setAttribute('x1', '25'); topDecorL.setAttribute('y1', '20');
                    topDecorL.setAttribute('x2', '55'); topDecorL.setAttribute('y2', '20');
                    topDecorL.setAttribute('stroke', '#000'); topDecorL.setAttribute('stroke-width', '2');
                    topDecorL.setAttribute('pointer-events', 'none');
                    svg.appendChild(topDecorL);
                    
                    const topDecorR = document.createElementNS('http://www.w3.org/2000/svg', 'line');
                    topDecorR.setAttribute('x1', '115'); topDecorR.setAttribute('y1', '20');
                    topDecorR.setAttribute('x2', '145'); topDecorR.setAttribute('y2', '20');
                    topDecorR.setAttribute('stroke', '#000'); topDecorR.setAttribute('stroke-width', '2');
                    topDecorR.setAttribute('pointer-events', 'none');
                    svg.appendChild(topDecorR);
                }
            }

            svgContainer.appendChild(svg);
            beakerArea.appendChild(svgContainer);
            container.appendChild(beakerArea);

            // --- 質問・入力エリア ---
            const questionArea = document.createElement('div');
            questionArea.className = 'question-area';

            // ① 指示文
            const q1Block = document.createElement('div');
            q1Block.className = 'question-block';
            const q1Text = document.createElement('div');
            q1Text.className = 'question-text';
            q1Text.innerHTML = `① <div class="inline-frac"><div class="num">1</div><div class="den">${prob.den}</div></div> L の &nbsp;<strong style="font-size:1.5rem; color:#d35400;">${prob.num}</strong>&nbsp; こ分だけ色をぬりましょう。`;
            q1Block.appendChild(q1Text);
            
            // ② 答えるエリア
            const q2Block = document.createElement('div');
            q2Block.className = 'question-block';
            const q2Text = document.createElement('div');
            q2Text.className = 'question-text';
            q2Text.textContent = '② 色をぬったところのかさは何Lですか。';
            
            const q2InputRow = document.createElement('div');
            q2InputRow.className = 'input-row';
            
            const fractionInput = document.createElement('div');
            fractionInput.className = 'fraction-input';

            const numZone = document.createElement('div');
            numZone.className = 'drop-zone';
            numZone.id = 'ans-num';
            numZone.addEventListener('click', () => { CalcKeyboard.open(numZone); });

            const fractionLine = document.createElement('div');
            fractionLine.className = 'fraction-line';

            const denZone = document.createElement('div');
            denZone.className = 'drop-zone';
            denZone.id = 'ans-den';
            denZone.addEventListener('click', () => { CalcKeyboard.open(denZone); });

            fractionInput.appendChild(numZone);
            fractionInput.appendChild(fractionLine);
            fractionInput.appendChild(denZone);
            
            const q2Unit = document.createElement('div');
            q2Unit.className = 'unit';
            q2Unit.textContent = 'L';

            q2InputRow.appendChild(fractionInput);
            q2InputRow.appendChild(q2Unit);
            q2Block.appendChild(q2Text);
            q2Block.appendChild(q2InputRow);

            questionArea.appendChild(q1Block);
            questionArea.appendChild(q2Block);
            container.appendChild(questionArea);

            // できたボタン
            const checkBtnContainer = document.createElement('div');
            checkBtnContainer.className = 'check-btn-container';
            const checkBtn = document.createElement('button');
            checkBtn.className = 'check-btn';
            checkBtn.textContent = 'できた';
            checkBtnContainer.appendChild(checkBtn);
            container.appendChild(checkBtnContainer);
            
            appContainer.appendChild(container);

            const hintText = document.createElement('div');
            hintText.className = 'hint-text';
            hintText.innerHTML = '※ 枠をタップして計算機で数字を入力してください';
            appContainer.appendChild(hintText);

            // 判定処理
            checkBtn.addEventListener('click', () => {
                const numText = document.getElementById('ans-num').textContent.trim();
                const denText = document.getElementById('ans-den').textContent.trim();
                const judgeOverlay = document.getElementById('judge-overlay');

                if (numText === '' || denText === '') {
                    judgeOverlay.textContent = 'すうじを にゅうりょく してね';
                    judgeOverlay.className = 'judge-overlay incorrect show';
                    AppAudio.speak("すうじを にゅうりょく してね");
                    setTimeout(() => { judgeOverlay.classList.remove('show'); }, 1200);
                    return;
                }

                const filledCount = svgContainer.querySelectorAll('.water-segment.filled').length;
                const userNum = parseInt(numText, 10);
                const userDen = parseInt(denText, 10);

                const isCorrect1 = (filledCount === prob.num);
                const isCorrect2 = (userNum === prob.num) && (userDen === prob.den);
                const isCorrect = isCorrect1 && isCorrect2;

                AppLogger.save({
                    storageKey: "paint_fraction_history",
                    problemType: "分数の色塗りと読み取り",
                    problemContent: `図：${prob.num}/${prob.den}L`,
                    userAnswer: `塗り:${filledCount}, 回答:${userNum}/${userDen}L`,
                    startTime: problemStartTime,
                    endTime: new Date(),
                    inputMethod: "計算機入力",
                    isCorrect: isCorrect
                });

                if (isCorrect) {
                    judgeOverlay.textContent = 'せいかい！';
                    judgeOverlay.className = 'judge-overlay show';
                    AppAudio.playOk();
                    
                    checkBtn.disabled = true;
                    const segments = svgContainer.querySelectorAll('.water-segment');
                    segments.forEach(s => s.style.pointerEvents = 'none');
                    
                    setTimeout(() => { judgeOverlay.classList.remove('show'); }, 1200);
                    setTimeout(() => {
                        currentIndex++;
                        renderProblem();
                    }, 1500);
                } else {
                    judgeOverlay.textContent = 'おしい！';
                    judgeOverlay.className = 'judge-overlay incorrect show';
                    mistakeCount++;
                    AppAudio.playNg();
                    
                    setTimeout(() => { judgeOverlay.classList.remove('show'); }, 1200);
                }
            });
        }

        document.getElementById('start-btn').addEventListener('click', () => {
            document.getElementById('start-screen').style.display = 'none';
            document.getElementById('main-content').style.display = 'block';
            renderProblem();
        });
    </script>
</body>
</html>
