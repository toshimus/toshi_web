<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>分数のひき算</title>
    
    <!-- 共通スタイルの読み込み -->
    <link rel="stylesheet" href="app-common.css">

    <!-- アプリ固有のスタイル -->
    <style>
        .problem-container {
            display: flex;
            flex-direction: column;
            margin-bottom: 10px;
            width: 100%;
            max-width: 900px;
            margin-left: auto;
            margin-right: auto;
        }
        .problem-main {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
        }
        
        /* テープ図（ブロック）エリア */
        .bar-wrapper {
            width: 100%;
            display: flex;
            flex-direction: column;
            margin-bottom: 25px;
        }
        .length-indicator-container {
            position: relative;
            width: 100%;
            height: 35px;
            margin-bottom: 5px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .red-bar-indicator {
            position: absolute;
            width: 100%;
            height: 2px;
            background-color: red;
            border-radius: 1px;
            box-sizing: border-box;
            top: 50%;
            transform: translateY(-50%);
        }
        .red-bar-indicator::before, .red-bar-indicator::after {
            content: '';
            position: absolute;
            top: -8px;
            height: 18px;
            width: 2px;
            background-color: red;
        }
        .red-bar-indicator::before { left: 0; }
        .red-bar-indicator::after { right: 0; }
        
        .indicator-label-center {
            position: relative;
            z-index: 2;
            background-color: #ffffff;
            padding: 0 10px;
            color: red;
            font-size: 1.6rem;
            font-weight: bold;
            line-height: 1.0;
        }
        
        .bar {
            display: flex;
            width: 100%;
            height: 65px;
            border: 2px solid #000;
            box-sizing: border-box;
            background-color: #fff;
        }
        .segment {
            flex: 1;
            border-right: 1px dotted #000;
            box-sizing: border-box;
            transition: background-color 0.2s ease;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            -webkit-tap-highlight-color: transparent;
        }
        .segment:last-child {
            border-right: none;
        }
        .segment.filled {
            background-color: #00bfff;
        }
        .segment.gray-filled {
            background-color: #95a5a6 !important;
        }
        
        .inner-fraction {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-size: 1.4rem;
            font-weight: bold;
        }
        .inner-num, .inner-den {
            padding: 0 4px;
            line-height: 1.1;
        }

        /* 数式エリア（レイアウト修正版） */
        .controls-area {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
        }
        .eq-container {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            margin-bottom: 25px;
            font-weight: bold;
        }
        .operator {
            font-size: 2.8rem;
            line-height: 1;
            display: flex;
            align-items: center;
        }
        .eq-integer {
            font-size: 3.2rem;
            padding: 0 5px;
            display: flex;
            align-items: center;
        }
        .eq-fraction {
            display: inline-flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        .eq-num, .eq-den {
            font-size: 2.2rem;
            line-height: 1.1;
            padding: 2px 6px;
            text-align: center;
        }
        .fraction-line {
            width: 100%;
            height: 4px;
            background-color: #000;
            margin: 4px 0;
            border-radius: 2px;
        }
        
        /* 入力枠（ドロップゾーン） */
        .drop-zone {
            width: 65px;
            height: 65px;
            border: 3px dashed #3498db;
            background-color: #f0f8ff;
            border-radius: 8px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 3rem;
            font-weight: bold;
            cursor: pointer;
            color: #333;
            flex-shrink: 0;
        }

        .check-btn-container {
            display: flex;
            justify-content: center;
            width: 100%;
            margin-top: 10px;
        }
        .check-btn {
            padding: 0 40px;
            height: 60px;
            font-size: 1.5rem;
            cursor: pointer;
            border: 2px solid #00bfff;
            background-color: #00bfff;
            color: #fff;
            font-weight: bold;
            border-radius: 8px;
            outline: none;
            box-shadow: 0 4px 0 #0088cc;
            -webkit-tap-highlight-color: transparent;
            touch-action: manipulation;
            flex-shrink: 0;
        }
        .check-btn:active {
            transform: translateY(4px);
            box-shadow: none;
        }
        .check-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: translateY(4px);
            box-shadow: none;
        }
        
        .instruction-red {
            color: red;
            font-size: 1.1rem;
            font-weight: bold;
            margin-bottom: 15px;
            text-align: center;
            line-height: 1.5;
        }
    </style>
</head>
<body>

    <!-- スタート画面 -->
    <div id="start-screen" class="start-screen">
        <h1>分数のひき算</h1>
        <button id="start-btn" class="start-btn">スタート</button>
        <div style="margin-top: 30px; text-align: center;">
            <a href="index.html" class="menu-btn">メニューへ戻る</a>
        </div>
    </div>

    <!-- メイン画面 -->
    <div id="main-content" style="display: none;">
        <div class="top-nav">
            <div class="toggle-group">
                <label class="settings-toggle">
                    <input type="checkbox" id="speech-checkbox" checked> スピーチON
                </label>
                <label class="settings-toggle">
                    <input type="checkbox" id="sound-checkbox" checked> 効果音ON
                </label>
            </div>
            <a href="index.html" class="back-btn">メニューへ戻る</a>
        </div>
        
        <div id="status-bar" class="status-bar"></div>
        <div id="question-title" class="question-title-container">・ 次の分数のひき算を求めなさい。</div>
        
        <div id="app"></div>
        <div id="judge-overlay" class="judge-overlay"></div>
    </div>

    <!-- 共通JavaScriptの読み込み -->
    <script src="app-common.js"></script>
    <script src="calc-keyboard.js"></script>

    <!-- アプリ固有JavaScript -->
    <script>
        // ガイドメッセージ表示関数
        function showGuideMessage(msg, speakMsg) {
            AppAudio.speak(speakMsg || msg);
            let guideEl = document.getElementById('guide-toast');
            if (!guideEl) {
                guideEl = document.createElement('div');
                guideEl.id = 'guide-toast';
                guideEl.style.cssText = `
                    position: fixed;
                    bottom: 80px;
                    left: 50%;
                    transform: translateX(-50%);
                    background-color: rgba(44, 62, 80, 0.95);
                    color: #fff;
                    padding: 14px 28px;
                    border-radius: 30px;
                    font-size: 1.3rem;
                    font-weight: bold;
                    z-index: 9998;
                    pointer-events: none;
                    transition: opacity 0.3s ease;
                    text-align: center;
                    box-shadow: 0 4px 15px rgba(0,0,0,0.3);
                    white-space: nowrap;
                `;
                document.body.appendChild(guideEl);
            }
            guideEl.textContent = msg;
            guideEl.style.opacity = '1';
            clearTimeout(guideEl.timer);
            guideEl.timer = setTimeout(() => {
                guideEl.style.opacity = '0';
            }, 2500);
        }

        // 問題生成（分母2〜8、分子1〜分母）
        const allProblems = [];
        for (let d = 2; d <= 8; d++) {
            for (let n1 = 2; n1 <= d; n1++) {
                for (let n2 = 1; n2 < n1; n2++) {
                    allProblems.push({ den: d, n1: n1, n2: n2 });
                }
            }
        }
        for (let i = allProblems.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [allProblems[i], allProblems[j]] = [allProblems[j], allProblems[i]];
        }
        const problems = allProblems.slice(0, 10); 
        
        let currentIndex = 0; 
        let mistakeCount = 0; 
        let problemStartTime;
        const appContainer = document.getElementById('app');

        function renderProblem() {
            appContainer.innerHTML = '';
            problemStartTime = new Date();

            if (currentIndex >= problems.length) {
                document.getElementById('status-bar').style.display = 'none';
                document.getElementById('question-title').style.display = 'none';
                
                const clearMsg = document.createElement('div');
                clearMsg.className = 'clear-message';
                clearMsg.innerHTML = `
                    <h2>全10問合格！！</h2>
                    <div class="final-result-details">
                        <div>間違えた回数： <strong>${mistakeCount}</strong> 回</div>
                        ${mistakeCount === 0 ? '<div style="color: blue; font-weight: bold; margin-top: 15px;">パーフェクトです！素晴らしい成績です。</div>' : ''}
                    </div>
                    <button class="retry-btn" onclick="location.reload()">もう一度挑戦する</button>
                    <a href="index.html" class="menu-btn">メニューへ戻る</a>
                `;
                appContainer.appendChild(clearMsg);
                AppAudio.speak("ぜんもんごうかくです。おつかれさまでした。");
                return;
            }
            
            const prob = problems[currentIndex]; 
            document.getElementById('status-bar').style.display = 'block';
            document.getElementById('question-title').style.display = 'block';
            document.getElementById('status-bar').textContent = `第 ${currentIndex + 1} 問 / 全 10 問`;

            AppAudio.playQ();
            
            const firstTermText = (prob.n1 === prob.den) ? "いち" : `${prob.den}ぶんの${prob.n1}`;
            AppAudio.speak(`${firstTermText}、ひく、${prob.den}ぶんの${prob.n2}、は`);

            const container = document.createElement('div');
            container.className = 'problem-container';
            const mainArea = document.createElement('div');
            mainArea.className = 'problem-main';
            
            const barWrapper = document.createElement('div');
            barWrapper.className = 'bar-wrapper';
            barWrapper.innerHTML = `
                <div class="length-indicator-container">
                    <div class="red-bar-indicator"></div>
                    <div class="indicator-label-center">1</div>
                </div>
            `;
            
            const bar = document.createElement('div');
            bar.className = 'bar';
            
            for(let i=0; i<prob.den; i++) {
                const seg = document.createElement('div');
                seg.className = 'segment';
                if (i < prob.n1) {
                    seg.classList.add('filled');
                    seg.innerHTML = `
                        <div class="inner-fraction">
                            <div class="inner-num">1</div>
                            <div class="fraction-line"></div>
                            <div class="inner-den">${prob.den}</div>
                        </div>
                    `;
                    seg.onclick = function() {
                        this.classList.toggle('gray-filled');
                    };
                }
                bar.appendChild(seg);
            }
            barWrapper.appendChild(bar);
            mainArea.appendChild(barWrapper);

            const controlsArea = document.createElement('div');
            controlsArea.className = 'controls-area';

            const eqContainer = document.createElement('div');
            eqContainer.className = 'eq-container';
            
            let firstTermHTML = '';
            if (prob.n1 === prob.den) {
                firstTermHTML = `<div class="eq-integer">1</div>`;
            } else {
                firstTermHTML = `
                    <div class="eq-fraction">
                        <div class="eq-num">${prob.n1}</div>
                        <div class="fraction-line"></div>
                        <div class="eq-den">${prob.den}</div>
                    </div>
                `;
            }

            eqContainer.innerHTML = `
                ${firstTermHTML}
                <div class="operator">ー</div>
                <div class="eq-fraction">
                    <div class="eq-num">${prob.n2}</div>
                    <div class="fraction-line"></div>
                    <div class="eq-den">${prob.den}</div>
                </div>
                <div class="operator">＝</div>
                <div class="eq-fraction">
                    <div class="drop-zone" id="ans-num"></div>
                    <div class="fraction-line"></div>
                    <div class="drop-zone" id="ans-den"></div>
                </div>
            `;
            controlsArea.appendChild(eqContainer);

            const instruction = document.createElement('div');
            instruction.className = 'instruction-red';
            instruction.innerHTML = '※水色のブロックをタップして灰色にし、ひき算をしましょう。<br>※枠をタップして、計算機で数字を入力してください';
            controlsArea.appendChild(instruction);

            // 判定ボタン
            const checkBtnContainer = document.createElement('div');
            checkBtnContainer.className = 'check-btn-container';
            const checkBtn = document.createElement('button');
            checkBtn.className = 'check-btn';
            checkBtn.textContent = 'できた！';
            checkBtnContainer.appendChild(checkBtn);
            controlsArea.appendChild(checkBtnContainer);

            container.appendChild(mainArea);
            container.appendChild(controlsArea);
            appContainer.appendChild(container);

            // 入力枠タップで計算機キーボードを起動
            [document.getElementById('ans-num'), document.getElementById('ans-den')].forEach(zone => {
                zone.addEventListener('click', () => { 
                    CalcKeyboard.open(zone);
                });
            });

            /* 判定処理 */
            checkBtn.onclick = () => {
                const boxNum = document.getElementById('ans-num');
                const boxDen = document.getElementById('ans-den');
                const numVal = boxNum.textContent.trim();
                const denVal = boxDen.textContent.trim();
                const overlayJudge = document.getElementById('judge-overlay');
                
                // 未入力時の案内
                if(numVal === "" || denVal === "") {
                    showGuideMessage('数字を全部入力してね！', 'すうじをぜんぶにゅうりょくしてね');
                    return;
                }

                // クロス乗算等で等価判定（約分済み・未約分のどちらにも対応）
                const isCorrect = (parseInt(numVal, 10) * prob.den === (prob.n1 - prob.n2) * parseInt(denVal, 10));

                // 共通ログ機能による履歴保存
                AppLogger.save({
                    storageKey: "fraction_sub_history",
                    problemType: "分数のひき算",
                    problemContent: `${prob.n1}/${prob.den} - ${prob.n2}/${prob.den}`,
                    userAnswer: `${numVal}/${denVal}`,
                    startTime: problemStartTime,
                    endTime: new Date(),
                    inputMethod: "計算機入力",
                    isCorrect: isCorrect
                });

                if (isCorrect) {
                    overlayJudge.textContent = 'せいかい！';
                    overlayJudge.className = 'judge-overlay show';
                    AppAudio.speak("せいかい！");
                    AppAudio.playOk();
                    checkBtn.disabled = true; 
                    setTimeout(() => { overlayJudge.classList.remove('show'); }, 1200);
                    setTimeout(() => { currentIndex++; renderProblem(); }, 1500);
                } else {
                    overlayJudge.textContent = 'おしい！';
                    overlayJudge.className = 'judge-overlay incorrect show';
                    AppAudio.speak("おしい！");
                    AppAudio.playNg();
                    mistakeCount++; 
                    setTimeout(() => { overlayJudge.classList.remove('show'); }, 1200);
                }
            };
        }

        // スタートボタン処理
        document.getElementById('start-btn').addEventListener('click', () => {
            document.getElementById('start-screen').style.display = 'none';
            document.getElementById('main-content').style.display = 'block';
            renderProblem();
        });
    </script>
</body>
</html>
