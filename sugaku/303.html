<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>2桁×2桁のかけ算（ひっ算）</title>
<style>
    html, body {
        height: 100%;
        overflow: hidden;
        position: fixed;
        width: 100%;
    }
    body {
        font-family: "Helvetica Neue", Arial, "Hiragino Kaku Gothic ProN", "Hiragino Sans", Meiryo, sans-serif;
        margin: 0;
        padding: 10px;
        background-color: #ffffff;
        color: #333;
        touch-action: none;
        box-sizing: border-box;
        user-select: none;
        -webkit-user-select: none;
    }
    
    .start-screen {
        position: fixed;
        top: 0; left: 0; width: 100%; height: 100%;
        background-color: #f0f8ff;
        display: flex; flex-direction: column; justify-content: center; align-items: center;
        z-index: 10000;
    }
    .start-screen h1 { font-size: 3rem; color: #2c3e50; margin-bottom: 40px; }
    .start-btn {
        padding: 20px 60px; font-size: 2.5rem; font-weight: bold; color: #fff;
        background-color: #3498db; border: none; border-radius: 15px;
        cursor: pointer; box-shadow: 0 8px 0 #2980b9;
        transition: transform 0.1s, box-shadow 0.1s;
        -webkit-tap-highlight-color: transparent;
    }
    .start-btn:active { transform: translateY(8px); box-shadow: none; }

    .status-bar { font-size: 1.2rem; font-weight: bold; margin-bottom: 5px; color: #555; }
    
    .top-nav { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
    .toggle-group { display: flex; gap: 15px; }
    .settings-toggle { font-size: 1.1rem; color: #555; cursor: pointer; display: flex; align-items: center; -webkit-tap-highlight-color: transparent; }
    .settings-toggle input { transform: scale(1.3); margin-right: 8px; cursor: pointer; }
    .back-btn { padding: 8px 15px; background-color: #ecf0f1; border: 1px solid #bdc3c7; border-radius: 5px; text-decoration: none; color: #2c3e50; font-size: 0.9rem; touch-action: manipulation; }

    .problem-container {
        display: flex; flex-direction: row; width: 100%; max-width: 1100px;
        margin: 0 auto; align-items: flex-start; justify-content: center; gap: 30px;
    }

    /* ひっ算エリア構造 */
    .hissan-wrapper {
        display: grid;
        grid-template-columns: 60px 70px 70px 70px 70px; /* ×, 千, 百, 十, 一 */
        grid-template-rows: repeat(8, auto);
        row-gap: 5px; column-gap: 10px;
        align-items: center; justify-items: center;
        font-size: 4rem; font-weight: bold;
        background-color: #f9f9f9; padding: 20px;
        border-radius: 12px; border: 2px solid #eee;
    }

    .hissan-line { grid-column: 1 / span 5; width: 100%; height: 4px; background-color: #333; }

    .memo-zone {
        width: 40px; height: 40px; border: 2px dashed #e74c3c;
        background-color: #fff5f5; border-radius: 6px;
        display: flex; justify-content: center; align-items: center;
        font-size: 2rem; font-weight: bold; cursor: pointer; color: #e74c3c;
    }

    .drop-zone {
        width: 65px; height: 80px; border: 3px dashed #3498db;
        background-color: #f0f8ff; border-radius: 10px;
        display: flex; justify-content: center; align-items: center;
        font-size: 4rem; font-weight: bold; cursor: pointer; color: #333;
    }

    /* 右側パネル */
    .right-panel { display: flex; flex-direction: column; flex: 1; max-width: 450px; }
    .hint-wrapper { min-height: 280px; margin-bottom: 20px; }
    .hint-line {
        display: flex; align-items: center; gap: 10px; font-size: 2.5rem;
        font-weight: bold; color: #333; opacity: 0; transform: translateX(-20px);
        transition: all 0.3s; margin-bottom: 10px;
    }
    .hint-line.show { opacity: 1; transform: translateX(0); }

    .circle {
        display: inline-flex; justify-content: center; align-items: center;
        width: 40px; height: 40px; border-radius: 50%; color: white; font-size: 2rem;
    }
    .circle.pink { background-color: #ff7675; }
    .circle.green { background-color: #55efc4; color: #2d3436; }
    .text-blue { color: #0984e3; }

    .clickable-digit { cursor: pointer; border-bottom: 5px dashed; transition: transform 0.1s, color 0.3s; }
    .clickable-digit:active { transform: scale(0.9); }
    
    /* 判定ボタン */
    .check-btn {
        width: auto;
        padding: 0 40px;
        height: 90px;
        font-size: 2.2rem;
        cursor: pointer;
        border: 2px solid #00bfff;
        background-color: #00bfff;
        color: #fff;
        font-weight: bold;
        border-radius: 10px;
        outline: none;
        box-shadow: 0 5px 0 #0088cc;
        -webkit-tap-highlight-color: transparent;
        touch-action: manipulation;
        white-space: nowrap;
        align-self: flex-start;
    }
    .check-btn:active {
        transform: translateY(5px);
        box-shadow: none;
    }
    .check-btn:disabled {
        opacity: 0.5;
        cursor: not-allowed;
        transform: translateY(5px);
        box-shadow: none;
    }

    .judge-overlay {
        position: fixed;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%) scale(0.7);
        opacity: 0;
        visibility: hidden;
        background-color: transparent;
        color: #ff3333;
        font-size: 7rem;
        font-weight: bold;
        padding: 30px 60px;
        -webkit-text-stroke: 3px #000;
        text-shadow: 4px 4px 10px rgba(0, 0, 0, 0.5);
        z-index: 9999;
        pointer-events: none;
        transition: opacity 0.3s ease, transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275), visibility 0.3s;
        white-space: nowrap; 
    }
    .judge-overlay.show { opacity: 1; visibility: visible; transform: translate(-50%, -50%) scale(1.0); }
    .judge-overlay.incorrect { color: #3366ff; }
    
    .clear-message { text-align: center; margin-top: 20px; padding: 25px; background-color: #f8f9fa; border-radius: 12px; border: 2px solid #a0c4ff; }
    .clear-message h2 { font-size: 2rem; color: #d9534f; margin-top: 0; margin-bottom: 20px; }
    .final-result-details { font-size: 1.4rem; color: #333; line-height: 1.8; }
    .menu-btn, .retry-btn { margin-top: 20px; padding: 12px 30px; font-size: 1.2rem; cursor: pointer; border: none; border-radius: 8px; outline: none; touch-action: manipulation; text-decoration: none; display: inline-block; font-weight: bold;}
    .retry-btn { background-color: #a0c4ff; color: #fff; margin-right: 15px; }
    .menu-btn { background-color: #95a5a6; color: #fff; }

    /* 計算機 */
    .pieces-container {
        display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
        background: #ecf0f1; padding: 20px; border-radius: 12px;
        grid-template-columns: repeat(3, 1fr); gap: 10px; z-index: 2000;
        box-shadow: 0 10px 25px rgba(0,0,0,0.3);
    }
    .piece {
        width: 70px; height: 70px; background: #f1c40f; border-radius: 10px;
        display: flex; justify-content: center; align-items: center; font-size: 2rem;
        font-weight: bold; cursor: pointer; box-shadow: 0 4px 0 #d4ac0d;
        color: #2c3e50; border: 2px solid #2c3e50;
    }
    .piece:active { transform: translateY(2px); box-shadow: none; }
    .piece.delete-btn { background-color: #e74c3c; color: white; border-color: #c0392b; box-shadow: 0 4px 0 #c0392b; font-size: 1.4rem; }
    .piece.enter-btn { background-color: #95a5a6; color: white; border-color: #7f8c8d; box-shadow: 0 4px 0 #7f8c8d; font-size: 1.4rem; }
    
    .overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.4); z-index: 1500; }
</style>
</head>
<body>

<div id="start-screen" class="start-screen">
    <h1>2桁×2桁のひっ算</h1>
    <button id="start-btn" class="start-btn">スタート</button>
</div>

<div id="main-content" style="display: none;">
    <div class="top-nav">
        <div class="toggle-group">
            <label class="settings-toggle"><input type="checkbox" id="speech-checkbox" checked> スピーチON</label>
            <label class="settings-toggle"><input type="checkbox" id="sound-checkbox" checked> 効果音ON</label>
        </div>
        <a href="index.html" class="back-btn">メニューへ戻る</a>
    </div>
    
    <div id="status-bar" class="status-bar"></div>
    <h1 class="question-title">・ つぎのかけ算を求めましょう！</h1>
    
    <div id="app"></div>
    <div id="judge-overlay" class="judge-overlay"></div>
    <div class="overlay" id="overlay"></div>
    <div class="pieces-container" id="calc-container"></div>
</div>

<script>
    const okSound = new Audio('ok.mp3');
    const ngSound = new Audio('ng.mp3');
    const qSound = new Audio('q.mp3');
    
    function speak(text) {
        if (!document.getElementById('speech-checkbox').checked) return;
        window.speechSynthesis.cancel();
        const ut = new SpeechSynthesisUtterance(text);
        ut.lang = 'ja-JP';
        window.speechSynthesis.speak(ut);
    }

    const numberReadings = [
        "ぜろ", "いち", "に", "さん", "よん", "ご", "ろく", "なな", "はち", "きゅう", "じゅう"
    ];

    const kukuReadings = {
        1: { 1: ["いんいちが", "いち"], 2: ["いんにが", "に"], 3: ["いんさんが", "さん"], 4: ["いんしが", "し"], 5: ["いんごが", "ご"], 6: ["いんろくが", "ろく"], 7: ["いんしちが", "しち"], 8: ["いんはちが", "はち"], 9: ["いんくが", "く"] },
        2: { 1: ["にいちが", "に"], 2: ["ににんが", "し"], 3: ["にさんが", "ろく"], 4: ["にしが", "はち"], 5: ["にご", "じゅう"], 6: ["にろく", "じゅうに"], 7: ["にしち", "じゅうし"], 8: ["にはち", "じゅうろく"], 9: ["にく", "じゅうはち"] },
        3: { 1: ["さんいちが", "さん"], 2: ["さんにが", "ろく"], 3: ["さざんが", "きゅう"], 4: ["さんし", "じゅうに"], 5: ["さんご", "じゅうご"], 6: ["さぶろく", "じゅうはち"], 7: ["さんしち", "にじゅういち"], 8: ["さんぱ", "にじゅうし"], 9: ["さんく", "にじゅうしち"] },
        4: { 1: ["しいちが", "し"], 2: ["しにが", "はち"], 3: ["しさん", "じゅうに"], 4: ["しし", "じゅうろく"], 5: ["しご", "にじゅう"], 6: ["しろく", "にじゅうし"], 7: ["ししち", "にじゅうはち"], 8: ["しはち", "さんじゅうに"], 9: ["しく", "さんじゅうろく"] },
        5: { 1: ["ごいちが", "ご"], 2: ["ごに", "じゅう"], 3: ["ごさん", "じゅうご"], 4: ["ごし", "にじゅう"], 5: ["ごご", "にじゅうご"], 6: ["ごろく", "さんじゅう"], 7: ["ごしち", "さんじゅうご"], 8: ["ごはち", "よんじゅう"], 9: ["ごっく", "しじゅうご"] },
        6: { 1: ["ろくいちが", "ろく"], 2: ["ろくに", "じゅうに"], 3: ["ろくさん", "じゅうはち"], 4: ["ろくし", "にじゅうし"], 5: ["ろくご", "さんじゅう"], 6: ["ろくろく", "さんじゅうろく"], 7: ["ろくしち", "しじゅうに"], 8: ["ろくはち", "しじゅうはち"], 9: ["ろっく", "ごじゅうし"] },
        7: { 1: ["しちいちが", "しち"], 2: ["しちに", "じゅうし"], 3: ["しちさん", "にじゅういち"], 4: ["しちし", "にじゅうはち"], 5: ["しちご", "さんじゅうご"], 6: ["しちろく", "しじゅうに"], 7: ["しちしち", "しじゅうく"], 8: ["しちは", "ごじゅうろく"], 9: ["しちく", "ろくじゅうさん"] },
        8: { 1: ["はちいちが", "はち"], 2: ["はちに", "じゅうろく"], 3: ["はちさん", "にじゅうし"], 4: ["はちし", "さんじゅうに"], 5: ["はちご", "よんじゅう"], 6: ["はちろく", "しじゅうはち"], 7: ["はちしち", "ごじゅうろく"], 8: ["はっぱ", "ろくじゅうし"], 9: ["はっく", "しちじゅうに"] },
        9: { 1: ["くいちが", "く"], 2: ["くに", "じゅうはち"], 3: ["くさん", "にじゅうしち"], 4: ["くし", "さんじゅうろく"], 5: ["くご", "しじゅうご"], 6: ["くろく", "ごじゅうし"], 7: ["くしち", "ろくじゅうさん"], 8: ["くはち", "しちじゅうに"], 9: ["くく", "はちじゅういち"] }
    };

    function playKuku(n1, n2) {
        if (n1 === 0 || n2 === 0) {
            speak("ぜろ");
        } else {
            const yomi1 = kukuReadings[n1][n2][0];
            const yomi2 = kukuReadings[n1][n2][1];
            speak(`${yomi1}、${yomi2}`);
        }
    }

    let activeInput = null;
    const calcContainer = document.getElementById('calc-container');
    const overlay = document.getElementById('overlay');

    // 計算機キー作成
    ['7','8','9','4','5','6','1','2','3','0','削除','閉じる'].forEach(key => {
        const div = document.createElement('div');
        div.className = 'piece'; 
        div.textContent = key;
        
        if (key === '削除') {
            div.classList.add('delete-btn');
        } else if (key === '閉じる') {
            div.classList.add('enter-btn');
        }

        div.onclick = () => {
            if(!activeInput) return;
            if(key === '削除') {
                activeInput.textContent = '';
            } else if(key === '閉じる') { 
                calcContainer.style.display = 'none'; 
                overlay.style.display = 'none'; 
            } else { 
                activeInput.textContent = key; 
                const parsedVal = parseInt(key, 10);
                if (parsedVal >= 0 && parsedVal <= 9) {
                    speak(numberReadings[parsedVal]);
                } else {
                    speak(key);
                }
                calcContainer.style.display = 'none'; 
                overlay.style.display = 'none'; 
            }
        };
        calcContainer.appendChild(div);
    });

    overlay.onclick = () => { calcContainer.style.display = 'none'; overlay.style.display = 'none'; activeInput = null; };

    let isCalcDragging = false;
    let calcDragStartX, calcDragStartY, calcInitialLeft, calcInitialTop;

    function startCalcDrag(e) {
        if (e.target.classList.contains('piece')) return;
        isCalcDragging = true;
        let clientX = e.touches ? e.touches[0].clientX : e.clientX;
        let clientY = e.touches ? e.touches[0].clientY : e.clientY;
        calcDragStartX = clientX;
        calcDragStartY = clientY;
        let style = window.getComputedStyle(calcContainer);
        calcInitialLeft = parseFloat(style.left);
        calcInitialTop = parseFloat(style.top);
    }

    function doCalcDrag(e) {
        if (!isCalcDragging) return;
        e.preventDefault();
        let clientX = e.touches ? e.touches[0].clientX : e.clientX;
        let clientY = e.touches ? e.touches[0].clientY : e.clientY;
        let dx = clientX - calcDragStartX;
        let dy = clientY - calcDragStartY;
        calcContainer.style.left = (calcInitialLeft + dx) + 'px';
        calcContainer.style.top = (calcInitialTop + dy) + 'px';
    }

    function stopCalcDrag() {
        isCalcDragging = false;
    }

    calcContainer.addEventListener('mousedown', startCalcDrag);
    document.addEventListener('mousemove', doCalcDrag, { passive: false });
    document.addEventListener('mouseup', stopCalcDrag);
    calcContainer.addEventListener('touchstart', startCalcDrag, { passive: false });
    document.addEventListener('touchmove', doCalcDrag, { passive: false });
    document.addEventListener('touchend', stopCalcDrag);

    let currentIndex = 0;
    let mistakeCount = 0;
    const problems = [];
    while(problems.length < 10) {
        let n1 = Math.floor(Math.random() * 90) + 10;
        let n2 = Math.floor(Math.random() * 90) + 10;
        problems.push({n1, n2});
    }

    function formatTime(date) {
        return date.getHours().toString().padStart(2, '0') + ':' + 
               date.getMinutes().toString().padStart(2, '0') + ':' + 
               date.getSeconds().toString().padStart(2, '0');
    }

    let problemStartTime;

    function renderProblem() {
        const app = document.getElementById('app');
        app.innerHTML = '';
        problemStartTime = new Date();

        if(currentIndex >= 10) {
            document.getElementById('status-bar').style.display = 'none';
            const clearMsg = document.createElement('div');
            clearMsg.className = 'clear-message';
            
            let htmlContent = `<h2>全10問合格！！</h2>`;
            htmlContent += `<div class="final-result-details">`;
            htmlContent += `<div>間違えた回数： <strong>${mistakeCount}</strong> 回</div>`;
            if (mistakeCount === 0) {
                htmlContent += `<div style="color: blue; font-weight: bold; margin-top: 15px;">パーフェクトです！素晴らしい成績です。</div>`;
            }
            htmlContent += `</div>`;
            htmlContent += `<button class="retry-btn" onclick="location.reload()">もう一度挑戦する</button>`;
            htmlContent += `<a href="index.html" class="menu-btn">メニューへ戻る</a>`;
            
            clearMsg.innerHTML = htmlContent;
            app.appendChild(clearMsg);
            speak("ぜんもんごうかくです。おつかれさまでした。");
            return;
        }

        document.getElementById('status-bar').style.display = 'block';
        document.getElementById('status-bar').textContent = `第 ${currentIndex+1} 問 / 10問`;
        
        const p = problems[currentIndex];
        const n1S = p.n1.toString();
        const n2S = p.n2.toString();

        speak(`つぎのかけざんをもとめましょう。${p.n1} かける ${p.n2} は`);
        
        const soundCheckbox = document.getElementById('sound-checkbox');
        if (soundCheckbox && soundCheckbox.checked) {
            qSound.currentTime = 0; qSound.play().catch(e => {});
        }

        const container = document.createElement('div');
        container.className = 'problem-container';

        // --- 左側：ひっ算 ---
        const hissan = document.createElement('div');
        hissan.className = 'hissan-wrapper';

        // 1行目: かけられる数
        const n1_10 = document.createElement('div'); n1_10.textContent = n1S[0]; n1_10.style.gridColumn = '4';
        const n1_1 = document.createElement('div'); n1_1.textContent = n1S[1]; n1_1.style.gridColumn = '5';
        hissan.append(n1_10, n1_1);

        // 2行目: ×記号とかける数
        const op = document.createElement('div'); op.textContent = '×'; op.style.gridColumn = '1'; op.style.color = '#555';
        const n2_10 = document.createElement('div'); n2_10.textContent = n2S[0]; n2_10.className='clickable-digit'; n2_10.style.gridColumn='4'; n2_10.style.borderBottomColor='#55efc4';
        const n2_1 = document.createElement('div'); n2_1.textContent = n2S[1]; n2_1.className='clickable-digit'; n2_1.style.gridColumn='5'; n2_1.style.borderBottomColor='#ff7675';
        hissan.append(op, n2_10, n2_1);

        // 3行目: 線
        const l1 = document.createElement('div'); l1.className='hissan-line'; hissan.append(l1);

        // 4段目：1段目メモ
        const m1 = document.createElement('div'); m1.className='memo-zone'; m1.style.gridColumn='4';
        m1.onclick = () => { activeInput = m1; calcContainer.style.display='grid'; overlay.style.display='block'; };
        hissan.append(m1);

        // 5段目：1段目途中式
        const a1_100 = document.createElement('div'); a1_100.className='drop-zone'; a1_100.style.gridColumn='3';
        const a1_10 = document.createElement('div'); a1_10.className='drop-zone'; a1_10.style.gridColumn='4';
        const a1_1 = document.createElement('div'); a1_1.className='drop-zone'; a1_1.style.gridColumn='5';
        [a1_100, a1_10, a1_1].forEach(d => d.onclick = () => { activeInput = d; calcContainer.style.display='grid'; overlay.style.display='block'; });
        hissan.append(a1_100, a1_10, a1_1);

        // 6段目：2段目メモ
        const m2 = document.createElement('div'); m2.className='memo-zone'; m2.style.gridColumn='3';
        m2.onclick = () => { activeInput = m2; calcContainer.style.display='grid'; overlay.style.display='block'; };
        hissan.append(m2);

        // 7段目：2段目途中式
        const a2_1000 = document.createElement('div'); a2_1000.className='drop-zone'; a2_1000.style.gridColumn='2';
        const a2_100 = document.createElement('div'); a2_100.className='drop-zone'; a2_100.style.gridColumn='3';
        const a2_10 = document.createElement('div'); a2_10.className='drop-zone'; a2_10.style.gridColumn='4';
        const zero = document.createElement('div'); zero.textContent='0'; zero.style.gridColumn='5'; zero.style.color='#ccc';
        [a2_1000, a2_100, a2_10].forEach(d => d.onclick = () => { activeInput = d; calcContainer.style.display='grid'; overlay.style.display='block'; });
        hissan.append(a2_1000, a2_100, a2_10, zero);

        // 8行目: 線
        const l2 = document.createElement('div'); l2.className='hissan-line'; hissan.append(l2);

        // 9段目：合計答え
        const f1000 = document.createElement('div'); f1000.className='drop-zone'; f1000.style.gridColumn='2'; f1000.id = 'ans-box-0';
        const f100 = document.createElement('div'); f100.className='drop-zone'; f100.style.gridColumn='3'; f100.id = 'ans-box-1';
        const f10 = document.createElement('div'); f10.className='drop-zone'; f10.style.gridColumn='4'; f10.id = 'ans-box-2';
        const f1 = document.createElement('div'); f1.className='drop-zone'; f1.style.gridColumn='5'; f1.id = 'ans-box-3';
        [f1000, f100, f10, f1].forEach(d => d.onclick = () => { activeInput = d; calcContainer.style.display='grid'; overlay.style.display='block'; });
        hissan.append(f1000, f100, f10, f1);

        // --- 右側：パネル ---
        const right = document.createElement('div');
        right.className = 'right-panel';
        
        const hintWrap = document.createElement('div');
        hintWrap.className = 'hint-wrapper';
        
        const n1OnesVal = parseInt(n1S[1]);
        const n1TensVal = parseInt(n1S[0]);
        const n2OnesVal = parseInt(n2S[1]);
        const n2TensVal = parseInt(n2S[0]);

        const h1 = document.createElement('div'); h1.className='hint-line';
        h1.innerHTML = `<div class="circle pink">${n1OnesVal}</div> <span>×</span> <span class="text-blue">${n2OnesVal}</span> <span>=</span> <span>${n1OnesVal * n2OnesVal}</span>`;
        const h2 = document.createElement('div'); h2.className='hint-line';
        h2.innerHTML = `<div class="circle pink">${n1TensVal}</div> <span>×</span> <span class="text-blue">${n2OnesVal}</span> <span>=</span> <span>${n1TensVal * n2OnesVal}</span>`;
        
        const h3 = document.createElement('div'); h3.className='hint-line';
        h3.innerHTML = `<div class="circle green">${n1OnesVal}</div> <span>×</span> <span class="text-blue">${n2TensVal}</span> <span>=</span> <span>${n1OnesVal * n2TensVal}</span>`;
        const h4 = document.createElement('div'); h4.className='hint-line';
        h4.innerHTML = `<div class="circle green">${n1TensVal}</div> <span>×</span> <span class="text-blue">${n2TensVal}</span> <span>=</span> <span>${n1TensVal * n2TensVal}</span>`;
        hintWrap.append(h1, h2, h3, h4);

        n2_1.onclick = () => { 
            [h1,h2].forEach(l=>l.classList.add('show')); [h3,h4].forEach(l=>l.classList.remove('show')); 
            n2_1.style.color = '#ff7675'; n2_1.style.borderBottom = 'none';
            n2_10.style.color = '#333'; n2_10.style.borderBottom = '5px dashed';
            speak(n2S[1]+"をかけるよ"); 
            setTimeout(() => playKuku(n1OnesVal, n2OnesVal), 1500);
        };
        n2_10.onclick = () => { 
            [h3,h4].forEach(l=>l.classList.add('show')); [h1,h2].forEach(l=>l.classList.remove('show')); 
            n2_10.style.color = '#00b894'; n2_10.style.borderBottom = 'none';
            n2_1.style.color = '#333'; n2_1.style.borderBottom = '5px dashed';
            speak(n2S[0]+"をかけるよ"); 
            setTimeout(() => playKuku(n1OnesVal, n2TensVal), 1500);
        };

        const btn = document.createElement('button');
        btn.className = 'check-btn'; btn.textContent = 'できた！';
        btn.onclick = () => {
            const userAnsStr = f1000.textContent + f100.textContent + f10.textContent + f1.textContent;
            const finalAns = parseInt(userAnsStr);
            const isCorrect = (finalAns === p.n1 * p.n2);

            const endTime = new Date();
            const problemType = "2桁×2桁のかけ算（ひっ算）";
            const problemContent = `${p.n1} × ${p.n2}`;
            const inputMethod = "計算機入力";
            const resultStr = isCorrect ? "正解" : "不正解";
            
            const csvLine = `"${problemType}","${problemContent}","${userAnsStr}",${formatTime(problemStartTime)},${formatTime(endTime)},${inputMethod},${resultStr}\n`;
            
            if (window.webkit && window.webkit.messageHandlers.appBridge) {
                window.webkit.messageHandlers.appBridge.postMessage({
                    action: "saveCSV",
                    csvLine: csvLine
                });
            }

            const judge = document.getElementById('judge-overlay');
            if(isCorrect) {
                judge.textContent = 'せいかい！'; judge.style.color = '#ff3333'; judge.className='judge-overlay show';
                if (soundCheckbox && soundCheckbox.checked) { okSound.currentTime = 0; okSound.play(); }
                btn.disabled = true;
                setTimeout(()=> { judge.className='judge-overlay'; currentIndex++; renderProblem(); }, 1500);
            } else {
                judge.textContent = 'おしい！'; judge.style.color = '#3366ff'; judge.className='judge-overlay show';
                mistakeCount++;
                if (soundCheckbox && soundCheckbox.checked) { ngSound.currentTime = 0; ngSound.play(); }
                setTimeout(()=> { judge.className='judge-overlay'; }, 1000);
            }
        };

        right.append(hintWrap, btn);
        container.append(hissan, right);
        app.appendChild(container);
    }

    document.getElementById('start-btn').onclick = () => {
        document.getElementById('start-screen').style.display = 'none';
        document.getElementById('main-content').style.display = 'block';
        renderProblem();
    };
</script>
</body>
</html>
