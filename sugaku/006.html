<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>分母と分子</title>
<style>
    html, body {
        height: 100%;
        overflow: hidden;
        position: fixed;
        width: 100%;
    }
    body {
        font-family: "Helvetica Neue", Arial, "Hiragino Kaku Gothic ProN", "Hiragino Sans", Meiryo, sans-serif;
        margin: 0;
        padding: 20px;
        background-color: #ffffff;
        color: #333;
        touch-action: none;
        box-sizing: border-box;
    }
    h1 {
        font-size: 1.2rem;
        font-weight: normal;
        margin-bottom: 20px;
    }
    .status-bar {
        font-size: 1.1rem;
        margin-bottom: 30px;
        color: #555;
    }
    .problem-container {
        display: flex;
        flex-direction: row;
        margin-bottom: 20px;
        width: 100%;
        max-width: 800px;
        align-items: center;
        justify-content: center;
        padding: 20px 0;
    }
    
    /* 問題の分数表示エリア */
    .fraction-display {
        display: flex;
        align-items: center;
        margin-right: 60px;
    }
    .fraction {
        display: inline-flex;
        flex-direction: column;
        align-items: center;
        font-size: 4rem;
        line-height: 1.2;
    }
    .numerator {
        border-bottom: 3px solid #000;
        padding: 0 15px;
    }
    .denominator {
        padding: 0 15px;
    }
    
    /* 回答入力エリア */
    .answer-panel {
        display: flex;
        flex-direction: column;
        gap: 30px;
    }
    .input-row {
        display: flex;
        align-items: center;
    }
    .answer-label {
        font-size: 1.5rem;
        width: 80px;
        text-align: right;
        margin-right: 20px;
    }
    
    .ctrl-group {
        display: flex;
        align-items: center;
    }
    .ctrl-btn {
        width: 50px;
        height: 50px;
        font-size: 1.8rem;
        border: 1px solid #999;
        background-color: #fff;
        border-radius: 8px;
        display: flex;
        justify-content: center;
        align-items: center;
        cursor: pointer;
        touch-action: manipulation;
        outline: none;
        -webkit-tap-highlight-color: transparent;
    }
    .ctrl-btn:active {
        background-color: #e0e0e0;
    }
    .ctrl-btn:disabled {
        opacity: 0.5;
        cursor: not-allowed;
    }
    .val-display {
        width: 80px;
        text-align: center;
        font-size: 2.2rem;
        font-weight: bold;
        border-bottom: 2px solid #000;
        margin: 0 10px;
        padding-bottom: 5px;
    }
    
    .check-btn-container {
        display: flex;
        justify-content: flex-end;
        width: 100%;
        max-width: 800px;
        margin-top: 10px;
    }
    .check-btn {
        padding: 15px 40px;
        font-size: 1.3rem;
        cursor: pointer;
        border: 1px solid #999;
        background-color: #f0f0f0;
        border-radius: 8px;
        font-family: inherit;
        outline: none;
        -webkit-tap-highlight-color: transparent;
        touch-action: manipulation;
    }
    .check-btn:active {
        background-color: #dcdcdc;
    }
    .check-btn:disabled {
        opacity: 0.5;
        cursor: not-allowed;
    }
    
    .result-display {
        font-size: 8rem;
        color: red;
        font-weight: bold;
        text-align: center;
        width: 100%;
        margin-top: 10px;
        min-height: 120px; 
        display: flex;
        justify-content: center;
        align-items: center;
        white-space: nowrap;
    }
    
    /* 最終結果表示用のスタイル */
    .clear-message {
        text-align: center;
        margin-top: 20px;
        padding: 25px;
        background-color: #f8f9fa;
        border-radius: 12px;
        border: 2px solid #a0c4ff;
    }
    .clear-message h2 {
        font-size: 1.8rem;
        color: #d9534f;
        margin-top: 0;
        margin-bottom: 20px;
    }
    .final-result-details {
        font-size: 1.3rem;
        color: #333;
        line-height: 1.8;
    }
    .menu-btn, .retry-btn {
        margin-top: 20px;
        padding: 12px 30px;
        font-size: 1.1rem;
        cursor: pointer;
        border: none;
        border-radius: 8px;
        outline: none;
        touch-action: manipulation;
        text-decoration: none;
        display: inline-block;
    }
    .retry-btn {
        background-color: #a0c4ff;
        color: #fff;
        margin-right: 15px;
    }
    .retry-btn:active {
        background-color: #8bb4f5;
    }
    .menu-btn {
        background-color: #95a5a6;
        color: #fff;
    }
    .menu-btn:active {
        background-color: #7f8c8d;
    }
    
    /* 上部に戻るボタン用 */
    .top-nav {
        display: flex;
        justify-content: flex-end;
        margin-bottom: -10px;
    }
    .back-btn {
        padding: 8px 15px;
        background-color: #ecf0f1;
        border: 1px solid #bdc3c7;
        border-radius: 5px;
        text-decoration: none;
        color: #2c3e50;
        font-size: 0.9rem;
        touch-action: manipulation;
    }
</style>
</head>
<body>

    <div class="top-nav">
        <a href="index.html" class="back-btn">メニューへ戻る</a>
    </div>
    <h1>・ 次の分数の分母、分子はそれぞれいくつでしょう。</h1>
    <div id="app"></div>

    <script>
        // ランダムな真分数を10問生成します
        const problems = [];
        const seen = new Set();
        while (problems.length < 10) {
            const den = Math.floor(Math.random() * 8) + 2; // 分母は2から9
            const num = Math.floor(Math.random() * (den - 1)) + 1; // 分子は1から分母-1の真分数
            const fracKey = `${num}/${den}`;
            if (!seen.has(fracKey)) {
                seen.add(fracKey);
                problems.push({ num: num, den: den });
            }
        }

        function shuffleArray(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
        }

        shuffleArray(problems);
        let currentIndex = 0;
        let mistakeCount = 0;
        const appContainer = document.getElementById('app');

        function renderProblem() {
            appContainer.innerHTML = '';

            if (currentIndex >= problems.length) {
                const clearMsg = document.createElement('div');
                clearMsg.className = 'clear-message';
                
                let htmlContent = `<h2>全10問クリアしました！</h2>`;
                htmlContent += `<div class="final-result-details">`;
                htmlContent += `<div>正解した問題： <strong>10</strong> 問</div>`;
                htmlContent += `<div>間違えた回数： <strong>${mistakeCount}</strong> 回</div>`;
                
                if (mistakeCount === 0) {
                    htmlContent += `<div style="color: blue; font-weight: bold; margin-top: 15px;">パーフェクトです！素晴らしい成績です。</div>`;
                }
                htmlContent += `</div>`;
                htmlContent += `<button class="retry-btn" onclick="location.reload()">もう一度挑戦する</button>`;
                htmlContent += `<a href="index.html" class="menu-btn">メニューへ戻る</a>`;
                
                clearMsg.innerHTML = htmlContent;
                appContainer.appendChild(clearMsg);
                return;
            }

            const prob = problems[currentIndex];
            
            // ユーザー入力用の初期値（ヒントにならないよう固定）
            let ansDen = 1;
            let ansNum = 1;

            const statusBar = document.createElement('div');
            statusBar.className = 'status-bar';
            statusBar.textContent = `第 ${currentIndex + 1} 問 / 全 ${problems.length} 問`;
            appContainer.appendChild(statusBar);

            const container = document.createElement('div');
            container.className = 'problem-container';

            // --- 問題の分数表示エリア ---
            const fracDisplay = document.createElement('div');
            fracDisplay.className = 'fraction-display';

            const fraction = document.createElement('div');
            fraction.className = 'fraction';
            
            const numEl = document.createElement('div');
            numEl.className = 'numerator';
            numEl.textContent = prob.num;
            
            const denEl = document.createElement('div');
            denEl.className = 'denominator';
            denEl.textContent = prob.den;

            fraction.appendChild(numEl);
            fraction.appendChild(denEl);
            fracDisplay.appendChild(fraction);
            container.appendChild(fracDisplay);

            // --- 回答入力エリア ---
            const answerPanel = document.createElement('div');
            answerPanel.className = 'answer-panel';

            // 分母入力行
            const denRow = document.createElement('div');
            denRow.className = 'input-row';
            const denLabel = document.createElement('div');
            denLabel.className = 'answer-label';
            denLabel.textContent = '分母：';
            
            const denControls = document.createElement('div');
            denControls.className = 'ctrl-group';
            const denMinus = document.createElement('button');
            denMinus.className = 'ctrl-btn';
            denMinus.textContent = 'ー';
            const denVal = document.createElement('div');
            denVal.className = 'val-display';
            denVal.textContent = ansDen;
            const denPlus = document.createElement('button');
            denPlus.className = 'ctrl-btn';
            denPlus.textContent = '＋';
            
            denControls.appendChild(denMinus);
            denControls.appendChild(denVal);
            denControls.appendChild(denPlus);
            denRow.appendChild(denLabel);
            denRow.appendChild(denControls);

            // 分子入力行
            const numRow = document.createElement('div');
            numRow.className = 'input-row';
            const numLabel = document.createElement('div');
            numLabel.className = 'answer-label';
            numLabel.textContent = '分子：';
            
            const numControls = document.createElement('div');
            numControls.className = 'ctrl-group';
            const numMinus = document.createElement('button');
            numMinus.className = 'ctrl-btn';
            numMinus.textContent = 'ー';
            const numVal = document.createElement('div');
            numVal.className = 'val-display';
            numVal.textContent = ansNum;
            const numPlus = document.createElement('button');
            numPlus.className = 'ctrl-btn';
            numPlus.textContent = '＋';
            
            numControls.appendChild(numMinus);
            numControls.appendChild(numVal);
            numControls.appendChild(numPlus);
            numRow.appendChild(numLabel);
            numRow.appendChild(numControls);

            answerPanel.appendChild(denRow);
            answerPanel.appendChild(numRow);
            container.appendChild(answerPanel);

            appContainer.appendChild(container);

            // ボタンのイベントリスナー
            denMinus.addEventListener('click', () => { if (ansDen > 1) { ansDen--; denVal.textContent = ansDen; }});
            denPlus.addEventListener('click', () => { if (ansDen < 20) { ansDen++; denVal.textContent = ansDen; }});
            numMinus.addEventListener('click', () => { if (ansNum > 1) { ansNum--; numVal.textContent = ansNum; }});
            numPlus.addEventListener('click', () => { if (ansNum < 20) { ansNum++; numVal.textContent = ansNum; }});

            // 判定ボタン
            const checkBtnContainer = document.createElement('div');
            checkBtnContainer.className = 'check-btn-container';
            const checkBtn = document.createElement('button');
            checkBtn.className = 'check-btn';
            checkBtn.textContent = 'できた';
            checkBtnContainer.appendChild(checkBtn);
            
            appContainer.appendChild(checkBtnContainer);

            const resultDisplay = document.createElement('div');
            resultDisplay.className = 'result-display';
            appContainer.appendChild(resultDisplay);

            checkBtn.addEventListener('click', () => {
                const isCorrect = (ansDen === prob.den) && (ansNum === prob.num);

                if (isCorrect) {
                    resultDisplay.textContent = '正解！';
                    
                    denMinus.disabled = true; denPlus.disabled = true;
                    numMinus.disabled = true; numPlus.disabled = true;
                    checkBtn.disabled = true;
                    
                    setTimeout(() => {
                        currentIndex++;
                        renderProblem();
                    }, 1500);
                } else {
                    resultDisplay.textContent = 'おしい！';
                    mistakeCount++;
                }
            });
        }

        renderProblem();
    </script>
</body>
</html>
