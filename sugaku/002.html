<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>分数の色塗り（円）</title>
<style>
    html, body {
        height: 100%;
        overflow: hidden;
        position: fixed;
        width: 100%;
    }
    body {
        font-family: "Helvetica Neue", Arial, "Hiragino Kaku Gothic ProN", "Hiragino Sans", Meiryo, sans-serif;
        margin: 0;
        padding: 20px;
        background-color: #ffffff;
        color: #333;
        touch-action: none;
        box-sizing: border-box;
    }
    h1 {
        font-size: 1.2rem;
        font-weight: normal;
        margin-bottom: 15px;
    }
    .status-bar {
        font-size: 1.1rem;
        margin-bottom: 20px;
        color: #555;
    }
    .problem-container {
        display: flex;
        flex-direction: column;
        margin-bottom: 20px;
        width: 100%;
        max-width: 800px;
    }
    .problem-main {
        display: flex;
        align-items: center;
        justify-content: center;
        width: 100%;
    }
    .fraction-display {
        display: flex;
        align-items: center;
        margin-right: 50px;
        width: 80px;
        justify-content: center;
    }
    .fraction {
        display: inline-flex;
        flex-direction: column;
        align-items: center;
        font-size: 2.2rem;
        line-height: 1.2;
    }
    .numerator {
        border-bottom: 2px solid #000;
        padding: 0 10px;
    }
    .denominator {
        padding: 0 10px;
    }
    .circle-area {
        display: flex;
        justify-content: center;
        align-items: center;
    }
    .svg-container {
        width: 200px;
        height: 200px;
    }
    .segment {
        fill: #ffffff;
        stroke: #000000;
        stroke-width: 2px;
        cursor: pointer;
        transition: fill 0.2s ease;
        touch-action: manipulation;
        -webkit-tap-highlight-color: transparent;
    }
    .segment.filled {
        fill: #a0c4ff;
    }
    
    .controls-area {
        display: flex;
        align-items: center;
        margin-top: 30px;
        padding-left: 130px;
    }
    .div-btn {
        width: 45px;
        height: 45px;
        font-size: 1.5rem;
        cursor: pointer;
        border: 1px solid #999;
        background-color: #fff;
        border-radius: 8px;
        margin-right: 10px;
        outline: none;
        -webkit-tap-highlight-color: transparent;
        display: flex;
        justify-content: center;
        align-items: center;
        touch-action: manipulation;
    }
    .div-btn:active {
        background-color: #e0e0e0;
    }
    .div-btn:disabled {
        opacity: 0.5;
        cursor: not-allowed;
    }
    .division-label {
        font-size: 1.1rem;
        margin: 0 20px 0 10px;
        color: #555;
    }
    .check-btn {
        padding: 12px 25px;
        font-size: 1.1rem;
        cursor: pointer;
        border: 1px solid #999;
        background-color: #f0f0f0;
        border-radius: 8px;
        font-family: inherit;
        outline: none;
        -webkit-tap-highlight-color: transparent;
        margin-left: auto;
        touch-action: manipulation;
    }
    .check-btn:active {
        background-color: #dcdcdc;
    }
    .check-btn:disabled {
        opacity: 0.5;
        cursor: not-allowed;
    }
    
    .result-display {
        font-size: 8rem;
        color: red;
        font-weight: bold;
        text-align: center;
        width: 100%;
        margin-top: 15px;
        min-height: 120px; 
        display: flex;
        justify-content: center;
        align-items: center;
        white-space: nowrap;
    }
    
    /* 最終結果表示用のスタイル */
    .clear-message {
        text-align: center;
        margin-top: 20px;
        padding: 25px;
        background-color: #f8f9fa;
        border-radius: 12px;
        border: 2px solid #a0c4ff;
    }
    .clear-message h2 {
        font-size: 1.8rem;
        color: #d9534f;
        margin-top: 0;
        margin-bottom: 20px;
    }
    .final-result-details {
        font-size: 1.3rem;
        color: #333;
        line-height: 1.8;
    }
    .retry-btn {
        margin-top: 20px;
        padding: 12px 30px;
        font-size: 1.1rem;
        cursor: pointer;
        border: none;
        background-color: #a0c4ff;
        color: #fff;
        border-radius: 8px;
        outline: none;
        touch-action: manipulation;
    }
    .retry-btn:active {
        background-color: #8bb4f5;
    }
</style>
</head>
<body>

    <h1>・ 次の分数の分だけ色をぬりましょう。</h1>
    <div id="app"></div>

    <script>
        const problems = [
            { num: 1, den: 3 },
            { num: 3, den: 5 },
            { num: 1, den: 2 },
            { num: 7, den: 8 },
            { num: 5, den: 7 },
            { num: 3, den: 4 },
            { num: 2, den: 9 },
            { num: 2, den: 3 },
            { num: 4, den: 5 },
            { num: 5, den: 6 }
        ];

        function shuffleArray(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
        }

        // 初期状態のセットアップ
        shuffleArray(problems);
        let currentIndex = 0;
        let mistakeCount = 0; // 間違えた回数を記録する変数
        const appContainer = document.getElementById('app');

        function renderProblem() {
            appContainer.innerHTML = '';

            // 全問終了時の結果表示処理
            if (currentIndex >= problems.length) {
                const clearMsg = document.createElement('div');
                clearMsg.className = 'clear-message';
                
                // 最終結果をHTMLで構築
                let htmlContent = `<h2>全10問クリアしました！</h2>`;
                htmlContent += `<div class="final-result-details">`;
                htmlContent += `<div>正解した問題： <strong>10</strong> 問</div>`;
                htmlContent += `<div>間違えた回数： <strong>${mistakeCount}</strong> 回</div>`;
                
                if (mistakeCount === 0) {
                    htmlContent += `<div style="color: blue; font-weight: bold; margin-top: 15px;">パーフェクトです！素晴らしい成績です。</div>`;
                }
                
                htmlContent += `</div>`;
                
                // 最初からやり直すボタン
                htmlContent += `<button class="retry-btn" onclick="location.reload()">もう一度挑戦する</button>`;
                
                clearMsg.innerHTML = htmlContent;
                appContainer.appendChild(clearMsg);
                return;
            }

            const prob = problems[currentIndex];
            let currentDivisions = 1;

            const statusBar = document.createElement('div');
            statusBar.className = 'status-bar';
            statusBar.textContent = `第 ${currentIndex + 1} 問 / 全 ${problems.length} 問`;
            appContainer.appendChild(statusBar);

            const container = document.createElement('div');
            container.className = 'problem-container';

            const mainArea = document.createElement('div');
            mainArea.className = 'problem-main';

            const fracDisplay = document.createElement('div');
            fracDisplay.className = 'fraction-display';

            const fraction = document.createElement('div');
            fraction.className = 'fraction';
            
            const numEl = document.createElement('div');
            numEl.className = 'numerator';
            numEl.textContent = prob.num;
            
            const denEl = document.createElement('div');
            denEl.className = 'denominator';
            denEl.textContent = prob.den;

            fraction.appendChild(numEl);
            fraction.appendChild(denEl);
            fracDisplay.appendChild(fraction);
            mainArea.appendChild(fracDisplay);

            const circleArea = document.createElement('div');
            circleArea.className = 'circle-area';

            const svgContainer = document.createElement('div');
            svgContainer.className = 'svg-container';
            
            const svg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
            svg.setAttribute('width', '100%');
            svg.setAttribute('height', '100%');
            svg.setAttribute('viewBox', '0 0 200 200');

            function updateCircle() {
                svg.innerHTML = '';
                for (let i = 0; i < currentDivisions; i++) {
                    let segment;
                    if (currentDivisions === 1) {
                        // 分割数1の場合は単純な円を描画
                        segment = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
                        segment.setAttribute('cx', '100');
                        segment.setAttribute('cy', '100');
                        segment.setAttribute('r', '90');
                        segment.setAttribute('class', 'segment');
                    } else {
                        // 分割数が2以上の場合は扇形（パス）を計算して描画
                        const startAngle = (i / currentDivisions) * Math.PI * 2 - Math.PI / 2;
                        const endAngle = ((i + 1) / currentDivisions) * Math.PI * 2 - Math.PI / 2;

                        const x1 = 100 + 90 * Math.cos(startAngle);
                        const y1 = 100 + 90 * Math.sin(startAngle);
                        const x2 = 100 + 90 * Math.cos(endAngle);
                        const y2 = 100 + 90 * Math.sin(endAngle);

                        const largeArcFlag = (1 / currentDivisions) > 0.5 ? 0 : 1;
                        
                        // 180度ジャスト（分割数2）の時のために微調整を追加
                        const arcFlag = (currentDivisions === 2) ? 0 : ((1 / currentDivisions) < 0.5 ? 0 : 1);

                        const d = [
                            'M', 100, 100,
                            'L', x1, y1,
                            'A', 90, 90, 0, arcFlag, 1, x2, y2,
                            'Z'
                        ].join(' ');

                        segment = document.createElementNS('http://www.w3.org/2000/svg', 'path');
                        segment.setAttribute('d', d);
                        segment.setAttribute('class', 'segment');
                    }
                    
                    segment.addEventListener('click', function() {
                        this.classList.toggle('filled');
                    });
                    
                    svg.appendChild(segment);
                }
            }
            
            updateCircle();

            svgContainer.appendChild(svg);
            circleArea.appendChild(svgContainer);
            mainArea.appendChild(circleArea);
            container.appendChild(mainArea);

            const controlsArea = document.createElement('div');
            controlsArea.className = 'controls-area';

            const minusBtn = document.createElement('button');
            minusBtn.className = 'div-btn';
            minusBtn.textContent = 'ー';

            const plusBtn = document.createElement('button');
            plusBtn.className = 'div-btn';
            plusBtn.textContent = '＋';

            const divLabel = document.createElement('div');
            divLabel.className = 'division-label';
            divLabel.textContent = `（${currentDivisions} 分割）`;

            minusBtn.addEventListener('click', () => {
                if (currentDivisions > 1) {
                    currentDivisions--;
                    divLabel.textContent = `（${currentDivisions} 分割）`;
                    updateCircle(); 
                }
            });

            plusBtn.addEventListener('click', () => {
                if (currentDivisions < 20) { 
                    currentDivisions++;
                    divLabel.textContent = `（${currentDivisions} 分割）`;
                    updateCircle(); 
                }
            });

            const checkBtn = document.createElement('button');
            checkBtn.className = 'check-btn';
            checkBtn.textContent = 'できた';

            const resultDisplay = document.createElement('div');
            resultDisplay.className = 'result-display';

            checkBtn.addEventListener('click', () => {
                const filledCount = svg.querySelectorAll('.segment.filled').length;
                
                const isCorrect = filledCount > 0 && 
                                  Math.abs((filledCount / currentDivisions) - (prob.num / prob.den)) < 0.0001;

                if (isCorrect) {
                    resultDisplay.textContent = '正解！';
                    
                    minusBtn.disabled = true;
                    plusBtn.disabled = true;
                    checkBtn.disabled = true;
                    
                    setTimeout(() => {
                        currentIndex++;
                        renderProblem();
                    }, 1500);
                } else {
                    resultDisplay.textContent = 'おしい！';
                    mistakeCount++; 
                }
            });

            controlsArea.appendChild(minusBtn);
            controlsArea.appendChild(plusBtn);
            controlsArea.appendChild(divLabel);
            controlsArea.appendChild(checkBtn);
            
            container.appendChild(controlsArea);
            container.appendChild(resultDisplay);
            
            appContainer.appendChild(container);
        }

        renderProblem();
    </script>
</body>
</html>
