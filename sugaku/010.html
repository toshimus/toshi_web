<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>分数の大きさくらべ</title>
<style>
    html, body {
        height: 100%;
        overflow: hidden;
        position: fixed;
        width: 100%;
    }
    body {
        font-family: "Helvetica Neue", Arial, "Hiragino Kaku Gothic ProN", "Hiragino Sans", Meiryo, sans-serif;
        margin: 0;
        padding: 20px;
        background-color: #ffffff;
        color: #333;
        touch-action: none;
        box-sizing: border-box;
        user-select: none;
        -webkit-user-select: none;
    }
    
    /* スタート画面のスタイル */
    .start-screen {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background-color: #f0f8ff;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        z-index: 10000;
    }
    .start-screen h1 {
        font-size: 3rem;
        color: #2c3e50;
        margin-bottom: 40px;
    }
    .start-btn {
        padding: 20px 60px;
        font-size: 2.5rem;
        font-weight: bold;
        color: #fff;
        background-color: #3498db;
        border: none;
        border-radius: 15px;
        cursor: pointer;
        box-shadow: 0 8px 0 #2980b9;
        transition: transform 0.1s, box-shadow 0.1s;
        -webkit-tap-highlight-color: transparent;
    }
    .start-btn:active {
        transform: translateY(8px);
        box-shadow: none;
    }

    .status-bar {
        font-size: 1.4rem;
        font-weight: bold;
        margin-bottom: 10px;
        color: #555;
    }
    .question-title {
        font-size: 2rem;
        font-weight: bold;
        margin-top: 5px;
        margin-bottom: 20px;
    }

    .problem-container {
        display: flex;
        flex-direction: row;
        align-items: center;
        justify-content: center;
        width: 100%;
        max-width: 900px;
        margin: 0 auto;
        padding: 10px;
    }
    
    /* 数式（左側）エリア */
    .equation-area {
        display: flex;
        align-items: center;
        margin-right: 40px;
        background-color: #f9f9f9;
        padding: 20px 30px;
        border-radius: 12px;
        border: 1px solid #ddd;
    }
    .fraction {
        display: inline-flex;
        flex-direction: column;
        align-items: center;
        font-size: 3rem;
        font-weight: bold;
        line-height: 1.2;
        margin: 0 15px;
    }
    .numerator {
        border-bottom: 3px solid #000;
        padding: 0 15px;
    }
    .denominator {
        padding: 0 15px;
    }
    
    /* 図解（右側）エリア */
    .visual-area {
        flex-grow: 1;
        max-width: 450px;
    }
    .svg-container {
        width: 100%;
        height: 220px;
    }
    
    /* ドロップゾーン（□の枠） */
    .drop-zone {
        width: 70px;
        height: 70px;
        border: 3px dashed #3498db;
        background-color: #f0f8ff;
        border-radius: 12px;
        display: flex;
        justify-content: center;
        align-items: center;
        font-size: 3rem;
        font-weight: bold;
        cursor: pointer;
        color: #3498db;
        margin: 0 15px;
    }

    /* ＞、＜、できた！ボタンを横一列に並べるコンテナ */
    .interaction-container {
        display: flex;
        justify-content: center;
        align-items: center;
        flex-wrap: nowrap;
        gap: 20px;
        margin-top: 10px;
        padding: 20px;
        background-color: #ecf0f1;
        border-radius: 12px;
        max-width: 800px;
        margin-left: auto;
        margin-right: auto;
    }
    .piece {
        width: 80px;
        height: 80px;
        border: 2px solid #2c3e50;
        background-color: #f1c40f;
        border-radius: 12px;
        display: flex;
        justify-content: center;
        align-items: center;
        font-size: 3rem;
        font-weight: bold;
        cursor: pointer;
        color: #2c3e50;
        box-shadow: 0 5px 0 #d4ac0d;
        touch-action: manipulation;
    }
    .piece:active {
        transform: translateY(5px);
        box-shadow: none;
    }
    
    /* 判定ボタンを青色の立体パターンに変更 */
    .check-btn {
        padding: 0 30px;
        height: 60px;
        font-size: 1.6rem;
        font-weight: bold;
        cursor: pointer;
        border: none;
        background-color: #00bfff;
        color: #ffffff;
        border-radius: 10px;
        font-family: inherit;
        outline: none;
        box-shadow: 0 4px 0 #0088cc;
        -webkit-tap-highlight-color: transparent;
        touch-action: manipulation;
        display: flex;
        justify-content: center;
        align-items: center;
    }
    .check-btn:active {
        transform: translateY(4px);
        box-shadow: none;
    }
    .check-btn:disabled {
        opacity: 0.5;
        cursor: not-allowed;
        transform: translateY(4px);
        box-shadow: none;
    }
    
    .hint-text {
        text-align: center;
        color: #e74c3c;
        font-size: 1.1rem;
        font-weight: bold;
        margin-top: 15px;
        margin-bottom: 5px;
    }
    
    .judge-overlay {
        position: fixed;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%) scale(0.7);
        opacity: 0;
        visibility: hidden;
        background-color: transparent;
        color: #ff3333;
        font-size: 6rem;
        font-weight: bold;
        padding: 30px 60px;
        -webkit-text-stroke: 3px #000;
        text-shadow: 4px 4px 10px rgba(0, 0, 0, 0.5);
        z-index: 9999;
        pointer-events: none;
        transition: opacity 0.3s ease, transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275), visibility 0.3s;
        white-space: nowrap;
    }
    .judge-overlay.show { opacity: 1; visibility: visible; transform: translate(-50%, -50%) scale(1.0); }
    .judge-overlay.incorrect { color: #3366ff; }
    
    .clear-message { text-align: center; margin-top: 20px; padding: 25px; background-color: #f8f9fa; border-radius: 12px; border: 2px solid #a0c4ff; }
    .clear-message h2 { font-size: 1.8rem; color: #d9534f; margin-top: 0; margin-bottom: 20px; }
    .final-result-details { font-size: 1.3rem; color: #333; line-height: 1.8; }
    .menu-btn, .retry-btn { padding: 12px 30px; font-size: 1.1rem; cursor: pointer; border: none; border-radius: 8px; color:#fff; text-decoration: none; display: inline-block; margin: 10px;}
    .retry-btn { background-color: #a0c4ff; margin-right: 15px;}
    .menu-btn { background-color: #95a5a6; }
    
    .top-nav { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
    .toggle-group { display: flex; gap: 15px; }
    .settings-toggle { font-size: 1.1rem; color: #555; cursor: pointer; display: flex; align-items: center; }
    .settings-toggle input { transform: scale(1.3); margin-right: 8px; cursor: pointer; }
    .back-btn { padding: 8px 15px; background-color: #ecf0f1; border: 1px solid #bdc3c7; border-radius: 5px; text-decoration: none; color: #2c3e50; font-size: 0.9rem; }
</style>
</head>
<body>

    <div id="start-screen" class="start-screen">
        <h1>分数の大きさくらべ</h1>
        <button id="start-btn" class="start-btn">スタート</button>
        <BR><BR><a href="index.html" class="menu-btn" style="margin-top: 20px; background-color: #95a5a6;">メニューへ戻る</a>
    </div>

    <div id="main-content" style="display: none;">
        <div class="top-nav">
            <div class="toggle-group">
                <label class="settings-toggle">
                    <input type="checkbox" id="speech-checkbox" checked>
                    スピーチON
                </label>
                <label class="settings-toggle">
                    <input type="checkbox" id="sound-checkbox" checked>
                    効果音ON
                </label>
            </div>
            <a href="index.html" class="back-btn">メニューへ戻る</a>
        </div>
        
        <div id="status-bar" class="status-bar"></div>
        <h1 class="question-title" id="question-title">・ 図を見て、□にあてはまる不等号（＞、＜）を書きましょう。</h1>
        
        <div id="app"></div>
        <div id="judge-overlay" class="judge-overlay"></div>
    </div>

    <script>
        const okSound = new Audio('ok.mp3');
        const ngSound = new Audio('ng.mp3');
        const qSound = new Audio('q.mp3');

        function speak(text) {
            const speechCheckbox = document.getElementById('speech-checkbox');
            if (speechCheckbox && !speechCheckbox.checked) return; 
            window.speechSynthesis.cancel(); 
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'ja-JP';
            window.speechSynthesis.speak(utterance);
        }

        const problems = [];
        const seen = new Set();
        
        while (problems.length < 10) {
            const num = Math.floor(Math.random() * 4) + 1; 
            const d1 = Math.floor(Math.random() * 6) + num + 1; 
            const d2 = Math.floor(Math.random() * 6) + num + 1; 
            
            if (d1 !== d2) {
                const key = `${num}/${d1}_${num}/${d2}`;
                if (!seen.has(key)) {
                    seen.add(key);
                    const correctSign = (num / d1) > (num / d2) ? '＞' : '＜';
                    problems.push({ n: num, d1: d1, d2: d2, sign: correctSign });
                }
            }
        }

        let currentIndex = 0;
        let mistakeCount = 0;
        const appContainer = document.getElementById('app');
        
        let problemStartTime = new Date();

        function formatTime(date) {
            return date.getHours().toString().padStart(2, '0') + ':' + 
                   date.getMinutes().toString().padStart(2, '0') + ':' + 
                   date.getSeconds().toString().padStart(2, '0');
        }

        function renderProblem() {
            appContainer.innerHTML = '';
            problemStartTime = new Date();

            if (currentIndex >= problems.length) {
                document.getElementById('status-bar').style.display = 'none';
                document.getElementById('question-title').style.display = 'none';
                
                const clearMsg = document.createElement('div');
                clearMsg.className = 'clear-message';
                
                let htmlContent = `<h2>全10問クリアしました！</h2>`;
                htmlContent += `<div class="final-result-details">`;
                htmlContent += `<div>正解した問題： <strong>10</strong> 問</div>`;
                htmlContent += `<div>間違えた回数： <strong>${mistakeCount}</strong> 回</div>`;
                
                if (mistakeCount === 0) {
                    htmlContent += `<div style="color: blue; font-weight: bold; margin-top: 15px;">パーフェクトです！素晴らしい成績です。</div>`;
                }
                htmlContent += `</div>`;
                htmlContent += `<button class="retry-btn" onclick="location.reload()">もう一度挑戦する</button>`;
                htmlContent += `<a href="index.html" class="menu-btn">メニューへ戻る</a>`;
                
                clearMsg.innerHTML = htmlContent;
                appContainer.appendChild(clearMsg);
                speak("ぜんもんくりあです。おつかれさまでした。");
                return;
            }

            document.getElementById('status-bar').style.display = 'block';
            document.getElementById('question-title').style.display = 'block';
            document.getElementById('status-bar').textContent = `第 ${currentIndex + 1} 問 / 全 ${problems.length} 問`;

            const soundCheckbox = document.getElementById('sound-checkbox');
            if (soundCheckbox && soundCheckbox.checked) {
                qSound.currentTime = 0;
                qSound.play().catch(e => console.log("Auto-play blocked:", e));
            }

            const prob = problems[currentIndex];

            const container = document.createElement('div');
            container.className = 'problem-container';

            // --- 数式エリア（左側） ---
            const equationArea = document.createElement('div');
            equationArea.className = 'equation-area';

            const frac1 = document.createElement('div');
            frac1.className = 'fraction';
            frac1.innerHTML = `<div class="numerator">${prob.n}</div><div class="denominator">${prob.d1}</div>`;
            equationArea.appendChild(frac1);

            const dropZone = document.createElement('div');
            dropZone.className = 'drop-zone';
            dropZone.id = 'ans-zone';
            dropZone.addEventListener('click', () => { 
                dropZone.textContent = ''; 
                speak("くりあ");
            });
            equationArea.appendChild(dropZone);

            const frac2 = document.createElement('div');
            frac2.className = 'fraction';
            frac2.innerHTML = `<div class="numerator">${prob.n}</div><div class="denominator">${prob.d2}</div>`;
            equationArea.appendChild(frac2);

            container.appendChild(equationArea);

            // --- 図解エリア（右側） ---
            const visualArea = document.createElement('div');
            visualArea.className = 'visual-area';
            
            const svgContainer = document.createElement('div');
            svgContainer.className = 'svg-container';
            const svgNS = 'http://www.w3.org/2000/svg';
            const svg = document.createElementNS(svgNS, 'svg');
            svg.setAttribute('width', '100%');
            svg.setAttribute('height', '100%');
            svg.setAttribute('viewBox', '0 0 400 220');
            
            const barWidth = 320;
            const startX = 40;
            
            const bar1Y = 20;
            const bar1Height = 40;
            const fillWidth1 = barWidth * (prob.n / prob.d1);
            
            const fill1 = document.createElementNS(svgNS, 'rect');
            fill1.setAttribute('x', startX.toString()); fill1.setAttribute('y', bar1Y.toString());
            fill1.setAttribute('width', fillWidth1.toString()); fill1.setAttribute('height', bar1Height.toString());
            fill1.setAttribute('fill', '#fff3cd');
            svg.appendChild(fill1);

            const outline1 = document.createElementNS(svgNS, 'rect');
            outline1.setAttribute('x', startX.toString()); outline1.setAttribute('y', bar1Y.toString());
            outline1.setAttribute('width', barWidth.toString()); outline1.setAttribute('height', bar1Height.toString());
            outline1.setAttribute('fill', 'none'); outline1.setAttribute('stroke', '#000'); outline1.setAttribute('stroke-width', '2');
            svg.appendChild(outline1);
            
            for(let i=1; i<prob.d1; i++){
                const lineX = startX + barWidth * (i / prob.d1);
                const line = document.createElementNS(svgNS, 'line');
                line.setAttribute('x1', lineX.toString()); line.setAttribute('y1', bar1Y.toString());
                line.setAttribute('x2', lineX.toString()); line.setAttribute('y2', (bar1Y + bar1Height).toString());
                line.setAttribute('stroke', '#000');
                line.setAttribute('stroke-dasharray', '4,4');
                svg.appendChild(line);
            }

            const bar2Y = 80;
            const bar2Height = 40;
            const fillWidth2 = barWidth * (prob.n / prob.d2);

            const fill2 = document.createElementNS(svgNS, 'rect');
            fill2.setAttribute('x', startX.toString()); fill2.setAttribute('y', bar2Y.toString());
            fill2.setAttribute('width', fillWidth2.toString()); fill2.setAttribute('height', bar2Height.toString());
            fill2.setAttribute('fill', '#fff3cd');
            svg.appendChild(fill2);

            const outline2 = document.createElementNS(svgNS, 'rect');
            outline2.setAttribute('x', startX.toString()); outline2.setAttribute('y', bar2Y.toString());
            outline2.setAttribute('width', barWidth.toString()); outline2.setAttribute('height', bar2Height.toString());
            outline2.setAttribute('fill', 'none'); outline2.setAttribute('stroke', '#000'); outline2.setAttribute('stroke-width', '2');
            svg.appendChild(outline2);
            
            for(let i=1; i<prob.d2; i++){
                const lineX = startX + barWidth * (i / prob.d2);
                const line = document.createElementNS(svgNS, 'line');
                line.setAttribute('x1', lineX.toString()); line.setAttribute('y1', bar2Y.toString());
                line.setAttribute('x2', lineX.toString()); line.setAttribute('y2', (bar2Y + bar2Height).toString());
                line.setAttribute('stroke', '#000');
                line.setAttribute('stroke-dasharray', '4,4');
                svg.appendChild(line);
            }

            const lineY = 160;
            const numLine = document.createElementNS(svgNS, 'line');
            numLine.setAttribute('x1', startX.toString()); numLine.setAttribute('y1', lineY.toString());
            numLine.setAttribute('x2', (startX + barWidth).toString()); numLine.setAttribute('y2', lineY.toString());
            numLine.setAttribute('stroke', '#000'); numLine.setAttribute('stroke-width', '3');
            svg.appendChild(numLine);
            
            const tick0 = document.createElementNS(svgNS, 'line');
            tick0.setAttribute('x1', startX.toString()); tick0.setAttribute('y1', (lineY - 10).toString());
            tick0.setAttribute('x2', startX.toString()); tick0.setAttribute('y2', (lineY + 10).toString());
            tick0.setAttribute('stroke', '#000'); tick0.setAttribute('stroke-width', '3');
            svg.appendChild(tick0);
            
            const text0 = document.createElementNS(svgNS, 'text');
            text0.setAttribute('x', startX.toString()); text0.setAttribute('y', (lineY + 30).toString());
            text0.setAttribute('text-anchor', 'middle'); text0.setAttribute('font-size', '18');
            text0.textContent = '0';
            svg.appendChild(text0);

            const tick1 = document.createElementNS(svgNS, 'line');
            tick1.setAttribute('x1', (startX + barWidth).toString()); tick1.setAttribute('y1', (lineY - 10).toString());
            tick1.setAttribute('x2', (startX + barWidth).toString()); tick1.setAttribute('y2', (lineY + 10).toString());
            tick1.setAttribute('stroke', '#000'); tick1.setAttribute('stroke-width', '3');
            svg.appendChild(tick1);

            const text1 = document.createElementNS(svgNS, 'text');
            text1.setAttribute('x', (startX + barWidth).toString()); text1.setAttribute('y', (lineY + 30).toString());
            text1.setAttribute('text-anchor', 'middle'); text1.setAttribute('font-size', '18');
            text1.textContent = '1';
            svg.appendChild(text1);

            const drawPointer = (valX, num, den, isTopBar) => {
                const pointer = document.createElementNS(svgNS, 'line');
                pointer.setAttribute('x1', valX.toString()); pointer.setAttribute('y1', isTopBar ? (bar1Y + bar1Height).toString() : (bar2Y + bar2Height).toString());
                pointer.setAttribute('x2', valX.toString()); pointer.setAttribute('y2', lineY.toString());
                pointer.setAttribute('stroke', '#f39c12');
                pointer.setAttribute('stroke-width', '2');
                pointer.setAttribute('stroke-dasharray', '5,5');
                svg.appendChild(pointer);

                const lblNum = document.createElementNS(svgNS, 'text');
                lblNum.setAttribute('x', valX.toString()); lblNum.setAttribute('y', (lineY + 28).toString());
                lblNum.setAttribute('text-anchor', 'middle'); lblNum.setAttribute('font-size', '16');
                lblNum.textContent = num;
                svg.appendChild(lblNum);
                
                const lblLine = document.createElementNS(svgNS, 'line');
                lblLine.setAttribute('x1', (valX - 8).toString()); lblLine.setAttribute('y1', (lineY + 33).toString());
                lblLine.setAttribute('x2', (valX + 8).toString()); lblLine.setAttribute('y2', (lineY + 33).toString());
                lblLine.setAttribute('stroke', '#000'); lblLine.setAttribute('stroke-width', '1');
                svg.appendChild(lblLine);

                const lblDen = document.createElementNS(svgNS, 'text');
                lblDen.setAttribute('x', valX.toString()); lblDen.setAttribute('y', (lineY + 48).toString());
                lblDen.setAttribute('text-anchor', 'middle'); lblDen.setAttribute('font-size', '16');
                lblDen.textContent = den;
                svg.appendChild(lblDen);
            };

            drawPointer(startX + fillWidth1, prob.n, prob.d1, true);
            drawPointer(startX + fillWidth2, prob.n, prob.d2, false);

            svgContainer.appendChild(svg);
            visualArea.appendChild(svgContainer);
            container.appendChild(visualArea);

            appContainer.appendChild(container);

            // --- 操作ボタンエリア（＞、＜、できた！） ---
            const hintText = document.createElement('div');
            hintText.className = 'hint-text';
            hintText.innerHTML = '下のボタンをタップして□に入れよう！<br>※枠をタップすると消せます';
            appContainer.appendChild(hintText);

            const interactionContainer = document.createElement('div');
            interactionContainer.className = 'interaction-container';
            
            ['＞', '＜'].forEach(sign => {
                const piece = document.createElement('div');
                piece.className = 'piece';
                piece.dataset.val = sign;
                piece.textContent = sign;
                piece.addEventListener('click', () => {
                    dropZone.textContent = sign;
                    //const signSpeech = sign === '＞' ? 'だいなり' : 'しょうなり';
                    //speak(signSpeech);
                });
                interactionContainer.appendChild(piece);
            });

            // 判定ボタン
            const checkBtn = document.createElement('button');
            checkBtn.className = 'check-btn';
            checkBtn.textContent = 'できた！';
            interactionContainer.appendChild(checkBtn);

            appContainer.appendChild(interactionContainer);

            checkBtn.addEventListener('click', () => {
                const userAnswer = document.getElementById('ans-zone').textContent;
                if (!userAnswer) return;

                const isCorrect = (userAnswer === prob.sign);
                
                const endTime = new Date();
                const problemType = "分数の大きさくらべ";
                const problemContent = `${prob.n}/${prob.d1} と ${prob.n}/${prob.d2}`;
                const inputMethod = "タップ";
                const resultStr = isCorrect ? "正解" : "不正解";
                
                const csvLine = `"${problemType}","${problemContent}","${userAnswer}",${formatTime(problemStartTime)},${formatTime(endTime)},${inputMethod},${resultStr}\n`;
                
                if (window.webkit && window.webkit.messageHandlers.appBridge) {
                    window.webkit.messageHandlers.appBridge.postMessage({
                        action: "saveCSV",
                        csvLine: csvLine
                    });
                }

                const overlay = document.getElementById('judge-overlay');

                if (isCorrect) {
                    overlay.textContent = 'せいかい！';
                    overlay.className = 'judge-overlay show';
                    if (soundCheckbox && soundCheckbox.checked) {
                        okSound.currentTime = 0;
                        okSound.play();
                    }
                    checkBtn.disabled = true;
                    
                    setTimeout(() => { overlay.classList.remove('show'); }, 1200);
                    setTimeout(() => { currentIndex++; renderProblem(); }, 1500);
                } else {
                    overlay.textContent = 'おしい！';
                    overlay.className = 'judge-overlay incorrect show';
                    mistakeCount++;
                    if (soundCheckbox && soundCheckbox.checked) {
                        ngSound.currentTime = 0;
                        ngSound.play();
                    }
                    setTimeout(() => { overlay.classList.remove('show'); }, 1200);
                }
            });
        }

        // --- スタートボタンのイベントリスナー ---
        document.getElementById('start-btn').addEventListener('click', () => {
            document.getElementById('start-screen').style.display = 'none';
            document.getElementById('main-content').style.display = 'block';
            renderProblem();
        });

    </script>
</body>
</html>
