<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>図を見て分数を答える</title>
    
    <!-- 共通スタイルの読み込み -->
    <link rel="stylesheet" href="app-common.css">

    <!-- 003固有のスタイル -->
    <style>
        :root {
            --bar-height: clamp(35px, 6vh, 50px);
        }

        .problem-container {
            display: flex;
            flex-direction: column;
            margin-bottom: 20px;
            width: 100%;
            max-width: 800px;
            margin-left: auto;
            margin-right: auto;
            flex: 1;
            justify-content: center;
        }
        .problem-main {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
            margin-bottom: clamp(10px, 2vh, 20px);
        }
        .bar-area {
            width: 100%;
            display: flex;
            flex-direction: column;
            margin-top: 10px;
        }
        .label-1m {
            display: flex;
            align-items: center;
            text-align: center;
            margin-bottom: 8px;
            font-size: clamp(0.9rem, 2vw, 1.1rem);
            color: blue; 
        }
        .label-1m::before, .label-1m::after {
            content: "";
            flex: 1;
            border-bottom: 1px solid blue; 
            margin: 0 15px;
        }
        .bar {
            display: flex;
            width: 100%;
            height: var(--bar-height);
            border: 2px solid #000;
            box-sizing: border-box;
        }
        .segment {
            flex: 1;
            border-right: 1px dotted #000;
            box-sizing: border-box;
        }
        .segment:last-child { border-right: none; }
        .segment.filled { background-color: #a0c4ff; }

        .answer-area {
            display: flex;
            align-items: center;
            justify-content: center;
            margin-top: clamp(10px, 2vh, 20px);
            flex-wrap: wrap;
            gap: 10px;
        }
        .answer-label {
            font-size: clamp(1.2rem, 3vw, 1.5rem);
            margin-right: 10px;
        }
        .fraction-input {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-right: 5px;
        }

        .drop-zone {
            width: clamp(50px, 8vw, 65px);
            height: clamp(50px, 8vw, 65px);
            border: 2px dashed #3498db;
            background-color: #f0f8ff;
            border-radius: 8px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: clamp(1.8rem, 5vw, 2.2rem);
            font-weight: bold;
            cursor: pointer;
            color: #333;
            touch-action: manipulation;
        }
        .fraction-line {
            width: 100%;
            height: 3px;
            background-color: #000;
            margin: 6px 0;
        }
        .unit {
            font-size: clamp(1.4rem, 4vw, 1.8rem);
            margin-left: 5px;
            margin-right: 15px;
        }

        .hint-text {
            text-align: center;
            color: #e74c3c;
            font-size: clamp(0.9rem, 2vw, 1.1rem);
            font-weight: bold;
            margin-top: 15px;
        }

        .check-btn {
            padding: 0 clamp(20px, 4vw, 30px);
            height: clamp(45px, 7vh, 60px);
            font-size: clamp(1.2rem, 3vw, 1.6rem);
            font-weight: bold;
            cursor: pointer;
            border: none;
            background-color: #00bfff;
            color: #ffffff;
            border-radius: 10px;
            font-family: inherit;
            outline: none;
            box-shadow: 0 4px 0 #0088cc;
            -webkit-tap-highlight-color: transparent;
            touch-action: manipulation;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .check-btn:active { transform: translateY(4px); box-shadow: none; }
        .check-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: translateY(4px); box-shadow: none; }
    </style>
</head>
<body>

    <!-- スタート画面 -->
    <div id="start-screen" class="start-screen">
        <h1>図を見て分数を答える</h1>
        <button id="start-btn" class="start-btn">スタート</button>
        <div style="margin-top: 30px; text-align: center;">
            <a href="index.html" class="menu-btn">メニューへ戻る</a>
        </div>
    </div>

    <!-- メイン領域 -->
    <div id="main-content" style="display: none; height: 100%; width: 100%;">
        <div class="top-nav">
            <div class="toggle-group">
                <label class="settings-toggle">
                    <input type="checkbox" id="speech-checkbox" checked> スピーチON
                </label>
                <label class="settings-toggle">
                    <input type="checkbox" id="sound-checkbox" checked> 効果音ON
                </label>
            </div>
            <a href="index.html" class="back-btn">メニューへ戻る</a>
        </div>
        
        <div id="status-bar" class="status-bar"></div>
        <h1 class="question-title">・ 色をぬったところの長さは、何mでしょう。</h1>
        
        <div id="app"></div>
        <div id="judge-overlay" class="judge-overlay"></div>
    </div>

    <!-- 共有JavaScriptの読み込み -->
    <script src="app-common.js"></script>
    <script src="calc-keyboard.js"></script>

    <!-- 003固有のJavaScript -->
    <script>
        const problems = [];
        const seen = new Set();
        while (problems.length < 10) {
            const den = Math.floor(Math.random() * 9) + 2; 
            const num = Math.floor(Math.random() * (den - 1)) + 1;
            const fracKey = `${num}/${den}`;
            if (!seen.has(fracKey)) {
                seen.add(fracKey);
                problems.push({ num: num, den: den });
            }
        }

        function shuffleArray(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
        }

        shuffleArray(problems);
        let currentIndex = 0;
        let mistakeCount = 0;
        const appContainer = document.getElementById('app');
        let problemStartTime;

        function renderProblem() {
            appContainer.innerHTML = '';
            problemStartTime = new Date();

            if (currentIndex >= problems.length) {
                document.getElementById('status-bar').style.display = 'none';
                document.querySelector('.question-title').style.display = 'none';
                
                const clearMsg = document.createElement('div');
                clearMsg.className = 'clear-message';
                
                let htmlContent = `<h2>全10問クリアしました！</h2>`;
                htmlContent += `<div class="final-result-details">`;
                htmlContent += `<div>正解した問題： <strong>10</strong> 問</div>`;
                htmlContent += `<div>間違えた回数： <strong>${mistakeCount}</strong> 回</div>`;
                
                if (mistakeCount === 0) {
                    htmlContent += `<div style="color: blue; font-weight: bold; margin-top: 15px;">パーフェクトです！素晴らしい成績です。</div>`;
                }
                
                htmlContent += `</div>`;
                htmlContent += `<button class="retry-btn" onclick="location.reload()">もう一度挑戦する</button>`;
                htmlContent += `<a href="index.html" class="menu-btn">メニューへ戻る</a>`;
                
                clearMsg.innerHTML = htmlContent;
                appContainer.appendChild(clearMsg);
                
                AppAudio.speak("ぜんもんくりあです。おつかれさでした。");
                return;
            }

            AppAudio.playQ();

            const prob = problems[currentIndex];

            document.getElementById('status-bar').style.display = 'block';
            document.querySelector('.question-title').style.display = 'block';
            document.getElementById('status-bar').textContent = `第 ${currentIndex + 1} 問 / 全 ${problems.length} 問`;

            const container = document.createElement('div');
            container.className = 'problem-container';

            const mainArea = document.createElement('div');
            mainArea.className = 'problem-main';

            const barArea = document.createElement('div');
            barArea.className = 'bar-area';

            const label1m = document.createElement('div');
            label1m.className = 'label-1m';
            label1m.textContent = '1 m';
            barArea.appendChild(label1m);

            const bar = document.createElement('div');
            bar.className = 'bar';

            for (let i = 0; i < prob.den; i++) {
                const segment = document.createElement('div');
                segment.className = 'segment';
                if (i < prob.num) {
                    segment.classList.add('filled');
                }
                bar.appendChild(segment);
            }

            barArea.appendChild(bar);
            mainArea.appendChild(barArea);
            container.appendChild(mainArea);

            // 回答エリア
            const answerArea = document.createElement('div');
            answerArea.className = 'answer-area';

            const answerLabel = document.createElement('div');
            answerLabel.className = 'answer-label';
            answerLabel.textContent = 'こたえ：';

            const fractionInput = document.createElement('div');
            fractionInput.className = 'fraction-input';

            // 分子枠
            const numZone = document.createElement('div');
            numZone.className = 'drop-zone';
            numZone.id = 'ans-num';
            numZone.addEventListener('click', () => { 
                CalcKeyboard.open(numZone);
            });

            const fractionLine = document.createElement('div');
            fractionLine.className = 'fraction-line';

            // 分母枠
            const denZone = document.createElement('div');
            denZone.className = 'drop-zone';
            denZone.id = 'ans-den';
            denZone.addEventListener('click', () => { 
                CalcKeyboard.open(denZone);
            });

            fractionInput.appendChild(numZone);
            fractionInput.appendChild(fractionLine);
            fractionInput.appendChild(denZone);

            const unitEl = document.createElement('div');
            unitEl.className = 'unit';
            unitEl.textContent = 'm';

            const checkBtn = document.createElement('button');
            checkBtn.className = 'check-btn';
            checkBtn.textContent = 'できた';

            answerArea.appendChild(answerLabel);
            answerArea.appendChild(fractionInput);
            answerArea.appendChild(unitEl);
            answerArea.appendChild(checkBtn);

            container.appendChild(answerArea);

            const hintText = document.createElement('div');
            hintText.className = 'hint-text';
            hintText.innerHTML = '枠をタップして、計算機で数字を入力してください';
            container.appendChild(hintText);
            
            appContainer.appendChild(container);

            checkBtn.addEventListener('click', () => {
                const userNum = parseInt(document.getElementById('ans-num').textContent, 10);
                const userDen = parseInt(document.getElementById('ans-den').textContent, 10);

                if (isNaN(userNum) || isNaN(userDen)) return;

                const isCorrect = (userNum === prob.num) && (userDen === prob.den);
                
                AppLogger.save({
                    storageKey: "fraction_bar_reading_history",
                    problemType: "図を見て分数を答える",
                    problemContent: `図：${prob.num}/${prob.den}m`,
                    userAnswer: `${userNum}/${userDen}m`,
                    startTime: problemStartTime,
                    endTime: new Date(),
                    inputMethod: "計算機入力",
                    isCorrect: isCorrect
                });

                const judgeOverlay = document.getElementById('judge-overlay');

                if (isCorrect) {
                    judgeOverlay.textContent = 'せいかい！';
                    judgeOverlay.className = 'judge-overlay show';
                    AppAudio.playOk();
                    
                    checkBtn.disabled = true;
                    
                    setTimeout(() => { judgeOverlay.classList.remove('show'); }, 1200);
                    setTimeout(() => {
                        currentIndex++;
                        renderProblem();
                    }, 1500);
                } else {
                    judgeOverlay.textContent = 'おしい！';
                    judgeOverlay.className = 'judge-overlay incorrect show';
                    mistakeCount++;
                    AppAudio.playNg();
                    
                    setTimeout(() => { judgeOverlay.classList.remove('show'); }, 1200);
                }
            });
        }

        document.getElementById('start-btn').addEventListener('click', () => {
            document.getElementById('start-screen').style.display = 'none';
            document.getElementById('main-content').style.display = 'block';
            renderProblem();
        });
    </script>
</body>
</html>
