<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>図を見て分数を答える</title>
<style>
    html, body {
        height: 100%;
        overflow: hidden;
        position: fixed;
        width: 100%;
    }
    body {
        font-family: "Helvetica Neue", Arial, "Hiragino Kaku Gothic ProN", "Hiragino Sans", Meiryo, sans-serif;
        margin: 0;
        padding: 20px;
        background-color: #ffffff;
        color: #333;
        touch-action: none;
        box-sizing: border-box;
    }
    h1 {
        font-size: 1.2rem;
        font-weight: normal;
        margin-bottom: 15px;
    }
    .status-bar {
        font-size: 1.1rem;
        margin-bottom: 20px;
        color: #555;
    }
    .problem-container {
        display: flex;
        flex-direction: column;
        margin-bottom: 20px;
        width: 100%;
        max-width: 800px;
    }
    .problem-main {
        display: flex;
        flex-direction: column;
        width: 100%;
        margin-bottom: 20px;
    }
    .bar-area {
        width: 100%;
        display: flex;
        flex-direction: column;
        margin-top: 20px;
    }
    .label-1m {
        display: flex;
        align-items: center;
        text-align: center;
        margin-bottom: 10px;
        font-size: 1.1rem;
        color: blue; 
    }
    .label-1m::before, .label-1m::after {
        content: "";
        flex: 1;
        border-bottom: 1px solid blue; 
        margin: 0 15px;
    }
    .bar {
        display: flex;
        width: 100%;
        height: 50px;
        border: 2px solid #000;
        box-sizing: border-box;
    }
    .segment {
        flex: 1;
        border-right: 1px dotted #000;
        box-sizing: border-box;
    }
    .segment:last-child {
        border-right: none;
    }
    .segment.filled {
        background-color: #a0c4ff;
    }
    
    .answer-area {
        display: flex;
        align-items: center;
        justify-content: flex-start;
        margin-top: 30px;
        padding-left: 20px;
    }
    .answer-label {
        font-size: 1.5rem;
        margin-right: 30px;
    }
    .fraction-input {
        display: flex;
        flex-direction: column;
        align-items: center;
        margin-right: 10px;
    }
    .num-controls, .den-controls {
        display: flex;
        align-items: center;
    }
    .val-display {
        width: 60px;
        text-align: center;
        font-size: 2.2rem;
        font-weight: bold;
    }
    .fraction-line {
        width: 100%;
        height: 3px;
        background-color: #000;
        margin: 8px 0;
    }
    .ctrl-btn {
        width: 45px;
        height: 45px;
        font-size: 1.5rem;
        border: 1px solid #999;
        background-color: #fff;
        border-radius: 8px;
        display: flex;
        justify-content: center;
        align-items: center;
        cursor: pointer;
        touch-action: manipulation;
        outline: none;
        -webkit-tap-highlight-color: transparent;
    }
    .ctrl-btn:active {
        background-color: #e0e0e0;
    }
    .ctrl-btn:disabled {
        opacity: 0.5;
        cursor: not-allowed;
    }
    .unit {
        font-size: 1.5rem;
        margin-left: 15px;
        margin-right: 50px;
    }
    
    .check-btn {
        padding: 15px 30px;
        font-size: 1.2rem;
        cursor: pointer;
        border: 1px solid #999;
        background-color: #f0f0f0;
        border-radius: 8px;
        font-family: inherit;
        outline: none;
        -webkit-tap-highlight-color: transparent;
        touch-action: manipulation;
        margin-left: auto;
    }
    .check-btn:active {
        background-color: #dcdcdc;
    }
    .check-btn:disabled {
        opacity: 0.5;
        cursor: not-allowed;
    }
    
    .result-display {
        font-size: 8rem;
        color: red;
        font-weight: bold;
        text-align: center;
        width: 100%;
        margin-top: 10px;
        min-height: 120px; 
        display: flex;
        justify-content: center;
        align-items: center;
        white-space: nowrap;
    }
    
    /* 最終結果表示用のスタイル */
    .clear-message {
        text-align: center;
        margin-top: 20px;
        padding: 25px;
        background-color: #f8f9fa;
        border-radius: 12px;
        border: 2px solid #a0c4ff;
    }
    .clear-message h2 {
        font-size: 1.8rem;
        color: #d9534f;
        margin-top: 0;
        margin-bottom: 20px;
    }
    .final-result-details {
        font-size: 1.3rem;
        color: #333;
        line-height: 1.8;
    }
    .menu-btn, .retry-btn {
        margin-top: 20px;
        padding: 12px 30px;
        font-size: 1.1rem;
        cursor: pointer;
        border: none;
        border-radius: 8px;
        outline: none;
        touch-action: manipulation;
        text-decoration: none;
        display: inline-block;
    }
    .retry-btn {
        background-color: #a0c4ff;
        color: #fff;
        margin-right: 15px;
    }
    .retry-btn:active {
        background-color: #8bb4f5;
    }
    .menu-btn {
        background-color: #95a5a6;
        color: #fff;
    }
    .menu-btn:active {
        background-color: #7f8c8d;
    }
    
    /* 上部に戻るボタン用 */
    .top-nav {
        display: flex;
        justify-content: flex-end;
        margin-bottom: -10px;
    }
    .back-btn {
        padding: 8px 15px;
        background-color: #ecf0f1;
        border: 1px solid #bdc3c7;
        border-radius: 5px;
        text-decoration: none;
        color: #2c3e50;
        font-size: 0.9rem;
        touch-action: manipulation;
    }
</style>
</head>
<body>

    <div class="top-nav">
        <a href="index.html" class="back-btn">メニューへ戻る</a>
    </div>
    <h1>・ 色をぬったところの長さは、何mでしょう。</h1>
    <div id="app"></div>

    <script>
        // ランダムな真分数を10問生成します
        const problems = [];
        const seen = new Set();
        while (problems.length < 10) {
            const den = Math.floor(Math.random() * 9) + 2; // 分母は2から10
            const num = Math.floor(Math.random() * (den - 1)) + 1; // 分子は1から分母-1の真分数
            const fracKey = `${num}/${den}`;
            if (!seen.has(fracKey)) {
                seen.add(fracKey);
                problems.push({ num: num, den: den });
            }
        }

        function shuffleArray(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
        }

        shuffleArray(problems);
        let currentIndex = 0;
        let mistakeCount = 0;
        const appContainer = document.getElementById('app');

        function renderProblem() {
            appContainer.innerHTML = '';

            if (currentIndex >= problems.length) {
                const clearMsg = document.createElement('div');
                clearMsg.className = 'clear-message';
                
                let htmlContent = `<h2>全10問クリアしました！</h2>`;
                htmlContent += `<div class="final-result-details">`;
                htmlContent += `<div>正解した問題： <strong>10</strong> 問</div>`;
                htmlContent += `<div>間違えた回数： <strong>${mistakeCount}</strong> 回</div>`;
                
                if (mistakeCount === 0) {
                    htmlContent += `<div style="color: blue; font-weight: bold; margin-top: 15px;">パーフェクトです！素晴らしい成績です。</div>`;
                }
                
                htmlContent += `</div>`;
                
                htmlContent += `<button class="retry-btn" onclick="location.reload()">もう一度挑戦する</button>`;
                htmlContent += `<a href="index.html" class="menu-btn">メニューへ戻る</a>`;
                
                clearMsg.innerHTML = htmlContent;
                appContainer.appendChild(clearMsg);
                return;
            }

            const prob = problems[currentIndex];
            
            // ユーザー入力用の初期値
            let ansNum = 1;
            let ansDen = 2;

            const statusBar = document.createElement('div');
            statusBar.className = 'status-bar';
            statusBar.textContent = `第 ${currentIndex + 1} 問 / 全 ${problems.length} 問`;
            appContainer.appendChild(statusBar);

            const container = document.createElement('div');
            container.className = 'problem-container';

            const mainArea = document.createElement('div');
            mainArea.className = 'problem-main';

            const barArea = document.createElement('div');
            barArea.className = 'bar-area';

            const label1m = document.createElement('div');
            label1m.className = 'label-1m';
            label1m.textContent = '1 m';
            barArea.appendChild(label1m);

            const bar = document.createElement('div');
            bar.className = 'bar';

            // 問題のバーを固定で描画
            for (let i = 0; i < prob.den; i++) {
                const segment = document.createElement('div');
                segment.className = 'segment';
                if (i < prob.num) {
                    segment.classList.add('filled');
                }
                bar.appendChild(segment);
            }

            barArea.appendChild(bar);
            mainArea.appendChild(barArea);
            container.appendChild(mainArea);

            // 回答入力エリア
            const answerArea = document.createElement('div');
            answerArea.className = 'answer-area';

            const answerLabel = document.createElement('div');
            answerLabel.className = 'answer-label';
            answerLabel.textContent = 'こたえ：';

            const fractionInput = document.createElement('div');
            fractionInput.className = 'fraction-input';

            // 分子のコントロール
            const numControls = document.createElement('div');
            numControls.className = 'num-controls';
            const numMinus = document.createElement('button');
            numMinus.className = 'ctrl-btn';
            numMinus.textContent = 'ー';
            const numVal = document.createElement('div');
            numVal.className = 'val-display';
            numVal.textContent = ansNum;
            const numPlus = document.createElement('button');
            numPlus.className = 'ctrl-btn';
            numPlus.textContent = '＋';
            
            numControls.appendChild(numMinus);
            numControls.appendChild(numVal);
            numControls.appendChild(numPlus);

            const fractionLine = document.createElement('div');
            fractionLine.className = 'fraction-line';

            // 分母のコントロール
            const denControls = document.createElement('div');
            denControls.className = 'den-controls';
            const denMinus = document.createElement('button');
            denMinus.className = 'ctrl-btn';
            denMinus.textContent = 'ー';
            const denVal = document.createElement('div');
            denVal.className = 'val-display';
            denVal.textContent = ansDen;
            const denPlus = document.createElement('button');
            denPlus.className = 'ctrl-btn';
            denPlus.textContent = '＋';

            denControls.appendChild(denMinus);
            denControls.appendChild(denVal);
            denControls.appendChild(denPlus);

            fractionInput.appendChild(numControls);
            fractionInput.appendChild(fractionLine);
            fractionInput.appendChild(denControls);

            const unitEl = document.createElement('div');
            unitEl.className = 'unit';
            unitEl.textContent = 'm';

            const checkBtn = document.createElement('button');
            checkBtn.className = 'check-btn';
            checkBtn.textContent = 'できた';

            // ボタンのイベントリスナー
            numMinus.addEventListener('click', () => {
                if (ansNum > 1) { ansNum--; numVal.textContent = ansNum; }
            });
            numPlus.addEventListener('click', () => {
                if (ansNum < 20) { ansNum++; numVal.textContent = ansNum; }
            });
            denMinus.addEventListener('click', () => {
                if (ansDen > 1) { ansDen--; denVal.textContent = ansDen; }
            });
            denPlus.addEventListener('click', () => {
                if (ansDen < 20) { ansDen++; denVal.textContent = ansDen; }
            });

            answerArea.appendChild(answerLabel);
            answerArea.appendChild(fractionInput);
            answerArea.appendChild(unitEl);
            answerArea.appendChild(checkBtn);

            container.appendChild(answerArea);

            const resultDisplay = document.createElement('div');
            resultDisplay.className = 'result-display';
            container.appendChild(resultDisplay);
            
            appContainer.appendChild(container);

            checkBtn.addEventListener('click', () => {
                const isCorrect = (ansNum === prob.num) && (ansDen === prob.den);

                if (isCorrect) {
                    resultDisplay.textContent = '正解！';
                    
                    numMinus.disabled = true;
                    numPlus.disabled = true;
                    denMinus.disabled = true;
                    denPlus.disabled = true;
                    checkBtn.disabled = true;
                    
                    setTimeout(() => {
                        currentIndex++;
                        renderProblem();
                    }, 1500);
                } else {
                    resultDisplay.textContent = 'おしい！';
                    mistakeCount++;
                }
            });
        }

        renderProblem();
    </script>
</body>
</html>
