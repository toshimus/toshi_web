<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>分数の色塗り</title>
    
    <!-- 共通スタイルの読み込み -->
    <link rel="stylesheet" href="app-common.css">

    <!-- 分数の色塗り 固有のスタイル -->
    <style>
        :root {
            --bar-height: clamp(35px, 6vh, 55px);
        }

        .problem-container {
            display: flex;
            flex-direction: column;
            margin-bottom: 20px;
            width: 100%;
            max-width: 800px;
            margin-left: auto;
            margin-right: auto;
            flex: 1;
            justify-content: center;
        }
        .problem-main {
            display: flex;
            flex-direction: column; 
            align-items: center;    
            width: 100%;
        }
        .fraction-display {
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: clamp(15px, 3vh, 30px);    
        }
        .fraction {
            display: inline-flex;
            flex-direction: column;
            align-items: center;
            font-size: clamp(2.5rem, 8vw, 3.6rem);
            line-height: 1.1;
        }
        .numerator {
            border-bottom: 3px solid #000;
            padding: 0 10px;
        }
        .denominator {
            padding: 0 10px;
        }
        .unit {
            font-size: clamp(2rem, 6vw, 2.8rem);
            margin-left: 15px;
        }
        .bar-area {
            width: 100%;            
            display: flex;
            flex-direction: column;
        }
        .label-1m {
            display: flex;
            align-items: center;
            text-align: center;
            margin-bottom: 8px;
            font-size: clamp(0.9rem, 2vw, 1.1rem);
            color: blue; 
        }
        .label-1m::before, .label-1m::after {
            content: "";
            flex: 1;
            border-bottom: 1px solid blue; 
            margin: 0 15px;
        }
        .bar {
            display: flex;
            width: 100%;
            height: var(--bar-height);
            border: 2px solid #000;
            box-sizing: border-box;
        }
        .segment {
            flex: 1;
            border-right: 1px dotted #000;
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
            transition: background-color 0.2s ease;
            touch-action: manipulation;
        }
        .segment:last-child {
            border-right: none;
        }
        .segment.filled {
            background-color: #a0c4ff;
        }
        
        .controls-area {
            display: flex;
            align-items: center;
            justify-content: center; 
            margin-top: clamp(15px, 3vh, 30px);
            width: 100%;
            flex-wrap: wrap;
            gap: 10px;
        }
        .div-btn {
            width: clamp(38px, 6vw, 45px);
            height: clamp(38px, 6vw, 45px);
            font-size: clamp(1.2rem, 3vw, 1.5rem);
            cursor: pointer;
            border: 1px solid #999;
            background-color: #fff;
            border-radius: 8px;
            outline: none;
            -webkit-tap-highlight-color: transparent;
            display: flex;
            justify-content: center;
            align-items: center;
            touch-action: manipulation;
        }
        .div-btn:active { background-color: #e0e0e0; }
        .div-btn:disabled { opacity: 0.5; cursor: not-allowed; }

        .division-label {
            font-size: clamp(1.1rem, 2.8vw, 1.5rem);      
            margin: 0 10px;
            color: #555;
        }
        .check-btn {
            padding: 0 clamp(20px, 4vw, 30px);
            height: clamp(45px, 7vh, 60px);
            font-size: clamp(1.2rem, 3vw, 1.6rem);
            font-weight: bold;
            cursor: pointer;
            border: none;
            background-color: #00bfff;
            color: #ffffff;
            border-radius: 10px;
            font-family: inherit;
            outline: none;
            box-shadow: 0 4px 0 #0088cc;
            -webkit-tap-highlight-color: transparent;
            touch-action: manipulation;
            display: flex;
            justify-content: center;
            align-items: center;
            margin-left: 10px;
        }
        .check-btn:active { transform: translateY(4px); box-shadow: none; }
        .check-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: translateY(4px); box-shadow: none; }
    </style>
</head>
<body>

    <!-- スタート画面 -->
    <div id="start-screen" class="start-screen">
        <h1>分数の色塗り</h1>
        <button id="start-btn" class="start-btn">スタート</button>
        <div style="margin-top: 30px; text-align: center;">
            <a href="index.html" class="menu-btn">メニューへ戻る</a>
        </div>
    </div>

    <!-- メイン画面 -->
    <div id="main-content" style="display: none; height: 100%; width: 100%;">
        <div class="top-nav">
            <div class="toggle-group">
                <label class="settings-toggle">
                    <input type="checkbox" id="speech-checkbox" checked> スピーチON
                </label>
                <label class="settings-toggle">
                    <input type="checkbox" id="sound-checkbox" checked> 効果音ON
                </label>
            </div>
            <a href="index.html" class="back-btn">メニューへ戻る</a>
        </div>
        
        <div id="status-bar" class="status-bar"></div>
        <h1 class="question-title">・ 次の長さの分だけ色をぬりましょう。</h1>
        
        <div id="app"></div>
        <div id="judge-overlay" class="judge-overlay"></div>
    </div>

    <!-- 共通JavaScriptの読み込み -->
    <script src="app-common.js"></script>

    <!-- 分数の色塗り 固有JavaScript -->
    <script>
        const numberReadings = [
            "ぜろ", "いち", "に", "さん", "よん", "ご", "ろく", "なな", "はち", "きゅう", "じゅう",
            "じゅういち", "じゅうに", "じゅうさん", "じゅうよん", "じゅうご", "じゅうろく", "じゅうなな", "じゅうはち", "じゅうきゅう", "にじゅう"
        ];

        // 問題生成 (10問)
        const problems = [];
        const seen = new Set();
        while (problems.length < 10) {
            const den = Math.floor(Math.random() * 9) + 2; 
            const num = Math.floor(Math.random() * (den - 1)) + 1; 
            const fracKey = `${num}/${den}`;
            if (!seen.has(fracKey)) {
                seen.add(fracKey);
                problems.push({ num: num, den: den });
            }
        }

        function shuffleArray(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
        }

        shuffleArray(problems);
        let currentIndex = 0;
        let mistakeCount = 0; 
        const appContainer = document.getElementById('app');
        let problemStartTime;

        function renderProblem() {
            appContainer.innerHTML = '';
            problemStartTime = new Date();

            if (currentIndex >= problems.length) {
                document.getElementById('status-bar').style.display = 'none';
                document.querySelector('.question-title').style.display = 'none';
                
                const clearMsg = document.createElement('div');
                clearMsg.className = 'clear-message';
                
                let htmlContent = `<h2>全10問クリアしました！</h2>`;
                htmlContent += `<div class="final-result-details">`;
                htmlContent += `<div>正解した問題： <strong>10</strong> 問</div>`;
                htmlContent += `<div>間違えた回数： <strong>${mistakeCount}</strong> 回</div>`;
                
                if (mistakeCount === 0) {
                    htmlContent += `<div style="color: blue; font-weight: bold; margin-top: 15px;">パーフェクトです！素晴らしい成績です。</div>`;
                }
                
                htmlContent += `</div>`;
                htmlContent += `<button class="retry-btn" onclick="location.reload()">もう一度挑戦する</button>`;
                htmlContent += `<a href="index.html" class="menu-btn">メニューへ戻る</a>`;
                
                clearMsg.innerHTML = htmlContent;
                appContainer.appendChild(clearMsg);
                
                AppAudio.speak("ぜんもんくりあです。おつかれさまでした。");
                return;
            }
            
            AppAudio.playQ();
            
            document.getElementById('status-bar').style.display = 'block';
            document.querySelector('.question-title').style.display = 'block';
            document.getElementById('status-bar').textContent = `第 ${currentIndex + 1} 問 / 全 ${problems.length} 問`;

            const prob = problems[currentIndex];
            let currentDivisions = 1;

            const container = document.createElement('div');
            container.className = 'problem-container';

            const mainArea = document.createElement('div');
            mainArea.className = 'problem-main';

            const fracDisplay = document.createElement('div');
            fracDisplay.className = 'fraction-display';

            const fraction = document.createElement('div');
            fraction.className = 'fraction';
            
            const numEl = document.createElement('div');
            numEl.className = 'numerator';
            numEl.textContent = prob.num;
            
            const denEl = document.createElement('div');
            denEl.className = 'denominator';
            denEl.textContent = prob.den;

            fraction.appendChild(numEl);
            fraction.appendChild(denEl);

            const unitEl = document.createElement('div');
            unitEl.className = 'unit';
            unitEl.textContent = 'm';

            fracDisplay.appendChild(fraction);
            fracDisplay.appendChild(unitEl);
            mainArea.appendChild(fracDisplay);

            const barArea = document.createElement('div');
            barArea.className = 'bar-area';

            const label1m = document.createElement('div');
            label1m.className = 'label-1m';
            label1m.textContent = '1 m';
            barArea.appendChild(label1m);

            const bar = document.createElement('div');
            bar.className = 'bar';

            function updateBar() {
                bar.innerHTML = '';
                for (let i = 0; i < currentDivisions; i++) {
                    const segment = document.createElement('div');
                    segment.className = 'segment';
                    
                    segment.addEventListener('click', function() {
                        this.classList.toggle('filled');
                        const filledCount = bar.querySelectorAll('.segment.filled').length;
                        if (filledCount >= 0 && filledCount <= 20) {
                            AppAudio.speak(numberReadings[filledCount]);
                        }
                    });
                    
                    bar.appendChild(segment);
                }
            }
            
            updateBar();

            barArea.appendChild(bar);
            mainArea.appendChild(barArea);
            container.appendChild(mainArea);

            const controlsArea = document.createElement('div');
            controlsArea.className = 'controls-area';

            const minusBtn = document.createElement('button');
            minusBtn.className = 'div-btn';
            minusBtn.textContent = 'ー';

            const plusBtn = document.createElement('button');
            plusBtn.className = 'div-btn';
            plusBtn.textContent = '＋';

            const divLabel = document.createElement('div');
            divLabel.className = 'division-label';
            divLabel.textContent = `（${currentDivisions} 分割）`;

            minusBtn.addEventListener('click', () => {
                if (currentDivisions > 1) {
                    currentDivisions--;
                    divLabel.textContent = `（${currentDivisions} 分割）`;
                    updateBar(); 
                    AppAudio.speak(currentDivisions + "ぶんかつ");
                }
            });

            plusBtn.addEventListener('click', () => {
                if (currentDivisions < 20) { 
                    currentDivisions++;
                    divLabel.textContent = `（${currentDivisions} 分割）`;
                    updateBar(); 
                    AppAudio.speak(currentDivisions + "ぶんかつ");
                }
            });

            const checkBtn = document.createElement('button');
            checkBtn.className = 'check-btn';
            checkBtn.textContent = 'できた';

            checkBtn.addEventListener('click', () => {
                const filledCount = bar.querySelectorAll('.segment.filled').length;
                const isCorrect = filledCount > 0 && Math.abs((filledCount / currentDivisions) - (prob.num / prob.den)) < 0.0001;
                
                AppLogger.save({
                    storageKey: "fraction_coloring_history",
                    problemType: "分数の色塗り",
                    problemContent: `${prob.num}/${prob.den}m`,
                    userAnswer: `${currentDivisions}分割で${filledCount}つ塗り`,
                    startTime: problemStartTime,
                    endTime: new Date(),
                    inputMethod: "タップ",
                    isCorrect: isCorrect
                });

                const overlay = document.getElementById('judge-overlay');

                if (isCorrect) {
                    overlay.textContent = 'せいかい！';
                    overlay.className = 'judge-overlay show';
                    AppAudio.playOk();
                    
                    minusBtn.disabled = true;
                    plusBtn.disabled = true;
                    checkBtn.disabled = true;
                    
                    setTimeout(() => { overlay.classList.remove('show'); }, 1200);
                    setTimeout(() => {
                        currentIndex++;
                        renderProblem();
                    }, 1500);
                } else {
                    overlay.textContent = 'おしい！';
                    overlay.className = 'judge-overlay incorrect show';
                    mistakeCount++; 
                    AppAudio.playNg();
                    
                    setTimeout(() => { overlay.classList.remove('show'); }, 1200);
                }
            });

            controlsArea.appendChild(minusBtn);
            controlsArea.appendChild(plusBtn);
            controlsArea.appendChild(divLabel);
            controlsArea.appendChild(checkBtn);
            
            container.appendChild(controlsArea);
            appContainer.appendChild(container);
        }

        document.getElementById('start-btn').addEventListener('click', () => {
            document.getElementById('start-screen').style.display = 'none';
            document.getElementById('main-content').style.display = 'block';
            renderProblem();
        });
    </script>
</body>
</html>
