<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>分数の色塗り</title>
<style>
    html, body {
        height: 100%;
        overflow: hidden;
        position: fixed;
        width: 100%;
    }
    body {
        font-family: "Helvetica Neue", Arial, "Hiragino Kaku Gothic ProN", "Hiragino Sans", Meiryo, sans-serif;
        margin: 0;
        padding: 20px;
        background-color: #ffffff;
        color: #333;
        touch-action: none;
        box-sizing: border-box;
    }
    
    /* 上部ステータスバーと問題文のスタイル */
    .status-bar {
        font-size: 1.2rem;
        font-weight: bold;
        margin-bottom: 10px;
        color: #555;
    }
    .question-title {
        font-size: 1.6rem;
        font-weight: normal;
        margin-bottom: 25px;
        margin-top: 0;
    }

    .problem-container {
        display: flex;
        flex-direction: column;
        margin-bottom: 20px;
        width: 100%;
        max-width: 800px;
    }
    .problem-main {
        display: flex;
        align-items: center;
        width: 100%;
    }
    .fraction-display {
        display: flex;
        align-items: center;
        margin-right: 30px;
        width: 100px;
    }
    .fraction {
        display: inline-flex;
        flex-direction: column;
        align-items: center;
        font-size: 1.8rem;
        line-height: 1.2;
    }
    .numerator {
        border-bottom: 2px solid #000;
        padding: 0 10px;
    }
    .denominator {
        padding: 0 10px;
    }
    .unit {
        font-size: 1.4rem;
        margin-left: 10px;
    }
    .bar-area {
        flex-grow: 1;
        display: flex;
        flex-direction: column;
    }
    .label-1m {
        display: flex;
        align-items: center;
        text-align: center;
        margin-bottom: 10px;
        font-size: 1.1rem;
        color: blue; 
    }
    .label-1m::before, .label-1m::after {
        content: "";
        flex: 1;
        border-bottom: 1px solid blue; 
        margin: 0 15px;
    }
    .bar {
        display: flex;
        width: 100%;
        height: 50px;
        border: 2px solid #000;
        box-sizing: border-box;
    }
    .segment {
        flex: 1;
        border-right: 1px dotted #000;
        cursor: pointer;
        -webkit-tap-highlight-color: transparent;
        transition: background-color 0.2s ease;
        touch-action: manipulation;
    }
    .segment:last-child {
        border-right: none;
    }
    .segment.filled {
        background-color: #a0c4ff;
    }
    
    .controls-area {
        display: flex;
        align-items: center;
        margin-top: 20px;
        padding-left: 130px;
    }
    .div-btn {
        width: 45px;
        height: 45px;
        font-size: 1.5rem;
        cursor: pointer;
        border: 1px solid #999;
        background-color: #fff;
        border-radius: 8px;
        margin-right: 10px;
        outline: none;
        -webkit-tap-highlight-color: transparent;
        display: flex;
        justify-content: center;
        align-items: center;
        touch-action: manipulation;
    }
    .div-btn:active {
        background-color: #e0e0e0;
    }
    .div-btn:disabled {
        opacity: 0.5;
        cursor: not-allowed;
    }
    .division-label {
        font-size: 1.1rem;
        margin: 0 20px 0 10px;
        color: #555;
    }
    .check-btn {
        padding: 12px 25px;
        font-size: 1.1rem;
        cursor: pointer;
        border: 1px solid #999;
        background-color: #f0f0f0;
        border-radius: 8px;
        font-family: inherit;
        outline: none;
        -webkit-tap-highlight-color: transparent;
        margin-left: auto;
        touch-action: manipulation;
    }
    .check-btn:active {
        background-color: #dcdcdc;
    }
    .check-btn:disabled {
        opacity: 0.5;
        cursor: not-allowed;
    }
    
    .judge-overlay {
        position: fixed;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%) scale(0.7);
        opacity: 0;
        visibility: hidden;
        background-color: transparent;
        color: #ff3333;
        font-size: 6rem;
        font-weight: bold;
        padding: 30px 60px;
        -webkit-text-stroke: 3px #000;
        text-shadow: 4px 4px 10px rgba(0, 0, 0, 0.5);
        z-index: 9999;
        pointer-events: none;
        transition: opacity 0.3s ease, transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275), visibility 0.3s;
        white-space: nowrap;
    }
    .judge-overlay.show {
        opacity: 1;
        visibility: visible;
        transform: translate(-50%, -50%) scale(1.0);
    }
    .judge-overlay.incorrect {
        color: #3366ff;
    }
    
    .clear-message {
        text-align: center;
        margin-top: 20px;
        padding: 25px;
        background-color: #f8f9fa;
        border-radius: 12px;
        border: 2px solid #a0c4ff;
    }
    .clear-message h2 {
        font-size: 1.8rem;
        color: #d9534f;
        margin-top: 0;
        margin-bottom: 20px;
    }
    .final-result-details {
        font-size: 1.3rem;
        color: #333;
        line-height: 1.8;
    }
    .retry-btn, .menu-btn {
        margin-top: 20px;
        padding: 12px 30px;
        font-size: 1.1rem;
        cursor: pointer;
        border: none;
        border-radius: 8px;
        outline: none;
        touch-action: manipulation;
        text-decoration: none;
        display: inline-block;
    }
    .retry-btn {
        background-color: #a0c4ff;
        color: #fff;
        margin-right: 15px;
    }
    .retry-btn:active {
        background-color: #8bb4f5;
    }
    .menu-btn {
        background-color: #95a5a6;
        color: #fff;
    }
    .menu-btn:active {
        background-color: #7f8c8d;
    }
    
    .top-nav {
        display: flex;
        justify-content: flex-end;
        margin-bottom: 10px;
    }
    .back-btn {
        padding: 8px 15px;
        background-color: #ecf0f1;
        border: 1px solid #bdc3c7;
        border-radius: 5px;
        text-decoration: none;
        color: #2c3e50;
        font-size: 0.9rem;
        touch-action: manipulation;
    }
</style>
</head>
<body>

    <div class="top-nav">
        <a href="index.html" class="back-btn">メニューへ戻る</a>
    </div>
    
    <div id="status-bar" class="status-bar"></div>
    <h1 class="question-title">・ 次の長さの分だけ色をぬりましょう。</h1>
    
    <div id="app"></div>
    
    <div id="judge-overlay" class="judge-overlay"></div>

    <script>
        const problems = [];
        const seen = new Set();
        while (problems.length < 10) {
            const den = Math.floor(Math.random() * 9) + 2; 
            const num = Math.floor(Math.random() * (den - 1)) + 1; 
            const fracKey = `${num}/${den}`;
            if (!seen.has(fracKey)) {
                seen.add(fracKey);
                problems.push({ num: num, den: den });
            }
        }

        function shuffleArray(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
        }

        shuffleArray(problems);
        let currentIndex = 0;
        let mistakeCount = 0; 
        const appContainer = document.getElementById('app');
        
        let problemStartTime = new Date();

        function formatTime(date) {
            return date.getHours().toString().padStart(2, '0') + ':' + 
                   date.getMinutes().toString().padStart(2, '0') + ':' + 
                   date.getSeconds().toString().padStart(2, '0');
        }

        function renderProblem() {
            appContainer.innerHTML = '';
            
            problemStartTime = new Date();

            if (currentIndex >= problems.length) {
                document.getElementById('status-bar').style.display = 'none';
                document.querySelector('.question-title').style.display = 'none';
                
                const clearMsg = document.createElement('div');
                clearMsg.className = 'clear-message';
                
                let htmlContent = `<h2>全10問クリアしました！</h2>`;
                htmlContent += `<div class="final-result-details">`;
                htmlContent += `<div>正解した問題： <strong>10</strong> 問</div>`;
                htmlContent += `<div>間違えた回数： <strong>${mistakeCount}</strong> 回</div>`;
                
                if (mistakeCount === 0) {
                    htmlContent += `<div style="color: blue; font-weight: bold; margin-top: 15px;">パーフェクトです！素晴らしい成績です。</div>`;
                }
                
                htmlContent += `</div>`;
                htmlContent += `<button class="retry-btn" onclick="location.reload()">もう一度挑戦する</button>`;
                htmlContent += `<a href="index.html" class="menu-btn">メニューへ戻る</a>`;
                
                clearMsg.innerHTML = htmlContent;
                appContainer.appendChild(clearMsg);
                return;
            }
            
            document.getElementById('status-bar').style.display = 'block';
            document.querySelector('.question-title').style.display = 'block';
            document.getElementById('status-bar').textContent = `第 ${currentIndex + 1} 問 / 全 ${problems.length} 問`;

            const prob = problems[currentIndex];
            let currentDivisions = 1;

            const container = document.createElement('div');
            container.className = 'problem-container';

            const mainArea = document.createElement('div');
            mainArea.className = 'problem-main';

            const fracDisplay = document.createElement('div');
            fracDisplay.className = 'fraction-display';

            const fraction = document.createElement('div');
            fraction.className = 'fraction';
            
            const numEl = document.createElement('div');
            numEl.className = 'numerator';
            numEl.textContent = prob.num;
            
            const denEl = document.createElement('div');
            denEl.className = 'denominator';
            denEl.textContent = prob.den;

            fraction.appendChild(numEl);
            fraction.appendChild(denEl);

            const unitEl = document.createElement('div');
            unitEl.className = 'unit';
            unitEl.textContent = 'm';

            fracDisplay.appendChild(fraction);
            fracDisplay.appendChild(unitEl);
            mainArea.appendChild(fracDisplay);

            const barArea = document.createElement('div');
            barArea.className = 'bar-area';

            const label1m = document.createElement('div');
            label1m.className = 'label-1m';
            label1m.textContent = '1 m';
            barArea.appendChild(label1m);

            const bar = document.createElement('div');
            bar.className = 'bar';

            function updateBar() {
                bar.innerHTML = '';
                for (let i = 0; i < currentDivisions; i++) {
                    const segment = document.createElement('div');
                    segment.className = 'segment';
                    
                    segment.addEventListener('click', function() {
                        this.classList.toggle('filled');
                    });
                    
                    bar.appendChild(segment);
                }
            }
            
            updateBar();

            barArea.appendChild(bar);
            mainArea.appendChild(barArea);
            container.appendChild(mainArea);

            const controlsArea = document.createElement('div');
            controlsArea.className = 'controls-area';

            const minusBtn = document.createElement('button');
            minusBtn.className = 'div-btn';
            minusBtn.textContent = 'ー';

            const plusBtn = document.createElement('button');
            plusBtn.className = 'div-btn';
            plusBtn.textContent = '＋';

            const divLabel = document.createElement('div');
            divLabel.className = 'division-label';
            divLabel.textContent = `（${currentDivisions} 分割）`;

            minusBtn.addEventListener('click', () => {
                if (currentDivisions > 1) {
                    currentDivisions--;
                    divLabel.textContent = `（${currentDivisions} 分割）`;
                    updateBar(); 
                }
            });

            plusBtn.addEventListener('click', () => {
                if (currentDivisions < 20) { 
                    currentDivisions++;
                    divLabel.textContent = `（${currentDivisions} 分割）`;
                    updateBar(); 
                }
            });

            const checkBtn = document.createElement('button');
            checkBtn.className = 'check-btn';
            checkBtn.textContent = 'できた';

            checkBtn.addEventListener('click', () => {
                const filledCount = bar.querySelectorAll('.segment.filled').length;
                const isCorrect = filledCount > 0 && Math.abs((filledCount / currentDivisions) - (prob.num / prob.den)) < 0.0001;
                
                const endTime = new Date();
                const problemType = "分数の色塗り";
                const problemContent = `${prob.num}/${prob.den}m`;
                const userAnswer = `${currentDivisions}分割で${filledCount}つ塗り`;
                const inputMethod = "タップ";
                const resultStr = isCorrect ? "正解" : "不正解";
                
                const csvLine = `"${problemType}","${problemContent}","${userAnswer}",${formatTime(problemStartTime)},${formatTime(endTime)},${inputMethod},${resultStr}\n`;
                
                if (window.webkit && window.webkit.messageHandlers.appBridge) {
                    window.webkit.messageHandlers.appBridge.postMessage({
                        action: "saveCSV",
                        csvLine: csvLine
                    });
                }

                const overlay = document.getElementById('judge-overlay');

                if (isCorrect) {
                    overlay.textContent = '正解！';
                    overlay.className = 'judge-overlay show';
                    
                    minusBtn.disabled = true;
                    plusBtn.disabled = true;
                    checkBtn.disabled = true;
                    
                    setTimeout(() => {
                        overlay.classList.remove('show');
                    }, 1200);
                    
                    setTimeout(() => {
                        currentIndex++;
                        renderProblem();
                    }, 1500);
                } else {
                    overlay.textContent = 'おしい！';
                    overlay.className = 'judge-overlay incorrect show';
                    mistakeCount++; 
                    
                    setTimeout(() => {
                        overlay.classList.remove('show');
                    }, 1200);
                }
            });

            controlsArea.appendChild(minusBtn);
            controlsArea.appendChild(plusBtn);
            controlsArea.appendChild(divLabel);
            controlsArea.appendChild(checkBtn);
            
            container.appendChild(controlsArea);
            
            appContainer.appendChild(container);
        }

        renderProblem();
    </script>
</body>
</html>
