<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>4:3 Grid Interface - Extended</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="main-container">
        <div class="box-container" id="container"></div>
    </div>

    <div class="sidebar">
        <button id="add-box-btn" class="edit-only">箱追加</button>
        <button id="add-ans-btn" class="edit-only">解答欄追加</button>
        <button id="add-formula-btn" class="edit-only">計算式追加</button>
        <button id="add-text-btn" class="edit-only">文字追加</button>
        <button id="add-line-btn" class="edit-only" style="background-color: #f39c12;">直線追加</button>
        <button id="var-settings-btn" class="edit-only" style="background-color: #8e44ad;">変数設定</button>
        <button id="add-check-btn" class="edit-only" style="background-color: #e67e22;">できた追加</button>
        <button id="delete-item-btn" class="edit-only" style="background-color: #c0392b;">削除</button>
        
        <button id="export-html-btn" class="edit-only" style="background-color: #16a085;">公開版書出</button>

        <button id="run-btn" style="background-color: #2ecc71;">実行モードへ</button>
        
        <button id="save-btn" class="edit-only" style="background-color: #9b59b6;">保存</button>
        <button id="load-btn" class="edit-only" style="background-color: #34495e;">読込</button>
    </div>

    <input type="file" id="load-file" style="display:none;" accept=".json">

    <div class="overlay" id="overlay"></div>
    
    <div class="pieces-container" id="calc-container">
        <div id="calc-0-20-view" style="width: 100%; display: none;"></div>
        <div id="calc-quick-view" style="width: 100%; display: none;">
            <div class="num-pad-square" id="quick-pad-inner"></div>
        </div>
        <div id="calc-standard-view" style="width: 100%; max-width: 400px; display: none;">
            <div class="calc-display" id="std-calc-display"></div>
            <div class="standard-pad">
                <div class="piece std-btn" data-val="7">7</div>
                <div class="piece std-btn" data-val="8">8</div>
                <div class="piece std-btn" data-val="9">9</div>
                <div class="piece std-btn" data-val="C" style="background-color:#e74c3c; color:white; border-color:#c0392b; box-shadow:0 4px 0 #c0392b;">C</div>
                
                <div class="piece std-btn" data-val="4">4</div>
                <div class="piece std-btn" data-val="5">5</div>
                <div class="piece std-btn" data-val="6">6</div>
                <div class="piece std-btn" data-val="BS" style="background-color:#e67e22; color:white; border-color:#d35400; box-shadow:0 4px 0 #d35400;">BS</div>
                
                <div class="piece std-btn" data-val="1">1</div>
                <div class="piece std-btn" data-val="2">2</div>
                <div class="piece std-btn" data-val="3">3</div>
                <div class="piece std-btn" data-val="-">-</div>
                
                <div class="piece std-btn" data-val="0" style="grid-column: span 2;">0</div>
                <div class="piece std-btn" data-val=".">.</div>
                <div class="piece std-btn" data-val="OK" style="background-color:#2ecc71; color:white; border-color:#27ae60; box-shadow:0 4px 0 #27ae60;">OK</div>
            </div>
        </div>
    </div>

    <div class="pieces-container" id="ans-prop-container" style="max-width: 350px; cursor: default;">
        <h3 style="margin-top:0; color:#2c3e50; text-align:center;">解答欄プロパティ</h3>
        <div class="prop-setting-row">
            <strong style="font-size: 1.1rem; color:#333;">ID</strong>
            <input type="text" id="ans-prop-id" class="prop-setting-input" style="text-align: left; width: 120px;" placeholder="例: [q1]">
        </div>
        <div class="prop-setting-row">
            <strong style="font-size: 1.1rem; color:#333;">入力モード</strong>
            <select id="ans-prop-mode" class="prop-select" style="width: 130px;">
                <option value="0-20">0〜20入力</option>
                <option value="standard">通常の電卓</option>
                <option value="quick-0-9">即決0〜9</option>
            </select>
        </div>
        <button id="save-ans-prop-btn" class="piece" style="width:100%; height:50px; background-color:#3498db; border-color:#2980b9; color:white; box-shadow:0 4px 0 #2980b9; margin-top: 10px;">設定を保存</button>
    </div>

    <div class="pieces-container" id="line-prop-container" style="max-width: 300px; cursor: default;">
        <h3 style="margin-top:0; color:#2c3e50; text-align:center;">直線プロパティ</h3>
        <div class="prop-setting-row">
            <strong style="font-size: 1.1rem; color:#333;">太さ</strong>
            <input type="number" id="line-prop-thickness" class="prop-setting-input" style="width: 70px;" min="1" max="20">
        </div>
        <div class="prop-setting-row">
            <strong style="font-size: 1.1rem; color:#333;">色</strong>
            <input type="color" id="line-prop-color" style="width: 50px; height: 35px; border:none; cursor:pointer;">
        </div>
        <div class="prop-setting-row">
            <strong style="font-size: 1.1rem; color:#333;">種類</strong>
            <select id="line-prop-style" class="prop-select" style="width: 130px;">
                <option value="solid">実線</option>
                <option value="dashed">破線</option>
                <option value="dotted">点線</option>
            </select>
        </div>
        <button id="save-line-prop-btn" class="piece" style="width:100%; height:50px; background-color:#3498db; border-color:#2980b9; color:white; box-shadow:0 4px 0 #2980b9; margin-top: 10px;">設定を保存</button>
    </div>

    <div class="pieces-container" id="var-settings-container" style="max-width: 500px; cursor: default; overflow-y: auto; max-height: 80vh;">
        <h3 style="margin-top:0; color:#2c3e50; text-align:center;">変数プロパティ設定</h3>
        <div id="var-list-container" style="width: 100%; margin-bottom: 20px;"></div>
        <button id="save-var-settings-btn" class="piece" style="width:100%; height:50px; background-color:#3498db; border-color:#2980b9; color:white; box-shadow:0 4px 0 #2980b9;">設定を保存</button>
    </div>

    <script src="script.js"></script>
</body>
</html>
