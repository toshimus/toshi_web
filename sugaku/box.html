<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>4:3 Grid Interface - Light Yellow</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: gray;
            display: flex;
            overflow: hidden;
            touch-action: none; /* スワイプなどのデフォルト動作を防止 */
        }

        .main-container {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        .box-container {
            width: min(90vw, calc(90vh * 4 / 3));
            height: min(90vh, calc(90vw * 3 / 4));
            background-color: white;
            display: grid;
            grid-template-columns: repeat(32, 1fr);
            grid-template-rows: repeat(24, 1fr);
            position: relative;
        }

        .sidebar {
            width: 10vw;
            background-color: #333;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-top: 20px;
        }

        #add-button {
            padding: 10px 20px;
            cursor: pointer;
            touch-action: manipulation;
        }

        .grid-cell { border: 0.1px solid rgba(0, 0, 0, 0.1); }

        .draggable {
            position: absolute;
            width: calc(100% / 32 * 2);
            height: calc(100% / 24 * 2);
            z-index: 10;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* 薄黄色で統一された9割サイズの角丸箱 */
        .rect {
            width: 90%;
            height: 90%;
            background-color: #44FFFF; /* 薄黄色 */
            /* グリッド1マスの長さをLとすると、この要素の幅は1.8L (2Lの90%)。
               1/16Lの半径にするため、1.8L / (1/16L) = 28.8。
               よって自身の100%に対して28.8で割ることで、正確にLの1/16の丸みになります。
            */
            border-radius: calc(100% / 8);
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: grab;
            color: #555;
            font-weight: bold;
            font-family: sans-serif;
            user-select: none;
            -webkit-user-select: none;
            box-shadow: 2px 2px 5px rgba(0,0,0,0.1);
        }
    </style>
</head>
<body>

    <div class="main-container">
        <div class="box-container" id="container"></div>
    </div>

    <div class="sidebar">
        <button id="add-button">追加</button>
    </div>

    <script>
        const container = document.getElementById('container');
        let count = 0;

        for (let i = 0; i < 32 * 24; i++) {
            const cell = document.createElement('div');
            cell.classList.add('grid-cell');
            container.appendChild(cell);
        }

        function createDraggable() {
            count++;
            const wrapper = document.createElement('div');
            wrapper.classList.add('draggable');
            
            const rect = document.createElement('div');
            rect.classList.add('rect');
            rect.textContent = count;
            
            wrapper.appendChild(rect);
            container.appendChild(wrapper);

            let isDragging = false;
            
            const dragStart = (e) => {
                isDragging = true;
                rect.style.cursor = 'grabbing';
            };

            wrapper.addEventListener('mousedown', dragStart);
            wrapper.addEventListener('touchstart', dragStart, { passive: false });

            const handleMove = (e) => {
                if (!isDragging) return;
                if (e.type === 'touchmove') e.preventDefault(); // スクロール防止
                
                const clientX = e.touches ? e.touches[0].clientX : e.clientX;
                const clientY = e.touches ? e.touches[0].clientY : e.clientY;

                const cRect = container.getBoundingClientRect();
                let x = clientX - cRect.left - (wrapper.offsetWidth / 2);
                let y = clientY - cRect.top - (wrapper.offsetHeight / 2);
                
                let gridX = Math.round(x / (cRect.width / 32));
                let gridY = Math.round(y / (cRect.height / 24));
                
                gridX = Math.max(0, Math.min(gridX, 32 - 2));
                gridY = Math.max(0, Math.min(gridY, 24 - 2));
                
                wrapper.style.left = `calc(${gridX} * (100% / 32))`;
                wrapper.style.top = `calc(${gridY} * (100% / 24))`;
            };

            document.addEventListener('mousemove', handleMove, { passive: false });
            document.addEventListener('touchmove', handleMove, { passive: false });

            const dragEnd = () => {
                isDragging = false;
                rect.style.cursor = 'grab';
            };

            document.addEventListener('mouseup', dragEnd);
            document.addEventListener('touchend', dragEnd);
        }

        document.getElementById('add-button').addEventListener('click', createDraggable);
        window.addEventListener('keydown', (e) => { if(e.key === 'F1') createDraggable(); });
    </script>
</body>
</html>
