<div id="dragarea">
<img src="img/100.png" widht="80" height="80" id="a" alt="">
<img src="img/100.png" widht="80" height="80" id="b" alt="">
<img src="img/100.png" widht="80" height="80" id="c" alt="">
<img src="img/100.png" widht="80" height="80" id="d" alt="">
</div>
<div class="dp" id="drop1"></div>
<div class="dp" id="drop2"></div>

<style type="text/css">
div#dragarea{ width:100%; height:80px; background-color:#80ffff }
div.dp{ width:50%; height:80px }
div#drop1{ background-color:#ffff80; float:left }
div#drop2{ margin-left:50%; background-color:#ff80ff;  }
div#drop2:after{ content:""; display:block; clear:left }
</style>

<script>
//imgタグ要素を全て取得する
var elm = document.getElementsByTagName("img");

//全imgタグにdragstartイベントを追加する
for ( var i=0 ; i < elm.length ; i++ )
{
  elm[i].addEventListener("dragstart", function(evt){
    evt.dataTransfer.setData("text/plain",evt.target.id);
    evt.stopPropagation();
  },false);
}

//クラス名「dp」を持つdivタグを全て取得する
var droparea = document.querySelectorAll("div.dp");

//全てのドロップ要素にdropイベントを追加する
for ( var i=0; i < droparea.length ; i++ )
{
  droparea[i].addEventListener("drop", function(evt){
    var id = evt.dataTransfer.getData( "text/plain" );
    var obj1 = document.getElementById( id );

    //ドロップされるdivタグをgetElementById()で取得し直す
    var obj2 = document.getElementById( evt.target.id );

    if( obj1 )
    {
      obj2.appendChild( obj1 );
    }
    evt.preventDefault();
  },false);

  //２つのイベントでデフォルト動作を抑制する
  droparea[i].addEventListener( "dragenter" , function(evt){
    evt.preventDefault();
  }, false );
  droparea[i].addEventListener( "dragover" , function(evt){
    evt.preventDefault();
  }, false );
}  
</script>

<script type="text/javascript">
Number.prototype.fillzero = function(n){
  var s = "00000000000"+ this;
  var len = s.length;
  return s.slice(len-n,len);
}
var refresh = function(){
  date = new Date;
  document.getElementById('hour').innerHTML = date.getHours().fillzero(2);
  document.getElementById('min').innerHTML = date.getMinutes().fillzero(2);
}
setInterval(refresh,1000);
</script>

<html>
<head>
<meta http-equiv="Content-Type" content="text/html; charset=utf-8" />
<meta name="viewport" content="width=device-width, minimum-scale=1.0,
maximum-scale=1.0, user-scalable=no" />
<meta name="apple-mobile-web-app-capable" content="yes" /> 
<title>時計</title>
</head>
<body style="background-color:#eee;">
<div style="font-size:60pt;font-family:sans-serif;text-align:center;">
<span id="hour">00</span>:<span id="min">00</span>
</div>
</body>
</html>
