<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>図書館VR マップエディタ (完全版)</title>
  <style>
    body { font-family: sans-serif; display: flex; background: #222; color: #ddd; margin: 0; height: 100vh; overflow: hidden; }
    #toolbar { width: 260px; background: #333; padding: 15px; border-right: 1px solid #555; display: flex; flex-direction: column; gap: 10px; overflow-y: auto; }
    #workspace { flex-grow: 1; display: flex; justify-content: center; align-items: center; background: #111; position: relative; }
    svg { background: white; border: 2px solid #666; cursor: default; }
    
    h3 { margin-top: 0; margin-bottom: 5px; font-size: 16px; border-bottom: 1px solid #555; padding-bottom: 5px; }
    
    button { padding: 8px; cursor: pointer; border: none; border-radius: 4px; background: #555; color: white; font-weight: bold; font-size: 13px; }
    button:hover { background: #777; }
    button.active { background: #4CAF50; }
    .btn-delete { background: #d32f2f; }
    .btn-delete:hover { background: #f44336; }
    .btn-action { background: #FF9800; }
    .btn-export { background: #2196F3; margin-top: 10px; }
    
    #properties { margin-top: 15px; padding-top: 15px; border-top: 1px solid #555; display: none; flex-direction: column; gap: 8px; }
    input { padding: 6px; border: 1px solid #777; border-radius: 4px; background: #222; color: white; width: 100%; box-sizing: border-box; }
    
    .draggable { cursor: move; }
    .selected { stroke: #ffeb3b !important; stroke-width: 3px !important; }
    .handle { cursor: nwse-resize; fill: white; stroke: black; stroke-width: 1; }
    .link-line { stroke: #2196F3; stroke-width: 3; stroke-dasharray: 5,5; pointer-events: none; }
  </style>
</head>
<body>

  <div id="toolbar">
    <h3>📂 ファイル操作</h3>
    <button class="btn-action" onclick="saveProject()">💾 プロジェクト保存 (.json)</button>
    <button class="btn-action" onclick="document.getElementById('file-input').click()">📂 プロジェクト読込</button>
    <input type="file" id="file-input" style="display:none" accept=".json" onchange="loadProject(event)">
    <button class="btn-export" onclick="exportHTML()">🌐 HTMLファイル書き出し</button>

    <h3 style="margin-top:15px;">🛠 ツールボックス</h3>
    <button onclick="addShelf()">+ 本棚を追加</button>
    <button onclick="addCamera()">+ カメラを追加</button>
    <button id="btn-link" onclick="toggleLinkMode()">🔗 カメラを線で結ぶ</button>
    <button class="btn-delete" onclick="deleteSelected()">🗑 選択中のものを削除</button>
    
    <div id="properties">
      <h3>📷 カメラプロパティ</h3>
      <label>画像ファイル名 (src)</label>
      <input type="text" id="prop-img" placeholder="room1.jpg" oninput="updateCameraProp('img')">
      <label>場所の名前 (name)</label>
      <input type="text" id="prop-name" placeholder="Entrance" oninput="updateCameraProp('name')">
    </div>
  </div>

  <div id="workspace">
    <svg id="editor" width="800" height="600">
      <defs>
        <pattern id="grid" width="20" height="20" patternUnits="userSpaceOnUse">
          <path d="M 20 0 L 0 0 0 20" fill="none" stroke="#e0e0e0" stroke-width="1"/>
        </pattern>
      </defs>
      <rect width="100%" height="100%" fill="url(#grid)" onclick="deselectAll()"/>
      <g id="layer-links"></g>
      <g id="layer-shelves"></g>
      <g id="layer-cameras"></g>
    </svg>
  </div>

  <script>
    const svg = document.getElementById('editor');
    const GRID_SIZE = 20;
    
    let state = {
      mode: 'select',
      selectedObj: null,
      linkSource: null,
      links: [], 
      camCounter: 0,
      shelfCounter: 0
    };

    const snap = (val) => Math.round(val / GRID_SIZE) * GRID_SIZE;
    const getSVGPoint = (evt) => {
      let pt = svg.createSVGPoint();
      pt.x = evt.clientX; pt.y = evt.clientY;
      return pt.matrixTransform(svg.getScreenCTM().inverse());
    };

    // --- 要素の追加 ---
    function addShelf(id, x=100, y=100, w=80, h=40) {
      if(!id) { state.shelfCounter++; id = 'shelf_' + state.shelfCounter; }
      
      const g = document.createElementNS('http://www.w3.org/2000/svg', 'g');
      g.setAttribute('class', 'draggable shelf-group');
      g.dataset.id = id; g.dataset.type = 'shelf';

      const rect = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
      rect.setAttribute('x', x); rect.setAttribute('y', y);
      rect.setAttribute('width', w); rect.setAttribute('height', h);
      rect.setAttribute('fill', '#8B4513'); rect.setAttribute('stroke', '#3e1f08'); rect.setAttribute('stroke-width', '2');
      
      const handle = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
      handle.setAttribute('class', 'handle');
      handle.setAttribute('x', x + w - 4); handle.setAttribute('y', y + h - 4);
      handle.setAttribute('width', 8); handle.setAttribute('height', 8);

      g.appendChild(rect); g.appendChild(handle);
      document.getElementById('layer-shelves').appendChild(g);
      setupInteractions(g);
    }

    function addCamera(id, cx=200, cy=200, img, name) {
      if(!id) {
        state.camCounter++;
        id = 'cam_' + state.camCounter;
        img = `room${state.camCounter}.jpg`;
        name = `場所 ${state.camCounter}`;
      }
      
      const g = document.createElementNS('http://www.w3.org/2000/svg', 'g');
      g.setAttribute('class', 'draggable cam-group');
      g.dataset.id = id; g.dataset.type = 'camera';
      g.dataset.img = img; g.dataset.name = name;

      const circle = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
      circle.setAttribute('cx', cx); circle.setAttribute('cy', cy);
      circle.setAttribute('r', 12);
      circle.setAttribute('fill', '#E91E63'); circle.setAttribute('stroke', 'white'); circle.setAttribute('stroke-width', '2');

      g.appendChild(circle);
      document.getElementById('layer-cameras').appendChild(g);
      setupInteractions(g);
    }

    // --- 選択・プロパティ ---
    function selectObj(g) {
      deselectAll();
      state.selectedObj = g;
      g.classList.add('selected');

      if (g.dataset.type === 'camera') {
        document.getElementById('properties').style.display = 'flex';
        document.getElementById('prop-img').value = g.dataset.img || '';
        document.getElementById('prop-name').value = g.dataset.name || '';
      }
    }

    function deselectAll() {
      if (state.selectedObj) state.selectedObj.classList.remove('selected');
      state.selectedObj = null;
      document.getElementById('properties').style.display = 'none';
      if (state.mode === 'select') state.linkSource = null;
    }

    function updateCameraProp(key) {
      if (state.selectedObj && state.selectedObj.dataset.type === 'camera') {
        state.selectedObj.dataset[key] = document.getElementById(`prop-${key}`).value;
      }
    }

    // --- 削除 ---
    function deleteSelected() {
      if (!state.selectedObj) return;
      const id = state.selectedObj.dataset.id;
      
      state.links = state.links.filter(l => {
        if (l.sourceId === id || l.targetId === id) {
          l.lineElement.remove(); return false;
        }
        return true;
      });

      state.selectedObj.remove();
      deselectAll();
    }
    
    // 入力中のDeleteキー無効化
    window.addEventListener('keydown', (e) => { 
      if (e.target.tagName === 'INPUT') return; 
      if (e.key === 'Delete' || e.key === 'Backspace') deleteSelected(); 
    });

    // --- ドラッグ＆リサイズ処理 ---
    let dragInfo = null;

    function setupInteractions(g) {
      g.addEventListener('mousedown', (e) => {
        e.stopPropagation();
        
        if (state.mode === 'link' && g.dataset.type === 'camera') {
          if (!state.linkSource) {
            state.linkSource = g; g.classList.add('selected');
          } else {
            if (state.linkSource !== g) createLink(state.linkSource, g);
            state.linkSource.classList.remove('selected'); state.linkSource = null;
          }
          return;
        }

        selectObj(g);
        const pt = getSVGPoint(e);
        const isHandle = e.target.classList.contains('handle');

        if (g.dataset.type === 'shelf') {
          const rect = g.querySelector('rect');
          dragInfo = { target: g, type: 'shelf', isResize: isHandle, startX: pt.x, startY: pt.y, origX: parseFloat(rect.getAttribute('x')), origY: parseFloat(rect.getAttribute('y')), origW: parseFloat(rect.getAttribute('width')), origH: parseFloat(rect.getAttribute('height')) };
        } else if (g.dataset.type === 'camera') {
          const circle = g.querySelector('circle');
          dragInfo = { target: g, type: 'camera', startX: pt.x, startY: pt.y, origCX: parseFloat(circle.getAttribute('cx')), origCY: parseFloat(circle.getAttribute('cy')) };
        }
      });
    }

    svg.addEventListener('mousemove', (e) => {
      if (!dragInfo) return;
      const pt = getSVGPoint(e);
      const dx = pt.x - dragInfo.startX; const dy = pt.y - dragInfo.startY;

      if (dragInfo.type === 'shelf') {
        const rect = dragInfo.target.querySelector('rect');
        const handle = dragInfo.target.querySelector('.handle');
        
        if (dragInfo.isResize) {
          const newW = Math.max(GRID_SIZE, snap(dragInfo.origW + dx));
          const newH = Math.max(GRID_SIZE, snap(dragInfo.origH + dy));
          rect.setAttribute('width', newW); rect.setAttribute('height', newH);
          handle.setAttribute('x', dragInfo.origX + newW - 4); handle.setAttribute('y', dragInfo.origY + newH - 4);
        } else {
          const newX = snap(dragInfo.origX + dx); const newY = snap(dragInfo.origY + dy);
          rect.setAttribute('x', newX); rect.setAttribute('y', newY);
          handle.setAttribute('x', newX + parseFloat(rect.getAttribute('width')) - 4); handle.setAttribute('y', newY + parseFloat(rect.getAttribute('height')) - 4);
        }
      } else if (dragInfo.type === 'camera') {
        const circle = dragInfo.target.querySelector('circle');
        circle.setAttribute('cx', snap(dragInfo.origCX + dx)); circle.setAttribute('cy', snap(dragInfo.origCY + dy));
        updateLinks();
      }
    });

    svg.addEventListener('mouseup', () => { dragInfo = null; });
    svg.addEventListener('mouseleave', () => { dragInfo = null; });

    // --- リンク（線）機能 ---
    function toggleLinkMode() {
      const btn = document.getElementById('btn-link');
      if (state.mode === 'select') {
        state.mode = 'link'; btn.classList.add('active'); btn.innerText = '🔴 接続先をクリック'; deselectAll();
      } else {
        state.mode = 'select'; btn.classList.remove('active'); btn.innerText = '🔗 カメラを線で結ぶ';
        if (state.linkSource) state.linkSource.classList.remove('selected');
        state.linkSource = null;
      }
    }

    function createLink(srcCam, tgtCam) {
      const exists = state.links.some(l => (l.sourceId === srcCam.dataset.id && l.targetId === tgtCam.dataset.id) || (l.sourceId === tgtCam.dataset.id && l.targetId === srcCam.dataset.id));
      if (exists) return;

      const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
      line.setAttribute('class', 'link-line');
      document.getElementById('layer-links').appendChild(line);
      state.links.push({ sourceId: srcCam.dataset.id, targetId: tgtCam.dataset.id, lineElement: line });
      updateLinks();
    }

    function updateLinks() {
      state.links.forEach(l => {
        const c1 = document.querySelector(`[data-id="${l.sourceId}"] circle`);
        const c2 = document.querySelector(`[data-id="${l.targetId}"] circle`);
        if (c1 && c2) {
          l.lineElement.setAttribute('x1', c1.getAttribute('cx')); l.lineElement.setAttribute('y1', c1.getAttribute('cy'));
          l.lineElement.setAttribute('x2', c2.getAttribute('cx')); l.lineElement.setAttribute('y2', c2.getAttribute('cy'));
        }
      });
    }

    // --- セーブ＆ロード ---
    function saveProject() {
      const projectData = {
        camCounter: state.camCounter, shelfCounter: state.shelfCounter,
        cameras: Array.from(document.querySelectorAll('.cam-group')).map(g => {
          const c = g.querySelector('circle');
          return { id: g.dataset.id, img: g.dataset.img, name: g.dataset.name, x: parseFloat(c.getAttribute('cx')), y: parseFloat(c.getAttribute('cy')) };
        }),
        shelves: Array.from(document.querySelectorAll('.shelf-group')).map(g => {
          const r = g.querySelector('rect');
          return { id: g.dataset.id, x: parseFloat(r.getAttribute('x')), y: parseFloat(r.getAttribute('y')), w: parseFloat(r.getAttribute('width')), h: parseFloat(r.getAttribute('height')) };
        }),
        links: state.links.map(l => ({ sourceId: l.sourceId, targetId: l.targetId }))
      };
      
      const blob = new Blob([JSON.stringify(projectData, null, 2)], { type: 'application/json' });
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = 'vrtour_project.json';
      a.click();
    }

    function loadProject(event) {
      const file = event.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = function(e) {
        try {
          const data = JSON.parse(e.target.result);
          document.getElementById('layer-cameras').innerHTML = '';
          document.getElementById('layer-shelves').innerHTML = '';
          document.getElementById('layer-links').innerHTML = '';
          state.links = []; deselectAll();
          
          state.camCounter = data.camCounter || 0;
          state.shelfCounter = data.shelfCounter || 0;
          
          if(data.shelves) data.shelves.forEach(s => addShelf(s.id, s.x, s.y, s.w, s.h));
          if(data.cameras) data.cameras.forEach(c => addCamera(c.id, c.x, c.y, c.img, c.name));
          if(data.links) {
            data.links.forEach(l => {
              const srcCam = document.querySelector(`[data-id="${l.sourceId}"]`);
              const tgtCam = document.querySelector(`[data-id="${l.targetId}"]`);
              if (srcCam && tgtCam) createLink(srcCam, tgtCam);
            });
          }
          document.getElementById('file-input').value = ""; 
        } catch (err) { alert("ファイルの読み込みに失敗しました。"); }
      };
      reader.readAsText(file);
    }

    // --- HTML出力 (VR生成機能) ---
    function generateVRHTML() {
      const cams = Array.from(document.querySelectorAll('.cam-group')).map(g => {
        const c = g.querySelector('circle');
        return { id: g.dataset.id, img: g.dataset.img, name: g.dataset.name, x: parseFloat(c.getAttribute('cx')), z: parseFloat(c.getAttribute('cy')) };
      });
      if (cams.length === 0) { alert("カメラを配置してください。"); return null; }

      let assetsHTML = '';
      cams.forEach((c, i) => {
         const safeId = c.img.split('.')[0] || `cam_img_${i}`;
         assetsHTML += `      <img id="${safeId}" src="${c.img}" crossorigin="anonymous">\n`;
      });

      let linksHTML = '';

      cams.forEach(currentCam => {
        const connectedIds = state.links.filter(l => l.sourceId === currentCam.id || l.targetId === currentCam.id).map(l => l.sourceId === currentCam.id ? l.targetId : l.sourceId);
        connectedIds.forEach(targetId => {
          const targetCam = cams.find(c => c.id === targetId);
          const dx = targetCam.x - currentCam.x; 
          const dz = targetCam.z - currentCam.z; 
          const angle = Math.atan2(dx, dz); 
          
          // 【変更1】表示距離を 3 から 7 に変更して、進行方向の奥へ移動
          const distance = 15; 
          const sphereX = (Math.sin(angle) * distance).toFixed(2); 
          const sphereZ = (Math.cos(angle) * distance).toFixed(2);
          
          const rotY = ((angle * 180 / Math.PI) - 180).toFixed(2);
          const targetAssetId = targetCam.img.split('.')[0];
          
          // 【変更2】scaleを 1.5 から 3 に変更してサイズを大きくし、クリックしやすく
          linksHTML += `      <a-triangle class="clickable link-from-${currentCam.id}" vertex-a="0 0.5 0" vertex-b="-0.5 -0.5 0" vertex-c="0.5 -0.5 0" color="#FFFFFF" material="transparent: true; opacity: 0.8" data-src="#${targetAssetId}" data-name="${targetCam.name}" data-cam-id="${targetCam.id}" position="${sphereX} -1.5 ${sphereZ}" rotation="-90 ${rotY} 0" scale="3 3 3" visible="false" animation__hover="property: scale; to: 3.5 3.5 3.5; startEvents: mouseenter; dur: 200" animation__leave="property: scale; to: 3 3 3; startEvents: mouseleave; dur: 200"></a-triangle>\n`;
        });
      });

      const firstCamId = cams[0].img.split('.')[0];
      return `<!DOCTYPE html>
<html>
<head><meta charset="utf-8"><title>図書館 VRツアー</title><script src="https://aframe.io/releases/1.6.0/aframe.min.js"><\/script></head>
<body>
  <a-scene background="color: #000">
    <a-assets>${assetsHTML}</a-assets>
    <a-entity id="sky-container"><a-sky id="sky" src="#${firstCamId}" material="transparent:true;opacity:1"></a-sky></a-entity>
    
    <a-entity cursor="rayOrigin: mouse" raycaster="objects: .clickable"></a-entity>
    <a-laser-controls hand="left" raycaster="objects: .clickable"></a-laser-controls>
    <a-laser-controls hand="right" raycaster="objects: .clickable"></a-laser-controls>

    <a-camera id="main-camera" look-controls="reverseMouseDrag: true">
      <a-text id="loc-name" value="${cams[0].name}" position="0 0.5 -2" align="center" color="white"></a-text>
    </a-camera>
    
    <a-entity id="links">${linksHTML}</a-entity>
  </a-scene>
  <script>
    let currentCamId = '${cams[0].id}';
    
    window.addEventListener('keydown', e => {
      const look = document.querySelector('#main-camera').components['look-controls'];
      if (!look) return;
      if (e.key === 'ArrowLeft') look.yawObject.rotation.y += 0.05;
      if (e.key === 'ArrowRight') look.yawObject.rotation.y -= 0.05;
      if (e.key === 'ArrowUp') look.pitchObject.rotation.x += 0.05;
      if (e.key === 'ArrowDown') look.pitchObject.rotation.x -= 0.05;
    });

    function updateLinksDisplay(camId) {
      document.querySelectorAll('.clickable').forEach(el => el.setAttribute('visible', 'false'));
      document.querySelectorAll('.link-from-' + camId).forEach(el => el.setAttribute('visible', 'true'));
    }
    updateLinksDisplay(currentCamId);

    document.querySelectorAll('.clickable').forEach(link => {
      link.addEventListener('click', function() {
        if (this.getAttribute('visible') === 'false') return;
        const newSrc = this.getAttribute('data-src');
        const nextCamId = this.getAttribute('data-cam-id');
        const targetName = this.getAttribute('data-name');
        
        const sky = document.querySelector('#sky');
        const container = document.querySelector('#sky-container');
        sky.setAttribute('animation__fade', {property: 'material.opacity', from: 1, to: 0, dur: 300});

        setTimeout(() => {
          sky.parentNode.removeChild(sky);
          const newSky = document.createElement('a-sky');
          newSky.setAttribute('id', 'sky');
          newSky.setAttribute('src', newSrc);
          newSky.setAttribute('material', 'transparent', 'true');
          newSky.setAttribute('material', 'opacity', '0');
          container.appendChild(newSky);
          
          document.querySelector('#loc-name').setAttribute('value', targetName);
          updateLinksDisplay(nextCamId);
          
          newSky.setAttribute('animation__fade', {property: 'material.opacity', from: 0, to: 1, dur: 300});
        }, 300);
      });
    });
  <\/script>
</body>
</html>`;
    }

    // 【修正2】 ファイル保存の挙動を「ダウンロード」ではなく「名前を付けて保存（場所選択可）」に変更
    async function exportHTML() {
      const htmlStr = generateVRHTML();
      if (!htmlStr) return;
      
      try {
        // 最新ブラウザの「File System Access API」を使って保存ダイアログを出す
        if (window.showSaveFilePicker) {
          const handle = await window.showSaveFilePicker({
            suggestedName: 'index.html',
            types: [{
              description: 'HTML File',
              accept: {'text/html': ['.html']},
            }],
          });
          const writable = await handle.createWritable();
          await writable.write(htmlStr);
          await writable.close();
          // alert("同じフォルダに保存完了しました！"); // 必要ならコメントアウトを外してください
        } else {
          // 非対応ブラウザ（古いブラウザなど）用のフォールバック
          const blob = new Blob([htmlStr], { type: 'text/html' });
          const a = document.createElement('a');
          a.href = URL.createObjectURL(blob);
          a.download = 'index.html';
          a.click();
        }
      } catch (err) {
        // ユーザーが「キャンセル」を押した時などは何もしない
        console.log("保存がキャンセルされたか、エラーが発生しました。", err);
      }
    }

  </script>
</body>
</html>
