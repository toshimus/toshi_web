<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>図書館バーチャルツアー</title>
  <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>
</head>
<body>
  <a-scene>
    <a-assets>
      <img id="room1" src="room1.jpg" crossorigin="anonymous">
      <img id="room2" src="room2.jpg" crossorigin="anonymous">
      <img id="room3" src="room3.jpg" crossorigin="anonymous">
    </a-assets>

    <a-sky id="sky" src="#room1"></a-sky>

    <a-camera id="main-camera" look-controls>
      <a-text id="location-name" value="Entrance" position="0 0.5 -2" align="center" scale="1 1 1" color="white"></a-text>
      <a-cursor raycaster="objects: .link"></a-cursor>
    </a-camera>

    <a-entity id="links">
      <a-sphere class="link" data-target="#room2" data-name="Reading Room" position="5 0 -2" radius="0.5" color="blue"></a-sphere>
      <a-sphere class="link" data-target="#room3" data-name="Archive" position="-5 0 2" radius="0.5" color="blue"></a-sphere>
      <a-sphere class="link" data-target="#room1" data-name="Entrance" position="0 0 5" radius="0.5" color="blue"></a-sphere>
    </a-entity>
  </a-scene>

  <script>
    document.querySelectorAll('.link').forEach(link => {
      link.addEventListener('click', function() {
        const sky = document.querySelector('#sky');
        const text = document.querySelector('#location-name');
        const targetId = this.getAttribute('data-target');
        const targetName = this.getAttribute('data-name');
        
        // 1. ズームインしながらフェードアウト
        sky.setAttribute('animation__zoom', {property: 'scale', from: '1 1 1', to: '0.7 0.7 0.7', dur: 500});
        sky.setAttribute('animation__fade', {property: 'opacity', from: 1, to: 0, dur: 500});

        setTimeout(() => {
          // 2. 切り替え
          sky.setAttribute('src', targetId);
          text.setAttribute('value', targetName);
          
          // 3. ズームアウトしながらフェードイン
          sky.setAttribute('animation__zoom', {property: 'scale', from: '0.7 0.7 0.7', to: '1 1 1', dur: 500});
          sky.setAttribute('animation__fade', {property: 'opacity', from: 0, to: 1, dur: 500});
        }, 500);
      });
    });

    // マウスホイールでのズーム機能
    window.addEventListener('wheel', (event) => {
      const camera = document.querySelector('#main-camera');
      const fov = camera.getAttribute('camera').fov;
      const newFov = Math.max(10, Math.min(120, fov + (event.deltaY * 0.1)));
      camera.setAttribute('camera', 'fov', newFov);
    });
  </script>
</body>
</html>
