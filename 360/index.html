<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>図書館バーチャルツアー</title>
  <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>
</head>
<body>
  <a-scene>
    <a-assets>
      <img id="room1" src="room1.jpg" crossorigin="anonymous">
      <img id="room2" src="room2.jpg" crossorigin="anonymous">
      <img id="room3" src="room3.jpg" crossorigin="anonymous">
    </a-assets>

    <a-sky id="sky" src="#room1"></a-sky>

    <a-entity id="links">
      <a-sphere class="link" data-target="#room2" position="5 0 -2" radius="0.5" color="blue"></a-sphere>
      <a-sphere class="link" data-target="#room3" position="-5 0 2" radius="0.5" color="blue"></a-sphere>
    </a-entity>

    <a-camera>
      <a-cursor raycaster="objects: .link"></a-cursor>
    </a-camera>
  </a-scene>

  <script>
    document.querySelectorAll('.link').forEach(link => {
      link.addEventListener('click', function() {
        const sky = document.querySelector('#sky');
        const targetId = this.getAttribute('data-target');
        
        // フェードアウト
        sky.setAttribute('animation', {property: 'opacity', from: 1, to: 0, dur: 500});

        setTimeout(() => {
          // 画像を切り替え
          sky.setAttribute('src', targetId);
          // フェードイン
          sky.setAttribute('animation', {property: 'opacity', from: 0, to: 1, dur: 500});
        }, 500);
      });
    });
  </script>
</body>
</html>
