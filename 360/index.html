<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>図書館バーチャルツアー</title>
  <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>
</head>
<body>
  <a-scene>
    <a-assets>
      <img id="entrance" src="entrance.jpg" crossorigin="anonymous">
      <img id="reading_room" src="reading_room.jpg" crossorigin="anonymous">
      <img id="archive" src="archive.jpg" crossorigin="anonymous">
    </a-assets>

    <a-sky id="sky" src="#entrance"></a-sky>

    <a-entity id="links">
      <a-sphere class="link" data-target="#reading_room" position="5 0 -2" radius="0.5" color="blue"></a-sphere>
      <a-sphere class="link" data-target="#entrance" position="-5 0 2" radius="0.5" color="blue"></a-sphere>
    </a-entity>

    <a-camera>
      <a-cursor raycaster="objects: .link"></a-cursor>
    </a-camera>
  </a-scene>

  <script>
    // 移動ロジック：クリックで画像切り替え
    document.querySelectorAll('.link').forEach(link => {
      link.addEventListener('click', function() {
        const sky = document.querySelector('#sky');
        const targetSrc = this.getAttribute('data-target');
        
        // フェードアウト効果
        sky.setAttribute('animation', {property: 'opacity', from: 1, to: 0, dur: 500});

        setTimeout(() => {
          sky.setAttribute('src', targetSrc);
          sky.setAttribute('animation', {property: 'opacity', from: 0, to: 1, dur: 500});
        }, 500);
      });
    });
  </script>
</body>
</html>
