<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>図書館 VRツアー</title>
  <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>
  <style>
    #ui-overlay {
      position: absolute;
      top: 0; left: 0; width: 100%; height: 100%;
      pointer-events: none;
      display: flex;
      justify-content: space-between;
      align-items: center;
      z-index: 9998;
      padding: 5%;
      box-sizing: border-box;
    }
    .nav-overlay-btn {
      pointer-events: auto;
      background: rgba(0, 0, 0, 0.5);
      color: white;
      border: 2px solid rgba(255, 255, 255, 0.8);
      border-radius: 8px;
      padding: 15px 30px;
      font-size: 24px;
      font-weight: bold;
      cursor: pointer;
      transition: all 0.2s ease-in-out;
      backdrop-filter: blur(4px);
      display: flex;
      visibility: hidden;
      align-items: center;
      gap: 4px;
      box-shadow: 0 4px 6px rgba(0,0,0,0.3);
    }
    .nav-overlay-btn:hover {
      background: rgba(33, 150, 243, 0.8);
      transform: scale(1.05);
    }
    .nav-overlay-btn:active {
      transform: scale(0.95);
    }

    #location-overlay {
      position: absolute;
      top: 20px; left: 20px;
      background: rgba(17, 17, 17, 0.7);
      color: #FF9800;
      border: 2px solid rgba(255, 255, 255, 0.5);
      border-radius: 8px;
      padding: 10px 25px;
      font-size: 28px;
      font-weight: bold;
      z-index: 10000;
      pointer-events: none;
      box-shadow: 0 4px 10px rgba(0,0,0,0.5);
      backdrop-filter: blur(4px);
      font-family: sans-serif;
    }

    #minimap-overlay {
      position: absolute;
      top: 20px; right: 20px;
      width: 240px;
      background: rgba(17, 17, 17, 0.7);
      border: 2px solid rgba(255, 255, 255, 0.5);
      border-radius: 8px;
      pointer-events: auto;
      z-index: 10000;
      touch-action: none;
      box-shadow: 0 4px 10px rgba(0,0,0,0.5);
    }
    #minimap-header {
      color: #fff;
      font-size: 13px;
      font-weight: bold;
      padding: 6px 10px;
      border-bottom: 1px solid rgba(255,255,255,0.2);
      user-select: none;
      cursor: move;
      background: rgba(255,255,255,0.1);
      border-top-left-radius: 6px;
      border-top-right-radius: 6px;
    }
  </style>
  <script>
    window.currentCamId = 'cam_1';
    
    // UIやミニマップの同期用コンポーネント
    AFRAME.registerComponent('sync-system', {
      tick: function () {
        try {
          const cam = document.querySelector('#main-camera');
          const player = document.querySelector('#mm-player');
          const btnLeft = document.querySelector('#btn-overlay-left');
          const btnRight = document.querySelector('#btn-overlay-right');
          const textLeft = document.querySelector('#text-overlay-left');
          const textRight = document.querySelector('#text-overlay-right');
          
          if (!cam || !cam.object3D || !btnLeft || !btnRight || !window.currentCamId) return;
          
          if (player) {
            const activeNode = document.querySelector('#mm-node-' + window.currentCamId);
            if (activeNode) {
              const x = activeNode.getAttribute('data-x');
              const y = activeNode.getAttribute('data-y');
              let rotateDeg = -cam.object3D.rotation.y * 180 / Math.PI;
              player.setAttribute('transform', 'translate(' + x + ',' + y + ') rotate(' + rotateDeg + ')');
            }
          }
          
          let camY = (-cam.object3D.rotation.y * 180 / Math.PI) % 360;
          if (camY < 0) camY += 360;

          const activeLinks = document.querySelectorAll('.link-from-' + window.currentCamId);
          let leftTarget = null, rightTarget = null;
          let leftDiff = 999, rightDiff = 999;

          activeLinks.forEach(el => {
             const arrow = el.querySelector('.nav-arrow');
             if(!arrow) return;
             const linkAngle = parseFloat(arrow.getAttribute('data-angle'));
             const camId = arrow.getAttribute('data-cam-id');
             const name = arrow.getAttribute('data-name');
             const src = arrow.getAttribute('data-src');
             const targetRot = arrow.getAttribute('data-target-rot');
             
             const relAngle = (linkAngle - camY + 360) % 360;
             
             if (relAngle >= 10 && relAngle <= 170) {
                const diff = Math.abs(relAngle - 90);
                if (diff < rightDiff) { rightDiff = diff; rightTarget = { camId, name, src, targetRot }; }
             } else if (relAngle >= 190 && relAngle <= 350) {
                const diff = Math.abs(relAngle - 270);
                if (diff < leftDiff) { leftDiff = diff; leftTarget = { camId, name, src, targetRot }; }
             }
          });

          if (leftTarget) {
             btnLeft.style.visibility = 'visible';
             btnLeft.setAttribute('data-cam-id', leftTarget.camId);
             btnLeft.setAttribute('data-name', leftTarget.name);
             btnLeft.setAttribute('data-src', leftTarget.src);
             btnLeft.setAttribute('data-target-rot', leftTarget.targetRot);
             const numMatch = leftTarget.name.match(/\d+/);
             textLeft.textContent = numMatch ? numMatch[0] : 'L';
          } else {
             btnLeft.style.visibility = 'hidden';
          }

          if (rightTarget) {
             btnRight.style.visibility = 'visible';
             btnRight.setAttribute('data-cam-id', rightTarget.camId);
             btnRight.setAttribute('data-name', rightTarget.name);
             btnRight.setAttribute('data-src', rightTarget.src);
             btnRight.setAttribute('data-target-rot', rightTarget.targetRot);
             const numMatch = rightTarget.name.match(/\d+/);
             textRight.textContent = numMatch ? numMatch[0] : 'R';
          } else {
             btnRight.style.visibility = 'hidden';
          }
        } catch (e) {
          console.error(e);
        }
      }
    });

    // --- 実行時のVR画面でのホイール・ピンチズーム対応コンポーネント ---
    AFRAME.registerComponent('fov-zoom-controls', {
      schema: { min: {default: 20}, max: {default: 120} },
      init: function () {
        this.camera = this.el;
        this.currentFov = 80;
        
        window.addEventListener('wheel', (e) => {
          if(e.target.closest('#minimap-overlay') || e.target.closest('#ui-overlay')) return;
          this.currentFov += Math.sign(e.deltaY) * 5;
          this.currentFov = Math.max(this.data.min, Math.min(this.data.max, this.currentFov));
          this.camera.setAttribute('camera', 'fov', this.currentFov);
        }, {passive: false});

        let initialDist = 0;
        window.addEventListener('touchstart', (e) => {
          if (e.touches.length === 2) {
            const dx = e.touches[0].pageX - e.touches[1].pageX;
            const dy = e.touches[0].pageY - e.touches[1].pageY;
            initialDist = Math.sqrt(dx*dx + dy*dy);
          }
        }, {passive: false});

        window.addEventListener('touchmove', (e) => {
          if (e.touches.length === 2) {
            if(e.target.closest('#minimap-overlay') || e.target.closest('#ui-overlay')) return;
            const dx = e.touches[0].pageX - e.touches[1].pageX;
            const dy = e.touches[0].pageY - e.touches[1].pageY;
            const dist = Math.sqrt(dx*dx + dy*dy);
            const diff = initialDist - dist;
            this.currentFov += diff * 0.15;
            this.currentFov = Math.max(this.data.min, Math.min(this.data.max, this.currentFov));
            this.camera.setAttribute('camera', 'fov', this.currentFov);
            initialDist = dist;
          }
        }, {passive: false});
      }
    });
  </script>

  <script>
    window.addEventListener('keydown', e => {
      const look = document.querySelector('#main-camera').components['look-controls'];
      if (!look) return;
      if (e.key === 'ArrowLeft') look.yawObject.rotation.y += 0.05;
      if (e.key === 'ArrowRight') look.yawObject.rotation.y -= 0.05;
      if (e.key === 'ArrowUp') look.pitchObject.rotation.x += 0.05;
      if (e.key === 'ArrowDown') look.pitchObject.rotation.x -= 0.05;
    });

    function updateLinksDisplay(camId) {
      document.querySelectorAll('.link-group').forEach(el => el.setAttribute('visible', 'false'));
      document.querySelectorAll('.nav-arrow').forEach(el => el.classList.remove('clickable'));
      
      document.querySelectorAll('.link-from-' + camId).forEach(el => {
        el.setAttribute('visible', 'true');
        const arrow = el.querySelector('.nav-arrow');
        if (arrow) arrow.classList.add('clickable');
      });
      
      document.querySelectorAll('[id^="mm-node-"]').forEach(el => el.setAttribute('fill', '#fff'));
      const activeNode = document.querySelector('#mm-node-' + camId);
      if (activeNode) {
        activeNode.setAttribute('fill', '#FF9800');
      }

      setTimeout(() => {
        document.querySelectorAll('[raycaster]').forEach(r => {
          if (r.components.raycaster) r.components.raycaster.refreshObjects();
        });
      }, 50);
    }
    updateLinksDisplay(window.currentCamId);

    let isTransitioning = false;

    const handleNavClick = function() {
      if (isTransitioning) return; 
      
      if (this.classList.contains('nav-arrow') && (!this.classList.contains('clickable') || this.parentNode.getAttribute('visible') === 'false')) return;
      if (this.classList.contains('nav-overlay-btn') && this.style.visibility === 'hidden') return;
      
      isTransitioning = true; 
      
      const newSrc = this.getAttribute('data-src');
      const nextCamId = this.getAttribute('data-cam-id');
      const targetName = this.getAttribute('data-name');
      const targetRot = this.getAttribute('data-target-rot') || '0';
      
      const sky = document.querySelector('#sky');
      const container = document.querySelector('#sky-container');
      sky.setAttribute('animation__fade', {property: 'material.opacity', from: 1, to: 0, dur: 300});

      setTimeout(() => {
        window.currentCamId = nextCamId; 
        
        sky.parentNode.removeChild(sky);
        const newSky = document.createElement('a-sky');
        newSky.setAttribute('id', 'sky');
        newSky.setAttribute('src', newSrc);
        newSky.setAttribute('rotation', '0 ' + targetRot + ' 0');
        newSky.setAttribute('material', 'transparent', 'true');
        newSky.setAttribute('material', 'opacity', '0');
        container.appendChild(newSky);
        
        const numMatch = targetName.match(/\d+/);
        document.querySelector('#location-overlay').textContent = numMatch ? numMatch[0] : targetName;

        updateLinksDisplay(nextCamId);
        
        newSky.setAttribute('animation__fade', {property: 'material.opacity', from: 0, to: 1, dur: 300});
        
        setTimeout(() => {
          isTransitioning = false;
        }, 300);
      }, 300);
    };

    document.querySelectorAll('.nav-arrow').forEach(link => {
      link.addEventListener('click', handleNavClick);
    });
    document.querySelectorAll('.nav-overlay-btn').forEach(btn => {
      btn.addEventListener('click', handleNavClick);
    });

    function setupDraggableMinimap() {
      const minimap = document.querySelector('#minimap-overlay');
      const header = document.querySelector('#minimap-header');
      if (!minimap || !header) return;

      let isDragging = false;
      let startX, startY;
      let initialLeft, initialTop;

      const onStart = (e) => {
        isDragging = true;
        const clientX = e.touches ? e.touches[0].clientX : e.clientX;
        const clientY = e.touches ? e.touches[0].clientY : e.clientY;
        startX = clientX;
        startY = clientY;
        
        const rect = minimap.getBoundingClientRect();
        initialLeft = rect.left;
        initialTop = rect.top;
        
        minimap.style.right = 'auto';
        minimap.style.bottom = 'auto';
        minimap.style.left = initialLeft + 'px';
        minimap.style.top = initialTop + 'px';
        
        if (e.cancelable) e.preventDefault();
      };

      const onMove = (e) => {
        if (!isDragging) return;
        const clientX = e.touches ? e.touches[0].clientX : e.clientX;
        const clientY = e.touches ? e.touches[0].clientY : e.clientY;
        const dx = clientX - startX;
        const dy = clientY - startY;
        
        minimap.style.left = (initialLeft + dx) + 'px';
        minimap.style.top = (initialTop + dy) + 'px';
      };

      const onEnd = () => {
        isDragging = false;
      };

      header.addEventListener('mousedown', onStart);
      window.addEventListener('mousemove', onMove);
      window.addEventListener('mouseup', onEnd);

      header.addEventListener('touchstart', onStart, { passive: false });
      window.addEventListener('touchmove', onMove, { passive: false });
      window.addEventListener('touchend', onEnd);
    }
    setupDraggableMinimap();
  </script>
