<!DOCTYPE html>
<html>
<head><meta charset="utf-8"><title>図書館 VRツアー</title><script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script></head>
<body>
  <a-scene background="color: #000">
    <a-assets>      <img id="room1" src="room1.jpg" crossorigin="anonymous">
      <img id="room2" src="room2.jpg" crossorigin="anonymous">
      <img id="room3" src="room3.jpg" crossorigin="anonymous">
      <img id="room4" src="room4.jpg" crossorigin="anonymous">
      <img id="room5" src="room5.jpg" crossorigin="anonymous">
      <img id="room6" src="room6.jpg" crossorigin="anonymous">
</a-assets>
    <a-entity id="sky-container"><a-sky id="sky" src="#room1" material="transparent:true;opacity:1"></a-sky></a-entity>
    
    <a-entity cursor="rayOrigin: mouse" raycaster="objects: .clickable"></a-entity>
    <a-laser-controls hand="left" raycaster="objects: .clickable"></a-laser-controls>
    <a-laser-controls hand="right" raycaster="objects: .clickable"></a-laser-controls>

    <a-camera id="main-camera" look-controls="reverseMouseDrag: true">
      <a-text id="loc-name" value="場所 1" position="0 0.5 -2" align="center" color="white"></a-text>
    </a-camera>
    
    <a-entity id="links">      <a-triangle class="clickable link-from-cam_1" vertex-a="0 0.5 0" vertex-b="-0.5 -0.5 0" vertex-c="0.5 -0.5 0" color="#FFFFFF" material="transparent: true; opacity: 0.8" data-src="#room2" data-name="場所 2" data-cam-id="cam_2" position="15.00 -1.5 0.00" rotation="-90 -90.00 0" scale="3 3 3" visible="false" animation__hover="property: scale; to: 3.5 3.5 3.5; startEvents: mouseenter; dur: 200" animation__leave="property: scale; to: 3 3 3; startEvents: mouseleave; dur: 200"></a-triangle>
      <a-triangle class="clickable link-from-cam_1" vertex-a="0 0.5 0" vertex-b="-0.5 -0.5 0" vertex-c="0.5 -0.5 0" color="#FFFFFF" material="transparent: true; opacity: 0.8" data-src="#room6" data-name="場所 6" data-cam-id="cam_6" position="0.00 -1.5 -15.00" rotation="-90 0.00 0" scale="3 3 3" visible="false" animation__hover="property: scale; to: 3.5 3.5 3.5; startEvents: mouseenter; dur: 200" animation__leave="property: scale; to: 3 3 3; startEvents: mouseleave; dur: 200"></a-triangle>
      <a-triangle class="clickable link-from-cam_2" vertex-a="0 0.5 0" vertex-b="-0.5 -0.5 0" vertex-c="0.5 -0.5 0" color="#FFFFFF" material="transparent: true; opacity: 0.8" data-src="#room1" data-name="場所 1" data-cam-id="cam_1" position="-15.00 -1.5 0.00" rotation="-90 -270.00 0" scale="3 3 3" visible="false" animation__hover="property: scale; to: 3.5 3.5 3.5; startEvents: mouseenter; dur: 200" animation__leave="property: scale; to: 3 3 3; startEvents: mouseleave; dur: 200"></a-triangle>
      <a-triangle class="clickable link-from-cam_2" vertex-a="0 0.5 0" vertex-b="-0.5 -0.5 0" vertex-c="0.5 -0.5 0" color="#FFFFFF" material="transparent: true; opacity: 0.8" data-src="#room3" data-name="場所 3" data-cam-id="cam_3" position="15.00 -1.5 0.00" rotation="-90 -90.00 0" scale="3 3 3" visible="false" animation__hover="property: scale; to: 3.5 3.5 3.5; startEvents: mouseenter; dur: 200" animation__leave="property: scale; to: 3 3 3; startEvents: mouseleave; dur: 200"></a-triangle>
      <a-triangle class="clickable link-from-cam_3" vertex-a="0 0.5 0" vertex-b="-0.5 -0.5 0" vertex-c="0.5 -0.5 0" color="#FFFFFF" material="transparent: true; opacity: 0.8" data-src="#room2" data-name="場所 2" data-cam-id="cam_2" position="-15.00 -1.5 0.00" rotation="-90 -270.00 0" scale="3 3 3" visible="false" animation__hover="property: scale; to: 3.5 3.5 3.5; startEvents: mouseenter; dur: 200" animation__leave="property: scale; to: 3 3 3; startEvents: mouseleave; dur: 200"></a-triangle>
      <a-triangle class="clickable link-from-cam_3" vertex-a="0 0.5 0" vertex-b="-0.5 -0.5 0" vertex-c="0.5 -0.5 0" color="#FFFFFF" material="transparent: true; opacity: 0.8" data-src="#room4" data-name="場所 4" data-cam-id="cam_4" position="0.00 -1.5 -15.00" rotation="-90 0.00 0" scale="3 3 3" visible="false" animation__hover="property: scale; to: 3.5 3.5 3.5; startEvents: mouseenter; dur: 200" animation__leave="property: scale; to: 3 3 3; startEvents: mouseleave; dur: 200"></a-triangle>
      <a-triangle class="clickable link-from-cam_4" vertex-a="0 0.5 0" vertex-b="-0.5 -0.5 0" vertex-c="0.5 -0.5 0" color="#FFFFFF" material="transparent: true; opacity: 0.8" data-src="#room3" data-name="場所 3" data-cam-id="cam_3" position="0.00 -1.5 15.00" rotation="-90 -180.00 0" scale="3 3 3" visible="false" animation__hover="property: scale; to: 3.5 3.5 3.5; startEvents: mouseenter; dur: 200" animation__leave="property: scale; to: 3 3 3; startEvents: mouseleave; dur: 200"></a-triangle>
      <a-triangle class="clickable link-from-cam_4" vertex-a="0 0.5 0" vertex-b="-0.5 -0.5 0" vertex-c="0.5 -0.5 0" color="#FFFFFF" material="transparent: true; opacity: 0.8" data-src="#room5" data-name="場所 5" data-cam-id="cam_5" position="-15.00 -1.5 0.00" rotation="-90 -270.00 0" scale="3 3 3" visible="false" animation__hover="property: scale; to: 3.5 3.5 3.5; startEvents: mouseenter; dur: 200" animation__leave="property: scale; to: 3 3 3; startEvents: mouseleave; dur: 200"></a-triangle>
      <a-triangle class="clickable link-from-cam_5" vertex-a="0 0.5 0" vertex-b="-0.5 -0.5 0" vertex-c="0.5 -0.5 0" color="#FFFFFF" material="transparent: true; opacity: 0.8" data-src="#room4" data-name="場所 4" data-cam-id="cam_4" position="15.00 -1.5 0.00" rotation="-90 -90.00 0" scale="3 3 3" visible="false" animation__hover="property: scale; to: 3.5 3.5 3.5; startEvents: mouseenter; dur: 200" animation__leave="property: scale; to: 3 3 3; startEvents: mouseleave; dur: 200"></a-triangle>
      <a-triangle class="clickable link-from-cam_5" vertex-a="0 0.5 0" vertex-b="-0.5 -0.5 0" vertex-c="0.5 -0.5 0" color="#FFFFFF" material="transparent: true; opacity: 0.8" data-src="#room6" data-name="場所 6" data-cam-id="cam_6" position="-15.00 -1.5 0.00" rotation="-90 -270.00 0" scale="3 3 3" visible="false" animation__hover="property: scale; to: 3.5 3.5 3.5; startEvents: mouseenter; dur: 200" animation__leave="property: scale; to: 3 3 3; startEvents: mouseleave; dur: 200"></a-triangle>
      <a-triangle class="clickable link-from-cam_6" vertex-a="0 0.5 0" vertex-b="-0.5 -0.5 0" vertex-c="0.5 -0.5 0" color="#FFFFFF" material="transparent: true; opacity: 0.8" data-src="#room5" data-name="場所 5" data-cam-id="cam_5" position="15.00 -1.5 0.00" rotation="-90 -90.00 0" scale="3 3 3" visible="false" animation__hover="property: scale; to: 3.5 3.5 3.5; startEvents: mouseenter; dur: 200" animation__leave="property: scale; to: 3 3 3; startEvents: mouseleave; dur: 200"></a-triangle>
      <a-triangle class="clickable link-from-cam_6" vertex-a="0 0.5 0" vertex-b="-0.5 -0.5 0" vertex-c="0.5 -0.5 0" color="#FFFFFF" material="transparent: true; opacity: 0.8" data-src="#room1" data-name="場所 1" data-cam-id="cam_1" position="0.00 -1.5 15.00" rotation="-90 -180.00 0" scale="3 3 3" visible="false" animation__hover="property: scale; to: 3.5 3.5 3.5; startEvents: mouseenter; dur: 200" animation__leave="property: scale; to: 3 3 3; startEvents: mouseleave; dur: 200"></a-triangle>
</a-entity>
  </a-scene>
  <script>
    let currentCamId = 'cam_1';
    
    window.addEventListener('keydown', e => {
      const look = document.querySelector('#main-camera').components['look-controls'];
      if (!look) return;
      if (e.key === 'ArrowLeft') look.yawObject.rotation.y += 0.05;
      if (e.key === 'ArrowRight') look.yawObject.rotation.y -= 0.05;
      if (e.key === 'ArrowUp') look.pitchObject.rotation.x += 0.05;
      if (e.key === 'ArrowDown') look.pitchObject.rotation.x -= 0.05;
    });

    function updateLinksDisplay(camId) {
      document.querySelectorAll('.clickable').forEach(el => el.setAttribute('visible', 'false'));
      document.querySelectorAll('.link-from-' + camId).forEach(el => el.setAttribute('visible', 'true'));
    }
    updateLinksDisplay(currentCamId);

    document.querySelectorAll('.clickable').forEach(link => {
      link.addEventListener('click', function() {
        if (this.getAttribute('visible') === 'false') return;
        const newSrc = this.getAttribute('data-src');
        const nextCamId = this.getAttribute('data-cam-id');
        const targetName = this.getAttribute('data-name');
        
        const sky = document.querySelector('#sky');
        const container = document.querySelector('#sky-container');
        sky.setAttribute('animation__fade', {property: 'material.opacity', from: 1, to: 0, dur: 300});

        setTimeout(() => {
          sky.parentNode.removeChild(sky);
          const newSky = document.createElement('a-sky');
          newSky.setAttribute('id', 'sky');
          newSky.setAttribute('src', newSrc);
          newSky.setAttribute('material', 'transparent', 'true');
          newSky.setAttribute('material', 'opacity', '0');
          container.appendChild(newSky);
          
          document.querySelector('#loc-name').setAttribute('value', targetName);
          updateLinksDisplay(nextCamId);
          
          newSky.setAttribute('animation__fade', {property: 'material.opacity', from: 0, to: 1, dur: 300});
        }, 300);
      });
    });
  </script>
</body>
</html>
