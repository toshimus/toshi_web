<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>強制再描画テスト</title>
  <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>
</head>
<body>
  <a-scene id="scene">
    <a-sky id="sky" src="room1.jpg"></a-sky>

    <a-camera>
      <a-cursor></a-cursor>
    </a-camera>

    <a-entity position="0 0 -2">
      <a-box id="b1" position="-1 0 0" color="red"   scale="0.5 0.5 0.5"></a-box>
      <a-box id="b2" position="0 0 0"  color="green" scale="0.5 0.5 0.5"></a-box>
      <a-box id="b3" position="1 0 0"  color="blue"  scale="0.5 0.5 0.5"></a-box>
    </a-entity>
  </a-scene>

  <script>
    const scene = document.querySelector('#scene');

    function changeBackground(file) {
      console.log("Replacing sky with: " + file);
      
      // 1. 古いskyを削除
      const oldSky = document.querySelector('#sky');
      if (oldSky) {
        oldSky.parentNode.removeChild(oldSky);
      }

      // 2. 新しいskyを生成してシーンに追加
      const newSky = document.createElement('a-sky');
      newSky.setAttribute('id', 'sky');
      newSky.setAttribute('src', file + "?t=" + new Date().getTime());
      scene.appendChild(newSky);
    }

    document.querySelector('#b1').addEventListener('click', () => changeBackground('room1.jpg'));
    document.querySelector('#b2').addEventListener('click', () => changeBackground('room2.jpg'));
    document.querySelector('#b3').addEventListener('click', () => changeBackground('room3.jpg'));
  </script>
</body>
</html>
