<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>図書館VR マップエディタ (完全版・カニ歩き対応)</title>
  <style>
    body { font-family: sans-serif; display: flex; background: #222; color: #ddd; margin: 0; height: 100vh; overflow: hidden; }
    #toolbar { width: 280px; background: #333; padding: 15px; border-right: 1px solid #555; display: flex; flex-direction: column; gap: 10px; overflow-y: auto; }
    #workspace { flex-grow: 1; display: flex; justify-content: center; align-items: center; background: #111; position: relative; user-select: none; }
    svg { background: white; border: 2px solid #666; cursor: default; }
    
    h3 { margin-top: 0; margin-bottom: 5px; font-size: 16px; border-bottom: 1px solid #555; padding-bottom: 5px; }
    
    button { padding: 8px; cursor: pointer; border: none; border-radius: 4px; background: #555; color: white; font-weight: bold; font-size: 13px; }
    button:hover { background: #777; }
    button.active { background: #4CAF50; }
    .btn-delete { background: #d32f2f; }
    .btn-delete:hover { background: #f44336; }
    .btn-action { background: #FF9800; }
    .btn-export { background: #2196F3; margin-top: 10px; }
    
    #properties { margin-top: 15px; padding-top: 15px; border-top: 1px solid #555; display: none; flex-direction: column; gap: 8px; }
    input[type="text"] { padding: 6px; border: 1px solid #777; border-radius: 4px; background: #222; color: white; width: 100%; box-sizing: border-box; }
    .file-row { display: flex; gap: 5px; }
    
    .draggable { cursor: move; }
    .selected { stroke: #ffeb3b !important; stroke-width: 3px !important; }
    .handle { cursor: nwse-resize; fill: white; stroke: black; stroke-width: 1; }
    .link-line { stroke: #2196F3; stroke-width: 3; stroke-dasharray: 5,5; pointer-events: none; }
    #selection-box { fill: rgba(33, 150, 243, 0.2); stroke: #2196F3; stroke-width: 1; stroke-dasharray: 4,4; pointer-events: none; display: none; }
  </style>
</head>
<body>

  <div id="toolbar">
    <h3>📂 ファイル操作</h3>
    <button class="btn-action" onclick="saveProject()">💾 プロジェクト保存</button>
    <button class="btn-action" onclick="document.getElementById('file-input').click()">📂 プロジェクト読込</button>
    <input type="file" id="file-input" style="display:none" accept=".json" onchange="loadProject(event)">
    <button class="btn-export" onclick="exportHTML()">🌐 VR HTML書き出し</button>

    <h3 style="margin-top:15px;">🛠 ツールボックス</h3>
    <button onclick="addShelf()">+ 本棚を追加</button>
    <button onclick="addCamera()">+ カメラを追加</button>
    <button id="btn-link" onclick="toggleLinkMode()">🔗 カメラを線で結ぶ</button>
    <button class="btn-delete" onclick="deleteSelected()">🗑 選択中のものを削除</button>
    
    <div id="properties">
      <h3>📷 カメラプロパティ</h3>
      <label>画像ファイル名 (src)</label>
      <div class="file-row">
        <input type="text" id="prop-img" placeholder="room1.jpg" oninput="updateCameraProp('img')">
        <button onclick="document.getElementById('img-file-picker').click()">📁 参照</button>
        <input type="file" id="img-file-picker" style="display:none" accept="image/*" onchange="handleImagePick(event)">
      </div>
      <label>場所の名前 (name)</label>
      <input type="text" id="prop-name" placeholder="Entrance" oninput="updateCameraProp('name')">
    </div>
  </div>

  <div id="workspace">
    <svg id="editor" width="800" height="600">
      <defs>
        <pattern id="grid" width="20" height="20" patternUnits="userSpaceOnUse">
          <path d="M 20 0 L 0 0 0 20" fill="none" stroke="#e0e0e0" stroke-width="1"/>
        </pattern>
      </defs>
      <rect id="bg-rect" width="100%" height="100%" fill="url(#grid)" />
      <g id="layer-links"></g>
      <g id="layer-shelves"></g>
      <g id="layer-cameras"></g>
      <rect id="selection-box" x="0" y="0" width="0" height="0"></rect>
    </svg>
  </div>

  <script>
    const svg = document.getElementById('editor');
    const GRID_SIZE = 20;
    
    let state = { mode: 'select', selectedObjs: [], linkSource: null, links: [], camCounter: 0, shelfCounter: 0 };
    const snap = (val) => Math.round(val / GRID_SIZE) * GRID_SIZE;
    const getSVGPoint = (evt) => {
      let pt = svg.createSVGPoint(); pt.x = evt.clientX; pt.y = evt.clientY; return pt.matrixTransform(svg.getScreenCTM().inverse());
    };

    function addShelf(id, x=100, y=100, w=80, h=40) {
      if(!id) { state.shelfCounter++; id = 'shelf_' + state.shelfCounter; }
      const g = document.createElementNS('http://www.w3.org/2000/svg', 'g');
      g.setAttribute('class', 'draggable shelf-group'); g.dataset.id = id; g.dataset.type = 'shelf';
      const rect = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
      rect.setAttribute('x', x); rect.setAttribute('y', y); rect.setAttribute('width', w); rect.setAttribute('height', h);
      rect.setAttribute('fill', '#8B4513'); rect.setAttribute('stroke', '#3e1f08'); rect.setAttribute('stroke-width', '2');
      const handle = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
      handle.setAttribute('class', 'handle'); handle.setAttribute('x', x + w - 4); handle.setAttribute('y', y + h - 4); handle.setAttribute('width', 8); handle.setAttribute('height', 8);
      g.appendChild(rect); g.appendChild(handle);
      document.getElementById('layer-shelves').appendChild(g); setupInteractions(g);
    }

    function addCamera(id, cx=200, cy=200, img, name) {
      if(!id) { state.camCounter++; id = 'cam_' + state.camCounter; img = `room${state.camCounter}.jpg`; name = `場所 ${state.camCounter}`; }
      const g = document.createElementNS('http://www.w3.org/2000/svg', 'g');
      g.setAttribute('class', 'draggable cam-group'); g.dataset.id = id; g.dataset.type = 'camera'; g.dataset.img = img; g.dataset.name = name;
      const circle = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
      circle.setAttribute('cx', cx); circle.setAttribute('cy', cy); circle.setAttribute('r', 15);
      circle.setAttribute('fill', '#E91E63'); circle.setAttribute('stroke', 'white'); circle.setAttribute('stroke-width', '2');
      
      const numMatch = name.match(/\d+/); const displayNum = numMatch ? numMatch[0] : name.substring(0, 3);
      const text = document.createElementNS('http://www.w3.org/2000/svg', 'text');
      text.setAttribute('x', cx); text.setAttribute('y', cy); text.setAttribute('dy', '4');
      text.setAttribute('text-anchor', 'middle'); text.setAttribute('fill', 'white'); text.setAttribute('font-size', '14px');
      text.setAttribute('font-weight', 'bold'); text.setAttribute('pointer-events', 'none'); text.textContent = displayNum;
      
      g.appendChild(circle); g.appendChild(text); document.getElementById('layer-cameras').appendChild(g); setupInteractions(g);
    }

    function toggleSelect(g, multi) {
      if (!multi) deselectAll();
      if (!state.selectedObjs.includes(g)) { state.selectedObjs.push(g); g.classList.add('selected'); }
      updatePropertiesPanel();
    }

    function deselectAll() {
      state.selectedObjs.forEach(g => g.classList.remove('selected')); state.selectedObjs = [];
      document.getElementById('properties').style.display = 'none';
      if (state.mode === 'select') state.linkSource = null;
    }

    function updatePropertiesPanel() {
      const cams = state.selectedObjs.filter(g => g.dataset.type === 'camera');
      if (state.selectedObjs.length === 1 && cams.length === 1) {
        document.getElementById('properties').style.display = 'flex';
        document.getElementById('prop-img').value = cams[0].dataset.img || '';
        document.getElementById('prop-name').value = cams[0].dataset.name || '';
      } else { document.getElementById('properties').style.display = 'none'; }
    }

    function updateCameraProp(key) {
      if (state.selectedObjs.length === 1 && state.selectedObjs[0].dataset.type === 'camera') {
        const val = document.getElementById(`prop-${key}`).value; state.selectedObjs[0].dataset[key] = val;
        if (key === 'name') {
           const textEl = state.selectedObjs[0].querySelector('text');
           if (textEl) { const numMatch = val.match(/\d+/); textEl.textContent = numMatch ? numMatch[0] : val.substring(0, 3); }
        }
      }
    }

    function handleImagePick(e) {
      if (e.target.files.length > 0) { document.getElementById('prop-img').value = e.target.files[0].name; updateCameraProp('img'); e.target.value = ''; }
    }

    function deleteSelected() {
      if (state.selectedObjs.length === 0) return;
      const ids = state.selectedObjs.map(g => g.dataset.id);
      state.links = state.links.filter(l => {
        if (ids.includes(l.sourceId) || ids.includes(l.targetId)) { l.lineElement.remove(); return false; } return true;
      });
      state.selectedObjs.forEach(g => g.remove()); deselectAll();
    }
    window.addEventListener('keydown', (e) => { if (e.target.tagName === 'INPUT') return; if (e.key === 'Delete' || e.key === 'Backspace') deleteSelected(); });

    let dragInfo = null; let selectionBox = { active: false, startX: 0, startY: 0, el: document.getElementById('selection-box') };

    document.getElementById('bg-rect').addEventListener('mousedown', (e) => {
      if (state.mode === 'link') return;
      deselectAll(); const pt = getSVGPoint(e);
      selectionBox.active = true; selectionBox.startX = pt.x; selectionBox.startY = pt.y;
      selectionBox.el.setAttribute('x', pt.x); selectionBox.el.setAttribute('y', pt.y);
      selectionBox.el.setAttribute('width', 0); selectionBox.el.setAttribute('height', 0); selectionBox.el.style.display = 'block';
    });

    function setupInteractions(g) {
      g.addEventListener('mousedown', (e) => {
        e.stopPropagation();
        if (state.mode === 'link' && g.dataset.type === 'camera') {
          if (!state.linkSource) { state.linkSource = g; g.classList.add('selected'); }
          else { if (state.linkSource !== g) createLink(state.linkSource, g); state.linkSource.classList.remove('selected'); state.linkSource = null; }
          return;
        }
        if (!state.selectedObjs.includes(g)) toggleSelect(g, e.shiftKey);
        const pt = getSVGPoint(e); const isHandle = e.target.classList.contains('handle');
        dragInfo = { startX: pt.x, startY: pt.y, isResize: isHandle, targets: [] };
        state.selectedObjs.forEach(obj => {
          if (obj.dataset.type === 'shelf') {
            const rect = obj.querySelector('rect');
            dragInfo.targets.push({ obj: obj, type: 'shelf', origX: parseFloat(rect.getAttribute('x')), origY: parseFloat(rect.getAttribute('y')), origW: parseFloat(rect.getAttribute('width')), origH: parseFloat(rect.getAttribute('height')) });
          } else if (obj.dataset.type === 'camera') {
            const circle = obj.querySelector('circle');
            dragInfo.targets.push({ obj: obj, type: 'camera', origCX: parseFloat(circle.getAttribute('cx')), origCY: parseFloat(circle.getAttribute('cy')) });
          }
        });
      });
    }

    svg.addEventListener('mousemove', (e) => {
      const pt = getSVGPoint(e);
      if (selectionBox.active) {
        const x = Math.min(pt.x, selectionBox.startX); const y = Math.min(pt.y, selectionBox.startY);
        const w = Math.abs(pt.x - selectionBox.startX); const h = Math.abs(pt.y - selectionBox.startY);
        selectionBox.el.setAttribute('x', x); selectionBox.el.setAttribute('y', y);
        selectionBox.el.setAttribute('width', w); selectionBox.el.setAttribute('height', h);
        return;
      }
      if (!dragInfo) return;
      const dx = pt.x - dragInfo.startX; const dy = pt.y - dragInfo.startY;
      dragInfo.targets.forEach(t => {
        if (t.type === 'shelf') {
          const rect = t.obj.querySelector('rect'); const handle = t.obj.querySelector('.handle');
          if (dragInfo.isResize && state.selectedObjs.length === 1) { 
            const newW = Math.max(GRID_SIZE, snap(t.origW + dx)); const newH = Math.max(GRID_SIZE, snap(t.origH + dy));
            rect.setAttribute('width', newW); rect.setAttribute('height', newH);
            handle.setAttribute('x', t.origX + newW - 4); handle.setAttribute('y', t.origY + newH - 4);
          } else {
            const newX = snap(t.origX + dx); const newY = snap(t.origY + dy);
            rect.setAttribute('x', newX); rect.setAttribute('y', newY);
            handle.setAttribute('x', newX + t.origW - 4); handle.setAttribute('y', newY + t.origH - 4);
          }
        } else if (t.type === 'camera') {
          const circle = t.obj.querySelector('circle'); const textEl = t.obj.querySelector('text');
          const newX = snap(t.origCX + dx); const newY = snap(t.origCY + dy);
          circle.setAttribute('cx', newX); circle.setAttribute('cy', newY);
          if (textEl) { textEl.setAttribute('x', newX); textEl.setAttribute('y', newY); }
        }
      });
      updateLinks();
    });

    svg.addEventListener('mouseup', () => { 
      dragInfo = null; 
      if (selectionBox.active) {
        selectionBox.active = false; selectionBox.el.style.display = 'none';
        const boxRect = selectionBox.el.getBoundingClientRect();
        document.querySelectorAll('.draggable').forEach(g => {
          let el = g.querySelector('rect') || g.querySelector('circle'); let r = el.getBoundingClientRect();
          if (!(r.right < boxRect.left || r.left > boxRect.right || r.bottom < boxRect.top || r.top > boxRect.bottom)) toggleSelect(g, true); 
        });
      }
    });
    svg.addEventListener('mouseleave', () => { dragInfo = null; selectionBox.active = false; selectionBox.el.style.display = 'none'; });

    function toggleLinkMode() {
      const btn = document.getElementById('btn-link');
      if (state.mode === 'select') { state.mode = 'link'; btn.classList.add('active'); btn.innerText = '🔴 接続先をクリック'; deselectAll();
      } else { state.mode = 'select'; btn.classList.remove('active'); btn.innerText = '🔗 カメラを線で結ぶ';
        if (state.linkSource) state.linkSource.classList.remove('selected'); state.linkSource = null;
      }
    }

    function createLink(srcCam, tgtCam) {
      const exists = state.links.some(l => (l.sourceId === srcCam.dataset.id && l.targetId === tgtCam.dataset.id) || (l.sourceId === tgtCam.dataset.id && l.targetId === srcCam.dataset.id));
      if (exists) return;
      const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
      line.setAttribute('class', 'link-line'); document.getElementById('layer-links').appendChild(line);
      state.links.push({ sourceId: srcCam.dataset.id, targetId: tgtCam.dataset.id, lineElement: line }); updateLinks();
    }

    function updateLinks() {
      state.links.forEach(l => {
        const c1 = document.querySelector(`[data-id="${l.sourceId}"] circle`); const c2 = document.querySelector(`[data-id="${l.targetId}"] circle`);
        if (c1 && c2) {
          l.lineElement.setAttribute('x1', c1.getAttribute('cx')); l.lineElement.setAttribute('y1', c1.getAttribute('cy'));
          l.lineElement.setAttribute('x2', c2.getAttribute('cx')); l.lineElement.setAttribute('y2', c2.getAttribute('cy'));
        }
      });
    }

    function saveProject() {
      const projectData = {
        camCounter: state.camCounter, shelfCounter: state.shelfCounter,
        cameras: Array.from(document.querySelectorAll('.cam-group')).map(g => {
          const c = g.querySelector('circle');
          return { id: g.dataset.id, img: g.dataset.img, name: g.dataset.name, x: parseFloat(c.getAttribute('cx')), y: parseFloat(c.getAttribute('cy')) };
        }),
        shelves: Array.from(document.querySelectorAll('.shelf-group')).map(g => {
          const r = g.querySelector('rect');
          return { id: g.dataset.id, x: parseFloat(r.getAttribute('x')), y: parseFloat(r.getAttribute('y')), w: parseFloat(r.getAttribute('width')), h: parseFloat(r.getAttribute('height')) };
        }),
        links: state.links.map(l => ({ sourceId: l.sourceId, targetId: l.targetId }))
      };
      const blob = new Blob([JSON.stringify(projectData, null, 2)], { type: 'application/json' });
      const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = 'vrtour_project.json'; a.click();
    }

    function loadProject(event) {
      const file = event.target.files[0]; if (!file) return;
      const reader = new FileReader();
      reader.onload = function(e) {
        try {
          const data = JSON.parse(e.target.result);
          document.getElementById('layer-cameras').innerHTML = ''; document.getElementById('layer-shelves').innerHTML = ''; document.getElementById('layer-links').innerHTML = '';
          state.links = []; deselectAll();
          state.camCounter = data.camCounter || 0; state.shelfCounter = data.shelfCounter || 0;
          if(data.shelves) data.shelves.forEach(s => addShelf(s.id, s.x, s.y, s.w, s.h));
          if(data.cameras) data.cameras.forEach(c => addCamera(c.id, c.x, c.y, c.img, c.name));
          if(data.links) { data.links.forEach(l => { const srcCam = document.querySelector(`[data-id="${l.sourceId}"]`); const tgtCam = document.querySelector(`[data-id="${l.targetId}"]`); if (srcCam && tgtCam) createLink(srcCam, tgtCam); }); }
          document.getElementById('file-input').value = ""; 
        } catch (err) { alert("ファイルの読み込みに失敗しました。"); }
      };
      reader.readAsText(file);
    }

    function generateVRHTML() {
      const cams = Array.from(document.querySelectorAll('.cam-group')).map(g => {
        const c = g.querySelector('circle');
        return { id: g.dataset.id, img: g.dataset.img, name: g.dataset.name, x: parseFloat(c.getAttribute('cx')), z: parseFloat(c.getAttribute('cy')) };
      });
      if (cams.length === 0) { alert("カメラを配置してください。"); return null; }

      let assetsHTML = '';
      cams.forEach((c, i) => {
         const safeId = c.img.split('.')[0] || `cam_img_${i}`;
         assetsHTML += `      <img id="${safeId}" src="${c.img}" crossorigin="anonymous">\n`;
      });

      let linksHTML = '';

      cams.forEach(currentCam => {
        const connectedIds = state.links.filter(l => l.sourceId === currentCam.id || l.targetId === currentCam.id).map(l => l.sourceId === currentCam.id ? l.targetId : l.sourceId);
        connectedIds.forEach(targetId => {
          const targetCam = cams.find(c => c.id === targetId);
          const dx = targetCam.x - currentCam.x; 
          const dz = targetCam.z - currentCam.z; 
          // 【ご要望対応】距離を12mに変更！
          const distance = 12; 
          const angleRad = Math.atan2(dx, -dz); 
          let angleDeg = angleRad * 180 / Math.PI;
          if (angleDeg < 0) angleDeg += 360;
          
          const sphereX = (Math.sin(angleRad) * distance).toFixed(2); 
          const sphereZ = (-Math.cos(angleRad) * distance).toFixed(2);
          const rotY = (angleDeg - 180).toFixed(2);
          const textRotY = angleDeg.toFixed(2); 
          
          const targetAssetId = targetCam.img.split('.')[0];
          const numMatch = targetCam.name.match(/\d+/);
          const displayNum = numMatch ? numMatch[0] : targetCam.name.substring(0, 3);
          
          linksHTML += `      <a-entity class="link-group link-from-${currentCam.id}" visible="false">
        <a-triangle class="nav-arrow" data-angle="${angleDeg.toFixed(2)}" data-src="#${targetAssetId}" data-name="${targetCam.name}" data-cam-id="${targetCam.id}" 
          vertex-a="0 0.5 0" vertex-b="-0.5 -0.5 0" vertex-c="0.5 -0.5 0" 
          color="#FF9800" material="transparent: true; opacity: 0.9" 
          position="${sphereX} -1.5 ${sphereZ}" rotation="-90 ${rotY} 0" scale="2.5 2.5 2.5" 
          animation__hover="property: scale; to: 3 3 3; startEvents: mouseenter; dur: 200" 
          animation__leave="property: scale; to: 2.5 2.5 2.5; startEvents: mouseleave; dur: 200"></a-triangle>
        <a-text value="${displayNum}" position="${sphereX} -0.5 ${sphereZ}" rotation="0 ${textRotY} 0" 
          align="center" color="#FFFFFF" scale="4 4 4" width="10"></a-text>
      </a-entity>\n`;
        });
      });

      const minX = Math.min(...cams.map(c => c.x)); const maxX = Math.max(...cams.map(c => c.x));
      const minZ = Math.min(...cams.map(c => c.z)); const maxZ = Math.max(...cams.map(c => c.z));
      const cX = (minX + maxX) / 2; const cZ = (minZ + maxZ) / 2;
      const range = Math.max(maxX - minX, maxZ - minZ) || 100;
      const mapScale = 1.2 / range; 

      let minimapHTML = `
        <a-plane color="#111" opacity="0.6" width="1.6" height="1.6" position="0 0 -0.02"></a-plane>
        <a-text value="MAP" position="-0.7 0.65 0" scale="0.4 0.4 0.4" color="#aaa"></a-text>\n`;

      state.links.forEach(l => {
        const c1 = cams.find(c => c.id === l.sourceId); const c2 = cams.find(c => c.id === l.targetId);
        if(c1 && c2) {
          const x1 = ((c1.x - cX) * mapScale).toFixed(3); const y1 = (-(c1.z - cZ) * mapScale).toFixed(3);
          const x2 = ((c2.x - cX) * mapScale).toFixed(3); const y2 = (-(c2.z - cZ) * mapScale).toFixed(3);
          minimapHTML += `        <a-entity line="start: ${x1} ${y1} 0; end: ${x2} ${y2} 0; color: #888;"></a-entity>\n`;
        }
      });

      cams.forEach(c => {
        const x = ((c.x - cX) * mapScale).toFixed(3); const y = (-(c.z - cZ) * mapScale).toFixed(3);
        const numMatch = c.name.match(/\d+/); const displayNum = numMatch ? numMatch[0] : "";
        minimapHTML += `        <a-entity position="${x} ${y} 0">
          <a-circle id="mm-node-${c.id}" data-x="${x}" data-y="${y}" radius="0.05" color="#fff"></a-circle>
          <a-text value="${displayNum}" position="0 0.1 0" align="center" scale="0.3 0.3 0.3" color="#fff"></a-text>
        </a-entity>\n`;
      });

      const startX = ((cams[0].x - cX) * mapScale).toFixed(3);
      const startY = (-(cams[0].z - cZ) * mapScale).toFixed(3);
      minimapHTML += `        <a-entity id="mm-player" position="${startX} ${startY} 0.01">
          <a-circle radius="0.07" color="#FF9800"></a-circle>
          <a-triangle vertex-a="0 0.12 0" vertex-b="-0.07 -0.04 0" vertex-c="0.07 -0.04 0" color="#FF9800"></a-triangle>
        </a-entity>\n`;

      const firstCamId = cams[0].img.split('.')[0];
      return `<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>図書館 VRツアー</title>
  <script src="https://aframe.io/releases/1.6.0/aframe.min.js"><\/script>
  <script>
    window.currentCamId = '${cams[0].id}';
    
    AFRAME.registerComponent('sync-system', {
      tick: function () {
        try {
          const cam = document.querySelector('#main-camera');
          const player = document.querySelector('#mm-player');
          const containerLeft = document.querySelector('#hud-left-container');
          const containerRight = document.querySelector('#hud-right-container');
          const btnLeft = document.querySelector('#hud-left');
          const btnRight = document.querySelector('#hud-right');
          
          if (!cam || !cam.object3D || !containerLeft || !containerRight || !btnLeft || !btnRight || !window.currentCamId) return;
          
          if (player && player.object3D) player.object3D.rotation.z = cam.object3D.rotation.y;
          
          let camY = (-cam.object3D.rotation.y * 180 / Math.PI) % 360;
          if (camY < 0) camY += 360;

          const activeLinks = document.querySelectorAll('.link-from-' + window.currentCamId);
          
          let leftTarget = null, rightTarget = null;
          let leftDiff = 999, rightDiff = 999;

          activeLinks.forEach(el => {
             const arrow = el.querySelector('.nav-arrow');
             if(!arrow) return;
             const linkAngle = parseFloat(arrow.getAttribute('data-angle'));
             const camId = arrow.getAttribute('data-cam-id');
             const name = arrow.getAttribute('data-name');
             const src = arrow.getAttribute('data-src');
             
             // 【重要修正】 カメラから見た相対角度を計算し、半球（10〜170度, 190〜350度）に入っていれば確実にボタンを出す
             const relAngle = (linkAngle - camY + 360) % 360;
             
             if (relAngle >= 10 && relAngle <= 170) {
                const diff = Math.abs(relAngle - 90);
                if (diff < rightDiff) {
                   rightDiff = diff;
                   rightTarget = { camId, name, src };
                }
             } else if (relAngle >= 190 && relAngle <= 350) {
                const diff = Math.abs(relAngle - 270);
                if (diff < leftDiff) {
                   leftDiff = diff;
                   leftTarget = { camId, name, src };
                }
             }
          });

          let stateChanged = false;
          
          const isLeftVis = containerLeft.getAttribute('visible') === true || containerLeft.getAttribute('visible') === 'true';
          const isRightVis = containerRight.getAttribute('visible') === true || containerRight.getAttribute('visible') === 'true';
          
          if (leftTarget) {
             if (!isLeftVis) {
               containerLeft.setAttribute('visible', true);
               btnLeft.classList.add('clickable');
               stateChanged = true;
             }
             btnLeft.setAttribute('data-cam-id', leftTarget.camId);
             btnLeft.setAttribute('data-name', leftTarget.name);
             btnLeft.setAttribute('data-src', leftTarget.src);
             const numMatch = leftTarget.name.match(/\\d+/);
             document.querySelector('#hud-left-text').setAttribute('value', numMatch ? numMatch[0] : 'L');
          } else {
             if (isLeftVis) {
               containerLeft.setAttribute('visible', false);
               btnLeft.classList.remove('clickable');
               stateChanged = true;
             }
          }

          if (rightTarget) {
             if (!isRightVis) {
               containerRight.setAttribute('visible', true);
               btnRight.classList.add('clickable');
               stateChanged = true;
             }
             btnRight.setAttribute('data-cam-id', rightTarget.camId);
             btnRight.setAttribute('data-name', rightTarget.name);
             btnRight.setAttribute('data-src', rightTarget.src);
             const numMatch = rightTarget.name.match(/\\d+/);
             document.querySelector('#hud-right-text').setAttribute('value', numMatch ? numMatch[0] : 'R');
          } else {
             if (isRightVis) {
               containerRight.setAttribute('visible', false);
               btnRight.classList.remove('clickable');
               stateChanged = true;
             }
          }

          if (stateChanged) {
             document.querySelectorAll('[raycaster]').forEach(r => {
               if (r.components.raycaster) r.components.raycaster.refreshObjects();
             });
          }
        } catch (e) {
          console.error(e);
        }
      }
    });
  <\/script>
</head>
<body>
  <a-scene background="color: #000" sync-system>
    <a-assets>${assetsHTML}</a-assets>
    <a-entity id="sky-container"><a-sky id="sky" src="#${firstCamId}" material="transparent:true;opacity:1"></a-sky></a-entity>
    
    <a-entity cursor="rayOrigin: mouse" raycaster="objects: .clickable"></a-entity>
    <a-laser-controls hand="left" raycaster="objects: .clickable"></a-laser-controls>
    <a-laser-controls hand="right" raycaster="objects: .clickable"></a-laser-controls>

    <a-camera id="main-camera" look-controls="reverseMouseDrag: true">
      <a-text id="loc-name" value="${cams[0].name}" position="0 0.5 -2" align="center" color="white"></a-text>
      
      <a-entity id="minimap-container" position="1.4 0.9 -2.5" scale="0.6 0.6 0.6">
        ${minimapHTML}
      </a-entity>

      <a-entity id="hud-left-container" position="-0.45 -0.2 -1" visible="false">
        <a-triangle id="hud-left" class="hud-btn" vertex-a="-0.08 0 0" vertex-b="0.05 0.08 0" vertex-c="0.05 -0.08 0" color="#2196F3" material="transparent: true; opacity: 0.8" animation__hover="property: scale; to: 1.2 1.2 1.2; startEvents: mouseenter; dur: 200" animation__leave="property: scale; to: 1 1 1; startEvents: mouseleave; dur: 200"></a-triangle>
        <a-text id="hud-left-text" value="L" position="0 -0.15 0" align="center" scale="0.4 0.4 0.4" color="#FFFFFF"></a-text>
      </a-entity>
      
      <a-entity id="hud-right-container" position="0.45 -0.2 -1" visible="false">
        <a-triangle id="hud-right" class="hud-btn" vertex-a="0.08 0 0" vertex-b="-0.05 0.08 0" vertex-c="-0.05 -0.08 0" color="#2196F3" material="transparent: true; opacity: 0.8" animation__hover="property: scale; to: 1.2 1.2 1.2; startEvents: mouseenter; dur: 200" animation__leave="property: scale; to: 1 1 1; startEvents: mouseleave; dur: 200"></a-triangle>
        <a-text id="hud-right-text" value="R" position="0 -0.15 0" align="center" scale="0.4 0.4 0.4" color="#FFFFFF"></a-text>
      </a-entity>
    </a-camera>
    
    <a-entity id="links">${linksHTML}</a-entity>
  </a-scene>
  <script>
    window.addEventListener('keydown', e => {
      const look = document.querySelector('#main-camera').components['look-controls'];
      if (!look) return;
      if (e.key === 'ArrowLeft') look.yawObject.rotation.y += 0.05;
      if (e.key === 'ArrowRight') look.yawObject.rotation.y -= 0.05;
      if (e.key === 'ArrowUp') look.pitchObject.rotation.x += 0.05;
      if (e.key === 'ArrowDown') look.pitchObject.rotation.x -= 0.05;
    });

    function updateLinksDisplay(camId) {
      document.querySelectorAll('.link-group').forEach(el => el.setAttribute('visible', 'false'));
      document.querySelectorAll('.nav-arrow').forEach(el => el.classList.remove('clickable'));
      
      document.querySelectorAll('.link-from-' + camId).forEach(el => {
        el.setAttribute('visible', 'true');
        const arrow = el.querySelector('.nav-arrow');
        if (arrow) arrow.classList.add('clickable');
      });
      
      document.querySelectorAll('[id^="mm-node-"]').forEach(el => el.setAttribute('color', '#fff'));
      const activeNode = document.querySelector('#mm-node-' + camId);
      if (activeNode) {
        activeNode.setAttribute('color', '#FF9800');
        const x = activeNode.getAttribute('data-x');
        const y = activeNode.getAttribute('data-y');
        if(x && y) {
           document.querySelector('#mm-player').setAttribute('position', x + ' ' + y + ' 0.01');
        }
      }

      setTimeout(() => {
        document.querySelectorAll('[raycaster]').forEach(r => {
          if (r.components.raycaster) r.components.raycaster.refreshObjects();
        });
      }, 50);
    }
    updateLinksDisplay(window.currentCamId);

    let isTransitioning = false;

    document.querySelectorAll('.nav-arrow, .hud-btn').forEach(link => {
      link.addEventListener('click', function() {
        if (isTransitioning) return; 
        if (!this.classList.contains('clickable')) return;
        
        if (this.classList.contains('nav-arrow') && this.parentNode.getAttribute('visible') === 'false') return;
        if (this.classList.contains('hud-btn') && this.parentNode.object3D.visible === false) return;
        
        isTransitioning = true; 
        
        const newSrc = this.getAttribute('data-src');
        const nextCamId = this.getAttribute('data-cam-id');
        const targetName = this.getAttribute('data-name');
        
        const sky = document.querySelector('#sky');
        const container = document.querySelector('#sky-container');
        sky.setAttribute('animation__fade', {property: 'material.opacity', from: 1, to: 0, dur: 300});

        setTimeout(() => {
          window.currentCamId = nextCamId; 
          
          sky.parentNode.removeChild(sky);
          const newSky = document.createElement('a-sky');
          newSky.setAttribute('id', 'sky');
          newSky.setAttribute('src', newSrc);
          newSky.setAttribute('material', 'transparent', 'true');
          newSky.setAttribute('material', 'opacity', '0');
          container.appendChild(newSky);
          
          document.querySelector('#loc-name').setAttribute('value', targetName);
          updateLinksDisplay(nextCamId);
          
          newSky.setAttribute('animation__fade', {property: 'material.opacity', from: 0, to: 1, dur: 300});
          
          setTimeout(() => {
            isTransitioning = false;
          }, 300);
        }, 300);
      });
    });
  <\/script>
</body>
</html>`;
    }

    async function exportHTML() {
      const htmlStr = generateVRHTML();
      if (!htmlStr) return;
      try {
        if (window.showSaveFilePicker) {
          const handle = await window.showSaveFilePicker({ suggestedName: 'index.html', types: [{ description: 'HTML File', accept: {'text/html': ['.html']} }] });
          const writable = await handle.createWritable(); await writable.write(htmlStr); await writable.close();
        } else {
          const blob = new Blob([htmlStr], { type: 'text/html' }); const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = 'index.html'; a.click();
        }
      } catch (err) { console.log("保存キャンセル", err); }
    }
  </script>
</body>
</html>
