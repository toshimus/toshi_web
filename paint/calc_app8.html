<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>たのしい けいさん アプリ (統合完全版)</title>
  <style>
    * {
      box-sizing: border-box;
      touch-action: manipulation;
      user-select: none;
      -webkit-user-select: none;
    }

    body {
      margin: 0;
      padding: 0;
      font-family: "Hiragino Kaku Gothic ProN", "メイリオ", sans-serif;
      background-color: #eef2f5;
      color: #333;
      display: flex;
      justify-content: center;
      align-items: center;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
    }

    .container {
      width: 98vw;
      height: 96vh;
      background: #ffffff;
      border-radius: 24px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.08);
      display: flex;
      flex-direction: column;
      position: relative;
      overflow: hidden;
    }

    /* --- 画面切り替え --- */
    .screen { display: none; width: 100%; height: 100%; padding: 20px 30px; }
    .screen.active { display: flex; }

    /* --- ボタン共通 --- */
    .btn {
      color: white; font-size: 1.2rem; font-weight: bold; border: none;
      padding: 12px 24px; border-radius: 50px; cursor: pointer;
      transition: all 0.1s; text-align: center;
    }
    .btn:active { transform: translateY(4px); }
    
    .btn-primary { background-color: #4ecdc4; box-shadow: 0 6px 0 #38b2ac; }
    .btn-primary:active { box-shadow: 0 2px 0 #38b2ac; }
    .btn-action { background-color: #ff8e53; box-shadow: 0 6px 0 #e07038; }
    .btn-action:active { box-shadow: 0 2px 0 #e07038; }
    .btn-secondary { background-color: #a0aec0; box-shadow: 0 6px 0 #718096; }
    .btn-secondary:active { box-shadow: 0 2px 0 #718096; }
    .btn-success { background-color: #38a169; box-shadow: 0 6px 0 #276749; }
    .btn-success:active { box-shadow: 0 2px 0 #276749; }
    .btn-outline { background-color: #fff; color: #2b6cb0; border: 3px solid #63b3ed; box-shadow: 0 4px 0 #63b3ed; }
    .btn-outline:active { box-shadow: 0 1px 0 #63b3ed; }

    /* --- 1. メニュー画面 --- */
    #menu-screen { flex-direction: column; align-items: center; justify-content: center; background: linear-gradient(135deg, #e0f2fe 0%, #f0f9ff 100%); }
    .menu-title { font-size: 2.5rem; color: #2b6cb0; margin-bottom: 5px; }
    .menu-subtitle { font-size: 1.2rem; color: #4a5568; margin-bottom: 25px; }
    .menu-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; width: 100%; max-width: 640px; margin-bottom: 25px; }
    .btn-menu {
      background-color: #ffffff; border: 3px solid #cbd5e0; border-radius: 20px; padding: 16px 12px; font-size: 1.3rem;
      font-weight: bold; color: #2d3748; cursor: pointer; box-shadow: 0 6px 0 #cbd5e0; display: flex; align-items: center; justify-content: center; gap: 10px;
    }
    .btn-menu:active { transform: translateY(4px); box-shadow: 0 2px 0 #cbd5e0; }
    .menu-footer-btns { display: flex; gap: 15px; }

    /* --- 2. 学習モード --- */
    #train-screen { flex-direction: column; align-items: center; background: #f0f8ff; overflow-y: auto; }
    .layout-row { display: flex; flex-direction: row; width: 100%; flex: 1; gap: 30px; align-items: center; justify-content: center; margin-top: 20px; }
    .col { display: flex; flex-direction: column; align-items: center; flex: 1; max-width: 400px;}
    .train-selector { font-size: 1.5rem; padding: 10px; border-radius: 8px; border: 2px solid #cbd5e0; margin-bottom: 15px; font-weight: bold; width: 100%; text-align: center; }
    .data-tools { display: flex; gap: 10px; width: 100%; margin: 10px 0; }
    .btn-half { flex: 1; font-size: 1rem; padding: 12px; margin: 0; }
    .preview-modal { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); border-radius: 24px; display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 20; padding: 20px; }
    .preview-modal.active { display: flex; }
    .preview-content { background: #fff; width: 90%; height: 90%; border-radius: 16px; padding: 20px; display: flex; flex-direction: column; }
    .preview-header { display: flex; justify-content: space-between; border-bottom: 2px solid #edf2f7; padding-bottom: 10px; margin-bottom: 15px; }
    .btn-close-modal { background: #cbd5e0; border: none; border-radius: 50%; width: 40px; height: 40px; font-size: 1.5rem; cursor: pointer; font-weight: bold; }
    .preview-grid { flex: 1; overflow-y: auto; display: grid; grid-template-columns: repeat(auto-fill, minmax(100px, 1fr)); gap: 15px; padding-bottom: 20px; }
    .preview-item { display: flex; flex-direction: column; align-items: center; background: #f7fafc; border: 2px solid #e2e8f0; border-radius: 12px; padding: 10px; }
    .preview-item canvas { border: 1px solid #cbd5e0; border-radius: 4px; background: #fff; width: 64px; height: 64px; }
    .preview-item-title { font-weight: bold; margin: 8px 0; color: #4a5568; }
    .btn-delete-item { background: #fc8181; color: white; border: none; border-radius: 8px; padding: 6px 12px; cursor: pointer; font-weight: bold; }

    /* --- 3. 問題画面 --- */
    #quiz-screen { flex-direction: row; gap: 30px; align-items: center; }
    .left-col { flex: 1; height: 100%; display: flex; flex-direction: column; justify-content: center; padding: 20px; }
    .right-col { flex: 1; height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; }
    .progress-bar { width: 100%; background: #edf2f7; border-radius: 10px; height: 16px; overflow: hidden; margin-bottom: 10px; }
    .progress-fill { height: 100%; background: #319795; width: 0%; transition: width 0.3s ease; }
    .question-info { display: flex; justify-content: space-between; font-weight: bold; color: #4a5568; font-size: 1.2rem; margin-bottom: 20px; }
    .question-box {
      font-size: 3.2rem; font-weight: bold; color: #1a202c; background: #f7fafc; border: 3px solid #e2e8f0;
      border-radius: 24px; padding: 40px 15px; text-align: center; display: flex; align-items: center; justify-content: center; gap: 10px; margin-bottom: 30px;
    }
    .fraction { display: inline-flex; flex-direction: column; align-items: center; justify-content: center; vertical-align: middle; line-height: 1.1; margin: 0 6px; }
    .fraction .num { border-bottom: 4px solid #1a202c; padding: 0 6px; }
    .fraction .den { padding: 0 6px; }

    .canvas-container { position: relative; touch-action: none; margin-bottom: 20px; }
    canvas {
      border: 4px dashed #cbd5e0; border-radius: 20px; background-color: #fafafa; touch-action: none;
      cursor: crosshair;
    }
    .canvas-tools { position: absolute; right: 15px; top: 15px; }
    .btn-clear { background: #e53e3e; color: white; border: none; border-radius: 12px; padding: 10px 18px; font-size: 1rem; font-weight: bold; cursor: pointer; }
    .btn-done { width: 100%; max-width: 400px; font-size: 2.2rem; padding: 16px 0; }

    /* フィードバック */
    .feedback-overlay {
      position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255,255,255,0.96);
      border-radius: 24px; display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 10; padding: 10px; text-align: center;
    }
    .feedback-overlay.active { display: flex; }
    .feedback-msg { font-size: 2.8rem; font-weight: bold; margin-bottom: 10px; }
    .correct { color: #38a169; }
    .wrong { color: #e53e3e; }
    
    /* 文字ごとの訂正UI */
    .correction-area { margin-bottom: 20px; background: #ebf8ff; padding: 20px; border-radius: 16px; border: 2px solid #90cdf4; display: none; width: 90%; max-width: 800px;}
    .correction-area p { color: #2b6cb0; font-weight: bold; margin: 0 0 15px 0; font-size: 1.2rem; }
    .correction-list { display: flex; gap: 15px; justify-content: center; flex-wrap: wrap; }
    .digit-correction-block { background: #fff; padding: 10px; border-radius: 12px; border: 2px solid #cbd5e0; display: flex; flex-direction: column; align-items: center; }
    .digit-correction-block canvas { border: 1px solid #e2e8f0; border-radius: 8px; margin-bottom: 8px; width: 64px; height: 64px; }
    .cand-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 5px; }
    .btn-cand { background: #edf2f7; border: 2px solid #cbd5e0; border-radius: 8px; font-size: 1.2rem; font-weight: bold; color: #4a5568; cursor: pointer; padding: 8px 0; width: 45px; }
    .btn-cand.active { background: #3182ce; color: white; border-color: #2b6cb0; }
    .other-select {
      background: #edf2f7; border: 2px solid #cbd5e0; border-radius: 8px; font-size: 1rem;
      font-weight: bold; color: #4a5568; padding: 6px; margin-top: 8px; width: 95px; text-align: center; cursor: pointer;
    }
    .other-select:focus { outline: none; border-color: #3182ce; }

    /* --- 4. 結果画面 --- */
    #result-screen { flex-direction: column; align-items: center; justify-content: center; }
    .result-actions { display: flex; gap: 20px; margin-top: 20px; }
  </style>
</head>
<body>

<div class="container">

  <!-- 1. メニュー画面 -->
  <div id="menu-screen" class="screen active">
    <h1 class="menu-title">たのしい けいさん アプリ</h1>
    <div class="menu-subtitle">挑戦するもんだいを選んでね！</div>
    
    <div class="menu-grid">
      <button class="btn-menu" onclick="startCategory('add')"><span>➕</span> たし算</button>
      <button class="btn-menu" onclick="startCategory('sub')"><span>➖</span> ひき算</button>
      <button class="btn-menu" onclick="startCategory('mul')"><span>✖️</span> かけ算</button>
      <button class="btn-menu" onclick="startCategory('div')"><span>➗</span> わり算</button>
      <button class="btn-menu" onclick="startCategory('fraction')"><span>🍰</span> 分数１ (同じ分母)</button>
      <button class="btn-menu" onclick="startCategory('fraction2')"><span>🧁</span> 分数２ (ちがう分母)</button>
    </div>
    
    <div class="menu-footer-btns">
      <button class="btn btn-secondary" onclick="showScreen('train-screen')" style="padding: 15px 30px; font-size: 1.1rem;">
        🧠 手書きデータ管理
      </button>
      <button class="btn btn-outline" onclick="exportHistoryCSV()" style="padding: 15px 30px; font-size: 1.1rem;">
        📊 学習履歴（CSV出力）
      </button>
    </div>
  </div>

  <!-- 2. 学習画面 -->
  <div id="train-screen" class="screen">
    <h2 style="color: #4a5568; margin-bottom: 5px; font-size: 1.8rem;">数字のパターンを学習させる</h2>
    <div class="layout-row">
      <div class="col">
        <select id="train-digit-select" class="train-selector">
          <option value="0">0 (ゼロ)</option><option value="1">1 (いち)</option>
          <option value="2">2 (に)</option><option value="3">3 (さん)</option>
          <option value="4">4 (よん)</option><option value="5">5 (ご)</option>
          <option value="6">6 (ろく)</option><option value="7">7 (なな)</option>
          <option value="8">8 (はち)</option><option value="9">9 (きゅう)</option>
        </select>
        <div class="canvas-container">
          <canvas id="train-canvas" width="280" height="280"></canvas>
          <div class="canvas-tools"><button class="btn-clear" onclick="clearCanvas(trainCtx, trainCanvas)">けす</button></div>
        </div>
        <button class="btn btn-action" style="width: 100%; font-size: 1.2rem;" onclick="savePattern()">📝 登録する</button>
      </div>
      <div class="col">
        <button class="btn btn-primary" style="width: 100%; margin-bottom: 10px;" onclick="openPreviewModal()">👀 登録データを見る・整理</button>
        <button class="btn btn-success" style="width: 100%; margin-bottom: 10px;" onclick="saveToLocalStorage(true)">💾 ブラウザに保存</button>
        <div class="data-tools">
          <button class="btn btn-secondary btn-half" onclick="exportData()">📤 書き出す</button>
          <button class="btn btn-secondary btn-half" onclick="document.getElementById('import-file').click()">📥 読み込む</button>
          <input type="file" id="import-file" style="display: none;" accept=".json" onchange="importData(event)">
        </div>
        <button class="btn btn-secondary" style="width: 100%; margin-top: 20px;" onclick="showScreen('menu-screen')">🔙 メニューへもどる</button>
      </div>
    </div>
    <div id="preview-modal" class="preview-modal">
      <div class="preview-content">
        <div class="preview-header">
          <h3 style="margin:0; font-size: 1.5rem;">登録データ一覧</h3>
          <button class="btn-close-modal" onclick="closePreviewModal()">×</button>
        </div>
        <div id="preview-grid" class="preview-grid"></div>
      </div>
    </div>
  </div>

  <!-- 3. 問題画面 -->
  <div id="quiz-screen" class="screen">
    <div class="left-col">
      <div class="progress-bar"><div id="progress-fill" class="progress-fill"></div></div>
      <div class="question-info">
        <span id="category-title">カテゴリ</span>
        <span id="question-num">だい 1 / 5 もん</span>
      </div>
      <div id="question-text" class="question-box"></div>
      <button class="btn btn-secondary" style="align-self: flex-start;" onclick="showScreen('menu-screen')">🏠 もどる</button>
    </div>
    <div class="right-col">
      <div class="canvas-container">
        <canvas id="quiz-canvas" width="400" height="400"></canvas>
        <div class="canvas-tools"><button class="btn-clear" onclick="clearCanvas(quizCtx, quizCanvas)">けす</button></div>
      </div>
      <button class="btn btn-action btn-done" onclick="checkAnswer()">できた！</button>
    </div>

    <!-- フィードバックオーバーレイ -->
    <div id="feedback-overlay" class="feedback-overlay">
      <div id="feedback-msg" class="feedback-msg"></div>
      <div id="recognized-info" class="question-box" style="padding: 10px 40px; border: 3px dashed #a0aec0; margin-bottom: 20px; font-size: 3.5rem;"></div>
      
      <!-- 文字単位の訂正UI -->
      <div id="correction-area" class="correction-area">
        <p>💡 よみまちがえた数字があれば、正しいものをえらんでね！</p>
        <div id="correction-list" class="correction-list"></div>
      </div>

      <div style="display: flex; gap: 20px;">
        <button id="retry-btn" class="btn btn-secondary" style="display: none; font-size: 1.5rem; padding: 15px 40px;" onclick="closeFeedback()">ぜんぶ かきなおす</button>
        <button id="next-btn" class="btn btn-action" style="display: none; font-size: 2rem; padding: 20px 60px;" onclick="nextQuestion()">つぎへ ➔</button>
      </div>
    </div>
  </div>

  <!-- 4. 結果画面 -->
  <div id="result-screen" class="screen">
    <h1 style="color: #ff6b6b; font-size: 4rem; margin-bottom: 10px;">けっか はっぴょう</h1>
    <div style="font-size: 6rem; margin: 20px 0;">🎉</div>
    <p style="font-size: 2.5rem; font-weight: bold; color: #2d3748; margin-bottom: 20px;">全問クリア！ すごいね！</p>
    <div class="result-actions">
      <button class="btn btn-action" style="font-size: 1.5rem; padding: 15px 30px;" onclick="showScreen('menu-screen')">メニューへもどる</button>
      <button class="btn btn-outline" style="font-size: 1.5rem; padding: 15px 30px;" onclick="exportHistoryCSV()">📊 学習履歴を出力</button>
    </div>
  </div>

</div>

<script>
  // ==========================================
  // 数学補助関数 (GCD / LCM)
  // ==========================================
  function gcd(a, b) { return b === 0 ? a : gcd(b, a % b); }
  function lcm(a, b) { return (a * b) / gcd(a, b); }

  // ==========================================
  // 学習データ管理 (Storage / Export / Import)
  // ==========================================
  const RAW_PATTERNS = [
    ["00000000", "00111100", "01100110", "01100110", "01100110", "01100110", "00111100", "00000000"], // 0
    ["00000000", "00011000", "00111000", "00011000", "00011000", "00011000", "00111100", "00000000"], // 1
    ["00000000", "00111100", "01100110", "00000110", "00011100", "01110000", "01111110", "00000000"], // 2
    ["00000000", "00111100", "01100110", "00011100", "00000110", "01100110", "00111100", "00000000"], // 3
    ["00000000", "00001100", "00011100", "00110100", "01100100", "01111111", "00000100", "00000000"], // 4
    ["00000000", "01111110", "01100000", "01111100", "00000110", "01100110", "00111100", "00000000"], // 5
    ["00000000", "00111100", "01100000", "01111100", "01100110", "01100110", "00111100", "00000000"], // 6
    ["00000000", "01111110", "00000110", "00001100", "00011000", "00110000", "01100000", "00000000"], // 7
    ["00000000", "00111100", "01100110", "00111100", "01100110", "01100110", "00111100", "00000000"], // 8
    ["00000000", "00111100", "01100110", "01100110", "00111110", "00000110", "00111100", "00000000"]  // 9
  ];

  let KNOWN_PATTERNS = [];
  for (let d = 0; d < 10; d++) {
    KNOWN_PATTERNS.push({ digit: d, pattern: RAW_PATTERNS[d].join('').split('').map(Number) });
  }

  const STORAGE_KEY = 'tegaki_patterns_v3';
  const HISTORY_STORAGE_KEY = 'math_app_history';

  function loadFromLocalStorage() {
    const saved = localStorage.getItem(STORAGE_KEY);
    if (saved) {
      try {
        const parsed = JSON.parse(saved);
        if (Array.isArray(parsed) && parsed.length > 0) KNOWN_PATTERNS = parsed;
      } catch (e) { console.error("Data load failed", e); }
    }
  }

  function saveToLocalStorage(showAlert = false) {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(KNOWN_PATTERNS));
    if(showAlert) alert("学習データをブラウザに保存しました！");
  }

  function exportData() {
    const dataStr = JSON.stringify(KNOWN_PATTERNS);
    const blob = new Blob([dataStr], { type: "application/json" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a"); a.href = url; a.download = "tegaki_data.json";
    document.body.appendChild(a); a.click(); document.body.removeChild(a); URL.revokeObjectURL(url);
  }

  function importData(event) {
    const file = event.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = function(e) {
      try {
        const parsed = JSON.parse(e.target.result);
        if (Array.isArray(parsed) && parsed.length > 0 && parsed[0].pattern) {
          KNOWN_PATTERNS = parsed; saveToLocalStorage(true); alert("読み込み成功！");
        }
      } catch (err) { alert("読み込み失敗"); }
    };
    reader.readAsText(file);
    event.target.value = "";
  }

  // ==========================================
  // 解答履歴・CSV機能
  // ==========================================
  function formatTime(date) {
    return date.getHours().toString().padStart(2, '0') + ':' + 
           date.getMinutes().toString().padStart(2, '0') + ':' + 
           date.getSeconds().toString().padStart(2, '0');
  }

  function recordCSVLine(targetQ, userAnswerStr, isCorrect) {
    const endTime = new Date();
    const yyyy = problemStartTime.getFullYear();
    const mm = String(problemStartTime.getMonth() + 1).padStart(2, '0');
    const dd = String(problemStartTime.getDate()).padStart(2, '0');
    const dateStr = `${yyyy}/${mm}/${dd}`;

    const problemType = targetQ.categoryName || "計算問題";
    const problemContent = targetQ.rawFormula;
    const inputMethod = "手書き認識";
    const resultStr = isCorrect ? "正解" : "不正解";

    const csvLine = `"${dateStr}","${problemType}","${problemContent}","${userAnswerStr}",${formatTime(problemStartTime)},${formatTime(endTime)},${inputMethod},${resultStr}\n`;

    if (window.webkit && window.webkit.messageHandlers && window.webkit.messageHandlers.appBridge) {
      window.webkit.messageHandlers.appBridge.postMessage({ action: "saveCSV", csvLine: csvLine });
    }

    let history = localStorage.getItem(HISTORY_STORAGE_KEY) || "";
    history += csvLine;
    localStorage.setItem(HISTORY_STORAGE_KEY, history);
  }

  async function exportHistoryCSV() {
    const historyData = localStorage.getItem(HISTORY_STORAGE_KEY);
    if (!historyData) { alert("保存された学習履歴がありません。"); return; }
    const header = '"日付","カテゴリ","問題内容","解答","開始時間","終了時間","入力方法","結果"\n';
    const fullCSV = header + historyData;
    const blob = new Blob([new Uint8Array([0xEF, 0xBB, 0xBF]), fullCSV], { type: "text/csv;charset=utf-8;" });

    if (navigator.canShare && navigator.share) {
      const file = new File([blob], "math_history.csv", { type: "text/csv" });
      if (navigator.canShare({ files: [file] })) {
        try { await navigator.share({ title: '学習履歴CSVデータ', files: [file] }); return; } 
        catch (err) { if (err.name !== 'AbortError') console.error("Share failed", err); }
      }
    }
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a"); a.href = url; a.download = "math_history.csv";
    document.body.appendChild(a); a.click(); document.body.removeChild(a); URL.revokeObjectURL(url);
  }

  // ==========================================
  // アプリケーションと画面遷移
  // ==========================================
  let currentQuestions = [];
  let currentQuestionIndex = 0;
  let quizCanvas, quizCtx, trainCanvas, trainCtx;
  let drawnStrokes = [];
  let currentDigitBlocks = []; 
  let problemStartTime = null;

  window.onload = () => {
    loadFromLocalStorage();
    quizCanvas = document.getElementById('quiz-canvas'); quizCtx = quizCanvas.getContext('2d');
    initCanvasEvents(quizCanvas, quizCtx, 22, true); // 線幅を少し細め(22)に初期化
    trainCanvas = document.getElementById('train-canvas'); trainCtx = trainCanvas.getContext('2d');
    initCanvasEvents(trainCanvas, trainCtx, 24, false);
  };

  function showScreen(id) {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    document.getElementById(id).classList.add('active');
  }

  function startCategory(cat) {
    currentQuestions = generateQuestions(cat); currentQuestionIndex = 0;
    showScreen('quiz-screen'); loadQuestion();
  }

  function generateQuestions(cat) {
    let list = [];
    const titles = { 
      add: "たし算", sub: "ひき算", mul: "かけ算", div: "わり算", 
      fraction: "分数１ (同じ分母)", fraction2: "分数２ (ちがう分母)" 
    };
    document.getElementById('category-title').innerText = titles[cat];

    for (let i = 0; i < 5; i++) {
      if (cat === 'add') { 
        let a = Math.floor(Math.random()*9)+1, b = Math.floor(Math.random()*9)+1; 
        list.push({ type: 'number', val: a+b, categoryName: titles[cat], rawFormula: `${a} + ${b}`, html: `${a} ＋ ${b} ＝ ?` }); 
      }
      else if (cat === 'sub') { 
        let a = Math.floor(Math.random()*15)+5, b = Math.floor(Math.random()*(a-1))+1; 
        list.push({ type: 'number', val: a-b, categoryName: titles[cat], rawFormula: `${a} - ${b}`, html: `${a} ➖ ${b} ＝ ?` }); 
      }
      else if (cat === 'mul') { 
        let a = Math.floor(Math.random()*9)+1, b = Math.floor(Math.random()*9)+1; 
        list.push({ type: 'number', val: a*b, categoryName: titles[cat], rawFormula: `${a} * ${b}`, html: `${a} ✖️ ${b} ＝ ?` }); 
      }
      else if (cat === 'div') { 
        let b = Math.floor(Math.random()*9)+1, ans = Math.floor(Math.random()*9)+1; 
        list.push({ type: 'number', val: ans, categoryName: titles[cat], rawFormula: `${b*ans} / ${b}`, html: `${b*ans} ➗ ${b} ＝ ?` }); 
      }
      else if (cat === 'fraction') {
        let den = Math.floor(Math.random()*7)+3, num1 = Math.floor(Math.random()*(den-1))+1, num2 = Math.floor(Math.random()*(den-num1))+1;
        list.push({ 
          type: 'fraction', num: num1+num2, den: den, categoryName: titles[cat], 
          rawFormula: `(${num1}/${den}) + (${num2}/${den})`, 
          html: `<div class="fraction"><span class="num">${num1}</span><span class="den">${den}</span></div> ＋ <div class="fraction"><span class="num">${num2}</span><span class="den">${den}</span></div> ＝ ?` 
        });
      }
      else if (cat === 'fraction2') {
        let d1 = Math.floor(Math.random() * 7) + 2;
        let d2 = Math.floor(Math.random() * 7) + 2;
        while (d1 === d2) { d2 = Math.floor(Math.random() * 7) + 2; }

        let n1 = Math.floor(Math.random() * 6) + 1;
        let n2 = Math.floor(Math.random() * 6) + 1;

        let L = lcm(d1, d2);
        let rawNum = n1 * (L / d1) + n2 * (L / d2);
        let rawDen = L;

        let G = gcd(rawNum, rawDen);
        let ansNum = rawNum / G;
        let ansDen = rawDen / G;

        list.push({ 
          type: 'fraction', num: ansNum, den: ansDen, categoryName: titles[cat], 
          rawFormula: `(${n1}/${d1}) + (${n2}/${d2})`, 
          html: `<div class="fraction"><span class="num">${n1}</span><span class="den">${d1}</span></div> ＋ <div class="fraction"><span class="num">${n2}</span><span class="den">${d2}</span></div> ＝ ?` 
        });
      }
    }
    return list;
  }

  function loadQuestion() {
    const q = currentQuestions[currentQuestionIndex];
    document.getElementById('question-num').innerText = `だい ${currentQuestionIndex+1} / ${currentQuestions.length} もん`;
    document.getElementById('question-text').innerHTML = q.html;
    document.getElementById('progress-fill').style.width = `${((currentQuestionIndex+1)/currentQuestions.length)*100}%`;
    
    // --- 手書き線の太さ調整 ---
    // 分数問題は書き込み量が多いため細め(18px)、その他の問題は(22px)に設定
    if (q.type === 'fraction') {
      quizCtx.lineWidth = 18;
    } else {
      quizCtx.lineWidth = 22;
    }

    clearCanvas(quizCtx, quizCanvas); closeFeedback();
    problemStartTime = new Date();
  }

  // ==========================================
  // キャンバス描画
  // ==========================================
  function initCanvasEvents(cvs, ctx, lineWidth, trackStrokes) {
    ctx.lineWidth = lineWidth; ctx.lineCap = 'round'; ctx.lineJoin = 'round'; ctx.strokeStyle = '#2d3748';
    let isDrawing = false, currentStroke = [];

    const getPos = (e) => {
      const rect = cvs.getBoundingClientRect();
      const touch = (e.touches && e.touches.length > 0) ? e.touches[0] : ((e.changedTouches && e.changedTouches.length > 0) ? e.changedTouches[0] : null);
      const clientX = touch ? touch.clientX : e.clientX;
      const clientY = touch ? touch.clientY : e.clientY;
      const scaleX = cvs.width / (rect.width || cvs.width);
      const scaleY = cvs.height / (rect.height || cvs.height);
      return { x: (clientX - rect.left) * scaleX, y: (clientY - rect.top) * scaleY };
    };

    const startDraw = (e) => {
      e.preventDefault(); isDrawing = true;
      const pos = getPos(e);
      if (trackStrokes) currentStroke = [pos];
      ctx.beginPath(); ctx.moveTo(pos.x, pos.y);
    };

    const draw = (e) => {
      if (!isDrawing) return;
      e.preventDefault();
      const pos = getPos(e);
      if (trackStrokes) currentStroke.push(pos);
      ctx.lineTo(pos.x, pos.y); ctx.stroke();
    };

    const stopDraw = (e) => {
      if (isDrawing) {
        if (trackStrokes && currentStroke.length > 1) drawnStrokes.push(currentStroke);
        isDrawing = false;
      }
    };

    cvs.addEventListener('mousedown', startDraw); cvs.addEventListener('mousemove', draw);
    cvs.addEventListener('mouseup', stopDraw); cvs.addEventListener('mouseleave', stopDraw);
    cvs.addEventListener('touchstart', startDraw, { passive: false }); cvs.addEventListener('touchmove', draw, { passive: false });
    cvs.addEventListener('touchend', stopDraw, { passive: false });
  }

  function clearCanvas(context, cvs) {
    context.clearRect(0, 0, cvs.width, cvs.height);
    if (cvs.id === 'quiz-canvas') drawnStrokes = [];
  }

  // ==========================================
  // 解析・認識ロジック
  // ==========================================
  
  function deskewCanvas(sourceCvs) {
    const ctx = sourceCvs.getContext('2d');
    const imgData = ctx.getImageData(0, 0, sourceCvs.width, sourceCvs.height);
    const data = imgData.data;
    const w = sourceCvs.width, h = sourceCvs.height;

    let m00 = 0, m10 = 0, m01 = 0;
    for (let y = 0; y < h; y++) {
      for (let x = 0; x < w; x++) {
        const alpha = data[(y * w + x) * 4 + 3];
        if (alpha > 30) { m00 += alpha; m10 += x * alpha; m01 += y * alpha; }
      }
    }
    if (m00 === 0) return sourceCvs;

    const cx = m10 / m00;
    const cy = m01 / m00;
    let mu11 = 0, mu02 = 0;

    for (let y = 0; y < h; y++) {
      for (let x = 0; x < w; x++) {
        const alpha = data[(y * w + x) * 4 + 3];
        if (alpha > 30) {
          mu11 += (x - cx) * (y - cy) * alpha;
          mu02 += Math.pow(y - cy, 2) * alpha;
        }
      }
    }

    const k = mu02 !== 0 ? mu11 / mu02 : 0;
    const outCvs = document.createElement('canvas');
    outCvs.width = w; outCvs.height = h;
    const outCtx = outCvs.getContext('2d');

    outCtx.translate(cx, cy);
    outCtx.transform(1, 0, -k, 1, 0, 0); 
    outCtx.translate(-cx, -cy);
    outCtx.drawImage(sourceCvs, 0, 0);

    return outCvs;
  }

  function extractFeatures(context, cvs) {
    const deskewedCvs = deskewCanvas(cvs);
    const dCtx = deskewedCvs.getContext('2d');
    const imgData = dCtx.getImageData(0, 0, cvs.width, cvs.height);
    const data = imgData.data;

    let minX = cvs.width, minY = cvs.height, maxX = 0, maxY = 0;
    let totalAlpha = 0, sumX = 0, sumY = 0;

    for (let y = 0; y < cvs.height; y++) {
      for (let x = 0; x < cvs.width; x++) {
        const a = data[(y * cvs.width + x) * 4 + 3];
        if (a > 30) {
          if (x < minX) minX = x; if (x > maxX) maxX = x;
          if (y < minY) minY = y; if (y > maxY) maxY = y;
          totalAlpha += a; sumX += x * a; sumY += y * a;
        }
      }
    }

    if (totalAlpha === 0) return null;

    const cx = sumX / totalAlpha;
    const cy = sumY / totalAlpha;
    const boxW = maxX - minX + 1;
    const boxH = maxY - minY + 1;
    const maxDim = Math.max(boxW, boxH);

    const normCvs = document.createElement('canvas');
    normCvs.width = maxDim * 1.2; 
    normCvs.height = maxDim * 1.2;
    const normCtx = normCvs.getContext('2d');

    const destX = (normCvs.width / 2) - (cx - minX) - minX;
    const destY = (normCvs.height / 2) - (cy - minY) - minY;

    normCtx.drawImage(deskewedCvs, minX, minY, boxW, boxH, destX + minX, destY + minY, boxW, boxH);

    const gridCvs = document.createElement('canvas');
    gridCvs.width = 8; gridCvs.height = 8;
    const gridCtx = gridCvs.getContext('2d');
    gridCtx.drawImage(normCvs, 0, 0, normCvs.width, normCvs.height, 0, 0, 8, 8);

    const gridData = gridCtx.getImageData(0, 0, 8, 8).data;
    const X = [];
    for (let i = 0; i < 64; i++) X.push(gridData[i * 4 + 3] / 255.0);
    return X;
  }

  function savePattern() {
    const X = extractFeatures(trainCtx, trainCanvas);
    if (!X) { alert("すうじが かかれていません！"); return; }
    const digitToTrain = parseInt(document.getElementById('train-digit-select').value, 10);
    KNOWN_PATTERNS.push({ digit: digitToTrain, pattern: X });
    alert(`「${digitToTrain}」の形を登録しました！\n残すには「ブラウザに保存」を押してください。`);
    clearCanvas(trainCtx, trainCanvas);
  }

  function doBoxesIntersect(a, b) {
    return !(a.maxX < b.minX || a.minX > b.maxX || a.maxY < b.minY || a.minY > b.maxY);
  }

  function recalculateGroupBounds(strokes) {
    let minX = Infinity, maxX = -Infinity, minY = Infinity, maxY = -Infinity;
    for (let st of strokes) {
      for (let p of st) {
        if (p.x < minX) minX = p.x; if (p.x > maxX) maxX = p.x;
        if (p.y < minY) minY = p.y; if (p.y > maxY) maxY = p.y;
      }
    }
    return { minX, maxX, minY, maxY, strokes };
  }

  function forceSplitWideGroups(groups) {
    let finalGroups = [];

    for (let g of groups) {
      let w = g.maxX - g.minX;
      let h = (g.maxY - g.minY) || 1;
      let aspectRatio = w / h;

      if (aspectRatio > 1.2 && g.strokes.length > 1) {
        let strokeInfos = g.strokes.map(st => {
          let xs = st.map(p => p.x), ys = st.map(p => p.y);
          return {
            stroke: st,
            minX: Math.min(...xs), maxX: Math.max(...xs),
            minY: Math.min(...ys), maxY: Math.max(...ys)
          };
        });

        strokeInfos.sort((a, b) => a.minX - b.minX);

        let bestSplitIndex = -1;
        let maxGap = -1;

        for (let i = 1; i < strokeInfos.length; i++) {
          let leftStrokes = strokeInfos.slice(0, i);
          let rightStrokes = strokeInfos.slice(i);

          let leftMaxX = Math.max(...leftStrokes.map(s => s.maxX));
          let rightMinX = Math.min(...rightStrokes.map(s => s.minX));

          if (rightMinX >= leftMaxX - 5) {
            let gap = rightMinX - leftMaxX;
            if (gap > maxGap) {
              maxGap = gap;
              bestSplitIndex = i;
            }
          }
        }

        if (bestSplitIndex !== -1) {
          let leftStrokes = strokeInfos.slice(0, bestSplitIndex).map(s => s.stroke);
          let rightStrokes = strokeInfos.slice(bestSplitIndex).map(s => s.stroke);

          if (leftStrokes.length > 0) finalGroups.push(recalculateGroupBounds(leftStrokes));
          if (rightStrokes.length > 0) finalGroups.push(recalculateGroupBounds(rightStrokes));
        } else {
          finalGroups.push(g);
        }
      } else {
        finalGroups.push(g);
      }
    }

    return finalGroups.sort((a, b) => a.minX - b.minX);
  }

  function processBoxesIntoBlocks(boxes, role) {
    if (boxes.length === 0) return [];
    boxes.sort((a, b) => a.minX - b.minX);
    let groups = [];

    for (let b of boxes) {
      let merged = false;
      let bHeight = b.maxY - b.minY;
      let dynamicGap = Math.max(12, bHeight * 0.3);

      for (let g of groups) {
        let intersects = doBoxesIntersect(b, g);
        let overlapX = Math.max(0, Math.min(b.maxX, g.maxX) - Math.max(b.minX, g.minX));
        let minW = Math.min(b.maxX - b.minX, g.maxX - g.minX);
        let xOverlapRatio = minW > 0 ? (overlapX / minW) : 0;
        let gapY = Math.max(0, Math.max(b.minY - g.maxY, g.minY - b.maxY));
        let avgH = ((b.maxY - b.minY) + (g.maxY - g.minY)) / 2;

        let verticalCloseAndAligned = (xOverlapRatio > 0.35) && (gapY < avgH * 0.8);
        let horizontalClose = !(b.minX > g.maxX + dynamicGap || b.maxX < g.minX - dynamicGap);
        let verticalOverlap = !(b.maxY < g.minY || b.minY > g.maxY);

        if (intersects || (horizontalClose && verticalOverlap) || verticalCloseAndAligned) {
          g.minX = Math.min(g.minX, b.minX); g.maxX = Math.max(g.maxX, b.maxX);
          g.minY = Math.min(g.minY, b.minY); g.maxY = Math.max(g.maxY, b.maxY);
          if (b.strokes) g.strokes.push(...b.strokes);
          else g.strokes.push(b.stroke);
          merged = true; 
          break;
        }
      }
      if (!merged) {
        groups.push({ 
          minX: b.minX, maxX: b.maxX, minY: b.minY, maxY: b.maxY, 
          strokes: b.strokes ? [...b.strokes] : [b.stroke] 
        });
      }
    }

    groups = forceSplitWideGroups(groups);

    let results = [];
    for (let g of groups) {
      let res = predictSingleCharacter(g.strokes);
      if (res && res.candidates.length > 0) {
        results.push({
          role: role,
          strokes: g.strokes,
          X: res.X,
          candidates: res.candidates,
          currentSelected: res.candidates[0].digit
        });
      }
    }
    return results;
  }

  function extractDigitBlocks(qType) {
    if (drawnStrokes.length === 0) return null;
    let strokeBoxes = drawnStrokes.map(st => {
      let xs = st.map(p => p.x), ys = st.map(p => p.y);
      return { minX: Math.min(...xs), maxX: Math.max(...xs), minY: Math.min(...ys), maxY: Math.max(...ys), stroke: st };
    });
    let blocks = [];
    if (qType === 'fraction') {
      let barIndex = -1, maxScore = -1;

      for (let i = 0; i < strokeBoxes.length; i++) {
        let b = strokeBoxes[i];
        let w = b.maxX - b.minX, h = (b.maxY - b.minY) || 1;
        let aspect = w / h;

        if (aspect < 2.0 || w < 30) continue;

        let centerY = (b.minY + b.maxY) / 2;
        let countAbove = strokeBoxes.filter((other, idx) => idx !== i && other.maxY <= centerY + 15).length;
        let countBelow = strokeBoxes.filter((other, idx) => idx !== i && other.minY >= centerY - 15).length;

        if (countAbove > 0 && countBelow > 0) {
          let score = aspect * w;
          if (score > maxScore) {
            maxScore = score;
            barIndex = i;
          }
        }
      }

      if (barIndex !== -1) {
        let barCenterY = (strokeBoxes[barIndex].minY + strokeBoxes[barIndex].maxY) / 2;
        let topBoxes = strokeBoxes.filter((b, i) => i !== barIndex && b.maxY < barCenterY + 15);
        let bottomBoxes = strokeBoxes.filter((b, i) => i !== barIndex && b.minY > barCenterY - 15);
        let numBlocks = processBoxesIntoBlocks(topBoxes, 'num');
        let denBlocks = processBoxesIntoBlocks(bottomBoxes, 'den');
        if(numBlocks.length === 0 || denBlocks.length === 0) return null;
        blocks = numBlocks.concat(denBlocks);
      } else return null;
    } else {
      blocks = processBoxesIntoBlocks(strokeBoxes, 'number');
    }
    return blocks.length > 0 ? blocks : null;
  }

  function predictSingleCharacter(strokesGroup) {
    let offCvs = document.createElement('canvas'); offCvs.width = quizCanvas.width; offCvs.height = quizCanvas.height;
    let offCtx = offCvs.getContext('2d'); 
    offCtx.lineWidth = 22; // 認識用描画幅も少し細め(22)に合わせる
    offCtx.lineCap = 'round'; offCtx.lineJoin = 'round'; offCtx.strokeStyle = '#2d3748';
    for (let st of strokesGroup) {
      if(!st || st.length < 2) continue;
      offCtx.beginPath(); offCtx.moveTo(st[0].x, st[0].y);
      for (let i = 1; i < st.length; i++) offCtx.lineTo(st[i].x, st[i].y);
      offCtx.stroke();
    }
    let X = extractFeatures(offCtx, offCvs);
    if (!X) return null;
    let distances = [];
    for (let i = 0; i < KNOWN_PATTERNS.length; i++) {
      let dist = 0, p = KNOWN_PATTERNS[i].pattern;
      for (let j = 0; j < 64; j++) { let diff = X[j] - p[j]; dist += diff * diff; }
      distances.push({ digit: KNOWN_PATTERNS[i].digit, distance: dist });
    }
    distances.sort((a, b) => a.distance - b.distance);
    let uniqueCandidates = []; let seen = new Set();
    for(let c of distances) {
      if(!seen.has(c.digit)) { seen.add(c.digit); uniqueCandidates.push({ digit: c.digit, distance: c.distance }); if(uniqueCandidates.length >= 4) break; }
    }
    return { X: X, candidates: uniqueCandidates };
  }

  // ==========================================
  // 回答チェックとフィードバック UI
  // ==========================================
  function getUserAnswerString(targetQ) {
    if (targetQ.type === 'fraction') {
      let nStr = currentDigitBlocks.filter(b => b.role === 'num').map(b => b.currentSelected).join('');
      let dStr = currentDigitBlocks.filter(b => b.role === 'den').map(b => b.currentSelected).join('');
      return `${nStr}/${dStr}`;
    } else {
      return currentDigitBlocks.map(b => b.currentSelected).join('');
    }
  }

  function checkAnswer() {
    const targetQ = currentQuestions[currentQuestionIndex];
    const blocks = extractDigitBlocks(targetQ.type);
    if (!blocks || blocks.length === 0) { alert("すうじが かかれていないか、うまく よみとれませんでした！"); return; }
    currentDigitBlocks = blocks;
    const isCorrect = checkCurrentBlocksCorrect(targetQ);
    const userAnswerStr = getUserAnswerString(targetQ);
    recordCSVLine(targetQ, userAnswerStr, isCorrect);
    evaluateAndRenderUI(targetQ);
  }
  
  function checkCurrentBlocksCorrect(targetQ) {
    if (targetQ.type === 'number') {
       let numStr = currentDigitBlocks.map(b => b.currentSelected).join('');
       return parseInt(numStr, 10) === targetQ.val;
    } else if (targetQ.type === 'fraction') {
       let numStr = currentDigitBlocks.filter(b => b.role === 'num').map(b => b.currentSelected).join('');
       let denStr = currentDigitBlocks.filter(b => b.role === 'den').map(b => b.currentSelected).join('');
       return parseInt(numStr, 10) === targetQ.num && parseInt(denStr, 10) === targetQ.den;
    }
    return false;
  }

  function evaluateAndRenderUI(targetQ) {
    const overlay = document.getElementById('feedback-overlay');
    const msg = document.getElementById('feedback-msg');
    const nextBtn = document.getElementById('next-btn');
    const retryBtn = document.getElementById('retry-btn');
    const correctionArea = document.getElementById('correction-area');
    
    overlay.classList.add('active');
    updateAnswerDisplay(targetQ);

    if (checkCurrentBlocksCorrect(targetQ)) {
      msg.innerHTML = "せいかい！ 🎉"; msg.className = "feedback-msg correct";
      nextBtn.style.display = "inline-block"; retryBtn.style.display = "none"; correctionArea.style.display = "none";
    } else {
      msg.innerHTML = "ざんねん！ 💡"; msg.className = "feedback-msg wrong";
      nextBtn.style.display = "none"; retryBtn.style.display = "inline-block";
      renderCorrectionUI();
    }
  }

  function updateAnswerDisplay(targetQ) {
    const info = document.getElementById('recognized-info');
    if (targetQ.type === 'fraction') {
      let nStr = currentDigitBlocks.filter(b => b.role === 'num').map(b => b.currentSelected).join('');
      let dStr = currentDigitBlocks.filter(b => b.role === 'den').map(b => b.currentSelected).join('');
      info.innerHTML = `<div style="font-size: 1.2rem; color: #718096; margin-bottom: 5px;">あなたのこたえ</div><div class="fraction"><span class="num">${nStr}</span><span class="den">${dStr}</span></div>`;
    } else {
      let nStr = currentDigitBlocks.map(b => b.currentSelected).join('');
      info.innerHTML = `<div style="font-size: 1.2rem; color: #718096; margin-bottom: 5px;">あなたのこたえ</div><div>${nStr}</div>`;
    }
  }

  function renderCorrectionUI() {
    const list = document.getElementById('correction-list');
    const correctionArea = document.getElementById('correction-area');
    list.innerHTML = '';
    
    currentDigitBlocks.forEach((block, index) => {
      const div = document.createElement('div');
      div.className = 'digit-correction-block';
      
      const cvs = document.createElement('canvas');
      cvs.width = 64; cvs.height = 64;
      drawStrokesToCanvas(block.strokes, cvs);
      
      const btnGrid = document.createElement('div');
      btnGrid.className = 'cand-grid';
      
      block.candidates.forEach(cand => {
        const btn = document.createElement('button');
        btn.className = `btn-cand ${cand.digit === block.currentSelected ? 'active' : ''}`;
        btn.innerText = cand.digit;
        btn.onclick = () => updateBlockSelection(index, cand.digit);
        btnGrid.appendChild(btn);
      });
      
      const otherSelect = document.createElement('select');
      otherSelect.className = 'other-select';
      const isSelectedInCands = block.candidates.some(c => c.digit === block.currentSelected);
      otherSelect.innerHTML = `<option value="" disabled ${isSelectedInCands ? 'selected' : ''}>ほか ▼</option>`;
      
      for (let i = 0; i <= 9; i++) {
        if (!block.candidates.some(c => c.digit === i)) {
          const isSelected = (!isSelectedInCands && block.currentSelected === i) ? 'selected' : '';
          otherSelect.innerHTML += `<option value="${i}" ${isSelected}>${i}</option>`;
        }
      }
      otherSelect.onchange = (e) => updateBlockSelection(index, parseInt(e.target.value, 10));

      div.appendChild(cvs); div.appendChild(btnGrid); div.appendChild(otherSelect);
      list.appendChild(div);
    });
    
    correctionArea.style.display = "block";
  }

  function drawStrokesToCanvas(strokes, cvs) {
    const ctx = cvs.getContext('2d'); ctx.clearRect(0, 0, cvs.width, cvs.height);
    let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
    strokes.forEach(st => st.forEach(p => { if(p.x < minX) minX = p.x; if(p.x > maxX) maxX = p.x; if(p.y < minY) minY = p.y; if(p.y > maxY) maxY = p.y; }));
    let w = maxX - minX, h = maxY - minY;
    let scale = Math.min((cvs.width - 16) / (w || 1), (cvs.height - 16) / (h || 1));
    ctx.save(); ctx.translate(cvs.width/2, cvs.height/2); ctx.scale(scale, scale); ctx.translate(-(minX + w/2), -(minY + h/2));
    ctx.lineWidth = 4 / (scale || 1); ctx.lineCap = 'round'; ctx.lineJoin = 'round'; ctx.strokeStyle = '#2d3748';
    strokes.forEach(st => {
      if(st.length < 2) return;
      ctx.beginPath(); ctx.moveTo(st[0].x, st[0].y);
      for(let i=1; i<st.length; i++) ctx.lineTo(st[i].x, st[i].y);
      ctx.stroke();
    });
    ctx.restore();
  }

  function updateBlockSelection(blockIndex, newDigit) {
    currentDigitBlocks[blockIndex].currentSelected = newDigit;
    const targetQ = currentQuestions[currentQuestionIndex];
    updateAnswerDisplay(targetQ);
    renderCorrectionUI();
    
    if (checkCurrentBlocksCorrect(targetQ)) {
      currentDigitBlocks.forEach(b => { KNOWN_PATTERNS.push({ digit: b.currentSelected, pattern: b.X }); });
      saveToLocalStorage(false);
      recordCSVLine(targetQ, getUserAnswerString(targetQ), true);
      
      const msg = document.getElementById('feedback-msg');
      msg.innerHTML = "せいかい！ 🎉<br><span style='font-size:1.5rem; color:#4a5568;'>えらんだ数字の形を、アプリが覚えたよ！</span>";
      msg.className = "feedback-msg correct";
      document.getElementById('correction-area').style.display = "none";
      document.getElementById('next-btn').style.display = "inline-block";
      document.getElementById('retry-btn').style.display = "none";
    }
  }

  function closeFeedback() { document.getElementById('feedback-overlay').classList.remove('active'); }
  function nextQuestion() {
    currentQuestionIndex++;
    if (currentQuestionIndex < currentQuestions.length) loadQuestion();
    else showScreen('result-screen');
  }

  // --- プレビュー関連 ---
  function openPreviewModal() { renderPreviewGrid(); document.getElementById('preview-modal').classList.add('active'); }
  function closePreviewModal() { document.getElementById('preview-modal').classList.remove('active'); }
  function renderPreviewGrid() {
    const grid = document.getElementById('preview-grid'); grid.innerHTML = '';
    KNOWN_PATTERNS.forEach((item, index) => {
      const div = document.createElement('div'); div.className = 'preview-item';
      const cvs = document.createElement('canvas'); cvs.width = 64; cvs.height = 64;
      const ctx = cvs.getContext('2d'); ctx.fillStyle = '#fff'; ctx.fillRect(0, 0, 64, 64);
      for (let i = 0; i < 64; i++) {
        const val = item.pattern[i];
        if (val > 0) { ctx.fillStyle = `rgba(45,55,72,${val})`; ctx.fillRect((i%8)*8, Math.floor(i/8)*8, 8, 8); }
      }
      const title = document.createElement('div'); title.className = 'preview-item-title'; title.innerText = `数字: ${item.digit}`;
      const delBtn = document.createElement('button'); delBtn.className = 'btn-delete-item'; delBtn.innerText = '🗑️';
      delBtn.onclick = () => { if(confirm(`削除しますか？`)) { KNOWN_PATTERNS.splice(index, 1); saveToLocalStorage(); renderPreviewGrid(); } };
      div.appendChild(cvs); div.appendChild(title); div.appendChild(delBtn); grid.appendChild(div);
    });
  }
</script>
