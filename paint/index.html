<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>K.I.T.T. - Advanced Drawing Interface (Retro Pixel Edition)</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- トップメニューバー -->
    <div id="menu-bar">
        <div class="menu-item">ファイル
            <div class="dropdown-content">
                <div class="dropdown-item" onclick="createNewCanvas()">新規作成</div>
                <div class="dropdown-item" onclick="document.getElementById('load-input').click()">開く (JSON)</div>
                <div class="dropdown-item" onclick="saveProject()">保存 (JSON)</div>
                <div class="dropdown-divider"></div>
                <div class="dropdown-item" onclick="document.getElementById('image-load-input').click()">画像読込</div>
                <div class="dropdown-item" onclick="exportImage('png')">エクスポート (PNG)</div>
                <div class="dropdown-item" onclick="exportImage('jpeg')">エクスポート (JPG)</div>
                <div class="dropdown-item" onclick="exportImage('bmp')">エクスポート (BMP)</div>
            </div>
        </div>
        <div class="menu-item">編集
            <div class="dropdown-content">
                <div class="dropdown-item" onclick="undo()">元に戻す (Undo)</div>
                <div class="dropdown-item" onclick="redo()">やり直す (Redo)</div>
                <div class="dropdown-divider"></div>
                <div class="dropdown-item" onclick="copyToClipboard()">コピー</div>
                <div class="dropdown-item" onclick="pasteFromClipboard()">貼り付け</div>
                <div class="dropdown-divider"></div>
                <div class="dropdown-item" onclick="duplicateSelection()">選択範囲の複製</div>
                <div class="dropdown-item" onclick="deleteSelection()">選択範囲の削除</div>
                <div class="dropdown-item" onclick="finalizeSelection()">選択範囲の確定</div>
            </div>
        </div>
        <div class="menu-item">画像
            <div class="dropdown-content">
                <div class="dropdown-item" onclick="resizeCanvasPrompt()">キャンバスサイズ変更</div>
                <div class="dropdown-item" onclick="scaleImagePrompt()">解像度拡縮</div>
                <div class="dropdown-item" onclick="setTool('crop')">トリミング</div>
                <div class="dropdown-divider"></div>
                <div class="dropdown-item" onclick="openColorAdjust()">色調補正...</div>
            </div>
        </div>
    </div>

    <!-- 非表示の入力系 -->
    <input type="file" id="load-input" style="display: none;" accept=".json" onchange="loadProject(event)">
    <input type="file" id="image-load-input" style="display: none;" accept="image/png, image/jpeg, image/bmp" onchange="loadImageAsLayer(event)">

    <div id="main-area">
        <div id="toolbar">
            
            <div class="tool-section">
                <label>直接描画ツール</label>
                <div class="icon-grid" id="tool-grid">
                    <button id="tool-pen" class="tool-btn active" onclick="setTool('pen')">
                        <svg viewBox="0 0 24 24"><path d="M3 17.25V21h3.75L17.81 9.94l-3.75-3.75L3 17.25zM20.71 7.04c.39-.39.39-1.02 0-1.41l-2.34-2.34c-.39-.39-1.02-.39-1.41 0l-1.83 1.83 3.75 3.75 1.83-1.83z"/></svg>
                        ペン
                    </button>
                    <button id="tool-dot" class="tool-btn" onclick="setTool('dot')">
                        <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="4"/></svg>
                        点
                    </button>
                    <button id="tool-eraser" class="tool-btn" onclick="setTool('eraser')">
                        <svg viewBox="0 0 24 24"><path d="M16.24 3.56l4.2 4.2c.78.78.78 2.05 0 2.83l-9.9 9.91c-.38.38-.88.59-1.41.59H3v-6.09c0-.53.21-1.04.59-1.41l9.82-9.83c.78-.78 2.05-.78 2.83 0zM5 19h3.09l7.5-7.5-3.09-3.09-7.5 7.5V19z"/></svg>
                        消しゴム
                    </button>
                    <button id="tool-bucket" class="tool-btn" onclick="setTool('bucket')">
                        <svg viewBox="0 0 24 24"><path d="M16.56 8.94L7.62 0 6.21 1.41l2.38 2.38-5.15 5.15c-.59.59-.59 1.54 0 2.12l5.5 5.5c.29.29.68.44 1.06.44s.77-.15 1.06-.44l7.49-7.49c.59-.58.59-1.53 0-2.13zM8.45 15.46l-5.5-5.5 3.54-3.54 5.5 5.5-3.54 3.54zM13 22v-3h3v3h-3zm5 0v-3h3v3h-3z"/></svg>
                        塗潰
                    </button>
                    <button id="tool-line" class="tool-btn" onclick="setTool('line')">
                        <svg viewBox="0 0 24 24"><path d="M3 21L21 3v2L5 21H3z"/></svg>
                        直線
                    </button>
                    <button id="tool-rect" class="tool-btn" onclick="setTool('rect')">
                        <svg viewBox="0 0 24 24"><path d="M3 3h18v18H3V3zm2 2v14h14V5H5z"/></svg>
                        四角
                    </button>
                    <button id="tool-rect-fill" class="tool-btn" onclick="setTool('rect-fill')">
                        <svg viewBox="0 0 24 24"><path d="M3 3h18v18H3z"/></svg>
                        四角
                    </button>
                    <button id="tool-circle" class="tool-btn" onclick="setTool('circle')">
                        <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 18c-4.41 0-8-3.59-8-8s3.59-8 8-8 8 3.59 8 8-3.59 8-8 8z"/></svg>
                        円
                    </button>
                    <button id="tool-circle-fill" class="tool-btn" onclick="setTool('circle-fill')">
                        <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/></svg>
                        円
                    </button>
                    <button id="tool-ellipse" class="tool-btn" onclick="setTool('ellipse')">
                        <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 18c-4.41 0-8-3.59-8-8s3.59-8 8-8 8 3.59 8 8-3.59 8-8 8z"/></svg>
                        楕円
                    </button>
                    <button id="tool-ellipse-fill" class="tool-btn" onclick="setTool('ellipse-fill')">
                        <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/></svg>
                        楕円
                    </button>
                    <button id="tool-select" class="tool-btn" onclick="setTool('select')">
                        <svg viewBox="0 0 24 24"><path d="M3 3h4V1H1v6h2V3zm4 18H3v-4H1v6h6v-2zm14-4h-2v4h-4v2h6v-6zm-2-14h-4V1h6v6h-2V3zM9 1h6v2H9V1zm0 20h6v2H9v-2zm10-10h2v6h-2v-6zM1 9h2v6H1V9z"/></svg>
                        選択
                    </button>
                </div>
                
                <button id="tool-pan" class="tool-btn" style="height: 35px; flex-direction: row; gap: 5px;" onclick="setTool('pan')">
                    <svg viewBox="0 0 24 24" style="margin: 0;"><path d="M12 2L8 6h3v5H6V8L2 12l4 4v-3h5v5H8l4 4 4-4h-3v-5h5v3l4-4-4-4v3h-5V6h3L12 2z"/></svg>
                    <span>移動 (手のひら)</span>
                </button>
            </div>

            <div class="tool-section" style="background-color: #2a1111; padding: 8px; border-radius: 4px; border: 1px solid #662222;">
                <label style="color: #ffaaaa; margin-bottom: 5px; display: block;">ベクター (自動レイヤー化)</label>
                <div class="icon-grid" style="grid-template-columns: repeat(2, 1fr);">
                    <button id="tool-edit-line" class="tool-btn" onclick="setTool('edit-line')" style="height: 35px;">直線</button>
                    <button id="tool-edit-rect" class="tool-btn" onclick="setTool('edit-rect')" style="height: 35px;">□</button>
                    <button id="tool-edit-rect-fill" class="tool-btn" onclick="setTool('edit-rect-fill')" style="height: 35px;">■</button>
                    <button id="tool-edit-ellipse" class="tool-btn" onclick="setTool('edit-ellipse')" style="height: 35px;">〇</button>
                    <button id="tool-edit-ellipse-fill" class="tool-btn" onclick="setTool('edit-ellipse-fill')" style="height: 35px;">●</button>
                    <button id="tool-edit-text" class="tool-btn" onclick="setTool('edit-text')" style="height: 35px;">文字</button>
                    <button id="tool-edit-table" class="tool-btn" onclick="setTool('edit-table')" style="height: 35px;">表(Grid)</button>
                    <button id="tool-finalize-shape" class="tool-btn" onclick="finalizeShape()" style="background-color: #ff3333; color: white; height: 35px;">✅ 確定</button>
                </div>
                <div style="margin-top: 5px;">
                    <input type="text" id="shape-text-input" placeholder="文字入力..." oninput="updateShapeProperties()" style="width: 100%; box-sizing: border-box; background: #111; color: #fff; border: 1px solid #444; padding: 4px; margin-bottom: 4px;">
                    <div style="display:flex; gap:5px;">
                        <label style="font-size:10px; color:#aaa;">行:<input type="number" id="table-rows" value="3" min="1" oninput="updateShapeProperties()" style="width:35px; background: #111; color: #fff; border: 1px solid #444;"></label>
                        <label style="font-size:10px; color:#aaa;">列:<input type="number" id="table-cols" value="3" min="1" oninput="updateShapeProperties()" style="width:35px; background: #111; color: #fff; border: 1px solid #444;"></label>
                    </div>
                </div>
            </div>

            <div class="tool-section">
                <label>線の太さ: <span id="line-width-display">1</span>px</label>
                <input type="range" id="line-width" min="1" max="50" value="1" oninput="setLineWidth(this.value)">
            </div>

            <div class="tool-section">
                <label>ドット絵・グリッドサポート</label>
                <div class="button-grid" style="grid-template-columns: 1fr 1fr;">
                    <button id="aa-off" class="active" onclick="setAntiAlias(false)">ドット(AAオフ)</button>
                    <button id="aa-on" onclick="setAntiAlias(true)">滑らか(AAオン)</button>
                </div>
                <div style="display:flex; gap:5px; margin-top:5px; align-items:center;">
                    <button id="grid-toggle" onclick="toggleGrid()" style="flex:1;">表示切替</button>
                    <label style="font-size:10px; color:#aaa; white-space:nowrap;">サイズ:<input type="number" id="grid-size" value="16" min="2" onchange="setGridSize(this.value)" style="width:35px; background: #111; color: #fff; border: 1px solid #444;"></label>
                </div>
                <!-- 追加: スナップ設定 -->
                <div class="button-grid" style="margin-top:5px;">
                    <button id="snap-grid-btn" onclick="toggleSnapToGrid()">グリッド吸着</button>
                    <button id="snap-obj-btn" onclick="toggleSnapToObject()">頂点/円周吸着</button>
                </div>
            </div>

            <div class="tool-section">
                <label>表示倍率 (Zoom)</label>
                <div class="zoom-grid" id="zoom-controls">
                    <button id="zoom-1" class="active" onclick="setZoom(1)">x1</button>
                    <button id="zoom-2" onclick="setZoom(2)">x2</button>
                    <button id="zoom-4" onclick="setZoom(4)">x4</button>
                    <button id="zoom-8" onclick="setZoom(8)">x8</button>
                    <button id="zoom-16" onclick="setZoom(16)">x16</button>
                    <button id="zoom-32" onclick="setZoom(32)">x32</button>
                </div>
            </div>

            <div class="tool-section">
                <label>FC パレット</label>
                <div class="palette-grid" id="famicom-palette">
                </div>
                <input type="color" id="color-picker" value="#000000" onchange="setColor(this.value)" style="margin-top: 5px;">
            </div>
            
            <div style="height: 10px; flex-shrink: 0;"></div>
        </div>

        <div id="workspace">
            <div id="canvas-wrapper">
                <div id="grid-overlay"></div>
                <canvas id="preview-canvas" width="800" height="600"></canvas>
            </div>
        </div>

        <div id="layer-panel">
            <div class="panel-header">レイヤー・モジュール</div>
            <div class="layer-list" id="layer-list"></div>
            <div class="layer-add-btn" onclick="addLayer()">+ 新規レイヤー追加</div>
        </div>
    </div>
    
    <div id="status-bar">
        <div class="status-item">
            SYSTEM STATUS: <span style="color: #0f0; margin-left: 5px;">ONLINE</span>
        </div>
        <div class="status-item">
            IMAGE SIZE: <span class="status-value" id="status-size">800 x 600 px</span>
        </div>
    </div>

    <!-- 色調補正モーダル -->
    <div id="color-adjust-modal" style="display:none; position:fixed; top:50%; left:50%; transform:translate(-50%, -50%); background:#2a2a2a; padding:20px; border:1px solid #ff0000; z-index:20000; border-radius:8px; width: 300px; box-shadow: 0 0 15px rgba(0,0,0,0.8);">
        <h3 style="margin-top:0; color:#ffaaaa;">色調補正（現在のレイヤー）</h3>
        <label style="display:block; margin-bottom:5px;">明るさ: <span id="bright-val">0</span></label>
        <input type="range" id="adj-brightness" min="-128" max="128" value="0" oninput="document.getElementById('bright-val').innerText=this.value" style="width:100%;">
        <br><br>
        <label style="display:block; margin-bottom:5px;">コントラスト: <span id="contrast-val">0</span></label>
        <input type="range" id="adj-contrast" min="-128" max="128" value="0" oninput="document.getElementById('contrast-val').innerText=this.value" style="width:100%;">
        <br><br>
        <div style="text-align:right;">
            <button onclick="document.getElementById('color-adjust-modal').style.display='none'" style="margin-right: 10px;">キャンセル</button>
            <button onclick="executeColorAdjust()" style="background-color:#ff3333; color:white;">適用</button>
        </div>
    </div>

    <script type="module" src="app.js"></script>
</body>
</html>
