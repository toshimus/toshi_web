<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>K.I.T.T. - Advanced Drawing Interface (Retro Pixel Edition)</title>
    <style>
        :root {
            --bg-color: #121212;
            --panel-bg: #1e1e1e;
            --text-color: #e0e0e0;
            --accent-color: #ff0000;
            --accent-hover: #cc0000;
            --border-color: #333;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            flex-direction: column; 
            height: 100vh;
            overflow: hidden;
            overscroll-behavior: none;
        }

        #main-area {
            display: flex;
            flex-grow: 1;
            overflow: hidden;
            width: 100%;
        }

        #toolbar {
            width: 240px; /* パレットが綺麗に見えるように少し幅を拡張 */
            background-color: var(--panel-bg);
            border-right: 1px solid var(--border-color);
            padding: 10px;
            padding-bottom: calc(60px + env(safe-area-inset-bottom));
            display: flex;
            flex-direction: column;
            gap: 10px;
            overflow-y: auto;
            flex-shrink: 0;
            overscroll-behavior: contain;
        }

        #workspace {
            flex-grow: 1;
            background-color: #0a0a0a;
            position: relative;
            overflow: auto; 
            padding: 20px;
            display: block; 
            overscroll-behavior: none; 
        }

        #canvas-wrapper {
            position: relative;
            width: 800px;
            height: 600px;
            margin: 0 auto; 
            background-image: 
                linear-gradient(45deg, #ccc 25%, transparent 25%),
                linear-gradient(135deg, #ccc 25%, transparent 25%),
                linear-gradient(45deg, transparent 75%, #ccc 75%),
                linear-gradient(135deg, transparent 75%, #ccc 75%);
            background-size: 20px 20px;
            background-position: 0 0, 10px 0, 10px -10px, 0px 10px;
            background-color: #ffffff;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.5);
            transform-origin: top left;
            touch-action: none; 
        }

        canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            image-rendering: pixelated; 
        }

        #preview-canvas {
            pointer-events: none;
            z-index: 9999;
        }

        #grid-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            display: none;
            z-index: 9998;
        }

        #layer-panel {
            width: 200px;
            background-color: var(--panel-bg);
            border-left: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
            overscroll-behavior: contain;
            padding-bottom: env(safe-area-inset-bottom);
        }

        .panel-header {
            padding: 10px;
            font-size: 0.85em;
            font-weight: bold;
            border-bottom: 1px solid var(--border-color);
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--accent-color);
        }

        .tool-section {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .tool-section label {
            font-size: 0.75em; /* 文字サイズを小さめに */
            color: #aaa;
        }

        .button-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 5px;
        }

        .zoom-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 5px;
        }

        .palette-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 4px; /* カラー間に余裕を持たせる */
            margin-top: 4px;
        }

        .palette-color {
            width: 100%;
            aspect-ratio: 1;
            border: 1px solid #444;
            cursor: pointer;
            border-radius: 2px;
            transition: transform 0.1s;
        }

        .palette-color:hover {
            border-color: #fff;
            transform: scale(1.2);
            z-index: 10;
            position: relative;
        }

        button {
            background-color: #2a2a2a;
            color: var(--text-color);
            border: 1px solid var(--border-color);
            padding: 5px 6px;
            cursor: pointer;
            border-radius: 4px;
            transition: all 0.2s;
            font-size: 0.75em; /* ボタンの文字も小さめに */
            touch-action: manipulation; 
        }

        button:hover {
            background-color: #3a3a3a;
            border-color: #555;
        }

        button.active {
            background-color: var(--accent-color);
            color: white;
            border-color: var(--accent-hover);
        }

        input[type="color"] {
            width: 100%;
            height: 30px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            background-color: transparent;
        }

        input[type="range"] {
            width: 100%;
            accent-color: var(--accent-color);
        }

        .layer-list {
            flex-grow: 1;
            overflow-y: auto;
            padding: 10px;
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .layer-item {
            background-color: #2a2a2a;
            padding: 6px;
            border-radius: 4px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            border: 1px solid transparent;
        }

        .layer-item.active {
            border-color: var(--accent-color);
            background-color: #332222;
        }

        .layer-item input[type="text"] {
            background: transparent;
            border: none;
            color: var(--text-color);
            font-size: 0.85em;
            width: 90px;
        }

        .layer-item input[type="text"]:focus {
            outline: none;
            border-bottom: 1px solid var(--accent-color);
        }

        .layer-controls button {
            padding: 2px 6px;
            font-size: 0.75em;
            background-color: transparent;
            border: 1px solid var(--border-color);
        }

        .layer-controls button:hover {
            background-color: #444;
        }

        .layer-add-btn {
            margin: 10px 10px 40px 10px; 
            padding: 8px;
            font-size: 0.8em;
            background-color: #2a2a2a;
            border: 1px dashed #666;
            text-align: center;
            cursor: pointer;
            border-radius: 4px;
        }

        .layer-add-btn:hover {
            background-color: #3a3a3a;
            border-color: var(--accent-color);
        }

        #status-bar {
            height: 28px;
            background-color: #151515;
            border-top: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            padding: 0 15px;
            font-size: 0.8em;
            color: #888;
            flex-shrink: 0;
            z-index: 10000;
            padding-bottom: env(safe-area-inset-bottom);
        }

        .status-item {
            margin-right: 20px;
            display: flex;
            align-items: center;
        }

        .status-value {
            color: #ccc;
            margin-left: 5px;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div id="main-area">
        <div id="toolbar">
            <div class="panel-header">システム・コントロール</div>
            
            <div class="tool-section">
                <label>ツール選択</label>
                <div class="button-grid">
                    <button id="tool-pen" class="active" onclick="setTool('pen')">ペン</button>
                    <button id="tool-dot" onclick="setTool('dot')">点</button>
                    <button id="tool-bucket" onclick="setTool('bucket')">ペイント</button>
                    <button id="tool-line" onclick="setTool('line')">直線</button>
                    <button id="tool-eraser" onclick="setTool('eraser')">消しゴム</button>
                    <button id="tool-rect" onclick="setTool('rect')">四角形</button>
                    <button id="tool-circle" onclick="setTool('circle')">円</button>
                    <button id="tool-select" onclick="setTool('select')">選択</button>
                    <button id="tool-pan" onclick="setTool('pan')" style="grid-column: span 2;">手のひら(移動)</button>
                </div>
            </div>

            <div class="tool-section" id="selection-panel" style="display: none; background-color: #3a2222; padding: 10px; border-radius: 4px; border: 1px solid #ff4444;">
                <label style="color: #ffaaaa;">選択範囲オプション</label>
                <div class="button-grid">
                    <button onclick="duplicateSelection()">複製</button>
                    <button onclick="deleteSelection()">削除</button>
                    <button onclick="finalizeSelection()" style="grid-column: span 2; background-color: #552222;">確定 (スタンプ)</button>
                </div>
            </div>

            <div class="tool-section">
                <label>描画モード</label>
                <div class="button-grid">
                    <button id="mode-stroke" class="active" onclick="setFillMode(false)">枠のみ</button>
                    <button id="mode-fill" onclick="setFillMode(true)">塗つぶし</button>
                </div>
            </div>

            <div class="tool-section">
                <label>ドット絵サポート</label>
                <div class="button-grid">
                    <button id="aa-off" class="active" onclick="setAntiAlias(false)">ドット</button>
                    <button id="aa-on" onclick="setAntiAlias(true)">滑らか</button>
                    <button id="grid-toggle" onclick="toggleGrid()" style="grid-column: span 2;">グリッド表示 (x4以上)</button>
                </div>
            </div>

            <div class="tool-section">
                <label>表示倍率 (Zoom)</label>
                <div class="zoom-grid" id="zoom-controls">
                    <button id="zoom-1" class="active" onclick="setZoom(1)">x1</button>
                    <button id="zoom-2" onclick="setZoom(2)">x2</button>
                    <button id="zoom-4" onclick="setZoom(4)">x4</button>
                    <button id="zoom-8" onclick="setZoom(8)">x8</button>
                    <button id="zoom-16" onclick="setZoom(16)">x16</button>
                    <button id="zoom-32" onclick="setZoom(32)">x32</button>
                </div>
            </div>

            <div class="tool-section">
                <label>FC パレット</label>
                <div class="palette-grid" id="famicom-palette">
                    <!-- JavaScriptで自動生成されます -->
                </div>
                <input type="color" id="color-picker" value="#000000" onchange="setColor(this.value)" style="margin-top: 5px;">
            </div>

            <div class="tool-section">
                <label>線の太さ: <span id="line-width-display">1</span>px</label>
                <input type="range" id="line-width" min="1" max="50" value="1" oninput="setLineWidth(this.value)">
            </div>

            <hr style="border-color: var(--border-color); width: 100%;">

            <div class="tool-section">
                <label>クリップボード</label>
                <div class="button-grid">
                    <button onclick="copyToClipboard()">コピー</button>
                    <button onclick="pasteFromClipboard()">貼付</button>
                </div>
            </div>

            <div class="tool-section">
                <label>キャンバス操作</label>
                <div class="button-grid">
                    <button onclick="createNewCanvas()" style="grid-column: span 2; background-color: #442222;">新規作成</button>
                    <button onclick="resizeCanvasPrompt()">サイズ変更</button>
                    <button onclick="scaleImagePrompt()">解像度拡縮</button>
                    <button id="tool-crop" onclick="setTool('crop')" style="grid-column: span 2;">トリミング</button>
                </div>
            </div>

            <div class="tool-section">
                <label>画像入出力</label>
                <div class="button-grid">
                    <button onclick="document.getElementById('image-load-input').click()" style="grid-column: span 2; background-color: #224422;">読込 (JPG/PNG/BMP)</button>
                    <input type="file" id="image-load-input" style="display: none;" accept="image/png, image/jpeg, image/bmp" onchange="loadImageAsLayer(event)">
                    <button onclick="exportImage('png')">PNG</button>
                    <button onclick="exportImage('jpeg')">JPG</button>
                    <button onclick="exportImage('bmp')" style="grid-column: span 2;">BMP</button>
                </div>
            </div>

            <hr style="border-color: var(--border-color); width: 100%;">

            <div class="tool-section">
                <label>履歴・管理</label>
                <div class="button-grid">
                    <button onclick="undo()">Undo</button>
                    <button onclick="redo()">Redo</button>
                    <button onclick="saveProject()">Save(JSON)</button>
                    <button onclick="document.getElementById('load-input').click()">Load(JSON)</button>
                    <input type="file" id="load-input" style="display: none;" accept=".json" onchange="loadProject(event)">
                </div>
            </div>
            
            <div style="height: 10px; flex-shrink: 0;"></div>
        </div>

        <div id="workspace">
            <div id="canvas-wrapper">
                <div id="grid-overlay"></div>
                <canvas id="preview-canvas" width="800" height="600"></canvas>
            </div>
        </div>

        <div id="layer-panel">
            <div class="panel-header">レイヤー・モジュール</div>
            <div class="layer-list" id="layer-list">
                </div>
            <div class="layer-add-btn" onclick="addLayer()">+ 新規レイヤー追加</div>
        </div>
    </div>
    
    <div id="status-bar">
        <div class="status-item">
            SYSTEM STATUS: <span style="color: #0f0; margin-left: 5px;">ONLINE</span>
        </div>
        <div class="status-item">
            IMAGE SIZE: <span class="status-value" id="status-size">800 x 600 px</span>
        </div>
    </div>

    <script>
        // --- システム定数・変数 ---
        let CANVAS_WIDTH = 800;
        let CANVAS_HEIGHT = 600; 
        
        let currentTool = 'pen';
        let currentColor = '#000000';
        let currentLineWidth = 1; 
        let isFillMode = false;
        let currentZoom = 1;
        let isAntiAlias = false; 
        let isGridVisible = false;

        let isDrawing = false;
        let hasMoved = false; 
        let startX = 0;
        let startY = 0;

        // 手のひら・ズーム（パンニング/ピンチ）用変数
        let isPanning = false;
        let panStartX = 0;
        let panStartY = 0;
        let panScrollX = 0;
        let panScrollY = 0;
        let initialPinchDistance = null;

        // 選択ツール用変数
        let selection = {
            active: false,
            x: 0, y: 0, w: 0, h: 0,
            canvas: null,
            isFloating: false
        };
        let dragOffsetX = 0;
        let dragOffsetY = 0;
        let isDraggingSelection = false;

        // レイヤー管理
        let layers = [];
        let currentLayerId = null;
        let layerCounter = 0;

        // 履歴管理 (Undo/Redo)
        let historyStack = [];
        let redoStack = [];
        const MAX_HISTORY = 20;

        // ファミコン（NES）標準カラーパレット
        const famicomColors = [
            "#7C7C7C","#0000FC","#0000BC","#4428BC","#940084","#A80020","#A81000","#881400","#503000","#007800","#006800","#005800","#004058","#000000",
            "#BCBCBC","#0078F8","#0058F8","#6844FC","#D800CC","#E40058","#F83800","#E45C10","#AC7C00","#00B800","#00A800","#00A844","#008888","#000000",
            "#F8F8F8","#3CBCFC","#6888FC","#9878F8","#F878F8","#F85898","#F87858","#FCA044","#F8B800","#B8F818","#58D854","#58F898","#00E8D8","#787878",
            "#FCFCFC","#A4E4FC","#B8B8F8","#D8B8F8","#F8B8F8","#F8A4C0","#F0D0B0","#FCE0A8","#F8D878","#D8F878","#B8F8B8","#B8F8D8","#00FCFC","#000000"
        ];

        // HTML要素の参照
        const workspace = document.getElementById('workspace');
        const canvasWrapper = document.getElementById('canvas-wrapper');
        const previewCanvas = document.getElementById('preview-canvas');
        const previewCtx = previewCanvas.getContext('2d');
        const layerListEl = document.getElementById('layer-list');
        const selectionPanel = document.getElementById('selection-panel');

        // ブラシサイズプレビュー用DOM要素の生成と初期設定
        const brushPreview = document.createElement('div');
        brushPreview.style.position = 'fixed';
        brushPreview.style.border = '1px solid #ff0000';
        brushPreview.style.borderRadius = '50%';
        brushPreview.style.pointerEvents = 'none';
        brushPreview.style.zIndex = '20000';
        brushPreview.style.transform = 'translate(-50%, -50%)'; 
        brushPreview.style.display = 'none';
        document.body.appendChild(brushPreview);

        // --- 初期化処理 ---
        function init() {
            previewCtx.imageSmoothingEnabled = isAntiAlias;
            previewCanvas.style.imageRendering = isAntiAlias ? 'auto' : 'pixelated';
            
            // ファミコンパレットの生成
            const paletteGrid = document.getElementById('famicom-palette');
            if (paletteGrid) {
                paletteGrid.innerHTML = '';
                famicomColors.forEach(color => {
                    const div = document.createElement('div');
                    div.className = 'palette-color';
                    div.style.backgroundColor = color;
                    div.onclick = () => setPaletteColor(color);
                    paletteGrid.appendChild(div);
                });
            }

            addLayer('レイヤー 1');
            saveState(); 
            setupPreviewCanvasEvents();
            updateStatusBar();
        }

        function updateStatusBar() {
            const sizeDisplay = document.getElementById('status-size');
            if (sizeDisplay) {
                sizeDisplay.innerText = `${CANVAS_WIDTH} x ${CANVAS_HEIGHT} px`;
            }
        }

        // --- ツール・システム制御 ---
        // ブラシプレビュー更新関数
        function updateBrushPreview(clientX, clientY) {
            if (['pen', 'eraser', 'dot'].includes(currentTool)) {
                const size = currentLineWidth * currentZoom;
                brushPreview.style.width = size + 'px';
                brushPreview.style.height = size + 'px';
                brushPreview.style.left = clientX + 'px';
                brushPreview.style.top = clientY + 'px';
                brushPreview.style.display = 'block';
            } else {
                brushPreview.style.display = 'none';
            }
        }

        function setTool(toolName) {
            if (currentTool === 'select' && toolName !== 'select') {
                finalizeSelection();
            }

            currentTool = toolName;
            document.querySelectorAll('#toolbar .button-grid button').forEach(btn => {
                if (btn.id && btn.id.startsWith('tool-')) {
                    btn.classList.remove('active');
                }
            });
            const targetBtn = document.getElementById(`tool-${toolName}`);
            if (targetBtn) targetBtn.classList.add('active');
            
            isPanning = false;
            selectionPanel.style.display = (toolName === 'select') ? 'flex' : 'none';
            
            if (!['pen', 'eraser', 'dot'].includes(currentTool)) {
                brushPreview.style.display = 'none';
            }
        }

        function setFillMode(fill) {
            isFillMode = fill;
            document.getElementById('mode-stroke').classList.toggle('active', !fill);
            document.getElementById('mode-fill').classList.toggle('active', fill);
        }

        function setAntiAlias(enable) {
            isAntiAlias = enable;
            document.getElementById('aa-off').classList.toggle('active', !enable);
            document.getElementById('aa-on').classList.toggle('active', enable);
            
            layers.forEach(layer => {
                layer.ctx.imageSmoothingEnabled = enable;
                layer.canvas.style.imageRendering = enable ? 'auto' : 'pixelated';
            });
            previewCtx.imageSmoothingEnabled = enable;
            previewCanvas.style.imageRendering = enable ? 'auto' : 'pixelated';
            if(selection.active) drawSelectionPreview();
        }

        function toggleGrid() {
            isGridVisible = !isGridVisible;
            document.getElementById('grid-toggle').classList.toggle('active', isGridVisible);
            updateGrid();
        }

        function updateGrid() {
            const overlay = document.getElementById('grid-overlay');
            if (isGridVisible && currentZoom >= 4) {
                overlay.style.display = 'block';
                overlay.style.backgroundImage = `
                    linear-gradient(to right, rgba(128,128,128,0.3) 1px, transparent 1px),
                    linear-gradient(to bottom, rgba(128,128,128,0.3) 1px, transparent 1px)
                `;
                overlay.style.backgroundSize = `${currentZoom}px ${currentZoom}px`;
            } else {
                overlay.style.display = 'none';
            }
        }

        function setColor(color) {
            currentColor = color;
        }

        function setPaletteColor(hex) {
            document.getElementById('color-picker').value = hex;
            setColor(hex);
        }

        function setLineWidth(width) {
            currentLineWidth = parseInt(width, 10);
            document.getElementById('line-width-display').innerText = width;
        }

        function setZoom(level, cx, cy) {
            const oldZoom = currentZoom;
            currentZoom = level;
            
            if (cx === undefined || cy === undefined) {
                const wsRect = workspace.getBoundingClientRect();
                cx = wsRect.left + wsRect.width / 2;
                cy = wsRect.top + wsRect.height / 2;
            }

            const cwRectOld = canvasWrapper.getBoundingClientRect();
            const offsetX = cx - cwRectOld.left;
            const offsetY = cy - cwRectOld.top;
            
            canvasWrapper.style.width = (CANVAS_WIDTH * currentZoom) + 'px';
            canvasWrapper.style.height = (CANVAS_HEIGHT * currentZoom) + 'px';
            
            document.querySelectorAll('#zoom-controls button').forEach(btn => {
                btn.classList.remove('active');
            });
            const zBtn = document.getElementById(`zoom-${level}`);
            if(zBtn) zBtn.classList.add('active');

            updateGrid();

            const newOffsetX = offsetX * (currentZoom / oldZoom);
            const newOffsetY = offsetY * (currentZoom / oldZoom);
            const cwRectNew = canvasWrapper.getBoundingClientRect();
            
            workspace.scrollLeft += (cwRectNew.left + newOffsetX) - cx;
            workspace.scrollTop += (cwRectNew.top + newOffsetY) - cy;
        }

        function zoomStep(dir, cx, cy) {
            const levels = [1, 2, 4, 8, 16, 32];
            let idx = levels.indexOf(currentZoom);
            if (idx === -1) idx = 0;
            idx += dir;
            if (idx < 0) idx = 0;
            if (idx >= levels.length) idx = levels.length - 1;
            if (levels[idx] !== currentZoom) {
                setZoom(levels[idx], cx, cy);
            }
        }

        // --- パンニング（移動）制御 ---
        function startPanning(e) {
            isPanning = true;
            let clientX, clientY;
            if (e.touches) {
                if (e.touches.length >= 2) {
                    clientX = (e.touches[0].clientX + e.touches[1].clientX) / 2;
                    clientY = (e.touches[0].clientY + e.touches[1].clientY) / 2;
                } else {
                    clientX = e.touches[0].clientX;
                    clientY = e.touches[0].clientY;
                }
            } else {
                clientX = e.clientX;
                clientY = e.clientY;
            }
            panStartX = clientX;
            panStartY = clientY;
            panScrollX = workspace.scrollLeft;
            panScrollY = workspace.scrollTop;
        }

        function doPan(e) {
            if (!isPanning) return;
            let clientX, clientY;
            if (e.touches) {
                if (e.touches.length >= 2) {
                    clientX = (e.touches[0].clientX + e.touches[1].clientX) / 2;
                    clientY = (e.touches[0].clientY + e.touches[1].clientY) / 2;
                } else {
                    clientX = e.touches[0].clientX;
                    clientY = e.touches[0].clientY;
                }
            } else {
                clientX = e.clientX;
                clientY = e.clientY;
            }
            const dx = clientX - panStartX;
            const dy = clientY - panStartY;
            workspace.scrollLeft = panScrollX - dx;
            workspace.scrollTop = panScrollY - dy;
        }

        function stopPanning() {
            isPanning = false;
        }

        // --- 描画イベントハンドリング ---
        function getMousePos(e) {
            const rect = previewCanvas.getBoundingClientRect();
            let clientX = e.clientX;
            let clientY = e.clientY;

            if (e.touches && e.touches.length > 0) {
                clientX = e.touches[0].clientX;
                clientY = e.touches[0].clientY;
            } else if (e.changedTouches && e.changedTouches.length > 0) {
                clientX = e.changedTouches[0].clientX;
                clientY = e.changedTouches[0].clientY;
            }

            const scaleX = CANVAS_WIDTH / rect.width;
            const scaleY = CANVAS_HEIGHT / rect.height;
            return {
                x: (clientX - rect.left) * scaleX,
                y: (clientY - rect.top) * scaleY
            };
        }

        function setupPreviewCanvasEvents() {
            const overlay = document.createElement('div');
            overlay.style.position = 'absolute';
            overlay.style.top = '0';
            overlay.style.left = '0';
            overlay.style.width = '100%';
            overlay.style.height = '100%';
            overlay.style.zIndex = '10000';
            overlay.style.cursor = 'crosshair';
            canvasWrapper.appendChild(overlay);

            window.addEventListener('mouseout', (e) => {
                brushPreview.style.display = 'none';
            });

            overlay.addEventListener('wheel', (e) => {
                e.preventDefault(); 
                if (e.deltaY < 0) zoomStep(1, e.clientX, e.clientY);
                else zoomStep(-1, e.clientX, e.clientY);
            }, { passive: false });

            overlay.addEventListener('mousedown', (e) => {
                if (currentTool === 'pan') {
                    startPanning(e);
                } else {
                    startDrawing(e);
                }
            });
            window.addEventListener('mousemove', (e) => {
                updateBrushPreview(e.clientX, e.clientY); 
                if (isPanning && currentTool === 'pan') {
                    doPan(e);
                } else if (isDrawing || isDraggingSelection) {
                    draw(e);
                }
            });
            window.addEventListener('mouseup', (e) => {
                if (isPanning) stopPanning();
                if (isDrawing || isDraggingSelection) stopDrawing(e);
            });

            overlay.addEventListener('touchstart', (e) => {
                if (e.touches && e.touches.length > 0) {
                    updateBrushPreview(e.touches[0].clientX, e.touches[0].clientY);
                }
                if (e.touches && e.touches.length >= 2) {
                    e.preventDefault();
                    startPanning(e);
                    initialPinchDistance = Math.hypot(
                        e.touches[0].clientX - e.touches[1].clientX,
                        e.touches[0].clientY - e.touches[1].clientY
                    );
                    return;
                }
                
                if (currentTool === 'pan') {
                    e.preventDefault();
                    startPanning(e);
                } else {
                    e.preventDefault(); 
                    startDrawing(e);
                }
            }, { passive: false });
            
            window.addEventListener('touchmove', (e) => {
                if (e.touches && e.touches.length > 0) {
                    updateBrushPreview(e.touches[0].clientX, e.touches[0].clientY);
                }
                if (e.touches && e.touches.length >= 2) {
                    e.preventDefault();
                    const currentDistance = Math.hypot(
                        e.touches[0].clientX - e.touches[1].clientX,
                        e.touches[0].clientY - e.touches[1].clientY
                    );
                    const pinchCenterX = (e.touches[0].clientX + e.touches[1].clientX) / 2;
                    const pinchCenterY = (e.touches[0].clientY + e.touches[1].clientY) / 2;

                    if (initialPinchDistance) {
                        const ratio = currentDistance / initialPinchDistance;
                        if (ratio > 1.2) {
                            zoomStep(1, pinchCenterX, pinchCenterY);
                            initialPinchDistance = currentDistance;
                        } else if (ratio < 0.8) {
                            zoomStep(-1, pinchCenterX, pinchCenterY);
                            initialPinchDistance = currentDistance;
                        }
                    }
                    if (isPanning) doPan(e);
                    return;
                }

                if (isPanning) {
                    e.preventDefault();
                    doPan(e);
                } else if (isDrawing || isDraggingSelection) {
                    e.preventDefault(); 
                    draw(e);
                }
            }, { passive: false });
            
            window.addEventListener('touchend', (e) => {
                brushPreview.style.display = 'none'; 
                initialPinchDistance = null;
                if (isPanning) stopPanning();
                if (isDrawing || isDraggingSelection) stopDrawing(e);
            });
            window.addEventListener('touchcancel', (e) => {
                brushPreview.style.display = 'none'; 
                initialPinchDistance = null;
                if (isPanning) stopPanning();
                if (isDrawing || isDraggingSelection) stopDrawing(e);
            });
        }

        function setupContextStyle(ctx, isEraser = false) {
            ctx.lineCap = 'round';
            ctx.lineJoin = 'round';
            ctx.lineWidth = currentLineWidth;
            
            if (isEraser) {
                ctx.globalCompositeOperation = 'destination-out';
                ctx.strokeStyle = 'rgba(0,0,0,1)';
            } else {
                ctx.globalCompositeOperation = 'source-over';
                ctx.strokeStyle = currentColor;
                ctx.fillStyle = currentColor;
            }
        }

        function startDrawing(e) {
            if (!currentLayerId) return;
            const layer = layers.find(l => l.id === currentLayerId);
            if (!layer || !layer.visible) {
                alert("現在選択されているレイヤーは非表示か存在しません。");
                return;
            }

            const pos = getMousePos(e);
            
            // --- 選択ツールの処理 ---
            if (currentTool === 'select') {
                if (selection.active &&
                    pos.x >= selection.x && pos.x <= selection.x + selection.w &&
                    pos.y >= selection.y && pos.y <= selection.y + selection.h) {
                    
                    isDraggingSelection = true;
                    if (!selection.isFloating) {
                        selection.canvas = document.createElement('canvas');
                        selection.canvas.width = selection.w;
                        selection.canvas.height = selection.h;
                        selection.canvas.getContext('2d').drawImage(layer.canvas, selection.x, selection.y, selection.w, selection.h, 0, 0, selection.w, selection.h);
                        layer.ctx.clearRect(selection.x, selection.y, selection.w, selection.h);
                        selection.isFloating = true;
                    }
                    dragOffsetX = pos.x - selection.x;
                    dragOffsetY = pos.y - selection.y;
                } else {
                    finalizeSelection(); 
                    startX = pos.x;
                    startY = pos.y;
                    isDrawing = true; 
                }
                return;
            }
            
            startX = pos.x;
            startY = pos.y;
            hasMoved = false; 

            // 点ツールの即時描画
            if (currentTool === 'dot') {
                const ctx = getCurrentContext();
                setupContextStyle(ctx, false);
                if (!isAntiAlias) {
                    drawBresenhamLine(ctx, startX, startY, startX, startY, false);
                } else {
                    ctx.beginPath();
                    ctx.arc(startX, startY, currentLineWidth / 2, 0, Math.PI * 2);
                    ctx.fill();
                }
                saveState();
                return; 
            }

            isDrawing = true;

            if (currentTool === 'bucket') {
                isDrawing = false;
                executeFloodFill(Math.floor(startX), Math.floor(startY));
                saveState();
                return;
            }

            if (currentTool === 'pen' || currentTool === 'eraser') {
                const ctx = getCurrentContext();
                setupContextStyle(ctx, currentTool === 'eraser');
                
                if (isAntiAlias) {
                    ctx.beginPath();
                    ctx.moveTo(startX, startY);
                }
            }
        }

        function draw(e) {
            const pos = getMousePos(e);
            hasMoved = true;

            // --- 選択ツールの処理 ---
            if (currentTool === 'select') {
                if (isDraggingSelection) {
                    selection.x = pos.x - dragOffsetX;
                    selection.y = pos.y - dragOffsetY;
                    if (!isAntiAlias) {
                        selection.x = Math.round(selection.x);
                        selection.y = Math.round(selection.y);
                    }
                    drawSelectionPreview();
                } else if (isDrawing) {
                    previewCtx.clearRect(0, 0, CANVAS_WIDTH, CANVAS_HEIGHT);
                    previewCtx.beginPath();
                    previewCtx.setLineDash([5, 5]);
                    previewCtx.strokeStyle = '#00ffff'; 
                    previewCtx.lineWidth = 1;
                    const w = pos.x - startX;
                    const h = pos.y - startY;
                    previewCtx.strokeRect(startX, startY, w, h);
                    previewCtx.setLineDash([]);
                }
                return;
            }

            if (!isDrawing) return;

            if (currentTool === 'pen' || currentTool === 'eraser') {
                const ctx = getCurrentContext();
                if (!isAntiAlias) {
                    drawBresenhamLine(ctx, startX, startY, pos.x, pos.y, currentTool === 'eraser');
                    startX = pos.x;
                    startY = pos.y;
                } else {
                    ctx.lineTo(pos.x, pos.y);
                    ctx.stroke();
                }
            } else if (['line', 'rect', 'circle', 'crop'].includes(currentTool)) {
                previewCtx.clearRect(0, 0, CANVAS_WIDTH, CANVAS_HEIGHT);
                setupContextStyle(previewCtx, false); 
                
                if (currentTool === 'crop') {
                    previewCtx.beginPath();
                    previewCtx.setLineDash([5, 5]);
                    previewCtx.strokeStyle = '#ff0000';
                    previewCtx.lineWidth = 1;
                    const width = pos.x - startX;
                    const height = pos.y - startY;
                    previewCtx.strokeRect(startX, startY, width, height);
                    previewCtx.setLineDash([]); 
                } else if (currentTool === 'line') {
                    if (!isAntiAlias) {
                        drawBresenhamLine(previewCtx, startX, startY, pos.x, pos.y, false);
                    } else {
                        previewCtx.beginPath();
                        previewCtx.moveTo(startX, startY);
                        previewCtx.lineTo(pos.x, pos.y);
                        previewCtx.stroke();
                    }
                } else if (currentTool === 'rect') {
                    let rx = startX, ry = startY, rw = pos.x - startX, rh = pos.y - startY;
                    if (!isAntiAlias) {
                        rx = Math.floor(rx); ry = Math.floor(ry);
                        rw = Math.floor(pos.x) - rx; rh = Math.floor(pos.y) - ry;
                    }
                    previewCtx.beginPath();
                    if (isFillMode) {
                        previewCtx.fillRect(rx, ry, rw, rh);
                    } else {
                        previewCtx.strokeRect(rx, ry, rw, rh);
                    }
                } else if (currentTool === 'circle') {
                    const radius = Math.sqrt(Math.pow(pos.x - startX, 2) + Math.pow(pos.y - startY, 2));
                    if (!isAntiAlias) {
                        drawBresenhamCircle(previewCtx, startX, startY, radius, isFillMode, false);
                    } else {
                        previewCtx.beginPath();
                        previewCtx.arc(startX, startY, radius, 0, Math.PI * 2);
                        if (isFillMode) previewCtx.fill(); else previewCtx.stroke();
                    }
                }
            }
        }

        function stopDrawing(e) {
            // --- 選択ツールの処理 ---
            if (currentTool === 'select') {
                if (isDraggingSelection) {
                    isDraggingSelection = false;
                    drawSelectionPreview();
                } else if (isDrawing) {
                    isDrawing = false;
                    const pos = getMousePos(e);
                    const rx = Math.min(startX, pos.x);
                    const ry = Math.min(startY, pos.y);
                    const rw = Math.abs(pos.x - startX);
                    const rh = Math.abs(pos.y - startY);
                    
                    if (rw > 2 && rh > 2) {
                        selection.x = !isAntiAlias ? Math.round(rx) : rx;
                        selection.y = !isAntiAlias ? Math.round(ry) : ry;
                        selection.w = !isAntiAlias ? Math.round(rw) : rw;
                        selection.h = !isAntiAlias ? Math.round(rh) : rh;
                        selection.active = true;
                        selection.isFloating = false;
                        drawSelectionPreview();
                    } else {
                        selection.active = false;
                        previewCtx.clearRect(0, 0, CANVAS_WIDTH, CANVAS_HEIGHT);
                    }
                }
                return; 
            }

            if (!isDrawing) return;
            isDrawing = false;
            
            const ctx = getCurrentContext();

            if (currentTool === 'pen' || currentTool === 'eraser') {
                if (isAntiAlias) {
                    ctx.closePath();
                }
                
                if (!hasMoved) {
                    if (!isAntiAlias) {
                        drawBresenhamLine(ctx, startX, startY, startX, startY, currentTool === 'eraser');
                    } else {
                        ctx.beginPath();
                        ctx.arc(startX, startY, currentLineWidth / 2, 0, Math.PI * 2);
                        ctx.fill();
                    }
                }

                if (currentTool === 'eraser') ctx.globalCompositeOperation = 'source-over';
            } else if (['line', 'rect', 'circle', 'crop'].includes(currentTool)) {
                setupContextStyle(ctx, false);
                const pos = getMousePos(e);
                
                if (currentTool === 'crop') {
                    previewCtx.clearRect(0, 0, CANVAS_WIDTH, CANVAS_HEIGHT);
                    const rectX = Math.min(startX, pos.x);
                    const rectY = Math.min(startY, pos.y);
                    const rectW = Math.abs(pos.x - startX);
                    const rectH = Math.abs(pos.y - startY);
                    
                    if (rectW > 5 && rectH > 5) {
                        finalizeSelection();
                        executeResize(rectW, rectH, rectX, rectY);
                    }
                    saveState();
                    return;
                }

                if (currentTool === 'line') {
                    if (!isAntiAlias) {
                        drawBresenhamLine(ctx, startX, startY, pos.x, pos.y, false);
                    } else {
                        ctx.beginPath();
                        ctx.moveTo(startX, startY);
                        ctx.lineTo(pos.x, pos.y);
                        ctx.stroke();
                    }
                } else if (currentTool === 'rect') {
                    let rx = startX, ry = startY, rw = pos.x - startX, rh = pos.y - startY;
                    if (!isAntiAlias) {
                        rx = Math.floor(rx); ry = Math.floor(ry);
                        rw = Math.floor(pos.x) - rx; rh = Math.floor(pos.y) - ry;
                    }
                    ctx.beginPath();
                    if (isFillMode) {
                        ctx.fillRect(rx, ry, rw, rh);
                    } else {
                        ctx.strokeRect(rx, ry, rw, rh);
                    }
                } else if (currentTool === 'circle') {
                    const radius = Math.sqrt(Math.pow(pos.x - startX, 2) + Math.pow(pos.y - startY, 2));
                    if (!isAntiAlias) {
                        drawBresenhamCircle(ctx, startX, startY, radius, isFillMode, false);
                    } else {
                        ctx.beginPath();
                        ctx.arc(startX, startY, radius, 0, Math.PI * 2);
                        if (isFillMode) ctx.fill(); else ctx.stroke();
                    }
                }
                previewCtx.clearRect(0, 0, CANVAS_WIDTH, CANVAS_HEIGHT);
            }
            
            saveState();
        }

        // --- ブレゼンハム アルゴリズム (ピクセルパーフェクト描画用) ---
        function drawBresenhamLine(ctx, x0, y0, x1, y1, isEraser) {
            x0 = Math.floor(x0); y0 = Math.floor(y0);
            x1 = Math.floor(x1); y1 = Math.floor(y1);
            let dx = Math.abs(x1 - x0);
            let dy = Math.abs(y1 - y0);
            let sx = (x0 < x1) ? 1 : -1;
            let sy = (y0 < y1) ? 1 : -1;
            let err = dx - dy;

            if (isEraser) {
                ctx.globalCompositeOperation = 'destination-out';
                ctx.fillStyle = 'rgba(0,0,0,1)';
            } else {
                ctx.globalCompositeOperation = 'source-over';
                ctx.fillStyle = currentColor;
            }

            let offset = Math.floor(currentLineWidth / 2);
            let drawSize = currentLineWidth;

            while (true) {
                ctx.fillRect(x0 - offset, y0 - offset, drawSize, drawSize);
                if (x0 === x1 && y0 === y1) break;
                let e2 = 2 * err;
                if (e2 > -dy) { err -= dy; x0 += sx; }
                if (e2 < dx) { err += dx; y0 += sy; }
            }
        }

        function drawBresenhamCircle(ctx, xc, yc, r, fill, isEraser) {
            xc = Math.floor(xc); yc = Math.floor(yc); r = Math.floor(r);
            if (isEraser) {
                ctx.globalCompositeOperation = 'destination-out';
                ctx.fillStyle = 'rgba(0,0,0,1)';
            } else {
                ctx.globalCompositeOperation = 'source-over';
                ctx.fillStyle = currentColor;
            }

            if (fill) {
                for (let y = -r; y <= r; y++) {
                    for (let x = -r; x <= r; x++) {
                        if (x * x + y * y <= r * r) {
                            ctx.fillRect(xc + x, yc + y, 1, 1);
                        }
                    }
                }
            } else {
                let x = 0;
                let y = r;
                let p = 3 - 2 * r;
                
                const drawSymmetric = (cx, cy, px, py) => {
                    ctx.fillRect(cx + px, cy + py, 1, 1);
                    ctx.fillRect(cx - px, cy + py, 1, 1);
                    ctx.fillRect(cx + px, cy - py, 1, 1);
                    ctx.fillRect(cx - px, cy - py, 1, 1);
                    ctx.fillRect(cx + py, cy + px, 1, 1);
                    ctx.fillRect(cx - py, cy + px, 1, 1);
                    ctx.fillRect(cx + py, cy - px, 1, 1);
                    ctx.fillRect(cx - py, cy - px, 1, 1);
                };

                while (y >= x) {
                    drawSymmetric(xc, yc, x, y);
                    x++;
                    if (p > 0) {
                        y--;
                        p = p + 4 * (x - y) + 10;
                    } else {
                        p = p + 4 * x + 6;
                    }
                }
            }
        }

        // --- バケツツール (Flood Fill アルゴリズム - 色差許容値対応) ---
        function hexToRgba(hex) {
            const result = /^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i.exec(hex);
            return result ? [
                parseInt(result[1], 16),
                parseInt(result[2], 16),
                parseInt(result[3], 16),
                255
            ] : [0, 0, 0, 255];
        }

        function executeFloodFill(startX, startY) {
            const ctx = getCurrentContext();
            if (!ctx) return;

            if (startX < 0 || startY < 0 || startX >= CANVAS_WIDTH || startY >= CANVAS_HEIGHT) return;

            const imageData = ctx.getImageData(0, 0, CANVAS_WIDTH, CANVAS_HEIGHT);
            const data32 = new Uint32Array(imageData.data.buffer);
            const data8 = new Uint8ClampedArray(imageData.data.buffer);
            
            const startIdx = startY * CANVAS_WIDTH + startX;
            const startColor32 = data32[startIdx];
            
            // 始点の色成分 (RGBA)
            const sr = data8[startIdx * 4];
            const sg = data8[startIdx * 4 + 1];
            const sb = data8[startIdx * 4 + 2];
            const sa = data8[startIdx * 4 + 3];
            
            const fillRgba = hexToRgba(currentColor);
            const fillColor32 = (fillRgba[3] << 24) | (fillRgba[2] << 16) | (fillRgba[1] << 8) | fillRgba[0];

            if (startColor32 === fillColor32) return; 

            // アンチエイリアスON時は許容誤差を設けて境界の滲み（半透明ピクセル）を塗りつぶす
            const tolerance = isAntiAlias ? 120 : 0;

            function matchStartColor(idx) {
                if (tolerance === 0) {
                    return data32[idx] === startColor32;
                }
                const r = data8[idx * 4];
                const g = data8[idx * 4 + 1];
                const b = data8[idx * 4 + 2];
                const a = data8[idx * 4 + 3];
                const diff = Math.abs(r - sr) + Math.abs(g - sg) + Math.abs(b - sb) + Math.abs(a - sa);
                return diff <= tolerance;
            }

            const stack = [startIdx];
            const visited = new Uint8Array(CANVAS_WIDTH * CANVAS_HEIGHT);

            while (stack.length > 0) {
                let idx = stack.pop();
                if (visited[idx]) continue;

                let y = Math.floor(idx / CANVAS_WIDTH);
                let x = idx % CANVAS_WIDTH;

                let left = x;
                while (left > 0 && matchStartColor(y * CANVAS_WIDTH + (left - 1))) {
                    left--;
                }

                let right = x;
                while (right < CANVAS_WIDTH - 1 && matchStartColor(y * CANVAS_WIDTH + (right + 1))) {
                    right++;
                }

                for (let i = left; i <= right; i++) {
                    let currentIdx = y * CANVAS_WIDTH + i;
                    data32[currentIdx] = fillColor32;
                    visited[currentIdx] = 1;

                    if (y > 0) {
                        let upIdx = (y - 1) * CANVAS_WIDTH + i;
                        if (!visited[upIdx] && matchStartColor(upIdx)) {
                            stack.push(upIdx);
                        }
                    }

                    if (y < CANVAS_HEIGHT - 1) {
                        let downIdx = (y + 1) * CANVAS_WIDTH + i;
                        if (!visited[downIdx] && matchStartColor(downIdx)) {
                            stack.push(downIdx);
                        }
                    }
                }
            }

            ctx.putImageData(imageData, 0, 0);
        }

        // --- 選択ツールモジュール ---
        function drawSelectionPreview() {
            previewCtx.clearRect(0, 0, CANVAS_WIDTH, CANVAS_HEIGHT);
            if (selection.isFloating && selection.canvas) {
                previewCtx.imageSmoothingEnabled = isAntiAlias;
                previewCtx.drawImage(selection.canvas, selection.x, selection.y);
            }
            if (selection.active) {
                previewCtx.beginPath();
                previewCtx.setLineDash([5, 5]);
                previewCtx.strokeStyle = '#00ffff';
                previewCtx.lineWidth = 1;
                previewCtx.strokeRect(selection.x, selection.y, selection.w, selection.h);
                previewCtx.setLineDash([]);
            }
        }

        function duplicateSelection() {
            if (!selection.active) return;
            const layer = layers.find(l => l.id === currentLayerId);
            if (!layer) return;
            
            if (selection.isFloating) {
                layer.ctx.imageSmoothingEnabled = isAntiAlias;
                layer.ctx.drawImage(selection.canvas, selection.x, selection.y);
            } else {
                selection.canvas = document.createElement('canvas');
                selection.canvas.width = selection.w;
                selection.canvas.height = selection.h;
                selection.canvas.getContext('2d').drawImage(layer.canvas, selection.x, selection.y, selection.w, selection.h, 0, 0, selection.w, selection.h);
                selection.isFloating = true;
            }
            
            selection.x += 10;
            selection.y += 10;
            if(!isAntiAlias){
                selection.x = Math.round(selection.x);
                selection.y = Math.round(selection.y);
            }
            drawSelectionPreview();
        }

        function deleteSelection() {
            if (!selection.active) return;
            if (!selection.isFloating) {
                const layer = layers.find(l => l.id === currentLayerId);
                if (layer) layer.ctx.clearRect(selection.x, selection.y, selection.w, selection.h);
            }
            selection.active = false;
            selection.isFloating = false;
            previewCtx.clearRect(0, 0, CANVAS_WIDTH, CANVAS_HEIGHT);
            saveState();
        }

        function finalizeSelection() {
            if (!selection.active) return;
            if (selection.isFloating && selection.canvas) {
                const layer = layers.find(l => l.id === currentLayerId);
                if (layer) {
                    layer.ctx.imageSmoothingEnabled = isAntiAlias;
                    layer.ctx.drawImage(selection.canvas, selection.x, selection.y);
                }
            }
            selection.active = false;
            selection.isFloating = false;
            previewCtx.clearRect(0, 0, CANVAS_WIDTH, CANVAS_HEIGHT);
            saveState();
        }

        // --- レイヤー管理ロジック ---
        function addLayer(name = null) {
            const id = `layer_${layerCounter++}`;
            const zIndex = layers.length;
            
            const canvas = document.createElement('canvas');
            canvas.id = id;
            canvas.width = CANVAS_WIDTH;
            canvas.height = CANVAS_HEIGHT;
            canvas.style.zIndex = zIndex;
            canvas.style.imageRendering = isAntiAlias ? 'auto' : 'pixelated';
            
            const ctx = canvas.getContext('2d', { willReadFrequently: true });
            ctx.imageSmoothingEnabled = isAntiAlias;

            canvasWrapper.insertBefore(canvas, previewCanvas);

            const layerObj = {
                id: id,
                name: name || `レイヤー ${layerCounter}`,
                canvas: canvas,
                ctx: ctx,
                visible: true
            };

            layers.push(layerObj);
            selectLayer(id);
            renderLayerPanel();
            
            if(layers.length > 1) { 
                saveState();
            }
            return layerObj;
        }

        function selectLayer(id) {
            currentLayerId = id;
            renderLayerPanel();
        }

        function toggleLayerVisibility(id, event) {
            event.stopPropagation();
            const layer = layers.find(l => l.id === id);
            if (layer) {
                layer.visible = !layer.visible;
                layer.canvas.style.display = layer.visible ? 'block' : 'none';
                renderLayerPanel();
            }
        }

        function deleteLayer(id, event) {
            event.stopPropagation();
            if (layers.length <= 1) {
                alert("最後のレイヤーは削除できません。");
                return;
            }
            const layerIndex = layers.findIndex(l => l.id === id);
            if (layerIndex !== -1) {
                const layer = layers[layerIndex];
                canvasWrapper.removeChild(layer.canvas);
                layers.splice(layerIndex, 1);
                
                if (currentLayerId === id) {
                    selectLayer(layers[layers.length - 1].id);
                }
                renderLayerPanel();
                saveState();
            }
        }

        function renderLayerPanel() {
            layerListEl.innerHTML = '';
            for (let i = layers.length - 1; i >= 0; i--) {
                const layer = layers[i];
                layer.canvas.style.zIndex = i; 

                const item = document.createElement('div');
                item.className = `layer-item ${layer.id === currentLayerId ? 'active' : ''}`;
                item.onclick = () => selectLayer(layer.id);

                const visibilityBtn = document.createElement('button');
                visibilityBtn.innerText = layer.visible ? '👁️' : 'ー';
                visibilityBtn.onclick = (e) => toggleLayerVisibility(layer.id, e);

                const nameInput = document.createElement('input');
                nameInput.type = 'text';
                nameInput.value = layer.name;
                nameInput.onclick = (e) => e.stopPropagation();
                nameInput.onchange = (e) => { layer.name = e.target.value; };

                const deleteBtn = document.createElement('button');
                deleteBtn.innerText = '✖';
                deleteBtn.onclick = (e) => deleteLayer(layer.id, e);

                const controls = document.createElement('div');
                controls.className = 'layer-controls';
                controls.appendChild(visibilityBtn);
                controls.appendChild(deleteBtn);

                item.appendChild(nameInput);
                item.appendChild(controls);
                layerListEl.appendChild(item);
            }
        }

        function getCurrentContext() {
            const layer = layers.find(l => l.id === currentLayerId);
            return layer ? layer.ctx : null;
        }

        // --- 新規作成・キャンバス変形・解像度変更モジュール ---
        function createNewCanvas() {
            if (!confirm("現在のデータは破棄されます。よろしいですか？")) return;
            const w = prompt("新規キャンバスの幅（ピクセル）を入力してください:", CANVAS_WIDTH);
            if (!w || isNaN(w) || w <= 0) return;
            const h = prompt("新規キャンバスの高さ（ピクセル）を入力してください:", CANVAS_HEIGHT);
            if (!h || isNaN(h) || h <= 0) return;

            finalizeSelection();
            CANVAS_WIDTH = Math.floor(Number(w));
            CANVAS_HEIGHT = Math.floor(Number(h));

            historyStack = [];
            redoStack = [];
            layers.forEach(l => canvasWrapper.removeChild(l.canvas));
            layers = [];
            layerCounter = 0;

            previewCanvas.width = CANVAS_WIDTH;
            previewCanvas.height = CANVAS_HEIGHT;
            previewCanvas.style.imageRendering = isAntiAlias ? 'auto' : 'pixelated';
            previewCtx.imageSmoothingEnabled = isAntiAlias;

            addLayer('レイヤー 1');
            setZoom(currentZoom);
            saveState();
        }

        function executeResize(newW, newH, offsetX = 0, offsetY = 0) {
            newW = Math.floor(newW);
            newH = Math.floor(newH);
            
            layers.forEach(layer => {
                const tempCanvas = document.createElement('canvas');
                tempCanvas.width = layer.canvas.width;
                tempCanvas.height = layer.canvas.height;
                tempCanvas.getContext('2d').drawImage(layer.canvas, 0, 0);
                
                layer.canvas.width = newW;
                layer.canvas.height = newH;
                layer.canvas.style.imageRendering = isAntiAlias ? 'auto' : 'pixelated';
                layer.ctx.imageSmoothingEnabled = isAntiAlias;
                
                layer.ctx.drawImage(tempCanvas, -offsetX, -offsetY);
            });
            
            CANVAS_WIDTH = newW;
            CANVAS_HEIGHT = newH;
            
            previewCanvas.width = newW;
            previewCanvas.height = newH;
            previewCanvas.style.imageRendering = isAntiAlias ? 'auto' : 'pixelated';
            previewCtx.imageSmoothingEnabled = isAntiAlias;
            
            updateStatusBar();
            setZoom(currentZoom); 
        }

        function resizeCanvasPrompt() {
            const w = prompt("新しい幅（ピクセル）を入力してください:", CANVAS_WIDTH);
            if (!w || isNaN(w)) return;
            const h = prompt("新しい高さ（ピクセル）を入力してください:", CANVAS_HEIGHT);
            if (!h || isNaN(h)) return;
            
            finalizeSelection();
            executeResize(Number(w), Number(h), 0, 0);
            saveState();
        }

        function scaleImagePrompt() {
            const input = prompt("変更後の長辺サイズ（ピクセル）、または倍率（例: *2, /2, x4）を入力してください:");
            if (!input) return;

            let maxSide = Math.max(CANVAS_WIDTH, CANVAS_HEIGHT);
            let newMaxSide = maxSide;
            const val = input.trim();

            if (val.startsWith('*') || val.startsWith('x') || val.startsWith('X')) {
                const multi = parseFloat(val.substring(1));
                if (isNaN(multi) || multi <= 0) return;
                newMaxSide = maxSide * multi;
            } else if (val.startsWith('/')) {
                const div = parseFloat(val.substring(1));
                if (isNaN(div) || div <= 0) return;
                newMaxSide = maxSide / div;
            } else {
                const num = parseFloat(val);
                if (isNaN(num) || num <= 0) return;
                newMaxSide = num;
            }

            const ratioW = CANVAS_WIDTH / maxSide;
            const ratioH = CANVAS_HEIGHT / maxSide;
            const newW = Math.round(newMaxSide * ratioW);
            const newH = Math.round(newMaxSide * ratioH);

            finalizeSelection();
            executeScaleImage(newW, newH);
            saveState();
        }

        function executeScaleImage(newW, newH) {
            const oldW = CANVAS_WIDTH;
            const oldH = CANVAS_HEIGHT;

            layers.forEach(layer => {
                const tempCanvas = document.createElement('canvas');
                tempCanvas.width = oldW;
                tempCanvas.height = oldH;
                tempCanvas.getContext('2d').drawImage(layer.canvas, 0, 0);

                layer.canvas.width = newW;
                layer.canvas.height = newH;
                layer.canvas.style.imageRendering = isAntiAlias ? 'auto' : 'pixelated';
                
                layer.ctx.imageSmoothingEnabled = isAntiAlias;
                layer.ctx.drawImage(tempCanvas, 0, 0, oldW, oldH, 0, 0, newW, newH);
            });

            CANVAS_WIDTH = newW;
            CANVAS_HEIGHT = newH;

            previewCanvas.width = newW;
            previewCanvas.height = newH;
            previewCanvas.style.imageRendering = isAntiAlias ? 'auto' : 'pixelated';
            previewCtx.imageSmoothingEnabled = isAntiAlias;

            updateStatusBar();
            setZoom(currentZoom);
        }

        // --- 画像インポート共通処理 ---
        function handleImageImport(img, fileName) {
            finalizeSelection();
            
            if (historyStack.length <= 1) {
                executeResize(img.width, img.height);
            }
            
            const newLayer = addLayer(fileName || 'Imported Image');
            newLayer.ctx.drawImage(img, 0, 0);
            saveState();
        }

        // --- クリップボード モジュール ---
        async function copyToClipboard() {
            try {
                const tempCanvas = document.createElement('canvas');
                tempCanvas.width = CANVAS_WIDTH;
                tempCanvas.height = CANVAS_HEIGHT;
                const tCtx = tempCanvas.getContext('2d');
                tCtx.imageSmoothingEnabled = isAntiAlias;
                
                layers.forEach(layer => {
                    if (layer.visible) tCtx.drawImage(layer.canvas, 0, 0);
                });
                
                tempCanvas.toBlob(async (blob) => {
                    if (blob) {
                        const item = new ClipboardItem({ 'image/png': blob });
                        await navigator.clipboard.write([item]);
                        alert("システム: 画像をクリップボードにコピーしました。");
                    }
                }, 'image/png');
            } catch (err) {
                alert("システム・エラー: コピーに失敗しました。Safari等の環境設定をご確認ください。");
                console.error(err);
            }
        }

        async function pasteFromClipboard() {
            try {
                const items = await navigator.clipboard.read();
                for (const item of items) {
                    if (item.types.includes('image/png') || item.types.includes('image/jpeg')) {
                        const type = item.types.includes('image/png') ? 'image/png' : 'image/jpeg';
                        const blob = await item.getType(type);
                        const img = new Image();
                        img.onload = () => handleImageImport(img, 'Pasted Image');
                        img.src = URL.createObjectURL(blob);
                        return;
                    }
                }
                alert("システム: クリップボードに有効な画像データがありません。");
            } catch (err) {
                alert("システム・エラー: 貼り付けに失敗しました。iPadの設定でクリップボード許可をご確認ください。");
                console.error(err);
            }
        }

        // --- 画像読み込みモジュール ---
        function loadImageAsLayer(event) {
            const file = event.target.files[0];
            if (!file) return;

            event.target.value = '';

            if (!file.type.match('image.*')) {
                alert("システム: 画像ファイルを選択してください。");
                return;
            }

            const reader = new FileReader();
            reader.onload = function(e) {
                const img = new Image();
                img.onload = () => handleImageImport(img, file.name);
                img.src = e.target.result;
            };
            reader.readAsDataURL(file);
        }

        // --- エクスポート モジュール ---
        function exportImage(format) {
            finalizeSelection();
            const tempCanvas = document.createElement('canvas');
            tempCanvas.width = CANVAS_WIDTH;
            tempCanvas.height = CANVAS_HEIGHT;
            const tCtx = tempCanvas.getContext('2d');
            tCtx.imageSmoothingEnabled = isAntiAlias;
            
            if (format === 'jpeg' || format === 'bmp') {
                tCtx.fillStyle = '#ffffff'; 
                tCtx.fillRect(0, 0, CANVAS_WIDTH, CANVAS_HEIGHT);
            }
            
            layers.forEach(layer => {
                if (layer.visible) tCtx.drawImage(layer.canvas, 0, 0);
            });
            
            const mimeType = `image/${format}`;
            const dataUrl = tempCanvas.toDataURL(mimeType);
            
            const a = document.createElement('a');
            a.href = dataUrl;
            a.download = `KITT_Export_${new Date().getTime()}.${format === 'jpeg' ? 'jpg' : format}`;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
        }

        // --- Undo / Redo 機能 ---
        function getSnapshot() {
            return layers.map(layer => ({
                id: layer.id,
                name: layer.name,
                visible: layer.visible,
                dataURL: layer.canvas.toDataURL()
            }));
        }

        function saveState() {
            const state = {
                width: CANVAS_WIDTH,
                height: CANVAS_HEIGHT,
                layers: getSnapshot()
            };
            historyStack.push(state);
            if (historyStack.length > MAX_HISTORY) {
                historyStack.shift();
            }
            redoStack = []; 
            updateStatusBar();
        }

        function restoreState(state) {
            CANVAS_WIDTH = state.width;
            CANVAS_HEIGHT = state.height;
            canvasWrapper.style.width = (CANVAS_WIDTH * currentZoom) + 'px';
            canvasWrapper.style.height = (CANVAS_HEIGHT * currentZoom) + 'px';
            previewCanvas.width = CANVAS_WIDTH;
            previewCanvas.height = CANVAS_HEIGHT;
            previewCanvas.style.imageRendering = isAntiAlias ? 'auto' : 'pixelated';
            previewCtx.imageSmoothingEnabled = isAntiAlias;

            layers.forEach(l => canvasWrapper.removeChild(l.canvas));
            layers = [];
            
            let loadedCount = 0;
            const totalLayers = state.layers.length;

            state.layers.forEach((layerData, index) => {
                const canvas = document.createElement('canvas');
                canvas.id = layerData.id;
                canvas.width = CANVAS_WIDTH;
                canvas.height = CANVAS_HEIGHT;
                canvas.style.zIndex = index;
                canvas.style.display = layerData.visible ? 'block' : 'none';
                canvas.style.imageRendering = isAntiAlias ? 'auto' : 'pixelated';
                
                const ctx = canvas.getContext('2d', { willReadFrequently: true });
                ctx.imageSmoothingEnabled = isAntiAlias;
                
                canvasWrapper.insertBefore(canvas, previewCanvas);

                const layerObj = {
                    id: layerData.id,
                    name: layerData.name,
                    canvas: canvas,
                    ctx: ctx,
                    visible: layerData.visible
                };
                layers.push(layerObj);

                const img = new Image();
                img.onload = () => {
                    ctx.drawImage(img, 0, 0);
                    loadedCount++;
                    if (loadedCount === totalLayers) {
                        const prevSelectedExists = layers.some(l => l.id === currentLayerId);
                        if (!prevSelectedExists) {
                            currentLayerId = layers[layers.length - 1].id;
                        }
                        renderLayerPanel();
                    }
                };
                img.src = layerData.dataURL;
            });

            layerCounter = Math.max(layerCounter, ...state.layers.map(s => parseInt(s.id.split('_')[1] || 0))) + 1;
            updateStatusBar();
        }

        function undo() {
            finalizeSelection();
            if (historyStack.length > 1) {
                const currentState = historyStack.pop();
                redoStack.push(currentState);
                const previousState = historyStack[historyStack.length - 1];
                restoreState(previousState);
            }
        }

        function redo() {
            finalizeSelection();
            if (redoStack.length > 0) {
                const nextState = redoStack.pop();
                historyStack.push(nextState);
                restoreState(nextState);
            }
        }

        // --- Save / Load 機能 ---
        function saveProject() {
            finalizeSelection();
            const projectData = {
                version: '2.8',
                width: CANVAS_WIDTH,
                height: CANVAS_HEIGHT,
                layers: getSnapshot()
            };
            
            const jsonStr = JSON.stringify(projectData);
            const blob = new Blob([jsonStr], { type: "application/json" });
            const url = URL.createObjectURL(blob);
            
            const a = document.createElement('a');
            a.href = url;
            a.download = `KITT_PixelProject_${new Date().getTime()}.json`;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        }

        function loadProject(event) {
            finalizeSelection();
            const file = event.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    const projectData = JSON.parse(e.target.result);
                    if (projectData.layers && Array.isArray(projectData.layers)) {
                        historyStack = [];
                        redoStack = [];
                        
                        const stateToRestore = {
                            width: projectData.width || 800,
                            height: projectData.height || 600,
                            layers: projectData.layers
                        };
                        restoreState(stateToRestore);
                        
                        setTimeout(() => { saveState(); }, 500); 
                    } else {
                        alert("データ形式が正しくありません。");
                    }
                } catch (err) {
                    alert("ファイルの読み込み中にエラーが発生しました。");
                    console.error(err);
                }
            };
            reader.readAsText(file);
            event.target.value = '';
        }

        // --- システム起動 ---
        window.onload = init;

    </script>
</body>
