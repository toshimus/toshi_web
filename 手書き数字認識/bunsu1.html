<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>たのしい すうじ＆けいさん アプリ</title>
  <style>
    * {
      box-sizing: border-box;
      touch-action: manipulation;
      user-select: none;
      -webkit-user-select: none;
    }

    body {
      margin: 0;
      padding: 0;
      font-family: "Hiragino Kaku Gothic ProN", "メイリオ", sans-serif;
      background-color: #f0f8ff;
      color: #333;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      overflow: hidden;
    }

    .container {
      width: 95vw;
      max-width: 900px;
      height: 96vh;
      background: #ffffff;
      border-radius: 24px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.1);
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 20px;
      position: relative;
      overflow: hidden;
    }

    /* 画面切り替え */
    .screen {
      display: none;
      width: 100%;
      height: 100%;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      overflow-y: auto;
      overflow-x: hidden;
      padding-bottom: 20px;
    }

    .screen.active {
      display: flex;
    }

    /* 画面を左右に分けるレイアウト (学習画面用) */
    .layout-row {
      display: flex;
      flex-direction: row;
      width: 100%;
      flex: 1;
      gap: 20px;
      align-items: stretch;
      justify-content: space-evenly;
    }

    .col {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      flex: 1;
      width: 100%;
    }

    @media (max-width: 768px) {
      .layout-row {
        flex-direction: column;
        justify-content: flex-start;
      }
    }

    /* タイトル & スタート */
    h1 { font-size: 2.2rem; color: #ff6b6b; margin-top: 20px; margin-bottom: 10px; text-align: center; }
    .start-icon { font-size: 5rem; margin: 10px 0; }

    .btn {
      background-color: #4ecdc4;
      color: white;
      font-size: 1.2rem;
      font-weight: bold;
      border: none;
      padding: 12px 24px;
      border-radius: 50px;
      cursor: pointer;
      box-shadow: 0 6px 0 #38b2ac;
      transition: all 0.1s;
      margin: 8px 0;
      width: 100%;
      max-width: 280px;
    }

    .btn:active { transform: translateY(4px); box-shadow: 0 2px 0 #38b2ac; }
    .btn-action { background-color: #ff8e53; box-shadow: 0 6px 0 #e07038; }
    .btn-action:active { box-shadow: 0 2px 0 #e07038; }
    .btn-secondary { background-color: #a0aec0; box-shadow: 0 6px 0 #718096; }
    .btn-secondary:active { box-shadow: 0 2px 0 #718096; }
    .btn-success { background-color: #38a169; box-shadow: 0 6px 0 #276749; }
    .btn-success:active { box-shadow: 0 2px 0 #276749; }

    /* 問題画面 */
    .quiz-container {
      width: 100%;
      max-width: 400px;
      display: flex;
      flex-direction: column;
      align-items: center;
      margin-top: 20px;
    }

    .progress-bar { width: 100%; background: #eee; border-radius: 10px; height: 12px; overflow: hidden; margin-bottom: 5px; }
    .progress-fill { height: 100%; background: #4ecdc4; width: 10%; transition: width 0.3s ease; }
    .question-header { font-size: 1.2rem; color: #666; font-weight: bold; }
    .question-box {
      font-size: 1.8rem; font-weight: bold; color: #2d3748; background: #edf2f7;
      padding: 16px 20px; border-radius: 16px; margin: 10px 0 20px 0; text-align: center;
      width: 100%; display: flex; align-items: center; justify-content: center; gap: 10px;
    }

    /* 教科書風 分数表示のCSS */
    .fraction {
      display: inline-flex; flex-direction: column; align-items: center;
      justify-content: center; vertical-align: middle; line-height: 1.2; margin: 0 8px;
    }
    .fraction .num { border-bottom: 3px solid #2d3748; padding: 0 6px; }
    .fraction .den { padding: 0 6px; }

    /* キャンバス共通 */
    .canvas-container { position: relative; touch-action: none; margin: 10px 0; }
    canvas {
      border: 4px dashed #cbd5e0;
      border-radius: 16px;
      background-color: #fafafa;
      touch-action: none;
      /* ここに赤色の十字カーソル（SVG）を指定します */
      cursor: url('data:image/svg+xml;charset=utf-8,%3Csvg xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22 width%3D%2232%22 height%3D%2232%22%3E%3Cpath d%3D%22M16 0v32M0 16h32%22 stroke%3D%22red%22 stroke-width%3D%222%22%2F%3E%3C%2Fsvg%3E') 16 16, crosshair;
    }
    .canvas-tools { position: absolute; right: -60px; top: 10px; }
    .btn-clear { background: #e53e3e; color: white; border: none; border-radius: 12px; padding: 8px 12px; font-size: 0.9rem; font-weight: bold; cursor: pointer; }

    /* フィードバック領域 */
    .feedback-overlay {
      position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255,255,255,0.95);
      border-radius: 24px; display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 10;
    }
    .feedback-overlay.active { display: flex; }
    .feedback-msg { font-size: 3rem; font-weight: bold; margin-bottom: 20px; text-align: center;}
    .correct { color: #38a169; }
    .wrong { color: #e53e3e; }

    /* 学習モード画面用 */
    .train-selector { font-size: 1.5rem; padding: 6px; border-radius: 8px; border: 2px solid #cbd5e0; margin-bottom: 5px; font-weight: bold; width: 100%; text-align: center; }
    .data-tools { display: flex; gap: 10px; width: 100%; max-width: 280px; margin: 4px 0; }
    .btn-half { flex: 1; font-size: 1rem; padding: 10px; margin: 0; }

    /* データプレビュー(モーダル) */
    .preview-modal { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); border-radius: 24px; display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 20; padding: 20px; }
    .preview-modal.active { display: flex; }
    .preview-content { background: #fff; width: 100%; height: 100%; border-radius: 16px; padding: 16px; display: flex; flex-direction: column; }
    .preview-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; border-bottom: 2px solid #edf2f7; padding-bottom: 10px; }
    .preview-header h3 { margin: 0; color: #2d3748; }
    .btn-close-modal { background: #cbd5e0; border: none; border-radius: 50%; width: 36px; height: 36px; font-size: 1.2rem; cursor: pointer; font-weight: bold; }
    .preview-grid { flex: 1; overflow-y: auto; display: grid; grid-template-columns: repeat(auto-fill, minmax(80px, 1fr)); gap: 12px; padding-bottom: 20px; }
    .preview-item { display: flex; flex-direction: column; align-items: center; background: #f7fafc; border: 2px solid #e2e8f0; border-radius: 12px; padding: 8px; }
    .preview-item canvas { border: 1px solid #cbd5e0; border-radius: 4px; background: #fff; width: 48px; height: 48px; cursor: default; }
    .preview-item-title { font-weight: bold; margin: 6px 0; color: #4a5568; }
    .btn-delete-item { background: #fc8181; color: white; border: none; border-radius: 8px; padding: 4px 12px; font-size: 0.8rem; cursor: pointer; font-weight: bold; }
  </style>
</head>
<body>

<div class="container">

  <!-- 1. スタート画面 -->
  <div id="start-screen" class="screen active" style="justify-content: center;">
    <h1>たのしい すうじ＆けいさん</h1>
    <div class="start-icon">✏️</div>
    <p style="font-size: 1.2rem; color: #718096; text-align: center; margin-bottom: 20px;">
      2けたの すうじ や ぶんすう にも<br>たいおう したよ！
    </p>
    <button class="btn btn-action" onclick="startGame()" style="font-size: 1.4rem; padding: 16px;">▶️ スタート！</button>
    <button class="btn btn-secondary" onclick="showScreen('train-screen')" style="margin-top: 20px;">🧠 じぶんの字を学習させる</button>
  </div>

  <!-- 2. 学習(トレーニング)画面 -->
  <div id="train-screen" class="screen">
    <h2 style="color: #4a5568; margin-bottom: 5px; font-size: 1.5rem; text-align: center;">パターンを おぼえさせる</h2>
    <p style="color: #718096; text-align: center; margin-top: 0; font-size: 0.9rem;">どのすうじを登録するか選んで下にかいてね。</p>
    
    <div class="layout-row">
      <div class="col">
        <select id="train-digit-select" class="train-selector">
          <option value="0">0 (ゼロ)</option><option value="1">1 (いち)</option>
          <option value="2">2 (に)</option><option value="3">3 (さん)</option>
          <option value="4">4 (よん)</option><option value="5">5 (ご)</option>
          <option value="6">6 (ろく)</option><option value="7">7 (なな)</option>
          <option value="8">8 (はち)</option><option value="9">9 (きゅう)</option>
        </select>
        <div class="canvas-container">
          <canvas id="train-canvas" width="220" height="220"></canvas>
          <div class="canvas-tools">
            <button class="btn-clear" onclick="clearCanvas(trainCtx, trainCanvas)">けす</button>
          </div>
        </div>
        <button class="btn btn-action" onclick="savePattern()">📝 この字を一時登録する</button>
      </div>
      
      <div class="col">
        <button class="btn btn-secondary" onclick="openPreviewModal()">👀 登録データを見る・整理</button>
        <button class="btn btn-success" onclick="saveToLocalStorage()">💾 ブラウザに保存</button>
        
        <div class="data-tools">
          <button class="btn btn-secondary btn-half" onclick="exportData()">📤 書き出す</button>
          <button class="btn btn-secondary btn-half" onclick="document.getElementById('import-file').click()">📥 読み込む</button>
          <input type="file" id="import-file" style="display: none;" accept=".json" onchange="importData(event)">
        </div>
        <button class="btn btn-secondary" style="margin-top: 15px;" onclick="showScreen('start-screen')">🔙 もどる</button>
      </div>
    </div>

    <!-- データプレビュー用モーダル -->
    <div id="preview-modal" class="preview-modal">
      <div class="preview-content">
        <div class="preview-header">
          <h3>登録データ一覧</h3>
          <button class="btn-close-modal" onclick="closePreviewModal()">×</button>
        </div>
        <div id="preview-grid" class="preview-grid"></div>
      </div>
    </div>
  </div>

  <!-- 3. 問題画面 -->
  <div id="quiz-screen" class="screen">
    <div class="quiz-container">
      <div style="width:100%;">
        <div class="progress-bar"><div id="progress-fill" class="progress-fill"></div></div>
        <div style="text-align: right; margin-bottom: 10px;">
          <span id="question-num" class="question-header">だい 1 / 5 もん</span>
        </div>
      </div>

      <!-- 問題文表示エリア -->
      <div id="question-text" class="question-box"></div>
      
      <div class="canvas-container" style="margin: 0;">
        <!-- heightを400に変更して縦長にします -->
        <canvas id="quiz-canvas" width="320" height="400"></canvas>
        <div class="canvas-tools">
          <button class="btn-clear" onclick="clearCanvas(quizCtx, quizCanvas)">けす</button>
        </div>
      </div>

      <button class="btn btn-action" style="font-size: 1.8rem; padding: 18px; margin-top: 30px; width: 100%;" onclick="checkAnswer()">できた！</button>
    </div>

    <!-- フィードバック -->
    <div id="feedback-overlay" class="feedback-overlay">
      <div id="feedback-msg" class="feedback-msg"></div>
      <div id="recognized-info" class="question-box" style="width: auto; background: none; border: 2px dashed #a0aec0; margin-bottom: 30px;"></div>
      <button id="next-btn" class="btn btn-action" style="display: none; padding: 16px; font-size: 1.4rem;" onclick="nextQuestion()">つぎの問題へ ➔</button>
      <button id="retry-btn" class="btn btn-secondary" style="display: none;" onclick="closeFeedback()">もういちど</button>
    </div>
  </div>

  <!-- 4. 結果画面 -->
  <div id="result-screen" class="screen" style="justify-content: center;">
    <h1 style="color: #ff6b6b; font-size: 2.5rem;">けっか はっぴょう</h1>
    <div style="font-size: 4rem;">🎉</div>
    <p style="font-size: 1.5rem; font-weight: bold; color: #2d3748; margin-bottom: 30px;">ぜんぶ クリア！ すごいね！</p>
    <button class="btn btn-action" onclick="showScreen('start-screen')">ホームへもどる</button>
  </div>

</div>

<script>
  // ==========================================
  // パターンデータ
  // ==========================================
  const RAW_PATTERNS = [
    ["00000000", "00111100", "01100110", "01100110", "01100110", "01100110", "00111100", "00000000"],
    ["00000000", "00011000", "00111000", "00011000", "00011000", "00011000", "00111100", "00000000"],
    ["00000000", "00111100", "01100110", "00000110", "00011100", "01110000", "01111110", "00000000"],
    ["00000000", "00111100", "01100110", "00011100", "00000110", "01100110", "00111100", "00000000"],
    ["00000000", "00001100", "00011100", "00110100", "01100100", "01111111", "00000100", "00000000"],
    ["00000000", "01111110", "01100000", "01111100", "00000110", "01100110", "00111100", "00000000"],
    ["00000000", "00111100", "01100000", "01111100", "01100110", "01100110", "00111100", "00000000"],
    ["00000000", "01111110", "00000110", "00001100", "00011000", "00110000", "01100000", "00000000"],
    ["00000000", "00111100", "01100110", "00111100", "01100110", "01100110", "00111100", "00000000"],
    ["00000000", "00111100", "01100110", "01100110", "00111110", "00000110", "00111100", "00000000"]
  ];

  let KNOWN_PATTERNS = [];
  for (let d = 0; d < 10; d++) {
    KNOWN_PATTERNS.push({ digit: d, pattern: RAW_PATTERNS[d].join('').split('').map(Number) });
  }

  // ==========================================
  // ストレージ・ファイル入出力
  // ==========================================
  const STORAGE_KEY = 'tegaki_patterns_v1';

  function loadFromLocalStorage() {
    const saved = localStorage.getItem(STORAGE_KEY);
    if (saved) {
      try {
        const parsed = JSON.parse(saved);
        if (Array.isArray(parsed) && parsed.length > 0) {
          KNOWN_PATTERNS = parsed;
          console.log("保存された学習データを読み込みました");
        }
      } catch (e) {
        console.error("学習データの読み込みに失敗しました", e);
      }
    }
  }

  function saveToLocalStorage() {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(KNOWN_PATTERNS));
    alert("学習データをブラウザに保存しました！");
  }

  function exportData() {
    const dataStr = JSON.stringify(KNOWN_PATTERNS);
    const blob = new Blob([dataStr], { type: "application/json" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = "tegaki_data.json";
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
  }

  function importData(event) {
    const file = event.target.files[0];
    if (!file) return;

    const reader = new FileReader();
    reader.onload = function(e) {
      try {
        const parsed = JSON.parse(e.target.result);
        if (Array.isArray(parsed) && parsed.length > 0 && parsed[0].pattern) {
          KNOWN_PATTERNS = parsed;
          saveToLocalStorage();
          alert("ファイルから学習データを読み込みました！");
        } else {
          alert("このファイルは正しい学習データではありません。");
        }
      } catch (err) {
        alert("ファイルの読み込みに失敗しました。");
      }
    };
    reader.readAsText(file);
    event.target.value = "";
  }

  // ==========================================
  // データプレビュー・削除処理
  // ==========================================
  function openPreviewModal() {
    renderPreviewGrid();
    document.getElementById('preview-modal').classList.add('active');
  }

  function closePreviewModal() {
    document.getElementById('preview-modal').classList.remove('active');
  }

  function renderPreviewGrid() {
    const grid = document.getElementById('preview-grid');
    grid.innerHTML = '';

    KNOWN_PATTERNS.forEach((item, index) => {
      const div = document.createElement('div');
      div.className = 'preview-item';

      const cvs = document.createElement('canvas');
      cvs.width = 64;
      cvs.height = 64;
      const ctx = cvs.getContext('2d');
      ctx.fillStyle = '#fff';
      ctx.fillRect(0, 0, 64, 64);
      
      for (let i = 0; i < 64; i++) {
        const val = item.pattern[i];
        if (val > 0) {
          const x = (i % 8) * 8;
          const y = Math.floor(i / 8) * 8;
          ctx.fillStyle = `rgba(45, 55, 72, ${val})`; 
          ctx.fillRect(x, y, 8, 8);
        }
      }
      
      const title = document.createElement('div');
      title.className = 'preview-item-title';
      title.innerText = `数字: ${item.digit}`;

      const delBtn = document.createElement('button');
      delBtn.className = 'btn-delete-item';
      delBtn.innerText = '🗑️ 削除';
      delBtn.onclick = () => { deletePattern(index); };

      div.appendChild(cvs);
      div.appendChild(title);
      div.appendChild(delBtn);
      grid.appendChild(div);
    });
  }

  function deletePattern(index) {
    if(confirm(`「${KNOWN_PATTERNS[index].digit}」のデータを削除しますか？`)) {
      KNOWN_PATTERNS.splice(index, 1);
      localStorage.setItem(STORAGE_KEY, JSON.stringify(KNOWN_PATTERNS));
      renderPreviewGrid(); 
    }
  }

  // ==========================================
  // 問題データ (複数桁と分数に対応)
  // ==========================================
  const QUESTIONS = [
    { type: "number", val: 12, html: "「 12 」を かきなさい" },
    { type: "fraction", num: 1, den: 2, html: '「 <div class="fraction"><span class="num">1</span><span class="den">2</span></div> 」を かきなさい' },
    { type: "number", val: 100, html: "「 100 」を かきなさい" },
    { type: "fraction", num: 3, den: 4, html: '「 <div class="fraction"><span class="num">3</span><span class="den">4</span></div> 」を かきなさい' },
    { type: "fraction", num: 10, den: 25, html: '「 <div class="fraction"><span class="num">10</span><span class="den">25</span></div> 」を かきなさい' }
  ];

  let currentQuestionIndex = 0;
  let quizCanvas, quizCtx;
  let trainCanvas, trainCtx;
  let drawnStrokes = []; // 描かれたすべての線(ストローク)を保存

  window.onload = () => {
    loadFromLocalStorage();

    quizCanvas = document.getElementById('quiz-canvas');
    quizCtx = quizCanvas.getContext('2d');
    initCanvasEvents(quizCanvas, quizCtx, 24, true);// ← ここの 28 が線の太さです

    trainCanvas = document.getElementById('train-canvas');
    trainCtx = trainCanvas.getContext('2d');
    initCanvasEvents(trainCanvas, trainCtx, 24, false);// ← ここの 28 が線の太さです
  };

  // ==========================================
  // 画面・ゲーム制御
  // ==========================================
  function showScreen(id) {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    document.getElementById(id).classList.add('active');
  }

  function startGame() {
    currentQuestionIndex = 0;
    showScreen('quiz-screen');
    loadQuestion();
  }

  function loadQuestion() {
    const q = QUESTIONS[currentQuestionIndex];
    document.getElementById('question-num').innerText = `だい ${currentQuestionIndex + 1} / ${QUESTIONS.length} もん`;
    document.getElementById('question-text').innerHTML = q.html;
    document.getElementById('progress-fill').style.width = `${((currentQuestionIndex + 1) / QUESTIONS.length) * 100}%`;
    clearCanvas(quizCtx, quizCanvas);
    closeFeedback();
  }

  // ==========================================
  // キャンバス・描画処理
  // ==========================================
  function initCanvasEvents(cvs, ctx, lineWidth, trackStrokes) {
    ctx.lineWidth = lineWidth;
    ctx.lineCap = 'round';
    ctx.lineJoin = 'round';
    ctx.strokeStyle = '#2d3748';

    let isDrawing = false;
    let currentStroke = [];

    const getPos = (e) => {
      const rect = cvs.getBoundingClientRect();
      const clientX = e.touches ? e.touches[0].clientX : e.clientX;
      const clientY = e.touches ? e.touches[0].clientY : e.clientY;
      return { x: clientX - rect.left, y: clientY - rect.top };
    };

    const startDraw = (e) => {
      e.preventDefault();
      isDrawing = true;
      const pos = getPos(e);
      if (trackStrokes) currentStroke = [pos];
      ctx.beginPath();
      ctx.moveTo(pos.x, pos.y);
    };

    const draw = (e) => {
      if (!isDrawing) return;
      e.preventDefault();
      const pos = getPos(e);
      if (trackStrokes) currentStroke.push(pos);
      ctx.lineTo(pos.x, pos.y);
      ctx.stroke();
    };

    const stopDraw = () => {
      if (isDrawing) {
        if (trackStrokes) drawnStrokes.push(currentStroke);
        isDrawing = false;
      }
    };

    cvs.addEventListener('mousedown', startDraw);
    cvs.addEventListener('mousemove', draw);
    cvs.addEventListener('mouseup', stopDraw);
    cvs.addEventListener('mouseleave', stopDraw);
    cvs.addEventListener('touchstart', startDraw, { passive: false });
    cvs.addEventListener('touchmove', draw, { passive: false });
    cvs.addEventListener('touchend', stopDraw);
  }

  function clearCanvas(context, cvs) {
    context.clearRect(0, 0, cvs.width, cvs.height);
    if (cvs.id === 'quiz-canvas') {
      drawnStrokes = [];
    }
  }

  // ==========================================
  // 特徴抽出（余白カット＆8x8リサイズ処理）
  // ==========================================
  function extractFeatures(context, cvs) {
    const imgData = context.getImageData(0, 0, cvs.width, cvs.height);
    const data = imgData.data;
    let minX = cvs.width, minY = cvs.height, maxX = 0, maxY = 0;
    let hasPixel = false;

    for (let y = 0; y < cvs.height; y++) {
      for (let x = 0; x < cvs.width; x++) {
        if (data[(y * cvs.width + x) * 4 + 3] > 30) {
          hasPixel = true;
          if (x < minX) minX = x;
          if (x > maxX) maxX = x;
          if (y < minY) minY = y;
          if (y > maxY) maxY = y;
        }
      }
    }

    if (!hasPixel) return null;

    const boxW = maxX - minX + 1;
    const boxH = maxY - minY + 1;
    const maxDim = Math.max(boxW, boxH);

    const offCanvas = document.createElement('canvas');
    offCanvas.width = maxDim;
    offCanvas.height = maxDim;
    const offCtx = offCanvas.getContext('2d');
    
    const offsetX = (maxDim - boxW) / 2;
    const offsetY = (maxDim - boxH) / 2;
    offCtx.drawImage(cvs, minX, minY, boxW, boxH, offsetX, offsetY, boxW, boxH);

    const smallCanvas = document.createElement('canvas');
    smallCanvas.width = 8;
    smallCanvas.height = 8;
    const smallCtx = smallCanvas.getContext('2d');
    
    smallCtx.drawImage(offCanvas, 0, 0, maxDim, maxDim, 1, 1, 6, 6);

    const smallData = smallCtx.getImageData(0, 0, 8, 8).data;
    const X = [];
    for (let i = 0; i < 64; i++) {
      X.push(smallData[i * 4 + 3] / 255.0);
    }
    return X;
  }

  // ==========================================
  // 手書き学習 (トレーニング画面用)
  // ==========================================
  function savePattern() {
    const X = extractFeatures(trainCtx, trainCanvas);
    if (!X) {
      alert("すうじが かかれていません！");
      return;
    }
    const digitToTrain = parseInt(document.getElementById('train-digit-select').value, 10);
    
    KNOWN_PATTERNS.push({ digit: digitToTrain, pattern: X });
    
    alert(`「${digitToTrain}」の新しいかたちを 一時的に登録しました！\nずっと残したい場合は「ブラウザに保存」を押してください。`);
    clearCanvas(trainCtx, trainCanvas);
  }

  // ==========================================
  // 解析・認識ロジック (複数桁＆分数対応)
  // ==========================================
  function analyzeStrokes() {
    if (drawnStrokes.length === 0) return null;

    let strokeBoxes = drawnStrokes.map(st => {
      let xs = st.map(p => p.x);
      let ys = st.map(p => p.y);
      return {
        minX: Math.min(...xs), maxX: Math.max(...xs),
        minY: Math.min(...ys), maxY: Math.max(...ys),
        stroke: st
      };
    });

    let barIndex = -1;
    let maxAspect = 0;
    for (let i = 0; i < strokeBoxes.length; i++) {
      let box = strokeBoxes[i];
      let w = box.maxX - box.minX;
      let h = (box.maxY - box.minY) || 1; 
      if (w > 50 && (w / h) > 3.0) { 
        if ((w / h) > maxAspect) {
          maxAspect = w / h;
          barIndex = i;
        }
      }
    }

    if (barIndex !== -1) {
      let barBox = strokeBoxes[barIndex];
      let barCenterY = (barBox.minY + barBox.maxY) / 2;

      let topBoxes = strokeBoxes.filter((b, i) => i !== barIndex && b.maxY < barCenterY + 30);
      let bottomBoxes = strokeBoxes.filter((b, i) => i !== barIndex && b.minY > barCenterY - 30);

      let numStr = recognizeDigitGroup(topBoxes);
      let denStr = recognizeDigitGroup(bottomBoxes);
      
      if (!numStr || !denStr) return null;
      return { type: 'fraction', num: parseInt(numStr), den: parseInt(denStr) };

    } else {
      let valStr = recognizeDigitGroup(strokeBoxes);
      if (!valStr) return null;
      return { type: 'number', val: parseInt(valStr) };
    }
  }

  function recognizeDigitGroup(boxes) {
    if (boxes.length === 0) return "";
    boxes.sort((a, b) => a.minX - b.minX);

    let groups = [];
    for (let b of boxes) {
      let merged = false;
      for (let g of groups) {
        if (!(b.minX > g.maxX + 25 || b.maxX < g.minX - 25)) {
          g.minX = Math.min(g.minX, b.minX);
          g.maxX = Math.max(g.maxX, b.maxX);
          g.minY = Math.min(g.minY, b.minY);
          g.maxY = Math.max(g.maxY, b.maxY);
          g.strokes.push(b.stroke);
          merged = true;
          break;
        }
      }
      if (!merged) {
        groups.push({ minX: b.minX, maxX: b.maxX, minY: b.minY, maxY: b.maxY, strokes: [b.stroke] });
      }
    }

    let result = "";
    for (let g of groups) {
      let digit = predictSingleCharacter(g.strokes);
      if (digit !== null) result += digit;
    }
    return result;
  }

  function predictSingleCharacter(strokesGroup) {
    let offCvs = document.createElement('canvas');
    offCvs.width = quizCanvas.width;
    offCvs.height = quizCanvas.height;
    let offCtx = offCvs.getContext('2d');
    
    offCtx.lineWidth = 28;
    offCtx.lineCap = 'round';
    offCtx.lineJoin = 'round';
    offCtx.strokeStyle = '#2d3748';

    for (let st of strokesGroup) {
      offCtx.beginPath();
      offCtx.moveTo(st[0].x, st[0].y);
      for (let i = 1; i < st.length; i++) {
        offCtx.lineTo(st[i].x, st[i].y);
      }
      offCtx.stroke();
    }

    let X = extractFeatures(offCtx, offCvs);
    if (!X) return null;
    return matchPattern(X);
  }

  function matchPattern(X) {
    let minDistance = Infinity;
    let bestDigit = 0;

    for (let i = 0; i < KNOWN_PATTERNS.length; i++) {
      let distance = 0;
      let patternData = KNOWN_PATTERNS[i].pattern;
      let targetDigit = KNOWN_PATTERNS[i].digit;

      for (let j = 0; j < 64; j++) {
        let diff = X[j] - patternData[j];
        distance += diff * diff;
      }

      if (distance < minDistance) {
        minDistance = distance;
        bestDigit = targetDigit;
      }
    }
    return bestDigit;
  }

  // ==========================================
  // ゲーム判定ロジック
  // ==========================================
  function checkAnswer() {
    const targetQ = QUESTIONS[currentQuestionIndex];
    const userResult = analyzeStrokes();

    if (userResult === null) {
      alert("すうじが かかれていないか、うまく よみとれませんでした！");
      return;
    }

    let isCorrect = false;
    let infoHtml = "";

    if (userResult.type === "fraction") {
      infoHtml = `<div style="font-size: 1.2rem; color: #718096; margin-bottom: 5px;">あなたのこたえ</div><div class="fraction"><span class="num">${userResult.num}</span><span class="den">${userResult.den}</span></div>`;
      
      if (targetQ.type === "fraction" && targetQ.num === userResult.num && targetQ.den === userResult.den) {
        isCorrect = true;
      }
    } else {
      infoHtml = `<div style="font-size: 1.2rem; color: #718096; margin-bottom: 5px;">あなたのこたえ</div><div>${userResult.val}</div>`;
      
      if (targetQ.type === "number" && targetQ.val === userResult.val) {
        isCorrect = true;
      }
    }

    showFeedback(isCorrect, infoHtml);
  }

  function showFeedback(isCorrect, infoHtml) {
    const overlay = document.getElementById('feedback-overlay');
    const msg = document.getElementById('feedback-msg');
    const info = document.getElementById('recognized-info');
    const nextBtn = document.getElementById('next-btn');
    const retryBtn = document.getElementById('retry-btn');

    overlay.classList.add('active');
    info.innerHTML = infoHtml;

    if (isCorrect) {
      msg.innerHTML = "せいかい！ 🎉";
      msg.className = "feedback-msg correct";
      nextBtn.style.display = "inline-block";
      retryBtn.style.display = "none";
    } else {
      msg.innerHTML = "ざんねん！ 💡";
      msg.className = "feedback-msg wrong";
      nextBtn.style.display = "none";
      retryBtn.style.display = "inline-block";
    }
  }

  function closeFeedback() {
    document.getElementById('feedback-overlay').classList.remove('active');
  }

  function nextQuestion() {
    currentQuestionIndex++;
    if (currentQuestionIndex < QUESTIONS.length) {
      loadQuestion();
    } else {
      showScreen('result-screen');
    }
  }
</script>
