<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>たのしい すうじ＆けいさん アプリ</title>
  <style>
    * {
      box-sizing: border-box;
      touch-action: manipulation;
      user-select: none;
      -webkit-user-select: none;
    }

    body {
      margin: 0;
      padding: 0;
      font-family: "Hiragino Kaku Gothic ProN", "メイリオ", sans-serif;
      background-color: #f0f8ff;
      color: #333;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      overflow: hidden;
    }

    .container {
      width: 90vw;
      max-width: 700px;
      height: 92vh;
      background: #ffffff;
      border-radius: 24px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.1);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: space-between;
      padding: 24px;
      position: relative;
    }

    /* 画面切り替え */
    .screen {
      display: none;
      width: 100%;
      height: 100%;
      flex-direction: column;
      align-items: center;
      justify-content: space-between;
    }

    .screen.active {
      display: flex;
    }

    /* タイトル & スタート */
    h1 {
      font-size: 2.2rem;
      color: #ff6b6b;
      margin-top: 40px;
      text-align: center;
    }

    .start-icon {
      font-size: 5rem;
      margin: 20px 0;
    }

    .btn {
      background-color: #4ecdc4;
      color: white;
      font-size: 1.6rem;
      font-weight: bold;
      border: none;
      padding: 16px 48px;
      border-radius: 50px;
      cursor: pointer;
      box-shadow: 0 6px 0 #38b2ac;
      transition: all 0.1s;
    }

    .btn:active {
      transform: translateY(4px);
      box-shadow: 0 2px 0 #38b2ac;
    }

    .btn-action {
      background-color: #ff8e53;
      box-shadow: 0 6px 0 #e07038;
      width: 80%;
      max-width: 300px;
    }

    .btn-action:active {
      box-shadow: 0 2px 0 #e07038;
    }

    /* 問題画面 */
    .progress-bar {
      width: 100%;
      background: #eee;
      border-radius: 10px;
      height: 16px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      background: #4ecdc4;
      width: 10%;
      transition: width 0.3s ease;
    }

    .question-header {
      font-size: 1.4rem;
      color: #666;
      font-weight: bold;
    }

    .question-box {
      font-size: 2.5rem;
      font-weight: bold;
      color: #2d3748;
      background: #edf2f7;
      padding: 12px 30px;
      border-radius: 16px;
      margin: 10px 0;
      text-align: center;
    }

    /* モード切り替えタブ */
    .mode-tabs {
      display: flex;
      gap: 10px;
      margin-bottom: 10px;
    }

    .tab-btn {
      padding: 8px 16px;
      border-radius: 20px;
      border: 2px solid #4ecdc4;
      background: white;
      color: #4ecdc4;
      font-weight: bold;
      font-size: 1rem;
      cursor: pointer;
    }

    .tab-btn.active {
      background: #4ecdc4;
      color: white;
    }

    /* 解答エリア */
    .answer-area {
      position: relative;
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* キャンバス (手書き) */
    .canvas-container {
      position: relative;
      touch-action: none;
    }

    canvas {
      border: 4px dashed #cbd5e0;
      border-radius: 16px;
      background-color: #fafafa;
      touch-action: none;
      cursor: crosshair;
    }

    .canvas-tools {
      position: absolute;
      right: -60px;
      top: 10px;
    }

    .btn-clear {
      background: #e53e3e;
      color: white;
      border: none;
      border-radius: 12px;
      padding: 8px 12px;
      font-size: 0.9rem;
      font-weight: bold;
      cursor: pointer;
    }

    /* テンキー (計算機) */
    .keypad {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      width: 240px;
    }

    .key-btn {
      background: #f7fafc;
      border: 2px solid #e2e8f0;
      font-size: 1.8rem;
      font-weight: bold;
      padding: 12px;
      border-radius: 12px;
      color: #2d3748;
      cursor: pointer;
    }

    .key-btn:active {
      background: #edf2f7;
    }

    .key-btn.del {
      background: #feb2b2;
      color: #9b2c2c;
      border-color: #fbb6ce;
    }

    .ans-display {
      font-size: 1.2rem;
      margin: 8px 0;
      color: #4a5568;
      height: 1.5em;
    }

    /* フィードバック領域 */
    .feedback-overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(255,255,255,0.95);
      border-radius: 24px;
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 10;
    }

    .feedback-overlay.active {
      display: flex;
    }

    .feedback-msg {
      font-size: 3rem;
      font-weight: bold;
      margin-bottom: 20px;
    }

    .correct { color: #38a169; }
    .wrong { color: #e53e3e; }

    /* 結果画面 */
    .result-title {
      font-size: 2.5rem;
      color: #ff6b6b;
    }

    .score-box {
      font-size: 3.5rem;
      font-weight: bold;
      color: #2b6cb0;
      margin: 20px 0;
    }
  </style>
</head>
<body>

<div class="container">

  <!-- 1. スタート画面 -->
  <div id="start-screen" class="screen active">
    <h1>たのしい すうじ＆けいさん</h1>
    <div class="start-icon">✏️🔢</div>
    <p style="font-size: 1.2rem; color: #718096; text-align: center;">
      てがき や ボタンで<br>すうじを こたえよう！（ぜん10もん）
    </p>
    <button class="btn btn-action" onclick="startGame()">スタート！</button>
  </div>

  <!-- 2. 問題画面 -->
  <div id="quiz-screen" class="screen">
    <div style="width:100%;">
      <div class="progress-bar">
        <div id="progress-fill" class="progress-fill"></div>
      </div>
      <div style="display: flex; justify-content: space-between; align-items: center; margin-top: 8px;">
        <span id="question-num" class="question-header">だい 1 / 10 もん</span>
      </div>
    </div>

    <div id="question-text" class="question-box">「 2 」を かきなさい</div>

    <!-- モード切り替え -->
    <div class="mode-tabs">
      <button id="tab-handwrite" class="tab-btn active" onclick="switchMode('handwrite')">✍️ てがき</button>
      <button id="tab-keypad" class="tab-btn" onclick="switchMode('keypad')">🔢 ボタン</button>
    </div>

    <div class="answer-area">
      <!-- 手書きキャンバスエリア -->
      <div id="handwrite-area">
        <div class="canvas-container">
          <canvas id="hw-canvas" width="220" height="220"></canvas>
          <div class="canvas-tools">
            <button class="btn-clear" onclick="clearCanvas()">けす</button>
          </div>
        </div>
      </div>

      <!-- テンキーエリア -->
      <div id="keypad-area" style="display: none;">
        <div class="keypad">
          <button class="key-btn" onclick="pressKey('1')">1</button>
          <button class="key-btn" onclick="pressKey('2')">2</button>
          <button class="key-btn" onclick="pressKey('3')">3</button>
          <button class="key-btn" onclick="pressKey('4')">4</button>
          <button class="key-btn" onclick="pressKey('5')">5</button>
          <button class="key-btn" onclick="pressKey('6')">6</button>
          <button class="key-btn" onclick="pressKey('7')">7</button>
          <button class="key-btn" onclick="pressKey('8')">8</button>
          <button class="key-btn" onclick="pressKey('9')">9</button>
          <button class="key-btn del" onclick="pressKey('DEL')">⌫</button>
          <button class="key-btn" onclick="pressKey('0')">0</button>
        </div>
      </div>

      <div id="ans-display" class="ans-display">こたえ: <span id="user-input">-</span></div>
    </div>

    <button class="btn btn-action" onclick="checkAnswer()">できた！</button>

    <!-- 正解・不正解オーバーレイ -->
    <div id="feedback-overlay" class="feedback-overlay">
      <div id="feedback-msg" class="feedback-msg"></div>
      <p id="recognized-info" style="font-size: 1.2rem; color: #4a5568; margin-bottom: 20px;"></p>
      <button id="next-btn" class="btn" style="display: none;" onclick="nextQuestion()">つぎの問題へ ➔</button>
      <button id="retry-btn" class="btn" style="background-color: #a0aec0; display: none;" onclick="closeFeedback()">もういちど</button>
    </div>
  </div>

  <!-- 3. 結果画面 -->
  <div id="result-screen" class="screen">
    <h1 class="result-title">けっか はっぴょう</h1>
    <div style="font-size: 4rem;">🎉</div>
    <div class="score-box" id="final-score">10 / 10</div>
    <p style="font-size: 1.5rem; font-weight: bold; color: #2d3748;">ぜんぶ クリア！ すごいね！</p>
    <button class="btn btn-action" onclick="startGame()">もう一度あそぶ</button>
  </div>

</div>

    } else {
      updateDisplay("てがき");
    }
  }

  // キャンバス描画関連 (タッチ/マウス両対応)
  function initCanvasEvents() {
    ctx.lineWidth = 14;
    ctx.lineCap = 'round';
    ctx.lineJoin = 'round';
    ctx.strokeStyle = '#2d3748';

    const getPos = (e) => {
      const rect = canvas.getBoundingClientRect();
      const clientX = e.touches ? e.touches[0].clientX : e.clientX;
      const clientY = e.touches ? e.touches[0].clientY : e.clientY;
      return {
        x: clientX - rect.left,
        y: clientY - rect.top
      };
    };

    const startDraw = (e) => {
      e.preventDefault();
      isDrawing = true;
      const pos = getPos(e);
      ctx.beginPath();
      ctx.moveTo(pos.x, pos.y);
    };

    const draw = (e) => {
      if (!isDrawing) return;
      e.preventDefault();
      const pos = getPos(e);
      ctx.lineTo(pos.x, pos.y);
      ctx.stroke();
    };

    const stopDraw = () => { isDrawing = false; };

    canvas.addEventListener('mousedown', startDraw);
    canvas.addEventListener('mousemove', draw);
    canvas.addEventListener('mouseup', stopDraw);

    canvas.addEventListener('touchstart', startDraw, { passive: false });
    canvas.addEventListener('touchmove', draw, { passive: false });
    canvas.addEventListener('touchend', stopDraw);
  }

  function clearCanvas() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
  }

  // テンキー入力
  function pressKey(key) {
    if (key === 'DEL') {
      keyInputValue = keyInputValue.slice(0, -1);
    } else {
      if (keyInputValue.length < 2) keyInputValue += key;
    }
    updateDisplay(keyInputValue || "-");
  }

  function updateDisplay(val) {
    document.getElementById('user-input').innerText = val;
  }

    let hasPixel = false;

    for (let y = 0; y < canvas.height; y++) {
      for (let x = 0; x < canvas.width; x++) {
        if (data[(y * canvas.width + x) * 4 + 3] > 30) {
          hasPixel = true;
          if (x < minX) minX = x;
          if (x > maxX) maxX = x;
          if (y < minY) minY = y;
          if (y > maxY) maxY = y;
        }
      }
    }

    if (!hasPixel) return null;

    // バウンディングボックスから 8x8 へリサイズ処理
    const boxW = maxX - minX + 1;
    const boxH = maxY - minY + 1;
    const maxDim = Math.max(boxW, boxH);

    const offCanvas = document.createElement('canvas');
    offCanvas.width = maxDim;
    offCanvas.height = maxDim;
    const offCtx = offCanvas.getContext('2d');
    
    const offsetX = (maxDim - boxW) / 2;
    const offsetY = (maxDim - boxH) / 2;
    offCtx.drawImage(canvas, minX, minY, boxW, boxH, offsetX, offsetY, boxW, boxH);

    const smallCanvas = document.createElement('canvas');
    smallCanvas.width = 8;
    smallCanvas.height = 8;
    const smallCtx = smallCanvas.getContext('2d');
    
    // 余白1pxを残して6x6領域にスケール
    smallCtx.drawImage(offCanvas, 0, 0, maxDim, maxDim, 1, 1, 6, 6);

    const smallData = smallCtx.getImageData(0, 0, 8, 8).data;
    const X = [];
    for (let i = 0; i < 64; i++) {
      X.push(smallData[i * 4 + 3] / 255.0);
    }

    // 行列演算で確率スコア最大値（数字）を判定
    let maxScore = -Infinity;
    let bestDigit = 0;
    for (let d = 0; d < 10; d++) {
      let score = INTERCEPTS[d];
      for (let j = 0; j < 64; j++) {
        score += COEFS[d][j] * X[j];
      }
      if (score > maxScore) {
        maxScore = score;
        bestDigit = d;
      }
    }
    return bestDigit;
  }

  // 「できた！」判定
  function checkAnswer() {
    const targetAns = QUESTIONS[currentQuestionIndex].ans;
    let userAns = null;
    let infoText = "";

    if (currentMode === 'handwrite') {
      userAns = predictHandwriting();
      if (userAns === null) {
        alert("すうじを かいてね！");
        return;
      }
      infoText = `「${userAns}」と にんしき しました`;
    } else {
      if (!keyInputValue) {
        alert("すうじを おしてね！");
        return;
      }
      userAns = parseInt(keyInputValue, 10);
      infoText = `あなたのこたえ: ${userAns}`;
    }

    const isCorrect = (userAns === targetAns);
    showFeedback(isCorrect, infoText);
  }

  // フィードバック表示
  function showFeedback(isCorrect, infoText) {
    const overlay = document.getElementById('feedback-overlay');
    const msg = document.getElementById('feedback-msg');
    const info = document.getElementById('recognized-info');
    const nextBtn = document.getElementById('next-btn');
    const retryBtn = document.getElementById('retry-btn');

    overlay.classList.add('active');
    info.innerText = infoText;

    if (isCorrect) {
      msg.innerText = "せいかい！ 🎉";
      msg.className = "feedback-msg correct";
      nextBtn.style.display = "inline-block";
      retryBtn.style.display = "none";
    } else {
      msg.innerText = "ざんねん！ 💡";
      msg.className = "feedback-msg wrong";
      nextBtn.style.display = "none";
      retryBtn.style.display = "inline-block";
    }
  }

  function closeFeedback() {
    document.getElementById('feedback-overlay').classList.remove('active');
  }

  // 次の問題または結果へ
  function nextQuestion() {
    currentQuestionIndex++;
    if (currentQuestionIndex < QUESTIONS.length) {
      loadQuestion();
    } else {
      showScreen('result-screen');
    }
  }
</script>
