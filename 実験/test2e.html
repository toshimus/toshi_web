<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>計算機入力の学習（上下3桁入力）</title>
<style>
    html, body {
        height: 100%;
        overflow: hidden;
        position: fixed;
        width: 100%;
    }
    body {
        font-family: "Helvetica Neue", Arial, "Hiragino Kaku Gothic ProN", "Hiragino Sans", Meiryo, sans-serif;
        margin: 0;
        padding: 20px;
        background-color: #ffffff;
        color: #333;
        touch-action: none;
        box-sizing: border-box;
        user-select: none;
        -webkit-user-select: none;
    }
    
    /* スタート画面のスタイル */
    .start-screen {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background-color: #f0f8ff;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        z-index: 10000;
    }
    .start-screen h1 {
        font-size: 3rem;
        color: #2c3e50;
        margin-bottom: 40px;
    }
    .start-btn {
        padding: 20px 60px;
        font-size: 2.5rem;
        font-weight: bold;
        color: #fff;
        background-color: #3498db;
        border: none;
        border-radius: 15px;
        cursor: pointer;
        box-shadow: 0 8px 0 #2980b9;
        transition: transform 0.1s, box-shadow 0.1s;
        -webkit-tap-highlight-color: transparent;
    }
    .start-btn:active {
        transform: translateY(8px);
        box-shadow: none;
    }

    /* 上部ステータスバーと問題文のスタイル */
    .status-bar {
        font-size: 1.2rem;
        font-weight: bold;
        margin-bottom: 10px;
        color: #555;
    }
    .question-title {
        font-size: 1.6rem;
        font-weight: normal;
        margin-bottom: 25px;
        margin-top: 0;
    }

    .answer-area {
        display: flex;
        align-items: center;
        justify-content: center;
        margin-top: 20px;
    }
    
    /* ドロップゾーン（□の枠） */
    .drop-zone {
        width: 60px;
        height: 60px;
        border: 2px dashed #3498db;
        background-color: #f0f8ff;
        border-radius: 8px;
        display: flex;
        justify-content: center;
        align-items: center;
        font-size: 2.2rem;
        font-weight: bold;
        cursor: pointer;
        color: #333;
    }
    
    .math-symbol {
        font-size: 2.5rem;
        margin: 0 15px;
        font-weight: bold;
        color: #555;
    }
    
    /* 判定ボタンを青色の立体パターンに変更 */
    .check-btn {
        padding: 0 30px;
        height: 60px;
        font-size: 1.6rem;
        font-weight: bold;
        cursor: pointer;
        border: none;
        background-color: #00bfff;
        color: #ffffff;
        border-radius: 10px;
        font-family: inherit;
        outline: none;
        box-shadow: 0 4px 0 #0088cc;
        -webkit-tap-highlight-color: transparent;
        touch-action: manipulation;
        display: flex;
        justify-content: center;
        align-items: center;
    }
    .check-btn:active {
        transform: translateY(4px);
        box-shadow: none;
    }
    .judge-overlay {
        position: fixed;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%) scale(0.7);
        opacity: 0;
        visibility: hidden;
        background-color: transparent;
        color: #ff3333;
        font-size: 6rem;
        font-weight: bold;
        padding: 30px 60px;
        -webkit-text-stroke: 3px #000;
        text-shadow: 4px 4px 10px rgba(0, 0, 0, 0.5);
        z-index: 9999;
        pointer-events: none;
        transition: opacity 0.3s ease, transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275), visibility 0.3s;
        white-space: nowrap;
    }
    .judge-overlay.show {
        opacity: 1;
        visibility: visible;
        transform: translate(-50%, -50%) scale(1.0);
    }
    .judge-overlay.incorrect {
        color: #3366ff;
    }
    
    .menu-btn, .retry-btn {
        margin-top: 20px;
        padding: 12px 30px;
        font-size: 1.1rem;
        cursor: pointer;
        border: none;
        border-radius: 8px;
        outline: none;
        touch-action: manipulation;
        text-decoration: none;
        display: inline-block;
    }
    .menu-btn {
        background-color: #95a5a6;
        color: #fff;
    }
    
    .top-nav {
        display: flex;
        justify-content: space-between; 
        align-items: center;            
        margin-bottom: 10px;
    }
    .toggle-group {
        display: flex;
        gap: 15px;
    }
    .settings-toggle {
        font-size: 1.1rem;
        color: #555;
        cursor: pointer;
        display: flex;
        align-items: center;
        -webkit-tap-highlight-color: transparent;
    }
    .settings-toggle input {
        transform: scale(1.3);
        margin-right: 8px;
        cursor: pointer;
    }
    .back-btn {
        padding: 8px 15px;
        background-color: #ecf0f1;
        border: 1px solid #bdc3c7;
        border-radius: 5px;
        text-decoration: none;
        color: #2c3e50;
        font-size: 0.9rem;
        touch-action: manipulation;
    }

    /* ==========================================
       計算機パネルとオーバーレイのスタイル追加
       ========================================== */
    .pieces-container { display: none; justify-content: center; align-items: center; flex-wrap: wrap; gap: 10px; padding: 15px; background-color: #ecf0f1; border-radius: 12px; width: 280px; margin: 0 auto; box-sizing: border-box; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); box-shadow: 0 10px 25px rgba(0,0,0,0.3); z-index: 1000; cursor: grab; }
    .pieces-container:active { cursor: grabbing; }
    
    .piece { flex: 1 1 25%; height: 60px; border: 2px solid #2c3e50; background-color: #f1c40f; border-radius: 10px; display: flex; justify-content: center; align-items: center; font-size: 1.8rem; font-weight: bold; cursor: pointer; color: #2c3e50; box-shadow: 0 4px 0 #d4ac0d; touch-action: manipulation; box-sizing: border-box; }
    .piece:active { transform: translateY(4px); box-shadow: none; }
    
    .piece.delete-btn { background-color: #e74c3c; color: white; border-color: #c0392b; box-shadow: 0 4px 0 #c0392b; font-size: 1.2rem; }
    .piece.enter-btn { background-color: #2ecc71; color: white; border-color: #27ae60; box-shadow: 0 4px 0 #27ae60; font-size: 1.2rem; }
    
    .overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.4); z-index: 999; }
</style>
</head>
<body>

    <div id="start-screen" class="start-screen">
        <h1>計算機入力の学習</h1>
        <button id="start-btn" class="start-btn">スタート</button>
        <BR><BR><a href="index.html" class="menu-btn" style="margin-top: 20px; background-color: #95a5a6;">メニューへ戻る</a>
    </div>

    <div id="main-content" style="display: none;">
        <div class="top-nav" style="display: none;">
            <div class="toggle-group">
                <label class="settings-toggle">
                    <input type="checkbox" id="speech-checkbox" checked>
                    スピーチON
                </label>
                <label class="settings-toggle">
                    <input type="checkbox" id="sound-checkbox" checked>
                    効果音ON
                </label>
            </div>
            <a href="index.html" class="back-btn">メニューへ戻る</a>
        </div>
        
        <div id="status-bar" class="status-bar" style="display: none;"></div>
        <h1 class="question-title" style="display: none;">問題タイトル</h1>
        
        <div id="app"></div>
        
        <div id="judge-overlay" class="judge-overlay"></div>

        <div class="overlay" id="overlay"></div>
        <div class="pieces-container" id="calc-container"></div>
    </div>

    <script>
        // 音声ファイル（mp3）のセットアップ
        const okSound = new Audio('ok.mp3');
        const ngSound = new Audio('ng.mp3');
        const qSound = new Audio('q.mp3');

        // 音声読み上げ用の関数（Web Speech API）
        function speak(text) {
            const speechCheckbox = document.getElementById('speech-checkbox');
            if (speechCheckbox && !speechCheckbox.checked) {
                return; 
            }
            
            window.speechSynthesis.cancel(); 
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'ja-JP';
            utterance.rate = 1.0;
            utterance.pitch = 1.0;
            window.speechSynthesis.speak(utterance);
        }

        // 読み上げ用の数字辞書（0〜20）
        const numberReadings = [
            "ぜろ", "いち", "に", "さん", "よん", "ご", "ろく", "なな", "はち", "きゅう", "じゅう",
            "じゅういち", "じゅうに", "じゅうさん", "じゅうよん", "じゅうご", "じゅうろく", "じゅうなな", "じゅうはち", "じゅうきゅう", "にじゅう"
        ];

        /* ==========================================
           計算機パネルの構築とロジック
           ========================================== */
        const overlay = document.getElementById('overlay');
        const calcContainer = document.getElementById('calc-container');
        let activeInputBox = null;
        let baseValue = 0; 

        const calcKeys = [
            '7', '8', '9',
            '4', '5', '6',
            '1', '2', '3',
            '0', '削除', '+10'
        ];

        calcKeys.forEach(key => {
            const piece = document.createElement('div');
            piece.className = 'piece';
            piece.textContent = key;
            
            if (key === '削除') {
                piece.classList.add('delete-btn');
                piece.addEventListener('click', () => {
                    if (activeInputBox) {
                        activeInputBox.textContent = '';
                        baseValue = 0;
                    }
                });
            } else if (key === '+10') {
                piece.classList.add('enter-btn');
                piece.addEventListener('click', () => {
                    if (activeInputBox) {
                        baseValue += 10;
                        activeInputBox.textContent = baseValue;
                        speak("じゅう");
                    }
                });
            } else {
                piece.addEventListener('click', () => {
                    if (activeInputBox) {
                        const num = parseInt(key, 10);
                        const finalValue = baseValue + num;
                        activeInputBox.textContent = finalValue;
                        
                        if (finalValue >= 0 && finalValue <= 20) {
                            speak(numberReadings[finalValue]);
                        } else {
                            speak(finalValue.toString());
                        }

                        calcContainer.style.display = 'none';
                        overlay.style.display = 'none';
                        activeInputBox = null;
                    }
                });
            }
            calcContainer.appendChild(piece);
        });

        overlay.addEventListener('click', () => {
            calcContainer.style.display = 'none';
            overlay.style.display = 'none';
            activeInputBox = null;
        });

        /* 計算機パネルのドラッグ移動ロジック */
        let isDragging = false;
        let dragStartX, dragStartY, initialLeft, initialTop;

        function startDrag(e) {
            if (e.target.classList.contains('piece')) return;
            isDragging = true;
            let clientX = e.touches ? e.touches[0].clientX : e.clientX;
            let clientY = e.touches ? e.touches[0].clientY : e.clientY;
            dragStartX = clientX;
            dragStartY = clientY;
            let style = window.getComputedStyle(calcContainer);
            initialLeft = parseFloat(style.left);
            initialTop = parseFloat(style.top);
        }

        function doDrag(e) {
            if (!isDragging) return;
            e.preventDefault();
            let clientX = e.touches ? e.touches[0].clientX : e.clientX;
            let clientY = e.touches ? e.touches[0].clientY : e.clientY;
            let dx = clientX - dragStartX;
            let dy = clientY - dragStartY;
            calcContainer.style.left = (initialLeft + dx) + 'px';
            calcContainer.style.top = (initialTop + dy) + 'px';
        }

        function stopDrag() {
            isDragging = false;
        }

        calcContainer.addEventListener('mousedown', startDrag);
        document.addEventListener('mousemove', doDrag, { passive: false });
        document.addEventListener('mouseup', stopDrag);
        calcContainer.addEventListener('touchstart', startDrag, { passive: false });
        document.addEventListener('touchmove', doDrag, { passive: false });
        document.addEventListener('touchend', stopDrag);

        /* ==========================================
           学習用シンプル画面ロジック（上下3桁版）
           ========================================== */
        const appContainer = document.getElementById('app');
        
        // CSV記録用の開始時間とフォーマット関数
        let problemStartTime = new Date();

        function formatTime(date) {
            return date.getHours().toString().padStart(2, '0') + ':' + 
                   date.getMinutes().toString().padStart(2, '0') + ':' + 
                   date.getSeconds().toString().padStart(2, '0');
        }

        function renderProblem() {
            appContainer.innerHTML = '';
            
            problemStartTime = new Date();

            const answerArea = document.createElement('div');
            answerArea.className = 'answer-area';
            answerArea.style.marginTop = '100px';

            // --- 上段の枠生成 ---
            const ansZone1 = document.createElement('div');
            ansZone1.className = 'drop-zone';
            ansZone1.id = 'ans-box1';
            ansZone1.addEventListener('click', () => { 
                ansZone1.textContent = ''; baseValue = 0; activeInputBox = ansZone1;
                calcContainer.style.display = 'flex'; overlay.style.display = 'block';
            });
            const ansZone2 = document.createElement('div');
            ansZone2.className = 'drop-zone';
            ansZone2.id = 'ans-box2';
            ansZone2.addEventListener('click', () => { 
                ansZone2.textContent = ''; baseValue = 0; activeInputBox = ansZone2;
                calcContainer.style.display = 'flex'; overlay.style.display = 'block';
            });
            const ansZone3 = document.createElement('div');
            ansZone3.className = 'drop-zone';
            ansZone3.id = 'ans-box3';
            ansZone3.addEventListener('click', () => { 
                ansZone3.textContent = ''; baseValue = 0; activeInputBox = ansZone3;
                calcContainer.style.display = 'flex'; overlay.style.display = 'block';
            });

            // --- 下段の枠生成 ---
            const ansZone4 = document.createElement('div');
            ansZone4.className = 'drop-zone';
            ansZone4.id = 'ans-box4';
            ansZone4.addEventListener('click', () => { 
                ansZone4.textContent = ''; baseValue = 0; activeInputBox = ansZone4;
                calcContainer.style.display = 'flex'; overlay.style.display = 'block';
            });
            const ansZone5 = document.createElement('div');
            ansZone5.className = 'drop-zone';
            ansZone5.id = 'ans-box5';
            ansZone5.addEventListener('click', () => { 
                ansZone5.textContent = ''; baseValue = 0; activeInputBox = ansZone5;
                calcContainer.style.display = 'flex'; overlay.style.display = 'block';
            });
            const ansZone6 = document.createElement('div');
            ansZone6.className = 'drop-zone';
            ansZone6.id = 'ans-box6';
            ansZone6.addEventListener('click', () => { 
                ansZone6.textContent = ''; baseValue = 0; activeInputBox = ansZone6;
                calcContainer.style.display = 'flex'; overlay.style.display = 'block';
            });

            // --- 上段のグループ（横並び） ---
            const topRow = document.createElement('div');
            topRow.style.display = 'flex';
            topRow.style.gap = '5px'; // 枠と枠の隙間
            topRow.style.marginBottom = '10px'; // 上段と下段の間の隙間
            topRow.appendChild(ansZone1);
            topRow.appendChild(ansZone2);
            topRow.appendChild(ansZone3);

            // --- 下段のグループ（横並び） ---
            const bottomRow = document.createElement('div');
            bottomRow.style.display = 'flex';
            bottomRow.style.gap = '5px';
            bottomRow.appendChild(ansZone4);
            bottomRow.appendChild(ansZone5);
            bottomRow.appendChild(ansZone6);

            // --- 全体のグループ（縦並び） ---
            const gridContainer = document.createElement('div');
            gridContainer.style.display = 'flex';
            gridContainer.style.flexDirection = 'column'; // ここで縦に並べるよう指定します
            gridContainer.appendChild(topRow);
            gridContainer.appendChild(bottomRow);

            // できたボタン
            const checkBtn = document.createElement('button');
            checkBtn.className = 'check-btn';
            checkBtn.style.marginLeft = '30px';
            checkBtn.textContent = 'できた';

            // answerAreaにグループ化された枠とボタンを追加
            answerArea.appendChild(gridContainer);
            answerArea.appendChild(checkBtn);
            appContainer.appendChild(answerArea);

            // 判定ロジックおよびiPad連動（CSV出力）
            checkBtn.addEventListener('click', () => {
                const u1 = parseInt(document.getElementById('ans-box1').textContent, 10);
                const u2 = parseInt(document.getElementById('ans-box2').textContent, 10);
                const u3 = parseInt(document.getElementById('ans-box3').textContent, 10);
                const u4 = parseInt(document.getElementById('ans-box4').textContent, 10);
                const u5 = parseInt(document.getElementById('ans-box5').textContent, 10);
                const u6 = parseInt(document.getElementById('ans-box6').textContent, 10);
                
                // 全ての枠が入力されていない場合は処理を中断します
                if (isNaN(u1) || isNaN(u2) || isNaN(u3) || isNaN(u4) || isNaN(u5) || isNaN(u6)) return;

                const topNum = u1 * 100 + u2 * 10 + u3;
                const bottomNum = u4 * 100 + u5 * 10 + u6;

                // 例として、上段と下段の和が特定の数（ここでは 1000 と仮定）になるかを判定します
                const isCorrect = ((topNum + bottomNum) === 1000);
                
                // iPadのSwiftアプリ（appBridge）へ送信するCSVロジック
                const endTime = new Date();
                const problemType = "計算機入力の学習";
                const problemContent = "入力テスト：上下3桁の入力";
                const userAnswer = `${topNum},${bottomNum}`;
                const inputMethod = "計算機入力";
                const resultStr = isCorrect ? "正解" : "不正解";
                
                const csvLine = `"${problemType}","${problemContent}","${userAnswer}",${formatTime(problemStartTime)},${formatTime(endTime)},${inputMethod},${resultStr}\n`;
                
                if (window.webkit && window.webkit.messageHandlers.appBridge) {
                    window.webkit.messageHandlers.appBridge.postMessage({
                        action: "saveCSV",
                        csvLine: csvLine
                    });
                }

                const judgeOverlay = document.getElementById('judge-overlay');

                if (isCorrect) {
                    judgeOverlay.textContent = 'せいかい！';
                    judgeOverlay.className = 'judge-overlay show';
                    
                    const soundCheckbox = document.getElementById('sound-checkbox');
                    if (soundCheckbox && soundCheckbox.checked) {
                        okSound.currentTime = 0;
                        okSound.play().catch(e => console.log(e));
                    }
                    
                    setTimeout(() => {
                        judgeOverlay.classList.remove('show');
                        // 正解後は全ての枠をクリアします
                        ansZone1.textContent = ''; ansZone2.textContent = ''; ansZone3.textContent = '';
                        ansZone4.textContent = ''; ansZone5.textContent = ''; ansZone6.textContent = '';
                        problemStartTime = new Date();
                    }, 1200);
                } else {
                    judgeOverlay.textContent = 'おしい！';
                    judgeOverlay.className = 'judge-overlay incorrect show';
                    
                    const soundCheckbox = document.getElementById('sound-checkbox');
                    if (soundCheckbox && soundCheckbox.checked) {
                        ngSound.currentTime = 0;
                        ngSound.play().catch(e => console.log(e));
                    }
                    
                    setTimeout(() => {
                        judgeOverlay.classList.remove('show');
                    }, 1200);
                }
            });
        }

        // --- スタートボタンのイベントリスナー ---
        document.getElementById('start-btn').addEventListener('click', () => {
            document.getElementById('start-screen').style.display = 'none';
            document.getElementById('main-content').style.display = 'block';
            renderProblem();
        });
    </script>
</body>
</html>
