<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>ボタンのサンプル - Text-align版</title>
    <style>
        .container {
            /* 親要素に指定することで、中のインライン要素やインラインブロック要素を配置 */
            text-align: center; 
            margin-top: 50px;
        }

        button {
            /* displayをinline-blockにすることで、text-alignの適用対象にする */
            display: inline-block;
            padding: 10px 20px;
            font-size: 16px;
            color: #ffffff;
            background-color: #ffc107; /* 視認性のために色を変更 */
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: background-color 0.3s;
        }

        button:hover {
            background-color: #e0a800;
        }
    </style>
</head>
<body>

    <div class="container">
        <button type="button" id="myButton">ボタンを押してください</button>
    </div>

    <script>
        const button = document.getElementById('myButton');
        
        button.addEventListener('click', function() {
            alert('text-alignを使用して中央に配置しました。');
        });
    </script>

</body>
</html>
