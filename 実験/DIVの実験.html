<!DOCTYPE html>
<html lang="ja">
<head>
    <style>
        /* 1. 画面全体（外側の海） */
        body {
            background-color: gray;
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* 2. 白い島（作業用エリア） */
        .container {
            width: 50vw;
            height: 50vh;
            background-color: white;
            position: relative; /* 子要素の基準点 */
            border: 2px solid black;
        }

        /* 共通の箱の設定 */
        .box {
            width: 50px;
            height: 50px;
            background-color: #3498db;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 5px;
        }

        /* 自由に動かす設定 */
        .box-absolute {
            position: absolute;
            background-color: #e74c3c;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="box">1</div>
        <div class="box">2</div>
        <div class="box box-absolute" style="top: 100px; left: 100px;">3</div>
        <div class="box box-absolute" style="top: 150px; left: 150px;">4</div>
        <div class="box">5</div>
    </div>

</body>
</html>
