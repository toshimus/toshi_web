<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>分数対応計算機</title>
<style>
    html, body {
        height: 100%;
        margin: 0;
        padding: 0;
        background-color: #e0e5ec;
        font-family: "Helvetica Neue", Arial, "Hiragino Kaku Gothic ProN", "Hiragino Sans", Meiryo, sans-serif;
        display: flex;
        justify-content: center;
        align-items: center;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
    }

    /* 計算機本体のコンテナ（横長に拡張） */
    .calculator {
        width: 100%;
        max-width: 700px;
        background-color: #2c3e50;
        border-radius: 20px;
        padding: 25px;
        box-shadow: 0 15px 35px rgba(0, 0, 0, 0.3), inset 0 2px 5px rgba(255, 255, 255, 0.2);
        box-sizing: border-box;
    }

    /* ディスプレイ画面 */
    .screen-container {
        width: 100%;
        height: 120px;
        background-color: #ecf0f1;
        border-radius: 12px;
        margin-bottom: 25px;
        padding: 10px 15px;
        box-sizing: border-box;
        display: flex;
        align-items: center;
        justify-content: flex-end;
        overflow-x: auto;
        box-shadow: inset 0 4px 8px rgba(0,0,0,0.1);
        border: 2px solid #bdc3c7;
    }

    .screen-content {
        display: flex;
        align-items: center;
        gap: 8px;
        font-size: 2.5rem;
        color: #333;
        white-space: nowrap;
    }

    /* 通常の数字、演算子のスタイル */
    .whole-number, .operator {
        font-weight: bold;
    }

    /* 分数の縦並びスタイル（教科書表示） */
    .fraction-display {
        display: inline-flex;
        flex-direction: column;
        align-items: center;
        vertical-align: middle;
        font-size: 2rem;
        font-weight: bold;
        margin: 0 5px;
    }

    .frac-num {
        padding: 0 5px;
        min-height: 2.5rem;
        display: flex;
        align-items: center;
        justify-content: center;
        min-width: 20px;
        border-radius: 4px;
    }

    .frac-line {
        width: 100%;
        height: 3px;
        background-color: #333;
        margin: 2px 0;
    }

    .frac-den {
        padding: 0 5px;
        min-height: 2.5rem;
        display: flex;
        align-items: center;
        justify-content: center;
        min-width: 20px;
        border-radius: 4px;
    }

    /* 入力中のアクティブな枠 */
    .frac-num.active, .frac-den.active, .whole-number.active {
        background-color: #a0c4ff;
        color: #000;
        box-shadow: 0 0 0 2px #3498db;
    }

    /* キーパッドのグリッドレイアウト */
    .calc-keys {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 15px;
    }

    /* ボタンの共通スタイル */
    .key-btn {
        height: 70px;
        border: none;
        border-radius: 12px;
        font-size: 1.8rem;
        font-weight: bold;
        cursor: pointer;
        display: flex;
        justify-content: center;
        align-items: center;
        transition: transform 0.1s, box-shadow 0.1s, background-color 0.2s;
        box-shadow: 0 6px 0 rgba(0,0,0,0.2);
        outline: none;
        color: #fff;
    }
    .key-btn:active {
        transform: translateY(6px);
        box-shadow: 0 0 0 rgba(0,0,0,0.2);
    }

    /* ボタンの種類ごとの色分け */
    .btn-num {
        background-color: #34495e;
        color: #ecf0f1;
        box-shadow: 0 6px 0 #1a252f;
    }
    .btn-num:hover { background-color: #3e566e; }

    .btn-op {
        background-color: #f39c12;
        box-shadow: 0 6px 0 #d68910;
    }
    .btn-op:hover { background-color: #f5b041; }

    .btn-func {
        background-color: #7f8c8d;
        box-shadow: 0 6px 0 #616a6b;
        font-size: 1.4rem;
    }
    .btn-func:hover { background-color: #95a5a6; }

    .btn-frac {
        background-color: #8e44ad;
        box-shadow: 0 6px 0 #732d91;
        font-size: 1.4rem;
    }
    .btn-frac:hover { background-color: #9b59b6; }

    .btn-reduce {
        background-color: #27ae60;
        box-shadow: 0 6px 0 #1e8449;
        font-size: 1.4rem;
    }
    .btn-reduce:hover { background-color: #2ecc71; }

    .btn-eq {
        background-color: #c0392b;
        box-shadow: 0 6px 0 #922b21;
    }
    .btn-eq:hover { background-color: #e74c3c; }

    .span-2 {
        grid-column: span 2;
    }

    /* メッセージオーバーレイ */
    .msg-overlay {
        position: fixed;
        top: 20%;
        left: 50%;
        transform: translate(-50%, -50%) scale(0.8);
        opacity: 0;
        visibility: hidden;
        background-color: rgba(46, 204, 113, 0.9);
        color: #fff;
        padding: 15px 40px;
        border-radius: 30px;
        font-size: 2rem;
        font-weight: bold;
        box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        z-index: 10000;
        pointer-events: none;
        transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }
    .msg-overlay.show {
        opacity: 1;
        visibility: visible;
        transform: translate(-50%, -50%) scale(1.0);
    }
    .msg-overlay.error {
        background-color: rgba(231, 76, 60, 0.9);
    }
</style>
</head>
<body>

    <div class="calculator">
        <div class="screen-container">
            <div id="screen" class="screen-content"></div>
        </div>

        <div class="calc-keys">
            <button class="key-btn btn-func" onclick="pressClear()">C</button>
            <button class="key-btn btn-func" onclick="pressBackspace()">削除</button>
            <button class="key-btn btn-frac" onclick="pressFraction()">分の</button>
            <button class="key-btn btn-op" onclick="pressOperator('÷')">÷</button>

            <button class="key-btn btn-num" onclick="pressDigit('7')">7</button>
            <button class="key-btn btn-num" onclick="pressDigit('8')">8</button>
            <button class="key-btn btn-num" onclick="pressDigit('9')">9</button>
            <button class="key-btn btn-op" onclick="pressOperator('×')">×</button>

            <button class="key-btn btn-num" onclick="pressDigit('4')">4</button>
            <button class="key-btn btn-num" onclick="pressDigit('5')">5</button>
            <button class="key-btn btn-num" onclick="pressDigit('6')">6</button>
            <button class="key-btn btn-op" onclick="pressOperator('-')">-</button>

            <button class="key-btn btn-num" onclick="pressDigit('1')">1</button>
            <button class="key-btn btn-num" onclick="pressDigit('2')">2</button>
            <button class="key-btn btn-num" onclick="pressDigit('3')">3</button>
            <button class="key-btn btn-op" onclick="pressOperator('+')">+</button>

            <button class="key-btn btn-num span-2" onclick="pressDigit('0')">0</button>
            <button class="key-btn btn-reduce" onclick="pressReduce()">約分</button>
            <button class="key-btn btn-eq" onclick="pressEquals()">=</button>
        </div>
    </div>

    <div id="msg-overlay" class="msg-overlay"></div>

    <script>
        // --- 算術用ヘルパー関数 ---
        function gcd(a, b) {
            a = Math.abs(a);
            b = Math.abs(b);
            while (b) {
                let t = b;
                b = a % b;
                a = t;
            }
            return Math.max(1, a);
        }

        function lcm(a, b) {
            if (a === 0 || b === 0) return 0;
            return Math.abs(a * b) / gcd(a, b);
        }

        // 分数の四則演算（通分を伴う教科書的アプローチ）
        function addFractions(f1, f2) {
            const d = lcm(f1.d, f2.d);
            const n1 = f1.n * (d / f1.d);
            const n2 = f2.n * (d / f2.d);
            return { n: n1 + n2, d: d };
        }

        function subFractions(f1, f2) {
            const d = lcm(f1.d, f2.d);
            const n1 = f1.n * (d / f1.d);
            const n2 = f2.n * (d / f2.d);
            return { n: n1 - n2, d: d };
        }

        function mulFractions(f1, f2) {
            return { n: f1.n * f2.n, d: f1.d * f2.d };
        }

        function divFractions(f1, f2) {
            // 割り算の際は、符号を維持しつつ分母分子を反転
            let newN = f1.n * f2.d;
            let newD = f1.d * f2.n;
            if (newD < 0) {
                newN = -newN;
                newD = -newD;
            }
            return { n: newN, d: newD };
        }

        // --- 状態管理 ---
        let tokens = []; // 確定した数値や演算子を格納 {t: 'val', n: 1, d: 2} または {t: 'op', v: '+'}
        let currentInput = { type: 'none' }; // 'none', 'number', 'fraction'
        let isResult = false; // 現在画面に表示されているのが計算結果かどうか
        let finalResult = null; // イコールを押した後の計算結果を保持

        const screenEl = document.getElementById('screen');
        const msgOverlay = document.getElementById('msg-overlay');

        function showMessage(text, isError = false) {
            msgOverlay.textContent = text;
            msgOverlay.className = isError ? 'msg-overlay error show' : 'msg-overlay show';
            setTimeout(() => {
                msgOverlay.classList.remove('show');
            }, 1500);
        }

        // --- レンダリング（画面描画） ---
        function renderDisplay() {
            screenEl.innerHTML = '';
            
            // 確定済みのトークン（計算式）を描画
            tokens.forEach(tok => {
                if (tok.t === 'val') {
                    screenEl.appendChild(createValElement(tok.n, tok.d));
                } else if (tok.t === 'op') {
                    const opEl = document.createElement('div');
                    opEl.className = 'operator';
                    opEl.textContent = tok.v;
                    screenEl.appendChild(opEl);
                }
            });

            // 現在入力中の要素を描画
            if (currentInput.type === 'number') {
                screenEl.appendChild(createValElement(currentInput.val, 1, true));
            } else if (currentInput.type === 'fraction') {
                screenEl.appendChild(createFracElement(currentInput.n, currentInput.d, currentInput.active === 'n', currentInput.active === 'd'));
            }

            // 「＝」と計算結果を描画
            if (isResult && finalResult) {
                const eqEl = document.createElement('div');
                eqEl.className = 'operator';
                eqEl.textContent = '=';
                screenEl.appendChild(eqEl);
                screenEl.appendChild(createValElement(finalResult.n, finalResult.d));
            }

            // 右端にスクロールして常に入力中部分または結果を見せる
            screenEl.scrollLeft = screenEl.scrollWidth;
        }

        // 数値要素の生成（整数なら通常テキスト、分数なら分数レイアウトを生成）
        function createValElement(n, d, isTyping = false) {
            // 分母が1の場合は整数として表示
            if (d === 1 && !isTyping && typeof n === 'number') {
                 const div = document.createElement('div');
                 div.className = 'whole-number';
                 div.textContent = n;
                 return div;
            }
            if (d === 1 && isTyping) {
                 const div = document.createElement('div');
                 div.className = 'whole-number active';
                 div.textContent = n === '' ? '' : n;
                 return div;
            }
            return createFracElement(n, d, false, false);
        }

        // 分数レイアウト（教科書表示）の生成
        function createFracElement(n, d, activeN, activeD) {
            const container = document.createElement('div');
            container.className = 'fraction-display';

            const numDiv = document.createElement('div');
            numDiv.className = 'frac-num' + (activeN ? ' active' : '');
            numDiv.textContent = n !== '' ? n : (activeN ? '' : '0');

            const lineDiv = document.createElement('div');
            lineDiv.className = 'frac-line';

            const denDiv = document.createElement('div');
            denDiv.className = 'frac-den' + (activeD ? ' active' : '');
            denDiv.textContent = d !== '' ? d : (activeD ? '' : '1');

            container.appendChild(numDiv);
            container.appendChild(lineDiv);
            container.appendChild(denDiv);

            // マイナスの分数処理（負の符号を分数の前に表示）
            if (typeof n === 'number' && typeof d === 'number' && (n < 0 || d < 0)) {
                const isNeg = (n < 0) ^ (d < 0);
                numDiv.textContent = Math.abs(n);
                denDiv.textContent = Math.abs(d);
                if (isNeg) {
                    const wrapper = document.createElement('div');
                    wrapper.style.display = 'flex';
                    wrapper.style.alignItems = 'center';
                    const minus = document.createElement('div');
                    minus.className = 'operator';
                    minus.textContent = '-';
                    minus.style.marginRight = '5px';
                    wrapper.appendChild(minus);
                    wrapper.appendChild(container);
                    return wrapper;
                }
            }

            return container;
        }

        // --- 入力制御ロジック ---
        function commitInput() {
            if (currentInput.type === 'none') return;
            
            if (currentInput.type === 'number') {
                const val = currentInput.val === '' ? 0 : parseInt(currentInput.val, 10);
                tokens.push({ t: 'val', n: val, d: 1 });
            } else if (currentInput.type === 'fraction') {
                const num = currentInput.n === '' ? 0 : parseInt(currentInput.n, 10);
                let den = currentInput.d === '' ? 1 : parseInt(currentInput.d, 10);
                if (den === 0) den = 1; // ゼロ除算防止
                tokens.push({ t: 'val', n: num, d: den });
            }
            currentInput = { type: 'none' };
        }

        // 数字ボタン押下
        window.pressDigit = function(digit) {
            if (isResult) {
                pressClear(); // 結果表示中に数字を押すと完全リセットして新規入力
            }

            if (currentInput.type === 'none') {
                currentInput = { type: 'number', val: digit };
            } else if (currentInput.type === 'number') {
                currentInput.val += digit;
            } else if (currentInput.type === 'fraction') {
                if (currentInput.active === 'n') {
                    currentInput.n += digit;
                } else {
                    currentInput.d += digit;
                }
            }
            renderDisplay();
        };

        // 分のボタン押下（モード切り替え）
        window.pressFraction = function() {
            if (isResult) {
                const res = finalResult;
                pressClear();
                // 計算結果からの再開時は分子をアクティブにする
                currentInput = { type: 'fraction', n: res.n.toString(), d: res.d.toString(), active: 'n' };
            } else if (currentInput.type === 'none') {
                // 何もない状態から「分の」を押した場合は、分母から入力させる
                currentInput = { type: 'fraction', n: '', d: '', active: 'd' };
            } else if (currentInput.type === 'number') {
                // すでに数字が入力されている場合は、それを「分母」としてセットし、「分子」をアクティブにする
                currentInput = { type: 'fraction', n: '', d: currentInput.val, active: 'n' };
            } else if (currentInput.type === 'fraction') {
                // 分子・分母の入力フォーカス切り替え
                currentInput.active = currentInput.active === 'n' ? 'd' : 'n';
            }
            renderDisplay();
        };

        // 演算子ボタン押下
        window.pressOperator = function(op) {
            if (isResult) {
                // 結果表示中に演算子を押した場合は、式を結果の数値からリスタートして演算を継続
                tokens = [finalResult];
                finalResult = null;
                isResult = false; 
            }
            
            commitInput();

            if (tokens.length > 0) {
                const lastToken = tokens[tokens.length - 1];
                if (lastToken.t === 'op') {
                    lastToken.v = op; // 連続で押した場合は上書き
                } else {
                    tokens.push({ t: 'op', v: op });
                }
            }
            renderDisplay();
        };

        // 削除（バックスペース）ボタン押下
        window.pressBackspace = function() {
            if (isResult) {
                // 結果表示中に削除を押すと、計算式だけを残して再編集可能にする
                isResult = false;
                finalResult = null;
                renderDisplay();
                return;
            }

            if (currentInput.type === 'number') {
                currentInput.val = currentInput.val.slice(0, -1);
                if (currentInput.val === '') currentInput = { type: 'none' };
            } else if (currentInput.type === 'fraction') {
                if (currentInput.active === 'n') {
                    currentInput.n = currentInput.n.slice(0, -1);
                } else {
                    currentInput.d = currentInput.d.slice(0, -1);
                }
                // 分子も分母も空になれば入力状態をリセット
                if (currentInput.n === '' && currentInput.d === '') {
                    currentInput = { type: 'none' };
                }
            } else if (currentInput.type === 'none' && tokens.length > 0) {
                tokens.pop(); // 確定したトークンを削除
            }
            renderDisplay();
        };

        // クリアボタン押下
        window.pressClear = function() {
            tokens = [];
            currentInput = { type: 'none' };
            isResult = false;
            finalResult = null;
            renderDisplay();
        };

        // 約分ボタン押下（最終解答の導出）
        window.pressReduce = function() {
            if (!isResult || !finalResult) {
                showMessage("計算後に押してください", true);
                return;
            }
            
            const g = gcd(finalResult.n, finalResult.d);
            
            if (g > 1) {
                finalResult.n /= g;
                finalResult.d /= g;
                showMessage("約分しました！");
                renderDisplay();
            } else {
                showMessage("これ以上約分できません", true);
            }
        };

        // 計算実行（イコールボタン）
        window.pressEquals = function() {
            commitInput();
            if (tokens.length === 0) return;

            // 演算子で終わっている場合は削除
            if (tokens[tokens.length - 1].t === 'op') {
                tokens.pop();
            }

            try {
                const result = evaluateExpression(tokens);
                // 式自体はtokensに残し、結果を別途保持する
                finalResult = { t: 'val', n: result.n, d: result.d };
                isResult = true;
                renderDisplay();
            } catch (e) {
                showMessage("計算エラー", true);
                pressClear();
            }
        };

        // 数式のパースと計算（掛け算・割り算を優先）
        function evaluateExpression(exprTokens) {
            if (exprTokens.length === 0) return { n: 0, d: 1 };
            if (exprTokens.length === 1) return exprTokens[0];

            // パス1: 掛け算・割り算の処理
            let pass1 = [];
            let i = 0;
            while (i < exprTokens.length) {
                const t = exprTokens[i];
                if (t.t === 'op' && (t.v === '×' || t.v === '÷')) {
                    const prev = pass1.pop();
                    const next = exprTokens[i + 1];
                    if (t.v === '÷' && next.n === 0) throw new Error("Division by zero");
                    const res = t.v === '×' ? mulFractions(prev, next) : divFractions(prev, next);
                    pass1.push({ t: 'val', n: res.n, d: res.d });
                    i += 2;
                } else {
                    pass1.push(t);
                    i++;
                }
            }

            // パス2: 足し算・引き算の処理
            let pass2 = [];
            i = 0;
            while (i < pass1.length) {
                const t = pass1[i];
                if (t.t === 'op' && (t.v === '+' || t.v === '-')) {
                    const prev = pass2.pop();
                    const next = pass1[i + 1];
                    const res = t.v === '+' ? addFractions(prev, next) : subFractions(prev, next);
                    pass2.push({ t: 'val', n: res.n, d: res.d });
                    i += 2;
                } else {
                    pass2.push(t);
                    i++;
                }
            }

            return pass2[0];
        }

        // 初期描画
        renderDisplay();
    </script>
</body>
</html>
