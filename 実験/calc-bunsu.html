<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>分数対応計算機</title>
<style>
    html, body {
        height: 100%;
        margin: 0;
        padding: 0;
        background-color: #e0e5ec;
        font-family: "Helvetica Neue", Arial, "Hiragino Kaku Gothic ProN", "Hiragino Sans", Meiryo, sans-serif;
        display: flex;
        justify-content: center;
        align-items: center;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
    }

    /* 計算機本体のコンテナ（横長に拡張） */
    .calculator {
        width: 100%;
        max-width: 800px;
        background-color: #2c3e50;
        border-radius: 20px;
        padding: 25px;
        box-shadow: 0 15px 35px rgba(0, 0, 0, 0.3), inset 0 2px 5px rgba(255, 255, 255, 0.2);
        box-sizing: border-box;
    }

    /* ディスプレイ画面 */
    .screen-container {
        width: 100%;
        height: 140px; /* 縦幅を少し拡張 */
        background-color: #ecf0f1;
        border-radius: 12px;
        margin-bottom: 25px;
        padding: 10px 20px;
        box-sizing: border-box;
        display: flex;
        align-items: center;
        justify-content: flex-start; /* 左寄せベースでスクロール */
        overflow-x: auto;
        box-shadow: inset 0 4px 8px rgba(0,0,0,0.1);
        border: 2px solid #bdc3c7;
    }

    .screen-content {
        display: flex;
        align-items: center;
        gap: 12px; /* 隙間を少し広く */
        font-size: 2.5rem;
        color: #333;
        white-space: nowrap;
        margin-left: auto; /* コンテンツが少ない時は右寄せに見せるための工夫 */
    }

    /* 通常の数字、演算子のスタイル */
    .whole-number, .operator {
        font-weight: bold;
    }

    /* 分数の縦並びスタイル（教科書表示） */
    .fraction-display {
        display: inline-flex;
        flex-direction: column;
        align-items: center;
        vertical-align: middle;
        font-size: 2rem;
        font-weight: bold;
        margin: 0 5px;
    }

    .frac-num {
        padding: 0 5px;
        min-height: 2.5rem;
        display: flex;
        align-items: center;
        justify-content: center;
        min-width: 20px;
        border-radius: 4px;
    }

    .frac-line {
        width: 100%;
        height: 3px;
        background-color: #333;
        margin: 4px 0;
    }

    .frac-den {
        padding: 0 5px;
        min-height: 2.5rem;
        display: flex;
        align-items: center;
        justify-content: center;
        min-width: 20px;
        border-radius: 4px;
    }

    /* 入力中のアクティブな枠 */
    .frac-num.active, .frac-den.active, .whole-number.active {
        background-color: #a0c4ff;
        color: #000;
        box-shadow: 0 0 0 2px #3498db;
    }

    /* キーパッドのグリッドレイアウト */
    .calc-keys {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 15px;
        max-width: 600px; /* キーパッドは操作しやすい幅に維持 */
        margin: 0 auto;
    }

    /* ボタンの共通スタイル */
    .key-btn {
        height: 70px;
        border: none;
        border-radius: 12px;
        font-size: 1.8rem;
        font-weight: bold;
        cursor: pointer;
        display: flex;
        justify-content: center;
        align-items: center;
        transition: transform 0.1s, box-shadow 0.1s, background-color 0.2s;
        box-shadow: 0 6px 0 rgba(0,0,0,0.2);
        outline: none;
        color: #fff;
    }
    .key-btn:active {
        transform: translateY(6px);
        box-shadow: 0 0 0 rgba(0,0,0,0.2);
    }

    /* ボタンの種類ごとの色分け */
    .btn-num {
        background-color: #34495e;
        color: #ecf0f1;
        box-shadow: 0 6px 0 #1a252f;
    }
    .btn-num:hover { background-color: #3e566e; }

    .btn-op {
        background-color: #f39c12;
        box-shadow: 0 6px 0 #d68910;
    }
    .btn-op:hover { background-color: #f5b041; }

    .btn-func {
        background-color: #7f8c8d;
        box-shadow: 0 6px 0 #616a6b;
        font-size: 1.4rem;
    }
    .btn-func:hover { background-color: #95a5a6; }

    .btn-frac {
        background-color: #8e44ad;
        box-shadow: 0 6px 0 #732d91;
        font-size: 1.4rem;
    }
    .btn-frac:hover { background-color: #9b59b6; }

    .btn-reduce {
        background-color: #27ae60;
        box-shadow: 0 6px 0 #1e8449;
        font-size: 1.4rem;
    }
    .btn-reduce:hover { background-color: #2ecc71; }

    .btn-eq {
        background-color: #c0392b;
        box-shadow: 0 6px 0 #922b21;
    }
    .btn-eq:hover { background-color: #e74c3c; }

    .span-2 {
        grid-column: span 2;
    }

    /* メッセージオーバーレイ */
    .msg-overlay {
        position: fixed;
        top: 20%;
        left: 50%;
        transform: translate(-50%, -50%) scale(0.8);
        opacity: 0;
        visibility: hidden;
        background-color: rgba(46, 204, 113, 0.9);
        color: #fff;
        padding: 15px 40px;
        border-radius: 30px;
        font-size: 2rem;
        font-weight: bold;
        box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        z-index: 10000;
        pointer-events: none;
        transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }
    .msg-overlay.show {
        opacity: 1;
        visibility: visible;
        transform: translate(-50%, -50%) scale(1.0);
    }
    .msg-overlay.error {
        background-color: rgba(231, 76, 60, 0.9);
    }
</style>
</head>
<body>

    <div class="calculator">
        <div class="screen-container" id="screen-container">
            <div id="screen" class="screen-content"></div>
        </div>

        <div class="calc-keys">
            <button class="key-btn btn-func" onclick="pressClear()">C</button>
            <button class="key-btn btn-func" onclick="pressBackspace()">削除</button>
            <button class="key-btn btn-frac" onclick="pressFraction()">分の</button>
            <button class="key-btn btn-op" onclick="pressOperator('÷')">÷</button>

            <button class="key-btn btn-num" onclick="pressDigit('7')">7</button>
            <button class="key-btn btn-num" onclick="pressDigit('8')">8</button>
            <button class="key-btn btn-num" onclick="pressDigit('9')">9</button>
            <button class="key-btn btn-op" onclick="pressOperator('×')">×</button>

            <button class="key-btn btn-num" onclick="pressDigit('4')">4</button>
            <button class="key-btn btn-num" onclick="pressDigit('5')">5</button>
            <button class="key-btn btn-num" onclick="pressDigit('6')">6</button>
            <button class="key-btn btn-op" onclick="pressOperator('-')">-</button>

            <button class="key-btn btn-num" onclick="pressDigit('1')">1</button>
            <button class="key-btn btn-num" onclick="pressDigit('2')">2</button>
            <button class="key-btn btn-num" onclick="pressDigit('3')">3</button>
            <button class="key-btn btn-op" onclick="pressOperator('+')">+</button>

            <button class="key-btn btn-num span-2" onclick="pressDigit('0')">0</button>
            <button class="key-btn btn-reduce" onclick="pressReduce()">約分</button>
            <button class="key-btn btn-eq" onclick="pressEquals()">=</button>
        </div>
    </div>

    <div id="msg-overlay" class="msg-overlay"></div>

    <script>
        // --- 算術用ヘルパー関数 ---
        function gcd(a, b) {
            a = Math.abs(a);
            b = Math.abs(b);
            while (b) {
                let t = b;
                b = a % b;
                a = t;
            }
            return Math.max(1, a);
        }

        function lcm(a, b) {
            if (a === 0 || b === 0) return 0;
            return Math.abs(a * b) / gcd(a, b);
        }

        // --- 状態管理 ---
        let tokens = []; // 確定した式を格納
        let currentInput = { type: 'none' }; 
        let isResult = false; 
        let finalResult = null; // 最終解答
        let calculationSteps = []; // 途中経過のステップを格納

        const screenEl = document.getElementById('screen');
        const screenContainer = document.getElementById('screen-container');
        const msgOverlay = document.getElementById('msg-overlay');

        function showMessage(text, isError = false) {
            msgOverlay.textContent = text;
            msgOverlay.className = isError ? 'msg-overlay error show' : 'msg-overlay show';
            setTimeout(() => {
                msgOverlay.classList.remove('show');
            }, 1500);
        }

        // --- 途中経過を計算し、全ステップの配列を返すエンジン ---
        function evaluateWithSteps(exprTokens) {
            // ディープコピーを作成して処理
            let currentExpr = exprTokens.map(t => ({...t}));
            let steps = [];

            // 先頭にマイナスがある場合は 0 - X の形に補正
            if (currentExpr.length > 0 && currentExpr[0].t === 'op') {
                if (currentExpr[0].v === '-') {
                    currentExpr.unshift({t: 'val', n: 0, d: 1});
                } else {
                    currentExpr.shift(); 
                }
            }

            // 【パス1】 掛け算・割り算の処理
            let i = 0;
            while (i < currentExpr.length) {
                const t = currentExpr[i];
                if (t.t === 'op' && (t.v === '×' || t.v === '÷')) {
                    let prev = currentExpr[i - 1];
                    let next = currentExpr[i + 1];

                    // 割り算は逆数にして掛け算に変換し、一旦ステップとして記録
                    if (t.v === '÷') {
                        if (next.n === 0) throw new Error("0で割ることはできません");
                        let newN = next.d;
                        let newD = next.n;
                        if (newD < 0) { newN = -newN; newD = -newD; } 
                        
                        currentExpr[i].v = '×';
                        currentExpr[i + 1] = { t: 'val', n: newN, d: newD };
                        steps.push(currentExpr.map(x => ({...x})));
                        next = currentExpr[i + 1]; 
                    }

                    // 結合ステップの作成（例： 1×3 / 2×4 ）
                    const nextNStr = next.n < 0 ? `(${next.n})` : next.n;
                    const nextDStr = next.d < 0 ? `(${next.d})` : next.d;
                    const combined = { 
                        t: 'combined', 
                        nStr: `${prev.n} × ${nextNStr}`, 
                        dStr: `${prev.d} × ${nextDStr}` 
                    };
                    
                    currentExpr.splice(i - 1, 3, combined);
                    steps.push(currentExpr.map(x => ({...x})));

                    // 計算結果に置換
                    const res = { t: 'val', n: prev.n * next.n, d: prev.d * next.d };
                    currentExpr.splice(i - 1, 1, res);
                    if (currentExpr.length > 1) {
                        steps.push(currentExpr.map(x => ({...x})));
                    }
                    i = i - 1; // 配列が縮んだのでインデックスを戻す
                } else {
                    i++;
                }
            }

            // 【パス2】 足し算・引き算の処理
            i = 0;
            while (i < currentExpr.length) {
                const t = currentExpr[i];
                if (t.t === 'op' && (t.v === '+' || t.v === '-')) {
                    let prev = currentExpr[i - 1];
                    let next = currentExpr[i + 1];
                    
                    const cd = lcm(prev.d, next.d);
                    
                    // 通分が必要な場合は通分してステップとして記録
                    if (prev.d !== cd || next.d !== cd) {
                        currentExpr[i - 1] = { t: 'val', n: prev.n * (cd / prev.d), d: cd };
                        currentExpr[i + 1] = { t: 'val', n: next.n * (cd / next.d), d: cd };
                        steps.push(currentExpr.map(x => ({...x})));
                        
                        prev = currentExpr[i - 1];
                        next = currentExpr[i + 1];
                    }

                    // 結合ステップの作成（例： 3 + 2 / 6 ）
                    const nextNStr = next.n < 0 ? `(${next.n})` : next.n;
                    const op = currentExpr[i].v;
                    const combined = { 
                        t: 'combined', 
                        nStr: `${prev.n} ${op} ${nextNStr}`, 
                        dStr: `${cd}` 
                    };
                    
                    currentExpr.splice(i - 1, 3, combined);
                    steps.push(currentExpr.map(x => ({...x})));

                    // 計算結果に置換
                    const resN = op === '+' ? (prev.n + next.n) : (prev.n - next.n);
                    const res = { t: 'val', n: resN, d: cd };
                    currentExpr.splice(i - 1, 1, res);
                    if (currentExpr.length > 1) {
                        steps.push(currentExpr.map(x => ({...x})));
                    }
                    i = i - 1;
                } else {
                    i++;
                }
            }

            return {
                finalResult: currentExpr[0] || { n: 0, d: 1 },
                steps: steps
            };
        }

        // --- レンダリング（画面描画） ---
        function renderDisplay() {
            screenEl.innerHTML = '';
            
            // 確定済みの元の計算式を描画
            renderTokenArray(tokens, screenEl);

            // 現在入力中の要素を描画
            if (!isResult) {
                if (currentInput.type === 'number') {
                    screenEl.appendChild(createValElement(currentInput.val, 1, true));
                } else if (currentInput.type === 'fraction') {
                    screenEl.appendChild(createFracElement(currentInput.n, currentInput.d, currentInput.active === 'n', currentInput.active === 'd'));
                }
            }

            // 「＝」と途中経過、最終結果を描画
            if (isResult && finalResult) {
                // 途中経過ステップを順に描画
                calculationSteps.forEach(stepArray => {
                    const eqEl = document.createElement('div');
                    eqEl.className = 'operator';
                    eqEl.textContent = '=';
                    screenEl.appendChild(eqEl);
                    renderTokenArray(stepArray, screenEl);
                });

                // 最後に最終的な答えを描画
                const eqElFinal = document.createElement('div');
                eqElFinal.className = 'operator';
                eqElFinal.textContent = '=';
                screenEl.appendChild(eqElFinal);
                screenEl.appendChild(createValElement(finalResult.n, finalResult.d));
            }

            // 入力や計算が進むにつれて自動で右にスクロール
            setTimeout(() => {
                screenContainer.scrollLeft = screenContainer.scrollWidth;
            }, 10);
        }

        // トークン配列を画面に追加する補助関数
        function renderTokenArray(tokArray, container) {
            tokArray.forEach(tok => {
                if (tok.t === 'val') {
                    container.appendChild(createValElement(tok.n, tok.d));
                } else if (tok.t === 'op') {
                    const opEl = document.createElement('div');
                    opEl.className = 'operator';
                    opEl.textContent = tok.v;
                    container.appendChild(opEl);
                } else if (tok.t === 'combined') {
                    container.appendChild(createCombinedElement(tok.nStr, tok.dStr));
                }
            });
        }

        // 結合要素（途中経過用の特別な分数表現）の生成
        function createCombinedElement(nStr, dStr) {
            const container = document.createElement('div');
            container.className = 'fraction-display';

            const numDiv = document.createElement('div');
            numDiv.className = 'frac-num';
            numDiv.textContent = nStr;

            const lineDiv = document.createElement('div');
            lineDiv.className = 'frac-line';

            const denDiv = document.createElement('div');
            denDiv.className = 'frac-den';
            denDiv.textContent = dStr;

            container.appendChild(numDiv);
            container.appendChild(lineDiv);
            container.appendChild(denDiv);

            return container;
        }

        // 数値要素の生成
        function createValElement(n, d, isTyping = false) {
            if (d === 1 && !isTyping && typeof n === 'number') {
                 const div = document.createElement('div');
                 div.className = 'whole-number';
                 div.textContent = n;
                 return div;
            }
            if (d === 1 && isTyping) {
                 const div = document.createElement('div');
                 div.className = 'whole-number active';
                 div.textContent = n === '' ? '' : n;
                 return div;
            }
            return createFracElement(n, d, false, false);
        }

        // 分数レイアウト（教科書表示）の生成
        function createFracElement(n, d, activeN, activeD) {
            const container = document.createElement('div');
            container.className = 'fraction-display';

            const numDiv = document.createElement('div');
            numDiv.className = 'frac-num' + (activeN ? ' active' : '');
            numDiv.textContent = n !== '' ? n : (activeN ? '' : '0');

            const lineDiv = document.createElement('div');
            lineDiv.className = 'frac-line';

            const denDiv = document.createElement('div');
            denDiv.className = 'frac-den' + (activeD ? ' active' : '');
            denDiv.textContent = d !== '' ? d : (activeD ? '' : '1');

            container.appendChild(numDiv);
            container.appendChild(lineDiv);
            container.appendChild(denDiv);

            if (typeof n === 'number' && typeof d === 'number' && (n < 0 || d < 0)) {
                const isNeg = (n < 0) ^ (d < 0);
                numDiv.textContent = Math.abs(n);
                denDiv.textContent = Math.abs(d);
                if (isNeg) {
                    const wrapper = document.createElement('div');
                    wrapper.style.display = 'flex';
                    wrapper.style.alignItems = 'center';
                    const minus = document.createElement('div');
                    minus.className = 'operator';
                    minus.textContent = '-';
                    minus.style.marginRight = '5px';
                    wrapper.appendChild(minus);
                    wrapper.appendChild(container);
                    return wrapper;
                }
            }
            return container;
        }

        // --- 入力制御ロジック ---
        function commitInput() {
            if (currentInput.type === 'none') return;
            
            if (currentInput.type === 'number') {
                const val = currentInput.val === '' ? 0 : parseInt(currentInput.val, 10);
                tokens.push({ t: 'val', n: val, d: 1 });
            } else if (currentInput.type === 'fraction') {
                const num = currentInput.n === '' ? 0 : parseInt(currentInput.n, 10);
                let den = currentInput.d === '' ? 1 : parseInt(currentInput.d, 10);
                if (den === 0) den = 1; 
                tokens.push({ t: 'val', n: num, d: den });
            }
            currentInput = { type: 'none' };
        }

        // 数字ボタン押下
        window.pressDigit = function(digit) {
            if (isResult) {
                pressClear(); // 結果表示中に数字を押すと完全リセット
            }

            if (currentInput.type === 'none') {
                currentInput = { type: 'number', val: digit };
            } else if (currentInput.type === 'number') {
                currentInput.val += digit;
            } else if (currentInput.type === 'fraction') {
                if (currentInput.active === 'n') {
                    currentInput.n += digit;
                } else {
                    currentInput.d += digit;
                }
            }
            renderDisplay();
        };

        // 「分の」ボタン押下（モード切り替え）
        window.pressFraction = function() {
            if (isResult) {
                const res = finalResult;
                pressClear();
                // 答えから計算を再開する場合は、分子のアクティブ状態から始める
                currentInput = { type: 'fraction', n: res.n.toString(), d: res.d.toString(), active: 'n' };
            } else if (currentInput.type === 'none') {
                // 何もない状態から押した場合は、分母から入力させる
                currentInput = { type: 'fraction', n: '', d: '', active: 'd' };
            } else if (currentInput.type === 'number') {
                // 数字入力後に押した場合は、それを「分母」とし、「分子」をアクティブにする
                currentInput = { type: 'fraction', n: '', d: currentInput.val, active: 'n' };
            } else if (currentInput.type === 'fraction') {
                currentInput.active = currentInput.active === 'n' ? 'd' : 'n';
            }
            renderDisplay();
        };

        // 演算子ボタン押下
        window.pressOperator = function(op) {
            if (isResult) {
                // 結果表示中に演算子を押した場合は、答えから式をリスタート
                tokens = [finalResult];
                finalResult = null;
                calculationSteps = [];
                isResult = false; 
            }
            
            commitInput();

            if (tokens.length > 0) {
                const lastToken = tokens[tokens.length - 1];
                if (lastToken.t === 'op') {
                    lastToken.v = op; // 連続押下は上書き
                } else {
                    tokens.push({ t: 'op', v: op });
                }
            }
            renderDisplay();
        };

        // 削除（バックスペース）ボタン押下
        window.pressBackspace = function() {
            if (isResult) {
                // 結果表示中に削除を押すと、途中経過と答えが消えて元の式に戻る
                isResult = false;
                finalResult = null;
                calculationSteps = [];
                renderDisplay();
                return;
            }

            if (currentInput.type === 'number') {
                currentInput.val = currentInput.val.slice(0, -1);
                if (currentInput.val === '') currentInput = { type: 'none' };
            } else if (currentInput.type === 'fraction') {
                if (currentInput.active === 'n') {
                    currentInput.n = currentInput.n.slice(0, -1);
                } else {
                    currentInput.d = currentInput.d.slice(0, -1);
                }
                if (currentInput.n === '' && currentInput.d === '') {
                    currentInput = { type: 'none' };
                }
            } else if (currentInput.type === 'none' && tokens.length > 0) {
                tokens.pop();
            }
            renderDisplay();
        };

        // クリアボタン押下
        window.pressClear = function() {
            tokens = [];
            currentInput = { type: 'none' };
            isResult = false;
            finalResult = null;
            calculationSteps = [];
            renderDisplay();
        };

        // 約分ボタン押下（最終解答の導出）
        window.pressReduce = function() {
            if (!isResult || !finalResult) {
                showMessage("計算後に押してください", true);
                return;
            }
            
            const g = gcd(finalResult.n, finalResult.d);
            
            if (g > 1) {
                // 約分前の答えを途中経過に記録し、答えを更新して追加表示させる
                calculationSteps.push([{t: 'val', n: finalResult.n, d: finalResult.d}]);
                
                finalResult.n /= g;
                finalResult.d /= g;
                showMessage("約分しました！");
                renderDisplay();
            } else {
                showMessage("これ以上約分できません", true);
            }
        };

        // 計算実行（イコールボタン）
        window.pressEquals = function() {
            commitInput();
            if (tokens.length === 0) return;

            if (tokens[tokens.length - 1].t === 'op') {
                tokens.pop();
            }

            try {
                // 途中経過アルゴリズムを呼び出し
                const evalData = evaluateWithSteps(tokens);
                calculationSteps = evalData.steps;
                finalResult = { t: 'val', n: evalData.finalResult.n, d: evalData.finalResult.d };
                isResult = true;
                renderDisplay();
            } catch (e) {
                showMessage("計算エラー", true);
                pressClear();
            }
        };

        // 初期描画
        renderDisplay();
    </script>
</body>
</html>
