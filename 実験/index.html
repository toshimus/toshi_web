<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>分数の色塗り</title>
<style>
    body {
        font-family: "Helvetica Neue", Arial, "Hiragino Kaku Gothic ProN", "Hiragino Sans", Meiryo, sans-serif;
        margin: 0;
        padding: 20px;
        background-color: #ffffff;
        color: #333;
    }
    h1 {
        font-size: 1.2rem;
        font-weight: normal;
        margin-bottom: 20px;
    }
    .status-bar {
        font-size: 1.1rem;
        margin-bottom: 30px;
        color: #555;
    }
    .problem-container {
        display: flex;
        flex-direction: column;
        margin-bottom: 40px;
        width: 100%;
        max-width: 800px;
    }
    .problem-main {
        display: flex;
        align-items: center;
        width: 100%;
    }
    .fraction-display {
        display: flex;
        align-items: center;
        margin-right: 30px;
        width: 100px;
    }
    .fraction {
        display: inline-flex;
        flex-direction: column;
        align-items: center;
        font-size: 1.8rem;
        line-height: 1.2;
    }
    .numerator {
        border-bottom: 2px solid #000;
        padding: 0 10px;
    }
    .denominator {
        padding: 0 10px;
    }
    .unit {
        font-size: 1.4rem;
        margin-left: 10px;
    }
    .bar-area {
        flex-grow: 1;
        display: flex;
        flex-direction: column;
    }
    .label-1m {
        display: flex;
        align-items: center;
        text-align: center;
        margin-bottom: 10px;
        font-size: 1.1rem;
        color: blue; 
    }
    .label-1m::before, .label-1m::after {
        content: "";
        flex: 1;
        border-bottom: 1px solid blue; 
        margin: 0 15px;
    }
    .bar {
        display: flex;
        width: 100%;
        height: 50px;
        border: 2px solid #000;
        box-sizing: border-box;
    }
    .segment {
        flex: 1;
        border-right: 1px dotted #000;
        cursor: pointer;
        -webkit-tap-highlight-color: transparent;
        transition: background-color 0.2s ease;
    }
    .segment:last-child {
        border-right: none;
    }
    .segment.filled {
        background-color: #a0c4ff;
    }
    
    .controls-area {
        display: flex;
        align-items: center;
        margin-top: 20px;
        padding-left: 130px;
    }
    .div-btn {
        width: 45px;
        height: 45px;
        font-size: 1.5rem;
        cursor: pointer;
        border: 1px solid #999;
        background-color: #fff;
        border-radius: 8px;
        margin-right: 10px;
        outline: none;
        -webkit-tap-highlight-color: transparent;
        display: flex;
        justify-content: center;
        align-items: center;
    }
    .div-btn:active {
        background-color: #e0e0e0;
    }
    .div-btn:disabled {
        opacity: 0.5;
        cursor: not-allowed;
    }
    .division-label {
        font-size: 1.1rem;
        margin: 0 20px 0 10px;
        color: #555;
    }
    .check-btn {
        padding: 12px 25px;
        font-size: 1.1rem;
        cursor: pointer;
        border: 1px solid #999;
        background-color: #f0f0f0;
        border-radius: 8px;
        font-family: inherit;
        outline: none;
        -webkit-tap-highlight-color: transparent;
        margin-left: auto;
    }
    .check-btn:active {
        background-color: #dcdcdc;
    }
    .check-btn:disabled {
        opacity: 0.5;
        cursor: not-allowed;
    }
    
    .result-display {
        font-size: 8rem;
        color: red;
        font-weight: bold;
        text-align: center;
        width: 100%;
        margin-top: 30px;
        min-height: 150px; 
        display: flex;
        justify-content: center;
        align-items: center;
    }
    
    /* 最終結果表示用のスタイル */
    .clear-message {
        text-align: center;
        margin-top: 40px;
        padding: 30px;
        background-color: #f8f9fa;
        border-radius: 12px;
        border: 2px solid #a0c4ff;
    }
    .clear-message h2 {
        font-size: 2rem;
        color: #d9534f;
        margin-top: 0;
        margin-bottom: 30px;
    }
    .final-result-details {
        font-size: 1.5rem;
        color: #333;
        line-height: 1.8;
    }
    .retry-btn {
        margin-top: 30px;
        padding: 12px 30px;
        font-size: 1.2rem;
        cursor: pointer;
        border: none;
        background-color: #a0c4ff;
        color: #fff;
        border-radius: 8px;
        outline: none;
    }
    .retry-btn:active {
        background-color: #8bb4f5;
    }
</style>
</head>
<body>

    <h1>・ 次の長さの分だけ色をぬりましょう。</h1>
    <div id="app"></div>

    <script>
        const problems = [
            { num: 1, den: 3 },
            { num: 3, den: 5 },
            { num: 1, den: 2 },
            { num: 7, den: 8 },
            { num: 5, den: 7 },
            { num: 3, den: 4 },
            { num: 2, den: 9 },
            { num: 2, den: 3 },
            { num: 4, den: 5 },
            { num: 5, den: 6 }
        ];

        function shuffleArray(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
        }

        // 初期状態のセットアップ
        shuffleArray(problems);
        let currentIndex = 0;
        let mistakeCount = 0; // 間違えた回数を記録する変数を追加しました
        const appContainer = document.getElementById('app');

        function renderProblem() {
            appContainer.innerHTML = '';

            // 全問終了時の結果表示処理
            if (currentIndex >= problems.length) {
                const clearMsg = document.createElement('div');
                clearMsg.className = 'clear-message';
                
                // 最終結果をHTMLで構築します
                let htmlContent = `<h2>全10問クリアしました！</h2>`;
                htmlContent += `<div class="final-result-details">`;
                htmlContent += `<div>正解した問題： <strong>10</strong> 問</div>`;
                htmlContent += `<div>間違えた回数： <strong>${mistakeCount}</strong> 回</div>`;
                
                if (mistakeCount === 0) {
                    htmlContent += `<div style="color: blue; font-weight: bold; margin-top: 15px;">パーフェクトです！素晴らしい成績です。</div>`;
                }
                
                htmlContent += `</div>`;
                
                // 最初からやり直すボタンも追加しました
                htmlContent += `<button class="retry-btn" onclick="location.reload()">もう一度挑戦する</button>`;
                
                clearMsg.innerHTML = htmlContent;
                appContainer.appendChild(clearMsg);
                return;
            }

            const prob = problems[currentIndex];
            let currentDivisions = 1;

            const statusBar = document.createElement('div');
            statusBar.className = 'status-bar';
            statusBar.textContent = `第 ${currentIndex + 1} 問 / 全 ${problems.length} 問`;
            appContainer.appendChild(statusBar);

            const container = document.createElement('div');
            container.className = 'problem-container';

            const mainArea = document.createElement('div');
            mainArea.className = 'problem-main';

            const fracDisplay = document.createElement('div');
            fracDisplay.className = 'fraction-display';

            const fraction = document.createElement('div');
            fraction.className = 'fraction';
            
            const numEl = document.createElement('div');
            numEl.className = 'numerator';
            numEl.textContent = prob.num;
            
            const denEl = document.createElement('div');
            denEl.className = 'denominator';
            denEl.textContent = prob.den;

            fraction.appendChild(numEl);
            fraction.appendChild(denEl);

            const unitEl = document.createElement('div');
            unitEl.className = 'unit';
            unitEl.textContent = 'm';

            fracDisplay.appendChild(fraction);
            fracDisplay.appendChild(unitEl);
            mainArea.appendChild(fracDisplay);

            const barArea = document.createElement('div');
            barArea.className = 'bar-area';

            const label1m = document.createElement('div');
            label1m.className = 'label-1m';
            label1m.textContent = '1 m';
            barArea.appendChild(label1m);

            const bar = document.createElement('div');
            bar.className = 'bar';

            function updateBar() {
                bar.innerHTML = '';
                for (let i = 0; i < currentDivisions; i++) {
                    const segment = document.createElement('div');
                    segment.className = 'segment';
                    
                    segment.addEventListener('click', function() {
                        this.classList.toggle('filled');
                    });
                    
                    bar.appendChild(segment);
                }
            }
            
            updateBar();

            barArea.appendChild(bar);
            mainArea.appendChild(barArea);
            container.appendChild(mainArea);

            const controlsArea = document.createElement('div');
            controlsArea.className = 'controls-area';

            const minusBtn = document.createElement('button');
            minusBtn.className = 'div-btn';
            minusBtn.textContent = 'ー';

            const plusBtn = document.createElement('button');
            plusBtn.className = 'div-btn';
            plusBtn.textContent = '＋';

            const divLabel = document.createElement('div');
            divLabel.className = 'division-label';
            divLabel.textContent = `（${currentDivisions} 分割）`;

            minusBtn.addEventListener('click', () => {
                if (currentDivisions > 1) {
                    currentDivisions--;
                    divLabel.textContent = `（${currentDivisions} 分割）`;
                    updateBar(); 
                }
            });

            plusBtn.addEventListener('click', () => {
                if (currentDivisions < 20) { 
                    currentDivisions++;
                    divLabel.textContent = `（${currentDivisions} 分割）`;
                    updateBar(); 
                }
            });

            const checkBtn = document.createElement('button');
            checkBtn.className = 'check-btn';
            checkBtn.textContent = 'できた';

            const resultDisplay = document.createElement('div');
            resultDisplay.className = 'result-display';

            checkBtn.addEventListener('click', () => {
                const filledCount = bar.querySelectorAll('.segment.filled').length;
                
                const isCorrect = filledCount > 0 && 
                                  Math.abs((filledCount / currentDivisions) - (prob.num / prob.den)) < 0.0001;

                if (isCorrect) {
                    resultDisplay.textContent = '○';
                    
                    minusBtn.disabled = true;
                    plusBtn.disabled = true;
                    checkBtn.disabled = true;
                    
                    setTimeout(() => {
                        currentIndex++;
                        renderProblem();
                    }, 1500);
                } else {
                    resultDisplay.textContent = '×';
                    mistakeCount++; // 不正解時に間違えた回数をカウントします
                }
            });

            controlsArea.appendChild(minusBtn);
            controlsArea.appendChild(plusBtn);
            controlsArea.appendChild(divLabel);
            controlsArea.appendChild(checkBtn);
            
            container.appendChild(controlsArea);
            container.appendChild(resultDisplay);
            
            appContainer.appendChild(container);
        }

        renderProblem();
    </script>
</body>
</html>
