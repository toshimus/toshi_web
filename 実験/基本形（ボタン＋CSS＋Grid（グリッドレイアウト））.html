<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>ボタンのサンプル - Grid版</title>
    <style>
        /* 画面全体を高さ100vhで指定し、グリッドで中央に配置します */
        body, html {
            margin: 0;
            height: 100%;
        }

        .container {
            display: grid;
            place-items: center; /* 水平・垂直ともに中央揃え */
            height: 100%;        /* 画面全体の高さを確保 */
        }

        button {
            padding: 10px 20px;
            font-size: 16px;
            color: #ffffff;
            background-color: #28a745; /* 違いを出すために色を変更しました */
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: background-color 0.3s;
        }

        button:hover {
            background-color: #218838;
        }
    </style>
</head>
<body>

    <div class="container">
        <button type="button" id="myButton">ボタンを押してください</button>
    </div>

    <script>
        const button = document.getElementById('myButton');
        
        button.addEventListener('click', function() {
            alert('Gridレイアウトを使用して中央に配置しました。');
        });
    </script>

</body>
</html>
