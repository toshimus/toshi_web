<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>ボタンのサンプル - Absolute版</title>
    <style>
        body, html {
            margin: 0;
            height: 100%;
        }

        .container {
            /* 子要素を絶対配置するために基準となる親を定義 */
            position: relative;
            height: 100%;
        }

        button {
            position: absolute;
            top: 20px;   /* 上から20pxの位置 */
            right: 20px; /* 右から20pxの位置 */
            
            padding: 10px 20px;
            font-size: 16px;
            color: #ffffff;
            background-color: #dc3545; /* 違いを出すために色を変更しました */
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: background-color 0.3s;
        }

        button:hover {
            background-color: #c82333;
        }
    </style>
</head>
<body>

    <div class="container">
        <button type="button" id="myButton">ボタンを押してください</button>
    </div>

    <script>
        const button = document.getElementById('myButton');
        
        button.addEventListener('click', function() {
            alert('Absolute（絶対配置）を使用して、画面の右上に配置しました。');
        });
    </script>

</body>
</html>
