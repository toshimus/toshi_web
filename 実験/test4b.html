<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>計算機入力の学習（2桁×2桁筆算）</title>
<style>
    html, body {
        height: 100%;
        overflow: hidden;
        position: fixed;
        width: 100%;
    }
    body {
        font-family: "Helvetica Neue", Arial, "Hiragino Kaku Gothic ProN", "Hiragino Sans", Meiryo, sans-serif;
        margin: 0;
        padding: 20px;
        background-color: #ffffff;
        color: #333;
        touch-action: none;
        box-sizing: border-box;
        user-select: none;
        -webkit-user-select: none;
    }
    
    /* スタート画面のスタイル */
    .start-screen {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background-color: #f0f8ff;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        z-index: 10000;
    }
    .start-screen h1 {
        font-size: 3rem;
        color: #2c3e50;
        margin-bottom: 40px;
    }
    .start-btn {
        padding: 20px 60px;
        font-size: 2.5rem;
        font-weight: bold;
        color: #fff;
        background-color: #3498db;
        border: none;
        border-radius: 15px;
        cursor: pointer;
        box-shadow: 0 8px 0 #2980b9;
        transition: transform 0.1s, box-shadow 0.1s;
        -webkit-tap-highlight-color: transparent;
    }
    .start-btn:active {
        transform: translateY(8px);
        box-shadow: none;
    }

    /* 上部ステータスバーと問題文のスタイル */
    .status-bar {
        font-size: 1.2rem;
        font-weight: bold;
        margin-bottom: 10px;
        color: #555;
    }
    .question-title {
        font-size: 1.6rem;
        font-weight: normal;
        margin-bottom: 25px;
        margin-top: 0;
    }

    .answer-area {
        display: flex;
        align-items: flex-end;
        justify-content: center;
        margin-top: 40px;
    }
    
    /* ドロップゾーン（□の枠） */
    .drop-zone {
        width: 80px; 
        height: 80px; 
        border: 2px dashed #3498db;
        background-color: #f0f8ff;
        border-radius: 8px;
        display: flex;
        justify-content: center;
        align-items: center;
        font-size: 3rem; 
        font-weight: bold;
        cursor: pointer;
        color: #333;
    }

    /* 繰り上がりメモ用の小さな赤い枠 */
    .drop-zone.small {
        width: 36px;
        height: 36px;
        border: 2px dashed #e74c3c;
        background-color: #fff0f0;
        border-radius: 6px;
        font-size: 1.8rem;
        color: #e74c3c;
    }
    
    /* 判定ボタン */
    .check-btn {
        width: 200px;
        height: 80px; 
        font-size: 1.6rem;
        font-weight: bold;
        cursor: pointer;
        border: none;
        background-color: #00bfff;
        color: #ffffff;
        border-radius: 10px;
        font-family: inherit;
        outline: none;
        box-shadow: 0 4px 0 #0088cc;
        -webkit-tap-highlight-color: transparent;
        touch-action: manipulation;
        display: flex;
        justify-content: center;
        align-items: center;
        margin-left: 40px;
        margin-bottom: 5px;
        transition: background-color 0.2s, box-shadow 0.2s;
    }
    .check-btn:active {
        transform: translateY(4px);
        box-shadow: none;
    }
    .judge-overlay {
        position: fixed;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%) scale(0.7);
        opacity: 0;
        visibility: hidden;
        background-color: transparent;
        color: #ff3333;
        font-size: 6rem;
        font-weight: bold;
        padding: 30px 60px;
        -webkit-text-stroke: 3px #000;
        text-shadow: 4px 4px 10px rgba(0, 0, 0, 0.5);
        z-index: 9999;
        pointer-events: none;
        transition: opacity 0.3s ease, transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275), visibility 0.3s;
        white-space: nowrap;
    }
    .judge-overlay.show {
        opacity: 1;
        visibility: visible;
        transform: translate(-50%, -50%) scale(1.0);
    }
    .judge-overlay.incorrect {
        color: #3366ff;
    }
    
    .menu-btn {
        background-color: #95a5a6;
        color: #fff;
        margin-top: 20px;
        padding: 12px 30px;
        font-size: 1.1rem;
        cursor: pointer;
        border: none;
        border-radius: 8px;
        outline: none;
        touch-action: manipulation;
        text-decoration: none;
        display: inline-block;
    }
    
    .top-nav {
        display: flex;
        justify-content: space-between; 
        align-items: center;            
        margin-bottom: 10px;
    }
    .toggle-group {
        display: flex;
        gap: 15px;
    }
    .settings-toggle {
        font-size: 1.1rem;
        color: #555;
        cursor: pointer;
        display: flex;
        align-items: center;
        -webkit-tap-highlight-color: transparent;
    }
    .settings-toggle input {
        transform: scale(1.3);
        margin-right: 8px;
        cursor: pointer;
    }
    .back-btn {
        padding: 8px 15px;
        background-color: #ecf0f1;
        border: 1px solid #bdc3c7;
        border-radius: 5px;
        text-decoration: none;
        color: #2c3e50;
        font-size: 0.9rem;
        touch-action: manipulation;
    }

    /* ==========================================
       計算機パネルとオーバーレイのスタイル追加
       ========================================== */
    .pieces-container { display: none; justify-content: center; align-items: center; flex-wrap: wrap; gap: 10px; padding: 15px; background-color: #ecf0f1; border-radius: 12px; width: 280px; margin: 0 auto; box-sizing: border-box; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); box-shadow: 0 10px 25px rgba(0,0,0,0.3); z-index: 1000; cursor: grab; }
    .pieces-container:active { cursor: grabbing; }
    
    .piece { flex: 1 1 25%; height: 60px; border: 2px solid #2c3e50; background-color: #f1c40f; border-radius: 10px; display: flex; justify-content: center; align-items: center; font-size: 1.8rem; font-weight: bold; cursor: pointer; color: #2c3e50; box-shadow: 0 4px 0 #d4ac0d; touch-action: manipulation; box-sizing: border-box; }
    .piece:active { transform: translateY(4px); box-shadow: none; }
    
    .piece.delete-btn { background-color: #e74c3c; color: white; border-color: #c0392b; box-shadow: 0 4px 0 #c0392b; font-size: 1.2rem; }
    .piece.enter-btn { background-color: #2ecc71; color: white; border-color: #27ae60; box-shadow: 0 4px 0 #27ae60; font-size: 1.2rem; }
    
    .overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.4); z-index: 999; }
</style>
</head>
<body>

    <div id="start-screen" class="start-screen">
        <h1>計算機入力の学習</h1>
        <button id="start-btn" class="start-btn">スタート</button>
        <BR><BR><a href="index.html" class="menu-btn" style="margin-top: 20px; background-color: #95a5a6;">メニューへ戻る</a>
    </div>

    <div id="main-content" style="display: none;">
        <div class="top-nav" style="display: none;">
            <div class="toggle-group">
                <label class="settings-toggle">
                    <input type="checkbox" id="speech-checkbox" checked>
                    スピーチON
                </label>
                <label class="settings-toggle">
                    <input type="checkbox" id="sound-checkbox" checked>
                    効果音ON
                </label>
            </div>
            <a href="index.html" class="back-btn">メニューへ戻る</a>
        </div>
        
        <div id="status-bar" class="status-bar" style="display: none;"></div>
        <h1 class="question-title" style="display: none;">問題タイトル</h1>
        
        <div id="app"></div>
        
        <div id="judge-overlay" class="judge-overlay"></div>

        <div class="overlay" id="overlay"></div>
        <div class="pieces-container" id="calc-container"></div>
    </div>

    <script>
        // 音声ファイル（mp3）のセットアップ
        const okSound = new Audio('ok.mp3');
        const ngSound = new Audio('ng.mp3');

        function speak(text) {
            const speechCheckbox = document.getElementById('speech-checkbox');
            if (speechCheckbox && !speechCheckbox.checked) {
                return; 
            }
            window.speechSynthesis.cancel(); 
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'ja-JP';
            utterance.rate = 1.0;
            utterance.pitch = 1.0;
            window.speechSynthesis.speak(utterance);
        }

        const numberReadings = [
            "ぜろ", "いち", "に", "さん", "よん", "ご", "ろく", "なな", "はち", "きゅう", "じゅう",
            "じゅういち", "じゅうに", "じゅうさん", "じゅうよん", "じゅうご", "じゅうろく", "じゅうなな", "じゅうはち", "じゅうきゅう", "にじゅう"
        ];

        /* ==========================================
           計算機パネルの構築とロジック
           ========================================== */
        const overlay = document.getElementById('overlay');
        const calcContainer = document.getElementById('calc-container');
        let activeInputBox = null;
        let baseValue = 0; 

        const calcKeys = [
            '7', '8', '9',
            '4', '5', '6',
            '1', '2', '3',
            '0', '削除', '+10'
        ];

        calcKeys.forEach(key => {
            const piece = document.createElement('div');
            piece.className = 'piece';
            piece.textContent = key;
            
            if (key === '削除') {
                piece.classList.add('delete-btn');
                piece.addEventListener('click', () => {
                    if (activeInputBox) {
                        activeInputBox.textContent = '';
                        baseValue = 0;
                    }
                });
            } else if (key === '+10') {
                piece.classList.add('enter-btn');
                piece.addEventListener('click', () => {
                    if (activeInputBox) {
                        baseValue += 10;
                        activeInputBox.textContent = baseValue;
                        speak("じゅう");
                    }
                });
            } else {
                piece.addEventListener('click', () => {
                    if (activeInputBox) {
                        const num = parseInt(key, 10);
                        const finalValue = baseValue + num;
                        activeInputBox.textContent = finalValue;
                        
                        if (finalValue >= 0 && finalValue <= 20) {
                            speak(numberReadings[finalValue]);
                        } else {
                            speak(finalValue.toString());
                        }

                        calcContainer.style.display = 'none';
                        overlay.style.display = 'none';
                        activeInputBox = null;
                    }
                });
            }
            calcContainer.appendChild(piece);
        });

        overlay.addEventListener('click', () => {
            calcContainer.style.display = 'none';
            overlay.style.display = 'none';
            activeInputBox = null;
        });

        let isDragging = false;
        let dragStartX, dragStartY, initialLeft, initialTop;

        function startDrag(e) {
            if (e.target.classList.contains('piece')) return;
            isDragging = true;
            let clientX = e.touches ? e.touches[0].clientX : e.clientX;
            let clientY = e.touches ? e.touches[0].clientY : e.clientY;
            dragStartX = clientX;
            dragStartY = clientY;
            let style = window.getComputedStyle(calcContainer);
            initialLeft = parseFloat(style.left);
            initialTop = parseFloat(style.top);
        }

        function doDrag(e) {
            if (!isDragging) return;
            e.preventDefault();
            let clientX = e.touches ? e.touches[0].clientX : e.clientX;
            let clientY = e.touches ? e.touches[0].clientY : e.clientY;
            let dx = clientX - dragStartX;
            let dy = clientY - dragStartY;
            calcContainer.style.left = (initialLeft + dx) + 'px';
            calcContainer.style.top = (initialTop + dy) + 'px';
        }

        function stopDrag() {
            isDragging = false;
        }

        calcContainer.addEventListener('mousedown', startDrag);
        document.addEventListener('mousemove', doDrag, { passive: false });
        document.addEventListener('mouseup', stopDrag);
        calcContainer.addEventListener('touchstart', startDrag, { passive: false });
        document.addEventListener('touchmove', doDrag, { passive: false });
        document.addEventListener('touchend', stopDrag);

        /* ==========================================
           学習用シンプル画面ロジック（2桁×2桁ランダム対応版）
           ========================================== */
        const appContainer = document.getElementById('app');
        let problemStartTime = new Date();

        function formatTime(date) {
            return date.getHours().toString().padStart(2, '0') + ':' + 
                   date.getMinutes().toString().padStart(2, '0') + ':' + 
                   date.getSeconds().toString().padStart(2, '0');
        }

        function renderProblem() {
            appContainer.innerHTML = '';
            problemStartTime = new Date();

            // ランダムに2桁×2桁の問題を生成（10〜99）
            const currentNum1 = Math.floor(Math.random() * 90) + 10;
            const currentNum2 = Math.floor(Math.random() * 90) + 10;

            const num1Str = currentNum1.toString();
            const num2Str = currentNum2.toString();
            
            // 正解の計算
            const expectedFinalAns = currentNum1 * currentNum2;

            const answerArea = document.createElement('div');
            answerArea.className = 'answer-area';

            const mathContainer = document.createElement('div');
            mathContainer.style.display = 'flex';
            mathContainer.style.flexDirection = 'column';
            mathContainer.style.alignItems = 'flex-start';

            // 空白マスの生成（高さ調整可能）
            const createEmpty = (h = 80) => {
                const div = document.createElement('div');
                div.style.width = '80px';
                div.style.height = h + 'px';
                return div;
            };

            const createText = (str, isHint = false, textColor = '#333', customFontSize = null) => {
                const div = document.createElement('div');
                div.style.width = isHint ? 'auto' : '80px';
                div.style.height = '80px';
                div.style.display = 'flex';
                div.style.justifyContent = isHint ? 'flex-start' : 'center';
                div.style.alignItems = 'center';
                div.style.fontSize = customFontSize ? customFontSize : (isHint ? '1.5rem' : '3.5rem');
                div.style.fontWeight = 'bold';
                div.style.color = isHint ? '#888' : textColor;
                div.style.marginLeft = isHint ? '20px' : '0';
                div.textContent = str;
                return div;
            };

            const createDropZone = (id) => {
                const zone = document.createElement('div');
                zone.className = 'drop-zone';
                zone.id = id;
                zone.addEventListener('click', () => { 
                    zone.textContent = ''; baseValue = 0; activeInputBox = zone;
                    calcContainer.style.display = 'flex'; overlay.style.display = 'block';
                });
                return zone;
            };

            // 繰り上がりメモ用の小さな枠を格納するコンテナ
            const createSmallBoxContainer = (id) => {
                const container = document.createElement('div');
                container.style.width = '80px';
                container.style.height = '45px';
                container.style.display = 'flex';
                // 枠の左上に寄せて配置
                container.style.justifyContent = 'flex-end'; // 'flex-start';（左寄せ）
                container.style.alignItems = 'center';
                container.style.paddingLeft = '5px';

                if (id) {
                    const zone = document.createElement('div');
                    zone.className = 'drop-zone small';
                    zone.id = id;
                    zone.addEventListener('click', () => { 
                        zone.textContent = ''; baseValue = 0; activeInputBox = zone;
                        calcContainer.style.display = 'flex'; overlay.style.display = 'block';
                    });
                    container.appendChild(zone);
                }
                return container;
            };

            // 区切り線: 全5桁分の幅を基準にして指定した桁数分を右揃えで引く
            const createLine = (digits) => {
                const line = document.createElement('div');
                const width = (80 * digits) + (5 * (digits - 1));
                line.style.width = width + 'px';
                line.style.borderBottom = '4px solid #333';
                line.style.margin = '5px 0';
                
                const totalColumns = 5;
                const totalMathWidth = (80 * totalColumns) + (5 * (totalColumns - 1));
                
                line.style.marginLeft = (totalMathWidth - width) + 'px';
                return line;
            };

            const createRow = () => {
                const row = document.createElement('div');
                row.style.display = 'flex';
                row.style.gap = '5px';
                return row;
            };

            // 全5桁（Col1=万の位, Col2=千の位, Col3=百の位, Col4=十の位, Col5=一の位）の構造で作成

            // --- 1段目: 2桁の数（Col 4, 5 に配置） ---
            const r1 = createRow();
            r1.appendChild(createEmpty()); r1.appendChild(createEmpty()); r1.appendChild(createEmpty());
            r1.appendChild(createText(num1Str[0])); r1.appendChild(createText(num1Str[1]));

            // --- 2段目: × 2桁の数（Col 3 に×、Col 4, 5 に数） ---
            const r2 = createRow();
            r2.appendChild(createEmpty()); r2.appendChild(createEmpty());
            r2.appendChild(createText('×', false, '#333', '5rem'));
            r2.appendChild(createText(num2Str[0])); r2.appendChild(createText(num2Str[1]));

            // --- 3段目: □ □ <-- num2(1の位) × num1(1の位) ---
            const r3 = createRow();
            r3.appendChild(createEmpty()); r3.appendChild(createEmpty()); r3.appendChild(createEmpty());
            const box1 = createDropZone('ans-box1');
            const box2 = createDropZone('ans-box2');
            r3.appendChild(box1); r3.appendChild(box2);
            r3.appendChild(createText(`<-- ${num2Str[1]}×${num1Str[1]}`, true));

            // --- 4段目: □ □ 0 <-- num2(1の位) × num1(10の位) ---
            const r4 = createRow();
            r4.appendChild(createEmpty()); r4.appendChild(createEmpty());
            const box3 = createDropZone('ans-box3');
            const box4 = createDropZone('ans-box4');
            r4.appendChild(box3); r4.appendChild(box4);
            r4.appendChild(createText('0', false, '#bbb'));
            r4.appendChild(createText(`<-- ${num2Str[1]}×${num1Str[0]}`, true));

            // --- 5段目: □ □ 0 <-- num2(10の位) × num1(1の位) ---
            const r5 = createRow();
            r5.appendChild(createEmpty()); r5.appendChild(createEmpty());
            const box5 = createDropZone('ans-box5');
            const box6 = createDropZone('ans-box6');
            r5.appendChild(box5); r5.appendChild(box6);
            r5.appendChild(createText('0', false, '#bbb'));
            r5.appendChild(createText(`<-- ${num2Str[0]}×${num1Str[1]}`, true));

            // --- 6段目: □ □ 0 0 <-- num2(10の位) × num1(10の位) ---
            const r6 = createRow();
            r6.appendChild(createEmpty());
            const box7 = createDropZone('ans-box7');
            const box8 = createDropZone('ans-box8');
            r6.appendChild(box7); r6.appendChild(box8);
            r6.appendChild(createText('0', false, '#bbb'));
            r6.appendChild(createText('0', false, '#bbb'));
            r6.appendChild(createText(`<-- ${num2Str[0]}×${num1Str[0]}`, true));

            // --- 繰り上がりメモ行（Col2=千の位, Col3=百の位, Col4=十の位 に赤い補助枠） ---
            const r_carry = createRow();
            r_carry.appendChild(createEmpty(45)); // 万の位用空白（高さ合わせ）
            r_carry.appendChild(createSmallBoxContainer('carry-box1')); // 千の位
            r_carry.appendChild(createSmallBoxContainer('carry-box2')); // 百の位
            r_carry.appendChild(createSmallBoxContainer('carry-box3')); // 十の位
            r_carry.appendChild(createSmallBoxContainer(null));         // 一の位は繰り上がりなし

            // --- 7段目: □ □ □ □ (最終的な答え、最大4桁) ---
            const r7 = createRow();
            r7.appendChild(createEmpty());
            const box9 = createDropZone('ans-box9');
            const box10 = createDropZone('ans-box10');
            const box11 = createDropZone('ans-box11');
            const box12 = createDropZone('ans-box12');
            r7.appendChild(box9); r7.appendChild(box10); r7.appendChild(box11); r7.appendChild(box12);

            // コンテナに組み立て
            mathContainer.appendChild(r1);
            mathContainer.appendChild(r2);
            mathContainer.appendChild(createLine(4)); // 1つ目の横線は4桁分
            mathContainer.appendChild(r3);
            mathContainer.appendChild(r4);
            mathContainer.appendChild(r5);
            mathContainer.appendChild(r6);
            mathContainer.appendChild(createLine(4)); // 2つ目の横線も4桁分
            mathContainer.appendChild(r_carry);       // 横線の下に繰り上がりメモを配置
            mathContainer.appendChild(r7);            // その下に最終答え

            const checkBtn = document.createElement('button');
            checkBtn.className = 'check-btn';
            checkBtn.textContent = 'できた';

            answerArea.appendChild(mathContainer);
            answerArea.appendChild(checkBtn);
            appContainer.appendChild(answerArea);

            // 判定ロジックおよびiPad連動（CSV出力）
            checkBtn.addEventListener('click', () => {
                // ボタンが「次の問題へ」の時は再描画して処理終了
                if (checkBtn.textContent === '次の問題へ') {
                    renderProblem();
                    return;
                }

                // 最終的な答えの4つの枠（box9〜12）で判定します。補助枠（carry-box）は判定に含めません。
                let u9 = parseInt(document.getElementById('ans-box9').textContent, 10);
                let u10 = parseInt(document.getElementById('ans-box10').textContent, 10);
                let u11 = parseInt(document.getElementById('ans-box11').textContent, 10);
                let u12 = parseInt(document.getElementById('ans-box12').textContent, 10);
                
                // 4枠すべてが空欄なら処理を中断
                if (isNaN(u9) && isNaN(u10) && isNaN(u11) && isNaN(u12)) return;

                // 未入力の枠は 0 として扱う（答えが3桁の際、千の位を空欄にしても判定できるようにするため）
                u9 = isNaN(u9) ? 0 : u9;
                u10 = isNaN(u10) ? 0 : u10;
                u11 = isNaN(u11) ? 0 : u11;
                u12 = isNaN(u12) ? 0 : u12;

                const finalAns = (u9 * 1000) + (u10 * 100) + (u11 * 10) + u12;
                const isCorrect = (finalAns === expectedFinalAns);
                
                const endTime = new Date();
                const problemType = "計算機入力の学習";
                const problemContent = `入力テスト：筆算 ${currentNum1}×${currentNum2}`;
                const userAnswer = `${finalAns}`;
                const inputMethod = "計算機入力";
                const resultStr = isCorrect ? "正解" : "不正解";
                
                if (window.webkit && window.webkit.messageHandlers.appBridge) {
                    const csvLine = `"${problemType}","${problemContent}","${userAnswer}",${formatTime(problemStartTime)},${formatTime(endTime)},${inputMethod},${resultStr}\n`;
                    window.webkit.messageHandlers.appBridge.postMessage({
                        action: "saveCSV",
                        csvLine: csvLine
                    });
                }

                const judgeOverlay = document.getElementById('judge-overlay');

                if (isCorrect) {
                    judgeOverlay.textContent = 'せいかい！';
                    judgeOverlay.className = 'judge-overlay show';
                    
                    const soundCheckbox = document.getElementById('sound-checkbox');
                    if (soundCheckbox && soundCheckbox.checked) {
                        okSound.currentTime = 0;
                        okSound.play().catch(e => console.log(e));
                    }
                    
                    // ボタンを「次の問題へ」に変更し、色を緑色にする
                    checkBtn.textContent = '次の問題へ';
                    checkBtn.style.backgroundColor = '#2ecc71';
                    checkBtn.style.boxShadow = '0 4px 0 #27ae60';
                    
                    // 正解後、不要になった入力枠のクリア処理（補助枠のクリアも含む）
                    setTimeout(() => {
                        judgeOverlay.classList.remove('show');
                        const carry1 = document.getElementById('carry-box1');
                        const carry2 = document.getElementById('carry-box2');
                        const carry3 = document.getElementById('carry-box3');
                        if (carry1) carry1.textContent = '';
                        if (carry2) carry2.textContent = '';
                        if (carry3) carry3.textContent = '';
                    }, 1200);
                } else {
                    judgeOverlay.textContent = 'おしい！';
                    judgeOverlay.className = 'judge-overlay incorrect show';
                    
                    const soundCheckbox = document.getElementById('sound-checkbox');
                    if (soundCheckbox && soundCheckbox.checked) {
                        ngSound.currentTime = 0;
                        ngSound.play().catch(e => console.log(e));
                    }
                    
                    setTimeout(() => {
                        judgeOverlay.classList.remove('show');
                    }, 1200);
                }
            });
        }

        // --- スタートボタンのイベントリスナー ---
        document.getElementById('start-btn').addEventListener('click', () => {
            document.getElementById('start-screen').style.display = 'none';
            document.getElementById('main-content').style.display = 'block';
            renderProblem();
        });
    </script>
</body>
</html>
